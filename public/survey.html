<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<title>모임 후기 — ntable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Navy */
    --navy:        #0a0f1e;
    --navy-light:  #0f1628;
    --navy-mid:    #141d35;
    /* Surfaces */
    --surface:     #141d35;
    --surface-2:   #1a2442;
    --surface-3:   #223056;
    /* Gold (landing 기준) */
    --gold:        #d4a843;
    --gold-light:  #f0ca60;
    --gold-dim:    rgba(212,168,67,0.18);
    --gold-dim-2:  rgba(212,168,67,0.08);
    --gold-border: rgba(212,168,67,0.35);
    /* Text */
    --white:       #f5f2ec;
    --white-dim:   rgba(245,242,236,0.88);
    --white-muted: rgba(245,242,236,0.72);
    --text:        #ddd5bc;
    --text-muted:  rgba(216,208,187,0.78);
    --text-dim:    rgba(216,208,187,0.65);
    --subtext:     rgba(216,208,187,0.78);
    /* UI */
    --border:      rgba(255,255,255,0.14);
    --input-border:#5a6178;
    --placeholder: rgba(216,208,187,0.65);
    --danger:      #e87e7e;
    --success:     #7ee8a2;
    /* Motion */
    --radius:      10px;
    --radius-lg:   18px;
    --transition:  0.32s cubic-bezier(0.4,0,0.2,1);
  }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'DM Sans', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 44px 18px 60px;
    padding-top: calc(44px + env(safe-area-inset-top));
    padding-bottom: calc(60px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(212,168,67,0.09), transparent 55%),
      radial-gradient(circle at 80% 90%, rgba(80,100,180,0.06), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { width: 100%; max-width: 460px; position: relative; z-index: 1; }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.14em;
    color: var(--gold);
    text-align: center;
    margin-bottom: 18px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 10px;
    line-height: 1.25;
  }
  .sub {
    color: var(--subtext);
    font-size: 14px;
    margin-bottom: 32px;
    line-height: 1.7;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--gold-border);
    border-radius: 18px;
    padding: 22px;
    margin-bottom: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .label {
    font-size: 12px;
    color: var(--gold);
    margin-bottom: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .label::before {
    content: '';
    width: 16px; height: 1px;
    background: var(--gold);
  }

  .stars { display: flex; gap: 10px; justify-content: center; padding: 8px 0; }
  .star {
    font-size: 36px;
    cursor: pointer;
    color: var(--surface-2);
    transition: color 0.15s, transform 0.1s;
    user-select: none;
  }
  .star:hover { transform: scale(1.12); }
  .star.active { color: var(--gold); text-shadow: 0 0 12px rgba(212,168,67,0.3); }

  .yn-group { display: flex; gap: 10px; }
  .yn-btn {
    flex: 1;
    padding: 15px 12px;
    border: 1.5px solid var(--input-border);
    border-radius: 12px;
    background: var(--navy-light);
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .yn-btn:hover { border-color: var(--gold-border); }
  .yn-btn.active {
    border-color: var(--gold);
    color: var(--gold-light);
    background: var(--gold-dim);
  }

  input[type=range] {
    width: 100%;
    accent-color: var(--gold);
    margin-top: 4px;
    height: 6px;
  }
  .nps-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--subtext);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }
  .nps-val {
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
    font-size: 36px;
    font-weight: 600;
    color: var(--gold);
    margin-top: 10px;
    line-height: 1;
  }

  textarea, input[type=text] {
    width: 100%;
    background: var(--navy-light);
    border: 1.5px solid var(--input-border);
    border-radius: 12px;
    color: var(--white);
    font-size: 14px;
    padding: 14px;
    resize: none;
    outline: none;
    font-family: inherit;
    line-height: 1.6;
    transition: border-color 0.2s;
  }
  textarea:focus, input[type=text]:focus { border-color: var(--gold); }
  textarea::placeholder, input[type=text]::placeholder { color: var(--placeholder); opacity: 1; }
  textarea { height: 90px; }

  .submit-btn {
    width: 100%;
    padding: 17px;
    background: linear-gradient(135deg, var(--gold), #a07828);
    color: var(--navy);
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 10px;
    transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    letter-spacing: 0.04em;
    box-shadow: 0 4px 18px rgba(212,168,67,0.25);
    font-family: inherit;
  }
  .submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,168,67,0.35); }
  .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }

  /* ── Focus visible (A11y) ── */
  button:focus-visible, input:focus-visible, textarea:focus-visible, a:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  /* ── Mobile (≤480px) ── */
  @media (max-width: 480px) {
    body { padding: 28px 14px 50px;
           padding-top: calc(28px + env(safe-area-inset-top));
           padding-bottom: calc(50px + env(safe-area-inset-bottom)); }
    .brand { font-size: 18px; margin-bottom: 14px; }
    h1 { font-size: 24px; }
    .sub { font-size: 13px; margin-bottom: 24px; }
    .section { padding: 18px; border-radius: 16px; margin-bottom: 12px; }
    .label { font-size: 11px; margin-bottom: 12px; }
    .stars { gap: 6px; }
    .star { font-size: 32px; }
    .yn-btn { padding: 13px 10px; font-size: 13px; }
    .nps-val { font-size: 30px; }
    textarea, input[type=text] { padding: 12px; font-size: 13.5px; }
    textarea { height: 80px; }
    .submit-btn { padding: 15px; font-size: 14.5px; }
  }
</style>
<script src="/sentry-init.js" data-page="survey" defer></script>
</head>
<body>
<div class="container">
  <div class="brand">ntable</div>
  <h1>오늘 모임 어떠셨나요?</h1>
  <p class="sub">솔직한 후기가 더 좋은 모임을 만들어요 🙏</p>

  <div class="section">
    <div class="label">만족도</div>
    <div class="stars" id="stars">
      <span class="star" data-v="1">★</span>
      <span class="star" data-v="2">★</span>
      <span class="star" data-v="3">★</span>
      <span class="star" data-v="4">★</span>
      <span class="star" data-v="5">★</span>
    </div>
  </div>

  <div class="section">
    <div class="label">다음 모임에도 참여하시겠어요?</div>
    <div class="yn-group">
      <button type="button" class="yn-btn" id="yn-y" onclick="setYN(true)">✅ 네, 또 올게요</button>
      <button type="button" class="yn-btn" id="yn-n" onclick="setYN(false)">🤔 아직 모르겠어요</button>
    </div>
  </div>

  <div class="section">
    <div class="label">이 모임을 주변에 추천하시겠어요? (0~10)</div>
    <input type="range" id="nps" min="0" max="10" value="7" aria-label="NPS 점수 (0~10)" oninput="document.getElementById('nps-val').textContent=this.value">
    <div class="nps-labels"><span>전혀 아니오</span><span>매우 그렇다</span></div>
    <div class="nps-val" id="nps-val">7</div>
  </div>

  <div class="section">
    <div class="label">오늘 가장 기억에 남는 순간</div>
    <textarea id="best" placeholder="예: 밸런스 게임 할 때 다들 웃었던 순간 😄" aria-label="가장 기억에 남는 순간"></textarea>
  </div>

  <div class="section">
    <div class="label">아쉬웠던 점</div>
    <textarea id="regret" placeholder="솔직하게 적어주세요. 더 나은 모임을 만드는 데 쓸게요." aria-label="아쉬웠던 점"></textarea>
  </div>

  <div class="section">
    <div class="label">한 줄 후기</div>
    <input type="text" id="review" placeholder="한 문장으로 오늘을 표현한다면?" aria-label="한 줄 후기">
  </div>

  <button type="button" class="submit-btn" id="submit-btn" onclick="submit()">후기 제출하기</button>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const room_code = params.get('room');
  const uuid = localStorage.getItem('demo_uuid');
  if (!uuid || !room_code) location.href = '/';

  let satisfaction = 0;
  let revisit = null;

  document.querySelectorAll('.star').forEach(s => {
    s.addEventListener('click', () => {
      satisfaction = parseInt(s.dataset.v);
      document.querySelectorAll('.star').forEach(x => {
        x.classList.toggle('active', parseInt(x.dataset.v) <= satisfaction);
      });
    });
  });

  function setYN(val) {
    revisit = val;
    document.getElementById('yn-y').classList.toggle('active', val === true);
    document.getElementById('yn-n').classList.toggle('active', val === false);
  }

  async function submit() {
    if (!satisfaction) return alert('만족도를 선택해주세요');
    if (revisit === null) return alert('재방문 의향을 선택해주세요');

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '제출 중...';

    try {
      const r = await fetch('/api/survey', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          uuid, room_code,
          satisfaction,
          revisit,
          nps: parseInt(document.getElementById('nps').value),
          best_moment: document.getElementById('best').value,
          regret: document.getElementById('regret').value,
          review: document.getElementById('review').value
        })
      });
      const data = await r.json();
      if (data.success) {
        location.href = `/result?room=${room_code}&uuid=${uuid}`;
      } else {
        alert('제출 중 오류가 발생했어요');
        btn.disabled = false;
        btn.textContent = '후기 제출하기';
      }
    } catch {
      alert('네트워크 오류');
      btn.disabled = false;
      btn.textContent = '후기 제출하기';
    }
  }
</script>
</body>
</html>
