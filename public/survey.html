<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<link rel="stylesheet" href="/theme-lock.css">
<script src="/samsung-dark-warn.js" defer></script>
<script src="/oauth-redirect.js"></script>
<script src="/auth-header.js" defer></script>
<script src="/remember-toggle.js" defer></script>
<title>모임 후기 — ntable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Navy */
    --navy:        #0a0f1e;
    --navy-light:  #0f1628;
    --navy-mid:    #141d35;
    /* Surfaces */
    --surface:     #141d35;
    --surface-2:   #1a2442;
    --surface-3:   #223056;
    /* Gold (landing 기준) */
    --gold:        #d4a843;
    --gold-light:  #f0ca60;
    --gold-dim:    rgba(212,168,67,0.18);
    --gold-dim-2:  rgba(212,168,67,0.08);
    --gold-border: rgba(212,168,67,0.35);
    /* Text */
    --white:       #f5f2ec;
    --white-dim:   rgba(245,242,236,0.88);
    --white-muted: rgba(245,242,236,0.72);
    --text:        #ddd5bc;
    --text-muted:  rgba(216,208,187,0.78);
    --text-dim:    rgba(216,208,187,0.65);
    --subtext:     rgba(216,208,187,0.78);
    /* UI */
    --border:      rgba(255,255,255,0.14);
    --input-border:#5a6178;
    --placeholder: rgba(216,208,187,0.65);
    --danger:      #e87e7e;
    --success:     #7ee8a2;
    /* Motion */
    --radius:      10px;
    --radius-lg:   18px;
    --transition:  0.32s cubic-bezier(0.4,0,0.2,1);
  }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'DM Sans', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 44px 18px 60px;
    padding-top: calc(44px + env(safe-area-inset-top));
    padding-bottom: calc(60px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(212,168,67,0.09), transparent 55%),
      radial-gradient(circle at 80% 90%, rgba(80,100,180,0.06), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { width: 100%; max-width: 460px; position: relative; z-index: 1; }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.14em;
    color: var(--gold);
    text-align: center;
    margin-bottom: 18px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 10px;
    line-height: 1.25;
  }
  .sub {
    color: var(--subtext);
    font-size: 14px;
    margin-bottom: 32px;
    line-height: 1.7;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--gold-border);
    border-radius: 18px;
    padding: 22px;
    margin-bottom: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .label {
    font-size: 12px;
    color: var(--gold);
    margin-bottom: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .label::before {
    content: '';
    width: 16px; height: 1px;
    background: var(--gold);
  }

  .stars { display: flex; gap: 10px; justify-content: center; padding: 8px 0; }
  .star {
    font-size: 36px;
    cursor: pointer;
    color: var(--surface-2);
    transition: color 0.15s, transform 0.1s;
    user-select: none;
  }
  .star:hover { transform: scale(1.12); }
  .star.active { color: var(--gold); text-shadow: 0 0 12px rgba(212,168,67,0.3); }

  .yn-group { display: flex; gap: 10px; }
  .yn-btn {
    flex: 1;
    padding: 15px 12px;
    border: 1.5px solid var(--input-border);
    border-radius: 12px;
    background: var(--navy-light);
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .yn-btn:hover { border-color: var(--gold-border); }
  .yn-btn.active {
    border-color: var(--gold);
    color: var(--gold-light);
    background: var(--gold-dim);
  }

  input[type=range] {
    width: 100%;
    accent-color: var(--gold);
    margin-top: 4px;
    height: 6px;
  }
  .nps-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--subtext);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }
  .nps-val {
    font-family: 'Cormorant Garamond', serif;
    text-align: center;
    font-size: 36px;
    font-weight: 600;
    color: var(--gold);
    margin-top: 10px;
    line-height: 1;
  }

  textarea, input[type=text] {
    width: 100%;
    background: var(--navy-light);
    border: 1.5px solid var(--input-border);
    border-radius: 12px;
    color: var(--white);
    font-size: 14px;
    padding: 14px;
    resize: none;
    outline: none;
    font-family: inherit;
    line-height: 1.6;
    transition: border-color 0.2s;
  }
  textarea:focus, input[type=text]:focus { border-color: var(--gold); }
  textarea::placeholder, input[type=text]::placeholder { color: var(--placeholder); opacity: 1; }
  textarea { height: 90px; }

  .submit-btn {
    width: 100%;
    padding: 17px;
    background: linear-gradient(135deg, var(--gold), #a07828);
    color: var(--navy);
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 10px;
    transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    letter-spacing: 0.04em;
    box-shadow: 0 4px 18px rgba(212,168,67,0.25);
    font-family: inherit;
  }
  .submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,168,67,0.35); }
  .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }

  /* 카테고리 태그 */
  .tag-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag-chip {
    border: 1.5px solid var(--input-border);
    background: var(--navy-light);
    color: var(--text);
    border-radius: 999px;
    padding: 9px 14px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .tag-chip:hover { border-color: var(--gold-border); }
  .tag-chip.selected {
    border-color: var(--gold);
    background: var(--gold-dim);
    color: var(--gold-light);
    font-weight: 600;
  }

  /* 참여자 연결 투표 */
  .people-list { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; }
  .person-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    background: var(--navy-light);
    border: 1.5px solid var(--input-border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    text-align: left;
  }
  .person-row:hover { border-color: var(--gold-border); }
  .person-row.selected { border-color: var(--gold); background: var(--gold-dim); }
  .person-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface-2); color: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; flex-shrink: 0;
  }
  .person-name { font-size: 14px; color: var(--white); flex: 1; }
  .person-meta { font-size: 11px; color: var(--text-muted); }
  .person-check { color: var(--gold); font-size: 16px; opacity: 0; }
  .person-row.selected .person-check { opacity: 1; }

  /* 호스트 섹션은 호스트 본인일 때 숨김 */
  #hostSection.hidden { display: none; }

  /* 제출 완료 오버레이 + 공유 카드 */
  #doneOverlay {
    position: fixed; inset: 0;
    background: rgba(10,15,30,0.96);
    backdrop-filter: blur(14px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 999;
    padding: 24px;
  }
  #doneOverlay.show { display: flex; }
  .done-card {
    background: var(--surface);
    border: 1px solid var(--gold-border);
    border-radius: 22px;
    padding: 36px 28px 30px;
    text-align: center;
    max-width: 420px;
    width: 100%;
  }
  .done-card h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 600;
    color: var(--gold-light);
    margin-bottom: 10px;
  }
  .done-card p { font-size: 14px; color: var(--subtext); margin-bottom: 20px; line-height: 1.6; }
  .mutual-badge {
    display: inline-block;
    background: var(--gold-dim);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    border-radius: 14px;
    padding: 10px 16px;
    font-size: 13px;
    margin-bottom: 18px;
  }
  .share-btn {
    width: 100%;
    padding: 14px;
    border: 1px solid var(--gold);
    background: var(--gold-dim);
    color: var(--gold-light);
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    margin-top: 10px;
    font-size: 14px;
  }
  .share-btn:hover { background: var(--gold-dim-2); }
  .close-done {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    margin-top: 10px;
    font-size: 13px;
  }

  /* 제출 불가 안내 */
  .ineligible-banner {
    background: var(--surface);
    border: 1px solid var(--danger);
    border-radius: 14px;
    padding: 18px;
    color: var(--danger);
    font-size: 13px;
    text-align: center;
    margin-bottom: 20px;
  }
  .ineligible-actions {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    margin-top: 14px;
  }
  .ineligible-actions a {
    padding: 10px 18px;
    background: var(--surface-2);
    border: 1px solid var(--gold-border);
    color: var(--gold-light);
    border-radius: 10px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
  }
  .ineligible-actions a.primary {
    background: linear-gradient(135deg, var(--gold), #a07828);
    color: var(--navy);
    border-color: transparent;
  }
  .ineligible-actions a:hover { transform: translateY(-1px); }

  /* ── Focus visible (A11y) ── */
  button:focus-visible, input:focus-visible, textarea:focus-visible, a:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  /* ── Mobile (≤480px) ── */
  @media (max-width: 480px) {
    body { padding: 28px 14px 50px;
           padding-top: calc(28px + env(safe-area-inset-top));
           padding-bottom: calc(50px + env(safe-area-inset-bottom)); }
    .brand { font-size: 18px; margin-bottom: 14px; }
    h1 { font-size: 24px; }
    .sub { font-size: 13px; margin-bottom: 24px; }
    .section { padding: 18px; border-radius: 16px; margin-bottom: 12px; }
    .label { font-size: 11px; margin-bottom: 12px; }
    .stars { gap: 6px; }
    .star { font-size: 32px; }
    .yn-btn { padding: 13px 10px; font-size: 13px; }
    .nps-val { font-size: 30px; }
    textarea, input[type=text] { padding: 12px; font-size: 13.5px; }
    textarea { height: 80px; }
    .submit-btn { padding: 15px; font-size: 14.5px; }
  }
</style>
<script src="/sentry-init.js" data-page="survey" defer></script>
</head>
<body>
<div class="container">
  <div class="brand">ntable</div>
  <h1>오늘 모임 어떠셨나요?</h1>
  <p class="sub">솔직한 후기가 다음 모임을 더 좋게 만들어요 🙏</p>

  <div id="mainForm" hidden>
    <div class="section">
      <div class="label">모임 만족도</div>
      <div class="stars" id="stars">
        <span class="star active" data-v="1">★</span>
        <span class="star active" data-v="2">★</span>
        <span class="star active" data-v="3">★</span>
        <span class="star active" data-v="4">★</span>
        <span class="star active" data-v="5">★</span>
      </div>
    </div>

    <div class="section">
      <div class="label">다음 모임에도 참여하시겠어요?</div>
      <div class="yn-group">
        <button type="button" class="yn-btn active" id="yn-y" onclick="setYN(true)">✅ 네, 또 올게요</button>
        <button type="button" class="yn-btn" id="yn-n" onclick="setYN(false)">🤔 아직 모르겠어요</button>
      </div>
    </div>

    <div class="section">
      <div class="label">이 모임을 주변에 추천 (0~10)</div>
      <input type="range" id="nps" min="0" max="10" value="9" aria-label="NPS 점수" oninput="document.getElementById('nps-val').textContent=this.value">
      <div class="nps-labels"><span>전혀 아니오</span><span>매우 그렇다</span></div>
      <div class="nps-val" id="nps-val">9</div>
    </div>

    <div class="section">
      <div class="label">무엇이 좋았나요? (여러 개 선택)</div>
      <div class="tag-group" id="tagGroup">
        <button type="button" class="tag-chip" data-tag="conversation">💬 대화 분위기</button>
        <button type="button" class="tag-chip" data-tag="host">🎤 호스트 진행</button>
        <button type="button" class="tag-chip" data-tag="matching">💫 매칭·연결</button>
        <button type="button" class="tag-chip" data-tag="questions">🎴 질문 구성</button>
        <button type="button" class="tag-chip" data-tag="space">🏠 공간·분위기</button>
        <button type="button" class="tag-chip" data-tag="people">👥 참여자 조합</button>
        <button type="button" class="tag-chip" data-tag="pacing">⏱️ 시간 배분</button>
      </div>
    </div>

    <div class="section" id="hostSection">
      <div class="label">호스트는 어땠나요? (평균만 공개, 코멘트는 관리자만)</div>
      <div class="stars" id="hostStars">
        <span class="star" data-v="1">★</span>
        <span class="star" data-v="2">★</span>
        <span class="star" data-v="3">★</span>
        <span class="star" data-v="4">★</span>
        <span class="star" data-v="5">★</span>
      </div>
      <input type="text" id="hostComment" placeholder="호스트에게 전하는 한 마디 (선택)" style="margin-top:14px" aria-label="호스트 코멘트" />
    </div>

    <div class="section">
      <div class="label">오늘 가장 기억에 남는 순간</div>
      <textarea id="best" placeholder="예: 밸런스 게임 할 때 다들 웃었던 순간 😄" aria-label="기억에 남는 순간"></textarea>
    </div>

    <div class="section">
      <div class="label">아쉬웠던 점</div>
      <textarea id="regret" placeholder="솔직하게 적어주세요. 더 나은 모임을 만드는 데 쓸게요." aria-label="아쉬웠던 점"></textarea>
    </div>

    <div class="section">
      <div class="label">한 줄 후기</div>
      <input type="text" id="review" placeholder="한 문장으로 오늘을 표현한다면?" aria-label="한 줄 후기" />
    </div>

    <div class="section" id="connSection" hidden>
      <div class="label">또 만나고 싶은 사람</div>
      <p style="font-size:12px; color:var(--text-muted); margin-bottom:12px; line-height:1.5;">상대방도 나를 선택하면 서로에게 결과 페이지에서 공개됩니다. 단방향 선택은 공개되지 않아요.</p>
      <div class="people-list" id="peopleList"></div>
    </div>

    <button type="button" class="submit-btn" id="submit-btn" onclick="submitSurvey()">후기 제출하기</button>
  </div>

  <div class="ineligible-banner" id="ineligibleBanner" hidden></div>
</div>

<!-- 완료 오버레이 -->
<div id="doneOverlay" role="dialog" aria-labelledby="doneTitle">
  <div class="done-card">
    <h2 id="doneTitle">후기 제출 완료</h2>
    <div id="mutualWrap"></div>
    <button type="button" class="close-done" onclick="goResult()">매칭 결과 보러가기 →</button>
  </div>
</div>

<canvas id="shareCanvas" width="1080" height="1920" style="display:none"></canvas>

<script>
  const params = new URLSearchParams(location.search);
  const room_code = params.get('room');
  const uuid = localStorage.getItem('demo_uuid');
  const mainForm = document.getElementById('mainForm');
  const ineligibleBanner = document.getElementById('ineligibleBanner');

  if (!uuid || !room_code) location.href = '/';

  // 응답 완료율 우선 — 기본값을 긍정 쪽으로 pre-fill (호스트 평가는 제외)
  let satisfaction = 5;
  let revisit = true;
  let hostRating = 0;
  let isHost = false;
  let roomTitle = '';
  let selectedTags = new Set();
  let selectedPicks = new Set();

  // ── 자격 검증 (재진입 대응)
  async function checkEligibility() {
    try {
      const r = await fetch(`/api/survey/eligibility?room=${encodeURIComponent(room_code)}&uuid=${encodeURIComponent(uuid)}`);
      const data = await r.json();
      if (!data.eligible) {
        let msg = '후기 제출 불가';
        let actions = '';
        let bannerOnClickHome = false;
        if (data.reason === 'NOT_PARTICIPANT') {
          msg = '이 모임에 참여한 기록이 없어 후기를 남길 수 없어요. (탭하면 홈으로)';
          bannerOnClickHome = true;
        } else if (data.reason === 'ALREADY_SUBMITTED') {
          msg = '이미 후기를 제출했어요. 잠시 후 결과 페이지로 이동합니다.';
          actions = `<div class="ineligible-actions">
            <a href="/result?room=${encodeURIComponent(room_code)}&uuid=${encodeURIComponent(uuid)}" class="primary">결과 보기</a>
            <a href="/">홈으로</a>
          </div>`;
        } else if (data.reason === 'ROOM_NOT_FOUND') {
          msg = '해당 모임을 찾을 수 없어요. (탭하면 홈으로)';
          bannerOnClickHome = true;
        } else {
          msg = '후기 제출 불가. (탭하면 홈으로)';
          bannerOnClickHome = true;
        }
        ineligibleBanner.innerHTML = '<div>' + msg + '</div>' + actions;
        ineligibleBanner.hidden = false;
        if (bannerOnClickHome) {
          ineligibleBanner.style.cursor = 'pointer';
          ineligibleBanner.onclick = () => { location.href = '/'; };
        } else {
          ineligibleBanner.style.cursor = '';
          ineligibleBanner.onclick = null;
        }
        if (data.reason === 'ALREADY_SUBMITTED') {
          setTimeout(goResult, 1500);
        }
        // pending_survey cleanup
        localStorage.removeItem('pending_survey');
        return false;
      }
      isHost = !!data.is_host;
      roomTitle = data.room_title || '';
      if (isHost) document.getElementById('hostSection').classList.add('hidden');
      mainForm.hidden = false;
      // 다음 로그인 때 자동 리다이렉트용 pending 저장
      localStorage.setItem('pending_survey', room_code);
      loadParticipants();
      return true;
    } catch {
      ineligibleBanner.innerHTML = '<div>일시적인 오류입니다. 잠시 후 다시 시도해주세요.</div>'
        + '<div class="ineligible-actions"><a href="/" class="primary">홈으로</a></div>';
      ineligibleBanner.hidden = false;
      return false;
    }
  }

  async function loadParticipants() {
    try {
      // couples 팩은 2인 전용 — '또 만나고 싶은 사람' 선택 의미 없어 섹션 자체 노출 안 함
      try {
        const rr = await fetch(`/api/rooms/${encodeURIComponent(room_code)}`);
        if (rr.ok) {
          const rd = await rr.json();
          if (rd.pack_id === 'couples') return;
        }
      } catch (_) {}
      const r = await fetch(`/api/survey/participants?room=${encodeURIComponent(room_code)}&uuid=${encodeURIComponent(uuid)}`);
      const list = await r.json();
      if (!Array.isArray(list) || list.length === 0) return;
      const wrap = document.getElementById('peopleList');
      wrap.innerHTML = '';
      list.forEach(p => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'person-row';
        btn.dataset.uuid = p.uuid;
        // 아바타: 사용자 이모지 우선 → 성별 기본 이모지 → 닉네임 첫글자 순 폴백
        const defaultEmoji = (p.gender === 'M' || p.gender === 'male') ? '👨'
                           : (p.gender === 'F' || p.gender === 'female') ? '👩' : '🙂';
        const avatarChar = p.emoji || defaultEmoji || (p.nickname || '?').slice(0, 1).toUpperCase();
        const meta = [p.mbti, p.birth_year ? `${new Date().getFullYear() - p.birth_year + 1}세` : null].filter(Boolean).join(' · ');
        btn.innerHTML = `
          <div class="person-avatar">${escHtml(avatarChar)}</div>
          <div style="flex:1">
            <div class="person-name">${escHtml(p.nickname)}</div>
            ${meta ? `<div class="person-meta">${escHtml(meta)}</div>` : ''}
          </div>
          <div class="person-check">✓</div>`;
        btn.addEventListener('click', () => togglePick(p.uuid, btn));
        wrap.appendChild(btn);
      });
      document.getElementById('connSection').hidden = false;
    } catch {}
  }

  function togglePick(u, btn) {
    if (selectedPicks.has(u)) {
      selectedPicks.delete(u);
      btn.classList.remove('selected');
    } else {
      if (selectedPicks.size >= 3) {
        btn.animate([{ transform: 'translateX(-4px)' }, { transform: 'translateX(4px)' }, { transform: 'translateX(0)' }], { duration: 200 });
        return;
      }
      selectedPicks.add(u);
      btn.classList.add('selected');
    }
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── 별점 핸들러
  function bindStars(containerId, setter) {
    document.querySelectorAll(`#${containerId} .star`).forEach(s => {
      s.addEventListener('click', () => {
        const v = parseInt(s.dataset.v, 10);
        setter(v);
        document.querySelectorAll(`#${containerId} .star`).forEach(x => {
          x.classList.toggle('active', parseInt(x.dataset.v, 10) <= v);
        });
      });
    });
  }
  bindStars('stars', v => { satisfaction = v; });
  bindStars('hostStars', v => { hostRating = v; });

  function setYN(val) {
    revisit = val;
    document.getElementById('yn-y').classList.toggle('active', val === true);
    document.getElementById('yn-n').classList.toggle('active', val === false);
  }

  // 태그 선택
  document.querySelectorAll('.tag-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const tag = chip.dataset.tag;
      if (selectedTags.has(tag)) {
        selectedTags.delete(tag);
        chip.classList.remove('selected');
      } else {
        selectedTags.add(tag);
        chip.classList.add('selected');
      }
    });
  });

  async function submitSurvey() {
    if (!satisfaction) return alert('모임 만족도를 선택해주세요');
    if (revisit === null) return alert('재방문 의향을 선택해주세요');

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '제출 중...';

    const payload = {
      uuid, room_code,
      satisfaction,
      revisit,
      nps: parseInt(document.getElementById('nps').value, 10),
      best_moment: document.getElementById('best').value,
      regret: document.getElementById('regret').value,
      review: document.getElementById('review').value,
      host_rating: isHost ? null : (hostRating || null),
      host_comment: isHost ? null : (document.getElementById('hostComment').value || null),
      liked_tags: [...selectedTags],
    };

    try {
      const r = await fetch('/api/survey', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await r.json();
      if (r.status === 409) {
        alert('이미 후기를 제출했어요. 결과 페이지로 이동합니다.');
        goResult();
        return;
      }
      if (!r.ok || !data.success) throw new Error(data.message || data.error || '제출 실패');

      // 연결 투표 (선택적)
      let mutuals = [];
      if (selectedPicks.size > 0) {
        try {
          const cr = await fetch('/api/connections', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uuid, room_code, picks: [...selectedPicks] }),
          });
          const cdata = await cr.json();
          mutuals = cdata.mutuals || [];
        } catch {}
      }

      localStorage.removeItem('pending_survey');
      showDone(mutuals);
    } catch (err) {
      alert(err.message || '네트워크 오류');
      btn.disabled = false;
      btn.textContent = '후기 제출하기';
    }
  }

  // 상호 선택 상대 누적 — 제출 응답 + WS broadcast 양쪽에서 갱신
  const mutualMap = new Map(); // target_uuid → nickname
  function updateMutualBadge() {
    const wrap = document.getElementById('mutualWrap');
    if (!wrap) return;
    if (mutualMap.size === 0) { wrap.innerHTML = ''; return; }
    const names = [...mutualMap.values()].map(escHtml).join(', ');
    wrap.innerHTML = `<div class="mutual-badge">💫 <strong>${names}</strong>님과 서로 선택했어요</div>`;
  }
  function showDone(mutuals) {
    if (Array.isArray(mutuals)) {
      for (const m of mutuals) {
        if (m && m.uuid && m.nickname) mutualMap.set(m.uuid, m.nickname);
      }
    }
    updateMutualBadge();
    document.getElementById('doneOverlay').classList.add('show');
  }

  // WS 연결 — 내가 먼저 제출한 뒤 상대가 나중에 나를 선택하면 실시간으로 '서로 선택' 뱃지 갱신
  let _surveyWs = null;
  function connectSurveyWs() {
    try {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      _surveyWs = new WebSocket(`${proto}://${location.host}/ws/${room_code}/${uuid}`);
      _surveyWs.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type !== 'connection_mutual') return;
          const involved = (msg.a && msg.a.uuid === uuid) || (msg.b && msg.b.uuid === uuid);
          if (!involved) return;
          const other = msg.a?.uuid === uuid ? msg.b : msg.a;
          if (!other || !other.uuid || !other.nickname) return;
          mutualMap.set(other.uuid, other.nickname);
          updateMutualBadge();
          // 완료 오버레이가 아직 뜨지 않았다면 자연스럽게 보이도록 띄움 (제출은 이미 됐다는 의미)
          document.getElementById('doneOverlay').classList.add('show');
        } catch (_) {}
      };
      _surveyWs.onclose = () => { setTimeout(connectSurveyWs, 5000); };
      _surveyWs.onerror = () => { try { _surveyWs.close(); } catch (_) {} };
    } catch (_) {}
  }
  connectSurveyWs();

  // 서버에서 이미 상호 매칭된 상대 목록 가져와 뱃지 복구 (먼저 제출하고 화면 꺼진 사이 B가 제출한 경우 커버)
  async function refreshMutualsFromServer() {
    try {
      const r = await fetch(`/api/connections/status?room_code=${encodeURIComponent(room_code)}&uuid=${encodeURIComponent(uuid)}`);
      if (!r.ok) return;
      const d = await r.json();
      if (!Array.isArray(d.mutuals)) return;
      let changed = false;
      for (const m of d.mutuals) {
        if (m && m.uuid && m.nickname && !mutualMap.has(m.uuid)) {
          mutualMap.set(m.uuid, m.nickname);
          changed = true;
        }
      }
      if (changed) {
        updateMutualBadge();
        if (mutualMap.size > 0) document.getElementById('doneOverlay').classList.add('show');
      }
    } catch (_) {}
  }
  refreshMutualsFromServer();

  // 모바일 보호모드(화면 꺼짐) 후 복귀 — WS 재연결 + 상태 재동기화
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    if (!_surveyWs || _surveyWs.readyState > 1) { try { connectSurveyWs(); } catch (_) {} }
    refreshMutualsFromServer();
  });

  function goResult() {
    location.href = `/result?room=${room_code}&uuid=${uuid}`;
  }

  // ── 인스타 스토리용 카드 그리기 (html2canvas 대신 Canvas API 로 경량 구현)
  async function shareCard() {
    const c = document.getElementById('shareCanvas');
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#0a0f1e';
    ctx.fillRect(0, 0, c.width, c.height);
    // 골드 배지
    const grad = ctx.createLinearGradient(0, 0, c.width, c.height);
    grad.addColorStop(0, 'rgba(212,168,67,0.08)');
    grad.addColorStop(1, 'rgba(212,168,67,0.02)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, c.width, c.height);
    // 브랜드
    ctx.font = '600 72px "Cormorant Garamond", serif';
    ctx.fillStyle = '#d4a843';
    ctx.textAlign = 'center';
    ctx.fillText('ntable', c.width / 2, 320);
    // 타이틀
    ctx.font = '600 80px "Cormorant Garamond", serif';
    ctx.fillStyle = '#f5f2ec';
    ctx.fillText('오늘의 모임', c.width / 2, 650);
    // 모임 제목
    ctx.font = '400 44px sans-serif';
    ctx.fillStyle = '#ddd5bc';
    const title = (roomTitle || '').slice(0, 22);
    ctx.fillText(title, c.width / 2, 760);
    // 별점
    const stars = '★'.repeat(satisfaction) + '☆'.repeat(5 - satisfaction);
    ctx.font = '600 96px sans-serif';
    ctx.fillStyle = '#f0ca60';
    ctx.fillText(stars, c.width / 2, 1000);
    // 한 줄 후기
    const review = (document.getElementById('review').value || '').slice(0, 30);
    if (review) {
      ctx.font = 'italic 400 48px "Noto Serif KR", serif';
      ctx.fillStyle = '#f5f2ec';
      ctx.fillText(`"${review}"`, c.width / 2, 1180);
    }
    // URL
    ctx.font = '400 36px sans-serif';
    ctx.fillStyle = 'rgba(245,242,236,0.55)';
    ctx.fillText('ntable.kr', c.width / 2, 1780);

    c.toBlob(async (blob) => {
      if (!blob) return;
      const file = new File([blob], 'ntable-moment.png', { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: 'ntable 모임 후기', text: `오늘 ntable 모임 다녀왔어요 — ${stars}` });
        } catch {}
      } else {
        // fallback: 다운로드
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'ntable-moment.png'; a.click();
        URL.revokeObjectURL(url);
      }
    }, 'image/png');
  }

  checkEligibility();
</script>
