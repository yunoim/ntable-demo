<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<link rel="stylesheet" href="/theme-lock.css">
<link rel="stylesheet" href="/styles/tokens-tv.css">
<script src="/samsung-dark-warn.js" defer></script>
<title>ntable TV — 페어링</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0e1628;
    color: #ffffff;
    font-family: var(--font-body);
    overflow: hidden;
  }
  body { position: relative; }
  .root {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px;
    text-align: center;
  }
  .brand {
    font-family: var(--font-heading);
    font-size: 36px;
    font-weight: 600;
    letter-spacing: 0.4em;
    color: #d4a843;
    margin-bottom: 24px;
  }
  .label {
    font-size: 18px;
    letter-spacing: 0.18em;
    color: #c0c0c0;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .code {
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: clamp(96px, 16vw, 240px);
    font-weight: 700;
    letter-spacing: 0.18em;
    color: #e8b84b;
    line-height: 1;
    margin-bottom: 36px;
    text-shadow: 0 0 30px rgba(232,184,75,0.4);
  }
  .help {
    font-size: 22px;
    color: #ffffff;
    line-height: 1.6;
    max-width: 720px;
  }
  .help strong { color: #e8b84b; }
  .ttl {
    margin-top: 28px;
    font-size: 16px;
    color: #c0c0c0;
  }
  .ttl strong { color: #e8b84b; font-weight: 600; }
  .status {
    margin-top: 24px;
    font-size: 14px;
    color: #c0c0c0;
    opacity: 0.7;
  }
  .err {
    color: #ff8a8a;
    font-size: 18px;
    margin-top: 20px;
  }

  /* T-12 (2026-04-22): 브랜드 캐러셀 — 페어링 대기 시간을 브랜드 기회로 활용 */
  .brand-carousel {
    position: absolute;
    left: 0; right: 0; bottom: clamp(40px, 5vh, 72px);
    min-height: clamp(100px, 12vh, 160px);
    display: flex; align-items: center; justify-content: center;
    padding: 0 40px;
    pointer-events: none;
  }
  .bc-slide {
    position: absolute;
    inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(12px, 1.2vh, 20px);
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .bc-slide.active { opacity: 1; transform: translateY(0); }
  .bc-eyebrow {
    font-family: var(--font-body);
    font-size: clamp(14px, 1.1vw, 20px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-light, #f0ca60);
    opacity: 0.75;
  }
  .bc-text {
    font-family: var(--font-heading);
    font-size: clamp(28px, 3.2vw, 56px);
    font-weight: 600;
    color: #f5f2ec;
    letter-spacing: 0.02em;
    line-height: 1.3;
  }
  .bc-text em { font-style: italic; color: var(--gold-light, #f0ca60); }
  .bc-steps {
    display: flex; gap: clamp(18px, 2vw, 40px);
    align-items: center;
    font-family: var(--font-body);
    font-size: clamp(16px, 1.4vw, 26px);
    color: #ddd5bc;
    letter-spacing: 0.03em;
  }
  .bc-steps .step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: clamp(28px, 2.2vw, 40px); height: clamp(28px, 2.2vw, 40px);
    border-radius: 50%;
    background: rgba(212,168,67,0.18);
    border: 1px solid rgba(212,168,67,0.45);
    color: var(--gold-light, #f0ca60);
    font-weight: 700;
    margin-right: 8px;
  }
  .bc-arrow { color: rgba(212,168,67,0.5); font-size: clamp(14px, 1.1vw, 20px); }
</style>
</head>
<body>
<div class="root">
  <div class="brand">ntable</div>
  <div class="label">TV Pairing Code</div>
  <div class="code" id="code">— — — — — —</div>
  <div class="help">
    모임장 모바일 화면에서 <strong>「TV 연결」</strong> 버튼을 누르고<br>
    위 코드를 입력해주세요.
  </div>
  <div class="ttl"><strong id="ttlSec">300</strong>초 후 코드가 만료됩니다</div>
  <div class="status" id="status">서버 연결 중…</div>
  <div class="err" id="err" hidden></div>
</div>

<!-- T-12 (2026-04-22): 브랜드 캐러셀 — 8초 주기 순환 -->
<div class="brand-carousel" aria-hidden="true">
  <div class="bc-slide active" data-slide="0">
    <span class="bc-eyebrow">모임 진행 도우미</span>
    <span class="bc-text"><em>ntable</em></span>
  </div>
  <div class="bc-slide" data-slide="1">
    <div class="bc-steps">
      <span><span class="step-num">1</span>QR 스캔</span>
      <span class="bc-arrow">→</span>
      <span><span class="step-num">2</span>한 문장 입력</span>
      <span class="bc-arrow">→</span>
      <span><span class="step-num">3</span>입장</span>
    </div>
  </div>
  <div class="bc-slide" data-slide="2">
    <span class="bc-text">누구나 <em>모임장</em>이 되는 모임</span>
  </div>
  <div class="bc-slide" data-slide="3">
    <span class="bc-text">QR 하나로 시작되는 <em>모임 툴킷</em></span>
  </div>
</div>

<script>
function genToken() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'tv-' + Math.random().toString(36).slice(2) + '-' + Date.now().toString(36);
}

const token = genToken();
let ws = null;
let ttl = 300;
let ttlInterval = null;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/tv/${token}`);
  ws.onopen = () => {
    document.getElementById('status').textContent = '페어링 코드 발급 중…';
  };
  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === 'pair_code') {
      document.getElementById('code').textContent = msg.code;
      document.getElementById('status').textContent = '모임장 입력 대기 중…';
      ttl = msg.expires_in || 300;
      startTtl();
    } else if (msg.type === 'attached') {
      document.getElementById('status').textContent = '연결 완료. 화면 전환 중…';
      try { ws.close(); } catch (_) {}
      setTimeout(() => location.replace(`/room/${msg.room_code}/presenter`), 600);
    }
  };
  ws.onclose = (e) => {
    if (e.code === 4007) {
      showErr('코드가 만료됐어요. 새로고침해주세요.');
      return;
    }
    document.getElementById('status').textContent = '재연결 중…';
    setTimeout(connect, 3000);
  };
  ws.onerror = () => { try { ws.close(); } catch (_) {} };
}

function startTtl() {
  if (ttlInterval) clearInterval(ttlInterval);
  ttlInterval = setInterval(() => {
    ttl--;
    document.getElementById('ttlSec').textContent = Math.max(0, ttl);
    if (ttl <= 0) clearInterval(ttlInterval);
  }, 1000);
}

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  el.hidden = false;
  document.getElementById('status').style.display = 'none';
}

// 핑 (TV 장기 연결 유지)
setInterval(() => {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' }));
}, 30000);

// T-12 (2026-04-22): 브랜드 캐러셀 8초 주기 순환
(function initCarousel() {
  var slides = document.querySelectorAll('.bc-slide');
  if (slides.length < 2) return;
  var idx = 0;
  setInterval(function () {
    slides[idx].classList.remove('active');
    idx = (idx + 1) % slides.length;
    slides[idx].classList.add('active');
  }, 8000);
})();

connect();
</script>
</body>
</html>
