<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ntable — 호스트</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0e;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a32;
    --text: #f0ede8;
    --text-muted: #888;
    --gold: #e8c97e;
    --gold-dim: rgba(232,201,126,0.15);
    --green: #4ade80;
    --red: #f87171;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    min-height: 100dvh;
    display: flex;
    overflow: hidden;
  }

  /* ── 사이드패널 ─────────────────────────────── */
  #sidebar {
    width: 180px;
    min-width: 180px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  #qr-wrap {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  #qr-img { width: 100%; border-radius: 8px; background: #fff; display: block; }
  #copy-url-btn {
    margin-top: 8px;
    width: 100%;
    background: var(--gold-dim);
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 8px;
    padding: 6px 0;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
  }
  #copy-url-btn:active { opacity: 0.7; }

  #waiting-section {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .section-title {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 6px;
    padding: 0 2px;
  }

  #approve-all-btn {
    width: 100%;
    background: var(--gold);
    color: #0c0c0e;
    border: none;
    border-radius: 8px;
    padding: 7px 0;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 8px;
    display: none;
  }
  #approve-all-btn:active { opacity: 0.85; }

  .waiting-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border-radius: 8px;
    padding: 6px 8px;
    margin-bottom: 4px;
    gap: 4px;
  }
  .waiting-name {
    font-size: 12px;
    font-weight: 600;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .approve-btn {
    background: var(--gold);
    color: #0c0c0e;
    border: none;
    border-radius: 6px;
    padding: 3px 7px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .approve-btn:active { opacity: 0.8; }

  .approved-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 6px;
    border-radius: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .approved-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

  /* ── 메인 영역 ─────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
    min-width: 0;
  }

  /* ── 탭 바 ─────────────────────────────────── */
  #tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .tab-btn {
    flex: 1;
    padding: 12px 0;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* ── 탭 콘텐츠 ─────────────────────────────── */
  #tab-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── 공통 컴포넌트 ────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .btn-gold {
    background: var(--gold);
    color: #0c0c0e;
    border: none;
    border-radius: 10px;
    padding: 11px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
  }
  .btn-gold:active { opacity: 0.85; }
  .btn-outline {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    margin-top: 6px;
  }
  .btn-outline:active { opacity: 0.7; }
  .btn-red {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    border-radius: 10px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    margin-top: 6px;
  }

  /* ── 소개 탭 ────────────────────────────────── */
  #profile-carousel {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 8px;
    scroll-snap-type: x mandatory;
  }
  .profile-card {
    min-width: 140px;
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 14px 12px;
    scroll-snap-align: start;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .profile-card .name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .profile-card .meta { font-size: 12px; color: var(--text-muted); line-height: 1.7; }
  .profile-card .mbti-badge {
    display: inline-block;
    background: var(--gold-dim);
    color: var(--gold);
    border-radius: 6px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 700;
    margin-top: 4px;
  }

  /* ── 탐구 탭 ────────────────────────────────── */
  .question-number {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .question-text {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .vote-bar-wrap { margin-bottom: 8px; }
  .vote-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
  }
  .vote-bar-bg {
    background: var(--surface2);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }
  .vote-bar-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* 호스트 겸임 투표 버튼 */
  .vote-option-btn {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 11px 14px;
    text-align: left;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 6px;
    transition: border-color 0.2s;
  }
  .vote-option-btn.voted { border-color: var(--gold); color: var(--gold); }
  .vote-option-btn:active { opacity: 0.8; }

  /* ── 자유대화 탭 ─────────────────────────────── */
  #timer-display {
    font-size: 36px;
    font-weight: 800;
    color: var(--gold);
    text-align: center;
    padding: 12px 0;
  }
  .timer-controls { display: flex; gap: 8px; margin-bottom: 8px; }
  .timer-control-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 0;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .question-selector { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
  .q-select-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 8px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  .q-select-item input[type="checkbox"] { accent-color: var(--gold); flex-shrink: 0; }

  #chat-log {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px;
    min-height: 80px;
    max-height: 150px;
    overflow-y: auto;
    font-size: 12px;
    color: var(--text-muted);
  }
  .chat-msg { padding: 3px 0; border-bottom: 1px solid var(--border); }
  .chat-msg:last-child { border-bottom: none; }

  /* ── 마무리 탭 ─────────────────────────────── */
  .mvp-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .mvp-row:last-child { border-bottom: none; }
  .fi-count { color: var(--gold); font-weight: 700; }

  .match-pair {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    font-size: 13px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .match-pair .pair-type { font-size: 11px; color: var(--gold); font-weight: 700; margin-bottom: 4px; }
  .match-pair .pair-names { font-weight: 700; font-size: 15px; }

  /* ── 토스트 ─────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 9999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* 상단 우측 계정/로그아웃 */
  #user-menu {
    display: flex; align-items: center; gap: 8px;
    padding: 0 12px; border-left: 1px solid var(--border); height: 100%;
    font-size: 12px; color: var(--text-muted); flex-shrink: 0;
  }
  #user-menu button {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); border-radius: 16px;
    padding: 5px 10px; font-size: 11px; cursor: pointer;
  }
  #user-menu button:hover { color: var(--text); border-color: var(--gold); }
</style>
</head>
<body>

<!-- 사이드패널 -->
<aside id="sidebar">
  <div id="qr-wrap">
    <img id="qr-img" src="" alt="QR" />
    <button id="copy-url-btn">🔗 URL 복사</button>
  </div>
  <div id="waiting-section">
    <div class="section-title">대기 중</div>
    <button id="approve-all-btn">전체 승인</button>
    <div id="waiting-list"></div>
    <div class="section-title" style="margin-top:12px;">참가자</div>
    <div id="approved-list"></div>
  </div>
</aside>

<!-- 메인 -->
<div id="main">
  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="intro">소개</button>
    <button class="tab-btn" data-tab="explore">탐구</button>
    <button class="tab-btn" data-tab="free">자유대화</button>
    <button class="tab-btn" data-tab="ending">마무리</button>
    <div id="user-menu">
      <span id="user-nick"></span>
      <button onclick="logout()">로그아웃</button>
    </div>
  </nav>

  <div id="tab-content">

    <!-- 소개 탭 -->
    <div class="tab-panel active" id="tab-intro">
      <div class="card">
        <div class="card-title">👥 참가자 소개</div>
        <div id="profile-carousel"></div>
        <div id="no-approved" style="color:var(--text-muted);font-size:13px;text-align:center;padding:12px 0;">
          아직 승인된 참가자가 없습니다
        </div>
      </div>
      <button class="btn-gold" id="start-explore-btn">탐구 시작 →</button>
    </div>

    <!-- 탐구 탭 -->
    <div class="tab-panel" id="tab-explore">
      <div class="card" id="question-card">
        <div class="question-number" id="q-number">Q1 / 13</div>
        <div class="question-text" id="q-text">문항 로딩 중...</div>
        <div id="vote-bars"></div>
        <div id="host-vote-btns" style="display:none; margin-top:10px;"></div>
      </div>
      <button class="btn-gold" id="next-q-btn">다음 문항 →</button>
      <button class="btn-outline" id="skip-to-free-btn" style="display:none;">자유대화 시작</button>
      <button class="btn-red" id="force-match-btn">강제 종료 후 매칭</button>
    </div>

    <!-- 자유대화 탭 -->
    <div class="tab-panel" id="tab-free">
      <div class="card">
        <div class="card-title">⏱️ 셔플 타이머</div>
        <div id="timer-display">20:00</div>
        <div class="timer-controls">
          <button class="timer-control-btn" id="timer-minus">－ 5분</button>
          <button class="timer-control-btn" id="timer-toggle">▶ 시작</button>
          <button class="timer-control-btn" id="timer-plus">＋ 5분</button>
        </div>
        <button class="btn-outline" id="nudge-now-btn">지금 셔플 발동 🔀</button>
      </div>

      <div class="card">
        <div class="card-title">🃏 질문 카드 던지기</div>
        <div class="question-selector" id="free-q-list"></div>
        <button class="btn-gold" id="throw-card-btn">선택한 카드 던지기</button>
      </div>

      <div class="card">
        <div class="card-title">💬 채팅 모니터링</div>
        <div id="chat-log"><div style="color:var(--text-muted);font-size:12px;">대화가 시작되면 여기 표시됩니다</div></div>
      </div>

      <button class="btn-gold" id="go-ending-btn">마무리로 이동 →</button>
    </div>

    <!-- 마무리 탭 -->
    <div class="tab-panel" id="tab-ending">
      <div class="card">
        <div class="card-title">🏆 MVP (사랑의 작대기)</div>
        <div id="mvp-list"></div>
      </div>

      <div class="card" id="match-result-card" style="display:none;">
        <div class="card-title">💘 매칭 결과</div>
        <div id="match-pairs"></div>
      </div>

      <button class="btn-gold" id="do-match-btn">매칭 발표 💘</button>
      <button class="btn-red" id="close-room-btn" style="margin-top:8px;">모임 종료</button>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
// ── 상태 ─────────────────────────────────────────────────────────────────────
const state = {
  roomCode: '',
  uuid: '',
  nickname: '',
  hostRole: 'host_only', // host_only | participant
  questions: [],
  currentQIdx: 0,
  currentVotes: {}, // question_id → counts
  myVotes: {}, // question_id → answer (겸임)
  waitingUsers: [], // [{uuid, nickname}]
  approvedUsers: [], // [{uuid, nickname, gender, birth_year, mbti, interest}]
  mvpList: [], // [{uuid, nickname, fi_count}]
  timerMinutes: 20,
  timerSeconds: 0,
  timerInterval: null,
  timerRunning: false,
  freeQSelected: new Set(),
  ws: null,
  wsReconnectTimer: null,
  pongInterval: null,
};

// ── 초기화 ────────────────────────────────────────────────────────────────────
function init() {
  // URL: /room/:code/host
  const parts = location.pathname.split('/');
  const codeIdx = parts.indexOf('room');
  state.roomCode = codeIdx !== -1 ? parts[codeIdx + 1] : '';
  state.uuid = localStorage.getItem('demo_uuid') || '';

  if (!state.roomCode || !state.uuid) {
    location.href = '/';
    return;
  }

  loadRoomInfo();
  loadQR();
  loadQuestions();
  connectWS();
  bindEvents();
}

async function loadRoomInfo() {
  try {
    const res = await api(`/api/rooms/${state.roomCode}`);
    if (!res.ok) { location.href = '/'; return; }
    const room = await res.json();
    // host_uuid 검증 — 타인의 host URL 접속 차단
    if (room.host_uuid && room.host_uuid !== state.uuid) { location.href = '/'; return; }
    if (room.status === 'closed') { location.href = '/create'; return; }
    state.hostRole = room.host_role || 'host_only';
    if (state.hostRole === 'participant') {
      document.getElementById('host-vote-btns').style.display = 'block';
    }
    // 닉네임 로드
    try {
      const meRes = await api(`/api/me?uuid=${state.uuid}`);
      if (meRes.ok) {
        const me = await meRes.json();
        state.nickname = me.nickname || '';
        const nickEl = document.getElementById('user-nick');
        if (nickEl) nickEl.textContent = `@${state.nickname}`;
      }
    } catch {}
  } catch {}
}

async function loadQR() {
  const img = document.getElementById('qr-img');
  try {
    const res = await fetch(`/api/rooms/${state.roomCode}/qr`);
    const data = await res.json();
    if (data.qr_data_url) {
      img.src = data.qr_data_url;
    } else {
      img.style.display = 'none';
    }
  } catch {
    img.style.display = 'none';
  }
}

async function loadQuestions() {
  try {
    const res = await api(`/api/rooms/${state.roomCode}/questions`);
    state.questions = await res.json();
    renderQuestion();
    renderFreeQList();
  } catch { console.error('questions load fail'); }
}

// ── API 헬퍼 ─────────────────────────────────────────────────────────────────
function api(url, method = 'GET', body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  return fetch(url, opts);
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWS() {
  if (state.wsReconnectTimer) clearTimeout(state.wsReconnectTimer);
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws/${state.roomCode}/${state.uuid}`);
  state.ws = ws;

  ws.onopen = () => {
    console.log('WS connected');
    state.pongInterval = setInterval(() => {
      if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' }));
    }, 30000);
  };

  ws.onmessage = (e) => {
    try { handleWSMessage(JSON.parse(e.data)); } catch {}
  };

  ws.onclose = () => {
    clearInterval(state.pongInterval);
    state.wsReconnectTimer = setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();
}

function handleWSMessage(msg) {
  switch (msg.type) {
    case 'user_joined':
      // 승인 전 대기 목록에 추가
      if (!state.waitingUsers.find(u => u.uuid === msg.uuid)) {
        state.waitingUsers.push({ uuid: msg.uuid, nickname: msg.nickname });
        renderWaitingList();
      }
      break;
    case 'user_left':
      state.waitingUsers = state.waitingUsers.filter(u => u.uuid !== msg.uuid);
      renderWaitingList();
      break;
    case 'approved':
      // 대기→승인 이동
      {
        const idx = state.waitingUsers.findIndex(u => u.uuid === msg.uuid);
        if (idx !== -1) {
          const user = state.waitingUsers.splice(idx, 1)[0];
          if (!state.approvedUsers.find(u => u.uuid === user.uuid)) {
            fetchUserProfile(user.uuid).then(profile => {
              state.approvedUsers.push({ ...user, ...profile });
              renderApprovedList();
              renderProfiles();
            });
          }
          renderWaitingList();
        } else if (!state.approvedUsers.find(u => u.uuid === msg.uuid)) {
          // 대기 목록 외에서 approved (호스트 자신 또는 이미 연결 중이던 케이스)
          fetchUserProfile(msg.uuid).then(profile => {
            if (profile && profile.nickname && !state.approvedUsers.find(u => u.uuid === msg.uuid)) {
              state.approvedUsers.push({ uuid: msg.uuid, ...profile });
              renderApprovedList();
              renderProfiles();
            }
          });
        }
      }
      break;
    case 'vote_result':
      state.currentVotes[msg.question_id] = msg.counts;
      renderVoteBars(msg.question_id, msg.counts);
      break;
    case 'mvp_update':
      state.mvpList = msg.mvp_list || [];
      updateMVPList();
      break;
    case 'matching_result':
      renderMatchResult(msg.match_json);
      break;
    case 'chat':
      // 내가 보낸 메시지 제외(호스트는 보통 송신 안 하지만 겸임 대비)
      appendChatMsg(msg);
      break;
  }
}

async function fetchUserProfile(uuid) {
  try {
    const res = await api(`/api/me?uuid=${uuid}`);
    return res.ok ? await res.json() : {};
  } catch { return {}; }
}

// ── 렌더링 ────────────────────────────────────────────────────────────────────
function renderWaitingList() {
  const list = document.getElementById('waiting-list');
  const allBtn = document.getElementById('approve-all-btn');
  list.innerHTML = '';

  if (!state.waitingUsers.length) {
    allBtn.style.display = 'none';
    list.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:4px 2px;">대기 중인 참가자 없음</div>';
    return;
  }

  allBtn.style.display = 'block';
  for (const u of state.waitingUsers) {
    const el = document.createElement('div');
    el.className = 'waiting-item';
    el.innerHTML = `<span class="waiting-name">${escHtml(u.nickname)}</span>
      <button class="approve-btn" onclick="approveUser('${u.uuid}')">승인</button>`;
    list.appendChild(el);
  }
}

function renderApprovedList() {
  const list = document.getElementById('approved-list');
  list.innerHTML = '';
  if (!state.approvedUsers.length) {
    list.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:4px 2px;">아직 없음</div>';
    return;
  }
  for (const u of state.approvedUsers) {
    const el = document.createElement('div');
    el.className = 'approved-item';
    el.innerHTML = `<span class="approved-dot"></span><span>${escHtml(u.nickname)}</span>`;
    list.appendChild(el);
  }
}

function renderProfiles() {
  const carousel = document.getElementById('profile-carousel');
  const noMsg = document.getElementById('no-approved');
  carousel.innerHTML = '';

  if (!state.approvedUsers.length) {
    noMsg.style.display = 'block';
    return;
  }
  noMsg.style.display = 'none';

  const now = new Date().getFullYear();
  for (const u of state.approvedUsers) {
    const age = u.birth_year ? now - u.birth_year + 1 : '?';
    const genderLabel = (u.gender === 'M' || u.gender === 'male') ? '남'
                      : (u.gender === 'F' || u.gender === 'female') ? '여' : '';
    const card = document.createElement('div');
    card.className = 'profile-card';
    card.innerHTML = `
      <div class="name">${escHtml(u.nickname)}</div>
      <div class="meta">
        ${genderLabel} · ${age}세<br>
        ${u.interest ? escHtml(u.interest) : ''}
      </div>
      ${u.mbti ? `<span class="mbti-badge">${escHtml(u.mbti)}</span>` : ''}`;
    carousel.appendChild(card);
  }
}

function renderQuestion() {
  const q = state.questions[state.currentQIdx];
  if (!q) return;

  document.getElementById('q-number').textContent = `Q${state.currentQIdx + 1} / ${state.questions.length}`;
  document.getElementById('q-text').textContent = q.question;
  renderVoteBars(q.id, state.currentVotes[q.id] || {});

  // 겸임 투표 버튼
  const btns = document.getElementById('host-vote-btns');
  btns.innerHTML = '';
  if (state.hostRole === 'participant') {
    for (const opt of q.options) {
      const answer = opt.split('.')[0].trim();
      const voted = state.myVotes[q.id] === answer;
      const btn = document.createElement('button');
      btn.className = `vote-option-btn${voted ? ' voted' : ''}`;
      btn.textContent = opt;
      btn.onclick = () => submitHostVote(q.id, answer);
      btns.appendChild(btn);
    }
  }

  // 마지막 문항이면 버튼 교체
  const nextBtn = document.getElementById('next-q-btn');
  const skipBtn = document.getElementById('skip-to-free-btn');
  if (state.currentQIdx >= state.questions.length - 1) {
    nextBtn.style.display = 'none';
    skipBtn.style.display = 'block';
  } else {
    nextBtn.style.display = 'block';
    skipBtn.style.display = 'none';
  }
}

function renderVoteBars(question_id, counts) {
  const q = state.questions.find(q => q.id === question_id);
  if (!q) return;

  const container = document.getElementById('vote-bars');
  if (!container) return;

  const total = Object.values(counts).reduce((a, b) => a + b, 0);
  container.innerHTML = '';
  for (const opt of q.options) {
    const answer = opt.split('.')[0].trim();
    const cnt = counts[answer] || 0;
    const pct = total ? Math.round(cnt / total * 100) : 0;
    const div = document.createElement('div');
    div.className = 'vote-bar-wrap';
    div.innerHTML = `
      <div class="vote-label"><span>${escHtml(opt)}</span><span>${cnt}명 (${pct}%)</span></div>
      <div class="vote-bar-bg"><div class="vote-bar-fill" style="width:${pct}%"></div></div>`;
    container.appendChild(div);
  }
}

function renderFreeQList() {
  const list = document.getElementById('free-q-list');
  list.innerHTML = '';
  for (const q of state.questions) {
    const item = document.createElement('label');
    item.className = 'q-select-item';
    item.innerHTML = `<input type="checkbox" value="${q.id}"> ${escHtml(q.question)}`;
    list.appendChild(item);
  }
}

function renderMatchResult(match_json) {
  document.getElementById('match-result-card').style.display = 'block';
  const container = document.getElementById('match-pairs');
  container.innerHTML = '';

  if (!match_json?.pairs?.length) {
    container.innerHTML = '<div style="color:var(--text-muted);font-size:13px;text-align:center;">매칭 데이터 없음</div>';
    return;
  }

  for (const pair of match_json.pairs) {
    const div = document.createElement('div');
    div.className = 'match-pair';
    if (pair.type === 'mutual') {
      div.innerHTML = `<div class="pair-type">💘 상호 매칭</div>
        <div class="pair-names">${escHtml(pair.a.nickname)} ↔ ${escHtml(pair.b.nickname)}</div>`;
    } else if (pair.type === 'recommended') {
      div.innerHTML = `<div class="pair-type">✨ 추천 매칭</div>
        <div class="pair-names">${escHtml(pair.a.nickname)} ↔ ${escHtml(pair.b.nickname)}</div>`;
    } else {
      div.innerHTML = `<div class="pair-type">👤 단독</div>
        <div class="pair-names">${escHtml(pair.a.nickname)}</div>`;
    }
    container.appendChild(div);
  }

  if (match_json.mvp) {
    const mvpDiv = document.createElement('div');
    mvpDiv.className = 'match-pair';
    mvpDiv.style.borderColor = 'var(--gold)';
    mvpDiv.innerHTML = `<div class="pair-type">🏆 MVP</div>
      <div class="pair-names">${escHtml(match_json.mvp.nickname)} (${match_json.mvp.fi_count}표)</div>`;
    container.insertBefore(mvpDiv, container.firstChild);
  }
}

function updateMVPList() {
  const list = document.getElementById('mvp-list');
  if (!list) return;

  // mvp_update WS 이벤트로 받은 실시간 fi_count 우선, 없으면 승인된 참가자 기준으로 0
  let rows = state.mvpList;
  if (!rows.length) {
    rows = state.approvedUsers.map(u => ({ uuid: u.uuid, nickname: u.nickname, fi_count: 0 }));
  }
  if (!rows.length) {
    list.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">아직 투표 없음</div>';
    return;
  }
  // fi_count 내림차순
  rows = [...rows].sort((a, b) => (b.fi_count || 0) - (a.fi_count || 0));
  list.innerHTML = rows.map(u =>
    `<div class="mvp-row"><span>${escHtml(u.nickname)}</span><span class="fi-count">${u.fi_count || 0}표</span></div>`
  ).join('');
}

function appendChatMsg(msg) {
  const log = document.getElementById('chat-log');
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.textContent = `${msg.nickname || '익명'}: ${msg.text || ''}`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

// ── 탭 → guest 표준 phase 매핑 ──────────────────────────────────────────────
// 내부 탭 id 'ending' ↔ guest가 기대하는 current_tab 'closing'
const TAB_TO_PHASE = { intro: 'intro', explore: 'explore', free: 'free', ending: 'closing' };

// ── 이벤트 바인딩 ─────────────────────────────────────────────────────────────
function bindEvents() {
  // 탭 전환 — 클릭만으로도 게스트 상태 동기화
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      switchTab(tab);
      const phase = TAB_TO_PHASE[tab] || tab;
      updateState({ phase, current_tab: phase, question_index: state.currentQIdx });
    });
  });

  // URL 복사
  document.getElementById('copy-url-btn').addEventListener('click', () => {
    const url = `https://demo.ntable.kr/room/${state.roomCode}`;
    navigator.clipboard.writeText(url).then(() => toast('URL 복사됨 ✓')).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      toast('URL 복사됨 ✓');
    });
  });

  // 전체 승인
  document.getElementById('approve-all-btn').addEventListener('click', approveAll);

  // 탐구 시작
  document.getElementById('start-explore-btn').addEventListener('click', () => {
    updateState({ phase: 'explore', current_tab: 'explore', question_index: 0 });
    state.currentQIdx = 0;
    renderQuestion();
    switchTab('explore');
  });

  // 다음 문항
  document.getElementById('next-q-btn').addEventListener('click', () => {
    if (state.currentQIdx < state.questions.length - 1) {
      state.currentQIdx++;
      updateState({ phase: 'explore', current_tab: 'explore', question_index: state.currentQIdx });
      renderQuestion();
    }
  });

  // 자유대화 시작
  document.getElementById('skip-to-free-btn').addEventListener('click', () => {
    updateState({ phase: 'free', current_tab: 'free' });
    switchTab('free');
  });

  // 강제 매칭
  document.getElementById('force-match-btn').addEventListener('click', async () => {
    if (!confirm('지금까지의 투표로 매칭을 진행하시겠어요?')) return;
    await doMatch();
    switchTab('ending');
  });

  // 타이머 컨트롤
  document.getElementById('timer-minus').addEventListener('click', () => adjustTimer(-5));
  document.getElementById('timer-plus').addEventListener('click', () => adjustTimer(5));
  document.getElementById('timer-toggle').addEventListener('click', toggleTimer);
  document.getElementById('nudge-now-btn').addEventListener('click', sendNudge);

  // 질문 카드 던지기
  document.getElementById('throw-card-btn').addEventListener('click', throwCard);

  // 마무리로 이동 (guest 는 current_tab='closing' 으로 받음)
  document.getElementById('go-ending-btn').addEventListener('click', () => {
    updateState({ phase: 'closing', current_tab: 'closing' });
    switchTab('ending');
  });

  // 매칭 발표
  document.getElementById('do-match-btn').addEventListener('click', doMatch);

  // 모임 종료
  document.getElementById('close-room-btn').addEventListener('click', closeRoom);
}

// ── 탭 전환 ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(panel => {
    panel.classList.toggle('active', panel.id === `tab-${tab}`);
  });
  if (tab === 'ending') updateMVPList();
}

// ── 승인 ─────────────────────────────────────────────────────────────────────
async function approveUser(uuid) {
  try {
    await api(`/api/rooms/${state.roomCode}/approve`, 'POST', { host_uuid: state.uuid, target_uuid: uuid });
    toast('승인 완료 ✓');
  } catch { toast('승인 실패'); }
}

async function approveAll() {
  for (const u of [...state.waitingUsers]) {
    await approveUser(u.uuid);
  }
}

// ── 상태 업데이트 ─────────────────────────────────────────────────────────────
async function updateState(stateData) {
  try {
    await api(`/api/rooms/${state.roomCode}/state`, 'POST', {
      host_uuid: state.uuid,
      state: stateData,
    });
  } catch { console.error('state update fail'); }
}

// ── 투표 (겸임 호스트) ────────────────────────────────────────────────────────
async function submitHostVote(question_id, answer) {
  if (state.myVotes[question_id]) return; // 이미 투표
  state.myVotes[question_id] = answer;
  try {
    await api(`/api/rooms/${state.roomCode}/vote`, 'POST', {
      uuid: state.uuid, question_id, answer
    });
    renderQuestion(); // 버튼 상태 갱신
  } catch { delete state.myVotes[question_id]; }
}

// ── 타이머 ────────────────────────────────────────────────────────────────────
function adjustTimer(delta) {
  if (state.timerRunning) return;
  state.timerMinutes = Math.max(1, state.timerMinutes + delta);
  state.timerSeconds = 0;
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = String(state.timerMinutes).padStart(2, '0');
  const s = String(state.timerSeconds).padStart(2, '0');
  document.getElementById('timer-display').textContent = `${m}:${s}`;
}

function toggleTimer() {
  const btn = document.getElementById('timer-toggle');
  if (state.timerRunning) {
    clearInterval(state.timerInterval);
    state.timerRunning = false;
    btn.textContent = '▶ 시작';
  } else {
    state.timerRunning = true;
    btn.textContent = '⏸ 정지';
    state.timerInterval = setInterval(() => {
      if (state.timerSeconds === 0) {
        if (state.timerMinutes === 0) {
          clearInterval(state.timerInterval);
          state.timerRunning = false;
          btn.textContent = '▶ 시작';
          sendNudge();
          return;
        }
        state.timerMinutes--;
        state.timerSeconds = 59;
      } else {
        state.timerSeconds--;
      }
      updateTimerDisplay();
    }, 1000);
  }
}

async function sendNudge() {
  try {
    await api(`/api/rooms/${state.roomCode}/nudge`, 'POST', {
      host_uuid: state.uuid,
      message: '자리를 이동해볼까요 🔀',
    });
    toast('셔플 넛지 전송 ✓');
  } catch { toast('전송 실패'); }
}

// ── 질문 카드 ─────────────────────────────────────────────────────────────────
async function throwCard() {
  const checked = document.querySelectorAll('#free-q-list input[type="checkbox"]:checked');
  if (!checked.length) { toast('카드를 선택하세요'); return; }
  const texts = [];
  checked.forEach(cb => {
    const q = state.questions.find(q => String(q.id) === cb.value);
    if (q) texts.push(q.question);
    cb.checked = false;
  });
  for (const text of texts) {
    try {
      await api(`/api/rooms/${state.roomCode}/question-card`, 'POST', {
        host_uuid: state.uuid, text
      });
    } catch {}
  }
  toast(`카드 ${texts.length}장 던짐 ✓`);
}

// ── 매칭 ─────────────────────────────────────────────────────────────────────
async function doMatch() {
  try {
    const res = await api(`/api/rooms/${state.roomCode}/match`, 'POST', { host_uuid: state.uuid });
    const data = await res.json();
    renderMatchResult(data.match_json);
    toast('매칭 발표 완료 ✓');
  } catch { toast('매칭 실패'); }
}

// ── 모임 종료 ─────────────────────────────────────────────────────────────────
async function closeRoom() {
  if (!confirm('모임을 종료하시겠어요? 참가자에게 종료 알림이 전송됩니다.')) return;
  try {
    const res = await api(`/api/rooms/${state.roomCode}/close`, 'POST', { host_uuid: state.uuid });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      toast('종료 실패: ' + (err.error || res.status));
      return;
    }
    location.href = '/create';
  } catch { toast('종료 실패'); }
}

function logout() {
  if (!confirm('로그아웃하시겠어요? 진행 중인 방은 그대로 유지돼요.')) return;
  try { if (state.ws) state.ws.close(); } catch {}
  localStorage.removeItem('demo_uuid');
  location.href = '/';
}

// ── 유틸 ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ── 실행 ─────────────────────────────────────────────────────────────────────
init();
</script>
