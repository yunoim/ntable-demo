<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<link rel="stylesheet" href="/theme-lock.css">
<script src="/samsung-dark-warn.js" defer></script>
<script src="/oauth-redirect.js"></script>
<script src="/auth-header.js" defer></script>
<script src="/pending-reveals.js" defer></script>
<title>오늘의 결과 — ntable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js" defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Navy */
    --navy:        #0a0f1e;
    --navy-light:  #0f1628;
    --navy-mid:    #141d35;
    /* Surfaces */
    --surface:     #141d35;
    --surface-2:   #1a2442;
    --surface-3:   #223056;
    /* Gold (landing 기준) */
    --gold:        #d4a843;
    --gold-light:  #f0ca60;
    --gold-dim:    rgba(212,168,67,0.18);
    --gold-dim-2:  rgba(212,168,67,0.08);
    --gold-border: rgba(212,168,67,0.35);
    /* Text */
    --white:       #f5f2ec;
    --white-dim:   rgba(245,242,236,0.88);
    --white-muted: rgba(245,242,236,0.72);
    --text:        #ddd5bc;
    --text-muted:  rgba(216,208,187,0.78);
    --text-dim:    rgba(216,208,187,0.65);
    --subtext:     rgba(216,208,187,0.78);
    /* UI */
    --border:      rgba(255,255,255,0.14);
    --input-border:#5a6178;
    --placeholder: rgba(216,208,187,0.65);
    --danger:      #e87e7e;
    --success:     #7ee8a2;
    /* Motion */
    --radius:      10px;
    --radius-lg:   18px;
    --transition:  0.32s cubic-bezier(0.4,0,0.2,1);
  }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'DM Sans', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 44px 18px 60px;
    padding-top: calc(44px + env(safe-area-inset-top));
    padding-bottom: calc(60px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(212,168,67,0.09), transparent 55%),
      radial-gradient(circle at 80% 90%, rgba(80,100,180,0.06), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { width: 100%; max-width: 460px; position: relative; z-index: 1; }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.14em;
    color: var(--gold);
    text-align: center;
    margin-bottom: 20px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 10px;
    line-height: 1.2;
  }
  h1 em { font-style: italic; color: var(--gold-light); }
  .sub {
    color: var(--subtext);
    font-size: 14px;
    margin-bottom: 32px;
    line-height: 1.7;
  }
  /* ── 4페이지 스와이프 셸 ─────────────────────── */
  .pager {
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    height: 72dvh;
    min-height: 480px;
    overscroll-behavior-x: contain;
  }
  /* PC 에선 마우스 드래그로 넘길 수 있음을 커서로 암시 */
  @media (hover: hover) and (pointer: fine) {
    .pager { cursor: grab; }
    .pager:active { cursor: grabbing; }
  }
  .pager::-webkit-scrollbar { display: none; }
  .page {
    flex: 0 0 100%;
    width: 100%;
    height: 100%;
    scroll-snap-align: start;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    box-sizing: border-box;
  }
  .page > .card:last-child { margin-bottom: 0; }
  .pager-dots {
    display: flex;
    justify-content: center;
    gap: 9px;
    margin: 18px 0 4px;
  }
  .pager-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(212,168,67,0.25);
    transition: background 0.25s, transform 0.2s;
    cursor: pointer;
  }
  .pager-dot.active { background: var(--gold); transform: scale(1.25); }

  .card {
    background: var(--surface);
    border: 1px solid var(--gold-border);
    border-radius: 18px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.28);
  }
  .card-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--gold);
    margin-bottom: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    width: 18px; height: 1px;
    background: var(--gold);
  }
  .personality-text {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
  }

  /* ── 공유 가능한 성향 카드 ── */
  .share-card {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 55%, var(--navy-mid) 100%);
    border: 1px solid var(--gold-border);
    border-radius: 18px;
    padding: 30px 24px 26px;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .share-card::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 22% 18%, rgba(212,168,67,0.18), transparent 50%),
      radial-gradient(circle at 78% 82%, rgba(212,168,67,0.1), transparent 55%);
    pointer-events: none;
  }
  .share-card::after {
    content: '✦ ✦ ✦';
    position: absolute;
    top: 14px; right: 16px;
    font-size: 10px;
    color: rgba(212,168,67,0.4);
    letter-spacing: 0.3em;
    pointer-events: none;
  }
  .share-card-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: none;
    margin-bottom: 22px;
    position: relative;
  }
  .share-card-emoji {
    font-size: 62px;
    line-height: 1;
    margin-bottom: 14px;
    position: relative;
    filter: drop-shadow(0 4px 14px rgba(212,168,67,0.45));
  }
  .share-card-photo {
    width: 110px; height: 110px;
    margin: 0 auto 16px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid var(--gold);
    box-shadow: 0 0 24px rgba(212,168,67,0.4);
    position: relative;
  }
  .share-card-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-include-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: rgba(212,168,67,0.06);
    border: 1px dashed rgba(212,168,67,0.3);
    border-radius: 10px;
    margin: 14px 0;
    cursor: pointer;
    font-size: 13px;
    color: var(--white-dim);
  }
  .photo-include-toggle input { width: 16px; height: 16px; accent-color: var(--gold); cursor: pointer; }
  .photo-include-toggle small { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; }
  .share-card-type {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px; font-weight: 600;
    color: var(--gold);
    margin-bottom: 16px;
    letter-spacing: 0.01em;
    line-height: 1.15;
    position: relative;
  }
  .share-card-text {
    font-size: 15px;
    line-height: 1.75;
    color: var(--white-dim);
    margin-bottom: 22px;
    position: relative;
    max-width: 320px;
    margin-left: auto; margin-right: auto;
  }
  .share-card-footer {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.14em;
    text-transform: none;
    font-weight: 600;
    position: relative;
  }
  .share-match-line {
    position: relative;
    margin: 4px auto 16px;
    padding: 9px 14px;
    background: rgba(212,168,67,0.10);
    border: 1px solid rgba(212,168,67,0.32);
    border-radius: 999px;
    font-size: 13.5px;
    color: var(--white-dim);
    display: inline-block;
    letter-spacing: 0.02em;
  }
  .share-actions { display: flex; gap: 10px; }
  .share-btn {
    flex: 1;
    background: linear-gradient(135deg, var(--gold), #a07828);
    color: var(--navy);
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 14px rgba(212,168,67,0.25);
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .share-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(212,168,67,0.36); }
  .share-btn:disabled { opacity: 0.6; cursor: progress; }
  .share-btn.outline {
    background: transparent;
    color: var(--gold-light);
    border: 1.5px solid var(--gold-border);
    box-shadow: none;
  }
  .share-btn.outline:hover:not(:disabled) { background: var(--gold-dim); border-color: var(--gold); }
  .loading {
    color: var(--subtext);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(212,168,67,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 매칭 카드 (share-card 톤 통일) ── */
  .match-frame {
    position: relative;
    background: linear-gradient(135deg, rgba(212,168,67,0.10) 0%, rgba(212,168,67,0.03) 55%, rgba(20,29,53,0.4) 100%);
    border: 1px solid var(--gold-border);
    border-radius: 16px;
    padding: 22px 18px 20px;
    text-align: center;
    overflow: hidden;
  }
  .match-frame::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 18% 22%, rgba(212,168,67,0.18), transparent 55%),
      radial-gradient(circle at 82% 78%, rgba(212,168,67,0.10), transparent 55%);
    pointer-events: none;
  }
  .match-frame::after {
    content: '✦ ✦ ✦';
    position: absolute;
    top: 10px; right: 14px;
    font-size: 9px;
    color: rgba(212,168,67,0.4);
    letter-spacing: 0.3em;
    pointer-events: none;
  }
  .match-eyebrow {
    position: relative;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .match-heart {
    position: relative;
    font-size: 26px;
    line-height: 1;
    margin-bottom: 6px;
    filter: drop-shadow(0 2px 10px rgba(232,126,126,0.45));
    animation: heartPulse 1.8s ease-in-out infinite;
  }
  .match-photo-wrap {
    position: relative;
    width: 88px; height: 88px;
    margin: 0 auto 8px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--gold);
    box-shadow: 0 0 18px rgba(212,168,67,0.35);
  }
  .match-photo-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  @keyframes heartPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  .match-name {
    position: relative;
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--gold);
    margin: 4px 0 8px;
    letter-spacing: 0.01em;
    line-height: 1.15;
  }
  .match-sub {
    position: relative;
    font-size: 13px;
    color: var(--subtext);
    line-height: 1.6;
  }
  .match-sub strong { color: var(--gold-light); font-weight: 600; }
  .match-common-chip {
    position: relative;
    display: inline-block;
    margin-top: 14px;
    padding: 8px 14px;
    background: rgba(212,168,67,0.08);
    border: 1px solid rgba(212,168,67,0.3);
    border-radius: 10px;
    font-size: 12.5px;
    color: var(--white-dim);
    letter-spacing: 0.02em;
  }
  .match-common-chip strong { color: var(--gold-light); font-weight: 700; }
  .match-picks {
    position: relative;
    margin-top: 12px;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .match-pick {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(212,168,67,0.18);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.5;
  }
  .match-pick-q {
    color: var(--text-dim);
    font-size: 11px;
    margin-bottom: 3px;
    letter-spacing: 0.02em;
  }
  .match-pick-a {
    color: var(--white-dim);
    font-weight: 500;
  }
  .match-pick-a::before {
    content: '✓';
    color: var(--gold-light);
    margin-right: 6px;
    font-weight: 700;
  }
  .match-runners {
    margin-top: 14px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(212,168,67,0.18);
    border-radius: 12px;
  }
  .match-runners-head {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .match-runner {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(212,168,67,0.06);
    font-size: 13px;
  }
  .match-runner:last-child { border-bottom: none; }
  .match-runner-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid rgba(212,168,67,0.3);
    flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(212,168,67,0.1);
    font-size: 14px;
  }
  .match-runner-avatar.dot { color: var(--gold-light); }
  .match-runner-name { color: var(--white-dim); font-weight: 500; flex: 1; }
  .match-runner-pct { color: var(--gold-light); font-variant-numeric: tabular-nums; font-weight: 600; font-size: 12px; white-space: nowrap; }
  .fi-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--gold-dim);
    color: var(--gold-light);
    border: 1px solid var(--gold-border);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12.5px;
    font-weight: 600;
    margin-top: 10px;
    position: relative;
  }
  .match-fallback-frame {
    position: relative;
    background: var(--navy-light);
    border: 1px dashed rgba(212,168,67,0.25);
    border-radius: 14px;
    padding: 22px 18px;
    text-align: center;
  }
  .match-fallback-icon {
    font-size: 32px;
    line-height: 1;
    margin-bottom: 10px;
    opacity: 0.85;
  }
  .match-fallback-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold-light);
    margin-bottom: 8px;
  }
  .match-fallback-text { font-size: 13px; color: var(--subtext); line-height: 1.65; }

  .stats-row { display: flex; gap: 12px; margin-bottom: 18px; }
  .stat-box {
    flex: 1;
    background: var(--navy-light);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 10px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 600;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--subtext);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  .highlight-item { padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .highlight-item:last-child { border-bottom: none; }
  .q-label {
    color: var(--subtext);
    font-size: 11px;
    margin-bottom: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .q-top-answer { color: var(--white); font-weight: 500; }
  .q-bar { height: 6px; background: var(--navy-light); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .q-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 3px; transition: width 0.7s ease; }

  .insta-btn {
    width: 100%;
    padding: 15px;
    background: transparent;
    border: 1.5px solid var(--gold-border);
    color: var(--gold-light);
    font-size: 15px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .insta-btn:hover { background: var(--gold-dim); border-color: var(--gold); }
  .insta-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .insta-reveal {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold);
    text-align: center;
    margin-top: 14px;
  }
  .insta-pending {
    font-size: 13px;
    color: var(--subtext);
    text-align: center;
    margin-top: 14px;
    line-height: 1.7;
  }
  .no-match { color: var(--subtext); font-size: 14px; }

  .hint-text {
    font-size: 12px;
    color: var(--subtext);
    margin-bottom: 14px;
    line-height: 1.6;
  }

  /* ── Focus visible (A11y) ── */
  button:focus-visible, a:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  /* ── Mobile (≤480px) ── */
  @media (max-width: 480px) {
    body { padding: 28px 14px 50px;
           padding-top: calc(28px + env(safe-area-inset-top));
           padding-bottom: calc(50px + env(safe-area-inset-bottom)); }
    .brand { font-size: 18px; margin-bottom: 16px; }
    h1 { font-size: 26px; }
    .sub { font-size: 13px; margin-bottom: 24px; }
    .card { padding: 20px; border-radius: 16px; margin-bottom: 12px; }
    .personality-text { font-size: 14px; line-height: 1.75; }
    .match-name { font-size: 26px; }
    .stat-num { font-size: 26px; }
    .stat-box { padding: 16px 8px; }
    .fi-badge { padding: 5px 12px; font-size: 12px; }
    .insta-btn { padding: 13px; font-size: 14px; }
    .insta-reveal { font-size: 20px; }
  }
</style>
<script src="/sentry-init.js" data-page="result" defer></script>
</head>
<body data-no-pending-banner="true">
<div class="container">
  <div class="brand">ntable</div>
  <h1>오늘의 <em>결과</em></h1>
  <p class="sub">수고하셨어요. 오늘 모임을 정리해드릴게요 🎉</p>

  <div id="pager" class="pager">
    <!-- 페이지 1 — AI 성향 분석 -->
    <section class="page" data-page="0">
      <div class="card">
        <div class="card-title">✨ AI 성향 분석</div>
        <div class="loading" id="personality-loading">
          <div class="spinner"></div>
          <span>분석 중...</span>
        </div>
        <div id="personality-body" style="display:none">
          <!-- html2canvas 캡처 타깃: 이 박스만 이미지로 저장됨 -->
          <div id="share-card" class="share-card">
            <div class="share-card-brand">ntable</div>
            <div class="share-card-photo" id="share-photo" style="display:none"></div>
            <div class="share-card-emoji" id="share-emoji">✨</div>
            <div class="share-card-type" id="share-type">탐구형</div>
            <div class="share-card-text" id="personality-text"></div>
            <div id="share-match-line" class="share-match-line" style="display:none;"></div>
            <div class="share-card-footer">오늘의 모임 유형 · ntable.kr</div>
          </div>
          <div class="share-actions">
            <button type="button" id="save-image-btn" class="share-btn" aria-label="이미지 저장">📷 이미지 저장</button>
            <button type="button" id="insta-share-btn" class="share-btn outline" aria-label="인스타 스토리로 공유">📸 인스타 스토리 공유</button>
          </div>
          <div class="share-actions" style="margin-top:10px;">
            <button type="button" id="kakao-share-btn" class="share-btn outline" aria-label="카카오톡 공유" hidden style="background:rgba(254,229,0,0.12);border-color:rgba(254,229,0,0.45);color:#FEE500;">💛 카카오톡 공유</button>
            <button type="button" id="copy-link-btn" class="share-btn outline" aria-label="ntable 링크 복사">🔗 ntable 링크 복사</button>
          </div>
        </div>
      </div>
    </section>

    <!-- 페이지 2 — 베스트 매칭 -->
    <section class="page" data-page="1">
      <div class="card">
        <div class="card-title">💘 베스트 매칭</div>
        <div id="match-content">
          <div class="loading"><div class="spinner"></div><span>불러오는 중...</span></div>
        </div>
      </div>
    </section>

    <!-- 페이지 3 — 오늘의 탐구 나의 선택 -->
    <section class="page" data-page="2">
      <div class="card">
        <div class="card-title">📖 오늘의 탐구 — 나의 선택</div>
        <div id="explore-content">
          <div class="loading"><div class="spinner"></div><span>불러오는 중...</span></div>
        </div>
      </div>
    </section>

    <!-- 페이지 4 — 오늘 모임 요약 + 인스타 교환 -->
    <section class="page" data-page="3">
      <div class="card">
        <div class="card-title">📊 오늘 모임 요약</div>
        <div id="summary-content">
          <div class="loading"><div class="spinner"></div><span>불러오는 중...</span></div>
        </div>
      </div>
      <div class="card" id="insta-exchange-card" style="text-align:center;">
        <div class="card-title">📸 인스타그램 교환</div>
        <p class="hint-text" style="margin-bottom:14px;">마음에 든 사람과 인스타를 교환할 수 있어요.<br>상대도 나를 선택해야 공개돼요.</p>
        <a class="insta-btn" id="insta-exchange-btn" href="#" style="text-decoration:none;display:block;text-align:center;">인스타 교환 열기 →</a>
      </div>
    </section>
  </div>

  <div class="pager-dots" id="pager-dots">
    <span class="pager-dot active" data-dot="0"></span>
    <span class="pager-dot" data-dot="1"></span>
    <span class="pager-dot" data-dot="2"></span>
    <span class="pager-dot" data-dot="3"></span>
  </div>

  <div style="margin-top:20px;text-align:center;">
    <a href="/" style="display:inline-block;padding:12px 28px;background:transparent;color:var(--gold-light);border:1px solid var(--gold-border);border-radius:10px;text-decoration:none;font-family:inherit;font-size:14px;font-weight:500;letter-spacing:0.02em;">← 홈으로</a>
  </div>
</div>

<!-- 커플 공유 카드 (html2canvas 캡처 타깃 — 오프스크린) -->
<div id="couple-card-capture" aria-hidden="true" style="position:absolute;left:-10000px;top:0;width:360px;height:640px;background:#141d35;color:#f5f2ec;padding:32px 26px;box-sizing:border-box;font-family:'DM Sans','Noto Sans KR','Apple SD Gothic Neo',sans-serif;overflow:hidden;">
  <div style="position:absolute;inset:0;background-image:radial-gradient(circle at 20% 15%, rgba(212,168,67,0.18), transparent 55%), radial-gradient(circle at 80% 90%, rgba(80,100,180,0.12), transparent 50%);pointer-events:none;"></div>
  <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column;">
    <div style="text-align:center;font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:0.3em;color:#d4a843;margin-bottom:20px;">ntable</div>
    <div style="text-align:center;font-family:'Cormorant Garamond',serif;font-size:24px;line-height:1.35;color:#f5f2ec;margin-bottom:4px;" id="cc-nicks">— 💘 —</div>
    <div style="text-align:center;font-size:10.5px;color:rgba(245,242,236,0.5);letter-spacing:0.22em;margin-bottom:18px;">OUR MATCH</div>
    <div id="cc-rows" style="flex:1;display:flex;flex-direction:column;gap:5px;overflow:hidden;"></div>
    <div style="margin-top:16px;text-align:center;border-top:1px solid rgba(212,168,67,0.2);padding-top:14px;">
      <div style="font-size:10px;color:rgba(245,242,236,0.45);letter-spacing:0.22em;margin-bottom:4px;">TODAY'S MATCH</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:36px;color:#f0ca60;font-weight:700;line-height:1;" id="cc-pct">0%</div>
      <div style="font-size:10px;color:rgba(212,168,67,0.55);letter-spacing:0.22em;margin-top:6px;">NTABLE.KR</div>
    </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const room_code = params.get('room');
  const uuid = params.get('uuid') || localStorage.getItem('demo_uuid');
  if (!uuid || !room_code) location.href = '/';

  let matchedUuid = null;
  let couplePartnerUuid = null;

  // ws 연결 — insta_mutual broadcast 수신 시 자동 갱신
  let _ws = null;
  function connectResultWs() {
    try {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      _ws = new WebSocket(`${proto}://${location.host}/ws/${room_code}/${uuid}`);
      _ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'insta_mutual') {
            // 본인이 페어인지 확인
            const ig = msg.a_uuid === uuid ? msg.b?.instagram : (msg.b_uuid === uuid ? msg.a?.instagram : null);
            if (ig) {
              const resultEl = document.getElementById('insta-result');
              if (resultEl) resultEl.innerHTML = `<div class="insta-reveal"><a href="https://instagram.com/${encodeURIComponent(ig)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">@${ig} 🎉</a></div>`;
              const btn = document.getElementById('insta-btn');
              if (btn) btn.style.display = 'none';
            }
          }
        } catch (_) {}
      };
      _ws.onclose = () => { setTimeout(connectResultWs, 5000); };
      _ws.onerror = () => { try { _ws.close(); } catch (_) {} };
    } catch (_) {}
  }
  connectResultWs();

  async function loadPersonality() {
    try {
      const r = await fetch(`/api/personality?uuid=${uuid}&room_code=${room_code}`);
      const data = await r.json();
      document.getElementById('personality-loading').style.display = 'none';
      // 결과(성향 분석)에서 도출된 이모지 사용 — wizard 선택 이모지 대신 결과 기반
      document.getElementById('share-emoji').textContent = data.emoji || '✨';
      document.getElementById('share-type').textContent = data.personality || '탐구형';
      document.getElementById('personality-text').textContent = data.text || '분석 결과를 불러올 수 없어요.';
      document.getElementById('personality-body').style.display = 'block';
    } catch {
      document.getElementById('personality-loading').innerHTML = '<span style="color:var(--subtext)">분석 결과를 불러올 수 없어요.</span>';
    }
  }

  // 매칭 정보가 결과 fetch 후 share-card에도 반영 — loadResult에서 호출
  function updateShareMatchLine(data) {
    const el = document.getElementById('share-match-line');
    if (!el) return;
    if (!data.match_nickname) { el.style.display = 'none'; return; }
    const totalAns = data.match_total_answered || 0;
    const common = data.match_common || 0;
    const pct = totalAns > 0 ? Math.round(common / totalAns * 100) : 0;
    const partnerEmoji = data.match_emoji || '💛';
    el.innerHTML = `<span style="font-size:18px;">${partnerEmoji}</span> ${escMatchSafe(data.match_nickname)} <span style="color:var(--gold-light);font-weight:700;">${pct}%</span> 호환`;
    el.style.display = 'block';
  }
  function escMatchSafe(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // 본인 사진 (모임 중 업로드한 것이 localStorage에 남아 있을 때만) 인스타 카드 포함 옵션
  function setupPhotoToggle() {
    let savedPhoto = null;
    try { savedPhoto = localStorage.getItem(`ntable_photo_${room_code}`); } catch (_) {}
    if (!savedPhoto) return;
    const wrap = document.getElementById('photoToggleWrap');
    const toggle = document.getElementById('includePhotoToggle');
    const photoSlot = document.getElementById('share-photo');
    const emojiSlot = document.getElementById('share-emoji');
    if (!wrap || !toggle || !photoSlot || !emojiSlot) return;
    wrap.hidden = false;
    toggle.addEventListener('change', () => {
      if (toggle.checked) {
        photoSlot.innerHTML = `<img src="${savedPhoto}" alt="">`;
        photoSlot.style.display = 'block';
        emojiSlot.style.display = 'none';
      } else {
        photoSlot.innerHTML = '';
        photoSlot.style.display = 'none';
        emojiSlot.style.display = '';
      }
    });
  }

  // ── 이미지 저장 / 링크 복사 ──
  async function saveShareImage() {
    const btn = document.getElementById('save-image-btn');
    const card = document.getElementById('share-card');
    if (!card || typeof html2canvas === 'undefined') {
      alert('이미지 저장 모듈 로딩 중입니다. 잠시 후 다시 시도해주세요.');
      return;
    }
    btn.disabled = true;
    btn.textContent = '저장 중...';
    try {
      const canvas = await html2canvas(card, {
        backgroundColor: '#141d35',
        scale: 2,
        useCORS: true,
        logging: false,
      });
      const link = document.createElement('a');
      link.download = `ntable-${room_code}-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      btn.textContent = '✓ 저장됨';
      setTimeout(() => { btn.textContent = '📷 이미지 저장'; btn.disabled = false; }, 1800);
    } catch (e) {
      btn.textContent = '❌ 저장 실패';
      setTimeout(() => { btn.textContent = '📷 이미지 저장'; btn.disabled = false; }, 1800);
    }
  }

  // 인스타 스토리 공유 — share-card DOM 을 html2canvas 로 PNG 뽑아서 Web Share API 로 전달
  async function shareToInstagram() {
    const btn = document.getElementById('insta-share-btn');
    const card = document.getElementById('share-card');
    if (!card || typeof html2canvas === 'undefined') {
      alert('공유 카드 준비 중이에요. 잠시 후 다시 시도해주세요.');
      return;
    }
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = '준비 중...';
    try {
      const canvas = await html2canvas(card, {
        backgroundColor: '#141d35',
        scale: 2,
        useCORS: true,
        logging: false,
      });
      canvas.toBlob(async (blob) => {
        if (!blob) { btn.textContent = '❌ 실패'; setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1800); return; }
        const file = new File([blob], `ntable-${room_code}.png`, { type: 'image/png' });
        const canShareFile = navigator.canShare && navigator.canShare({ files: [file] });
        try {
          if (canShareFile) {
            await navigator.share({
              files: [file],
              title: 'ntable 모임 결과',
              text: '오늘 ntable 모임 다녀왔어요 🍽️',
            });
            btn.textContent = '✓ 공유됨';
          } else {
            // 모바일에서 파일 공유 미지원 → 이미지 다운로드 + 인스타 앱 열기 안내
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `ntable-${room_code}.png`; a.click();
            URL.revokeObjectURL(url);
            btn.textContent = '✓ 저장됨 · 인스타에 올리세요';
          }
        } catch (_) {
          // 사용자가 공유 시트 닫음
          btn.textContent = original;
        } finally {
          setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2200);
        }
      }, 'image/png');
    } catch (_) {
      btn.textContent = '❌ 실패';
      setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1800);
    }
  }

  // 카카오 공유 — SDK init + 카드 공유 (host.html 패턴 재사용)
  async function setupKakaoShare() {
    try {
      const r = await fetch('/api/share-config');
      if (!r.ok) return;
      const cfg = await r.json();
      if (!cfg.kakaoJsKey || !window.Kakao) return;
      if (!Kakao.isInitialized()) Kakao.init(cfg.kakaoJsKey);
      const btn = document.getElementById('kakao-share-btn');
      if (btn) btn.hidden = false;
    } catch (_) {}
  }
  function kakaoShareResult() {
    if (!window.Kakao || !Kakao.isInitialized || !Kakao.isInitialized()) { alert('카카오 공유 준비 중입니다'); return; }
    const url = 'https://ntable.kr';
    const personality = document.getElementById('share-type')?.textContent || '';
    const emoji = document.getElementById('share-emoji')?.textContent || '🍽️';
    try {
      Kakao.Share.sendDefault({
        objectType: 'feed',
        content: {
          title: `오늘 ntable 모임 다녀왔어요 ${emoji}`,
          description: `내 성향: ${personality}\n누가 열어도 재밌는 모임 — ntable`,
          imageUrl: `${location.origin}/og-image.png`,
          link: { mobileWebUrl: url, webUrl: url },
        },
        buttons: [{ title: 'ntable에서 열어보기', link: { mobileWebUrl: url, webUrl: url } }],
      });
    } catch (e) { alert('카카오 공유 실패'); }
  }
  async function copyNtableLink() {
    const btn = document.getElementById('copy-link-btn');
    const originalText = btn ? btn.textContent : '';
    try {
      await navigator.clipboard.writeText('https://ntable.kr');
      if (btn) { btn.textContent = '✓ 복사됨'; setTimeout(() => { btn.textContent = originalText; }, 1800); }
    } catch (_) {
      if (btn) { btn.textContent = '❌ 실패'; setTimeout(() => { btn.textContent = originalText; }, 1800); }
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('save-image-btn')?.addEventListener('click', saveShareImage);
    document.getElementById('insta-share-btn')?.addEventListener('click', shareToInstagram);
    document.getElementById('kakao-share-btn')?.addEventListener('click', kakaoShareResult);
    document.getElementById('copy-link-btn')?.addEventListener('click', copyNtableLink);
    setupKakaoShare();
  });

  async function loadResult() {
    try {
      const r = await fetch(`/api/result?uuid=${uuid}&room_code=${room_code}`);
      const data = await r.json();

      // 팩별 UI 게이트 적용 (인스타 교환 카드 노출 등)
      if (typeof window._applyPackGates === 'function') window._applyPackGates(data.pack_defaults, data.pack_id);

      // share-card에도 매칭 한 줄 추가 (이미지 저장·인스타 공유 시 노출)
      if (typeof updateShareMatchLine === 'function') updateShareMatchLine(data);

      const matchEl = document.getElementById('match-content');
      const escMatch = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      // 오늘의 커플 — 사랑의 작대기 상호 지명
      const mutualPairs = Array.isArray(data.mutual_pairs) ? data.mutual_pairs : [];
      // 내가 속한 mutual pair → couple share card 대상
      const myMutual = mutualPairs.find(p => (p?.a?.uuid === uuid) || (p?.b?.uuid === uuid));
      couplePartnerUuid = myMutual ? (myMutual.a?.uuid === uuid ? myMutual.b?.uuid : myMutual.a?.uuid) : null;
      // couples 팩은 매칭 단계가 없어 mutual_pairs 가 비어있음 — 서버 /result 응답의 couple_partner_uuid 로 결정.
      // (기존 /members 폴백은 WS 연결된 클라이언트만 반환해서 결과 페이지 시점엔 빈 배열)
      const isCouplesPack = data.pack_id === 'couples';
      if (!couplePartnerUuid && isCouplesPack && data.couple_partner_uuid) {
        couplePartnerUuid = data.couple_partner_uuid;
      }
      const coupleBtnHtml = couplePartnerUuid ? `
        <button type="button" class="share-btn outline" style="margin-top:16px;width:100%;" onclick="generateCoupleCard()">💘 둘이서 공유 카드 만들기</button>
      ` : '';

      // couples 팩: page 2 = 연애 분석(couple_love), 기존 best_match/mutual_pairs 로직 대체
      if (isCouplesPack) {
        // 카드 타이틀 변경
        const cardTitle = document.querySelector('section[data-page="1"] .card-title');
        if (cardTitle) cardTitle.textContent = '💘 우리 연애 케미';
        if (couplePartnerUuid) {
          try {
            const lr = await fetch(`/api/rooms/${room_code}/couple-love?uuid=${encodeURIComponent(uuid)}&partner_uuid=${encodeURIComponent(couplePartnerUuid)}`);
            if (lr.ok) {
              const cd = await lr.json();
              matchEl.innerHTML = renderCoupleLove(cd) + coupleBtnHtml;
            } else {
              matchEl.innerHTML = '<div class="match-fallback-frame"><div class="match-fallback-text">연애 분석을 불러오지 못했어요.</div></div>' + coupleBtnHtml;
            }
          } catch (_) {
            matchEl.innerHTML = '<div class="match-fallback-frame"><div class="match-fallback-text">연애 분석을 불러오지 못했어요.</div></div>' + coupleBtnHtml;
          }
        } else {
          matchEl.innerHTML = '<div class="match-fallback-frame"><div class="match-fallback-text">파트너 정보가 없어요.</div></div>';
        }
      } else {
      const mutualHtml = mutualPairs.length > 0 ? `
        <div class="match-frame" style="padding:22px;margin-bottom:18px;">
          <div class="match-eyebrow">오늘의 커플 · 상호 지명</div>
          <div style="display:flex;flex-direction:column;gap:10px;margin-top:14px;">
            ${mutualPairs.map(p => `
              <div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 16px;background:rgba(212,168,67,0.06);border:1px solid var(--gold-border);border-radius:12px;">
                <span style="color:var(--white);font-weight:600;font-size:15px;">${escMatch(p.a?.nickname || '익명')}</span>
                <span style="color:var(--gold-light);font-size:18px;">💘</span>
                <span style="color:var(--white);font-weight:600;font-size:15px;">${escMatch(p.b?.nickname || '익명')}</span>
              </div>
            `).join('')}
          </div>
        </div>
      ` : `
        <div class="match-frame" style="padding:22px;margin-bottom:18px;text-align:center;">
          <div class="match-eyebrow">오늘의 커플</div>
          <div style="margin-top:12px;color:var(--subtext);font-size:13.5px;line-height:1.6;">서로 지목한 커플이 없었어요.</div>
        </div>
      `;
      if (data.match_nickname) {
        matchedUuid = data.match_uuid || null;
        const common = data.match_common || 0;
        const totalAns = data.match_total_answered || 0;
        const pctMatch = totalAns > 0 ? Math.round(common / totalAns * 100) : 0;
        const commonChip = totalAns > 0
          ? `<div class="match-common-chip">✦ ${totalAns}문항 중 <strong>${common}개</strong> 같은 선택 · 호환도 <strong>${pctMatch}%</strong></div>`
          : '';
        const picks = Array.isArray(data.match_common_picks) ? data.match_common_picks : [];
        const picksHtml = picks.length > 0
          ? `<div class="match-picks">${picks.map(p => `
              <div class="match-pick">
                <div class="match-pick-q">${escMatch(p.question)}</div>
                <div class="match-pick-a">${escMatch(p.choice)}</div>
              </div>
            `).join('')}</div>`
          : '';
        // 매칭 상대 아바타 — 사진(레거시 캐시) > 상대 emoji > 💛
        let partnerPhoto = '';
        try {
          const raw = localStorage.getItem(`ntable_photo_cache_${room_code}`);
          if (raw && matchedUuid) {
            const map = JSON.parse(raw);
            if (map[matchedUuid]) partnerPhoto = map[matchedUuid];
          }
        } catch (_) {}
        const partnerEmoji = data.match_emoji || '';
        const photoHtml = partnerPhoto
          ? `<div class="match-photo-wrap"><img src="${partnerPhoto}" alt="" class="match-photo-img"></div>`
          : (partnerEmoji
              ? `<div class="match-photo-wrap" style="display:flex;align-items:center;justify-content:center;font-size:64px;background:rgba(212,168,67,0.08);">${escMatch(partnerEmoji)}</div>`
              : `<div class="match-heart">💛</div>`);
        // 또 잘 맞았던 사람들 — top_matches 2~3위 (1위는 이미 베스트 매칭)
        const topRest = Array.isArray(data.top_matches) ? data.top_matches.slice(1, 3) : [];
        let partnerPhotoMap = {};
        try {
          const raw2 = localStorage.getItem(`ntable_photo_cache_${room_code}`);
          if (raw2) partnerPhotoMap = JSON.parse(raw2) || {};
        } catch (_) {}
        const topHtml = topRest.length > 0 ? `
          <div class="match-runners">
            <div class="match-runners-head">또 잘 맞았던 사람들</div>
            ${topRest.map(t => {
              const ph = partnerPhotoMap[t.uuid];
              const avatar = ph
                ? `<img src="${ph}" alt="" class="match-runner-avatar">`
                : (t.emoji
                    ? `<span class="match-runner-avatar dot">${escMatch(t.emoji)}</span>`
                    : `<span class="match-runner-avatar dot">👤</span>`);
              return `<div class="match-runner">
                ${avatar}
                <span class="match-runner-name">${escMatch(t.nickname)}</span>
                <span class="match-runner-pct">${t.pct}% <span style="opacity:0.6;font-size:11px;">(${t.same}/${t.common})</span></span>
              </div>`;
            }).join('')}
          </div>` : '';
        const bestLabel = data.pack_id === 'dating' ? '오늘의 인연' : '나와 가장 잘 맞았던 사람';
        matchEl.innerHTML = mutualHtml + coupleBtnHtml + `
          <div class="match-frame">
            <div class="match-eyebrow">${bestLabel}</div>
            ${photoHtml}
            <div class="match-name">${escMatch(data.match_nickname)}</div>
            <div class="match-sub">탐구 선택이 가장 많이 닿았어요</div>
            ${commonChip}
            ${picksHtml}
            ${data.fi_count ? `<div class="fi-badge">❤️ ${data.fi_count}명이 나에게 관심 표시</div>` : ''}
          </div>
          ${topHtml}
        `;
      } else {
        // 참여 상황별 fallback — fi_count 유무로 온도감 구분
        const hasInterest = (data.fi_count || 0) > 0;
        const fallback = hasInterest
          ? `
            <div class="match-fallback-frame">
              <div class="match-fallback-icon">✨</div>
              <div class="match-fallback-title">다음 만남을 기약</div>
              <div class="match-fallback-text">서로의 선택이 맞닿진 않았지만,<br><strong style="color:var(--gold-light);">${data.fi_count}명이 당신을 마음에 담았어요</strong>.<br>다음 모임에서 다시 연결될 수 있어요.</div>
            </div>
          `
          : `
            <div class="match-fallback-frame">
              <div class="match-fallback-icon">🌙</div>
              <div class="match-fallback-title">오늘은 조용히</div>
              <div class="match-fallback-text">매칭은 타이밍이에요. 오늘 나눈 대화가<br>다음 누군가와의 연결로 이어질 거예요.</div>
            </div>
          `;
        matchEl.innerHTML = mutualHtml + coupleBtnHtml + fallback;
      }
      } // end else (non-couples 분기)

      const summEl = document.getElementById('summary-content');
      const exploreEl = document.getElementById('explore-content');
      // 간단 escape
      const escResHtml = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      // 페이지 3 — 오늘의 탐구 나의 선택
      let hlHtml = '';
      try {
        const er = await fetch(`/api/rooms/${room_code}/explore-result`);
        if (er.ok) {
          const ed = await er.json();
          const myMember = (ed.members || []).find(m => m.uuid === uuid);
          const myVotes = (myMember && myMember.votes_json) || {};
          if ((ed.questions || []).length) {
            const totalQs = ed.questions.length;
            const answered = ed.questions.filter(q => myVotes[String(q.id)]).length;
            const header = `
              <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:linear-gradient(135deg, rgba(212,168,67,0.22), rgba(212,168,67,0.06));border:1px solid var(--gold-border);border-radius:14px;margin-bottom:14px;">
                <div>
                  <div style="font-size:10.5px;letter-spacing:0.2em;color:var(--gold);font-weight:600;">MY PICKS</div>
                  <div style="font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--white);font-weight:600;margin-top:2px;line-height:1;">${answered} <span style="opacity:0.55;font-size:17px;">/ ${totalQs}</span></div>
                  <div style="font-size:11.5px;color:var(--text-muted);margin-top:4px;letter-spacing:0.04em;">오늘 답한 문항</div>
                </div>
                <div style="font-size:32px;line-height:1;">🎯</div>
              </div>`;
            const rows = ed.questions.map((q, i) => {
              const opts = q.options || [];
              const optA = String(opts[0] || '').replace(/^A\.\s*/, '');
              const optB = String(opts[1] || '').replace(/^B\.\s*/, '');
              const myAns = myVotes[String(q.id)];
              const sel = myAns === 'A' ? 'A' : myAns === 'B' ? 'B' : null;
              const renderOption = (letter, text) => {
                const picked = sel === letter;
                const bg = picked ? 'rgba(212,168,67,0.22)' : 'rgba(245,242,236,0.03)';
                const br = picked ? 'var(--gold)' : 'var(--border, rgba(255,255,255,0.14))';
                const circleBg = picked ? 'var(--gold)' : 'rgba(212,168,67,0.15)';
                const circleFg = picked ? 'var(--navy)' : 'var(--gold-light)';
                const textColor = picked ? '#fff' : 'var(--text-muted)';
                const weight = picked ? 600 : 400;
                const check = picked ? '<span style="color:var(--gold);font-size:16px;line-height:1;flex-shrink:0;">✓</span>' : '';
                return `
                  <div style="display:flex;align-items:center;gap:10px;padding:11px 13px;background:${bg};border:1.5px solid ${br};border-radius:10px;transition:all 0.2s;">
                    <span style="width:24px;height:24px;border-radius:50%;background:${circleBg};color:${circleFg};display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;">${letter}</span>
                    <span style="flex:1;color:${textColor};font-weight:${weight};font-size:13px;line-height:1.45;">${escResHtml(text)}</span>
                    ${check}
                  </div>`;
              };

                <div style="padding:16px 16px 14px;background:rgba(20,29,53,0.55);border:1px solid var(--gold-border);border-radius:14px;margin-bottom:10px;">
                  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
                    <div style="font-size:10.5px;letter-spacing:0.18em;color:var(--gold);font-weight:700;">Q${i+1}</div>
                    ${!myAns ? '<div style="font-size:10.5px;color:var(--text-muted);letter-spacing:0.04em;">선택 안 함</div>' : ''}
                  </div>
                  <div style="color:#fff;font-size:14.5px;font-weight:600;line-height:1.5;margin-bottom:12px;">${escResHtml(q.question || '')}</div>
                  <div style="display:flex;flex-direction:column;gap:8px;">
                    ${renderOption('A', optA)}
                    ${renderOption('B', optB)}
                  </div>
                </div>`;
            }).join('');
            hlHtml = header + rows;
          }
        }
      } catch (_) {}
      const hs = data.host_summary || {};
      let hostAggHtml = '';
      if (hs.host_rating_count && hs.avg_host_rating != null) {
        const stars = '★'.repeat(Math.round(hs.avg_host_rating)) + '☆'.repeat(5 - Math.round(hs.avg_host_rating));
        hostAggHtml = `
          <div class="stats-row" style="margin-top:16px;">
            <div class="stat-box">
              <div class="stat-num" style="font-size:26px;color:var(--gold-light);letter-spacing:2px;">${stars}</div>
              <div class="stat-label">오늘 호스트 평가 · ${hs.host_rating_count}명 응답</div>
            </div>
          </div>`;
      }

      summEl.innerHTML = `
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-num">${data.participants}</div>
            <div class="stat-label">오늘 참가자</div>
          </div>
          <div class="stat-box">
            <div class="stat-num">${data.fi_count || 0}</div>
            <div class="stat-label">나에게 관심 표시</div>
          </div>
        </div>
        ${hostAggHtml}
      `;
      exploreEl.innerHTML = hlHtml || '<div style="color:var(--subtext);text-align:center;padding:20px 0;font-size:13px;">탐구 데이터가 없어요</div>';
    } catch {
      document.getElementById('match-content').innerHTML = '<span style="color:var(--subtext)">불러올 수 없어요.</span>';
      document.getElementById('summary-content').innerHTML = '<span style="color:var(--subtext)">불러올 수 없어요.</span>';
      document.getElementById('explore-content').innerHTML = '<span style="color:var(--subtext)">불러올 수 없어요.</span>';
    }
  }

  // 인라인 인스타 입력 (페이지 이동 없이 빠른 저장)
  function showInstaInlineInput(headHtml) {
    const resultEl = document.getElementById('insta-result');
    resultEl.innerHTML = `
      <div class="insta-pending">${headHtml}</div>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <input type="text" id="insta-inline-input" maxlength="50" placeholder="@your_instagram" autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="email" style="flex:1;padding:12px;background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.4);border-radius:10px;color:#fff;font-size:15px;font-family:inherit;text-align:center;letter-spacing:0.02em;">
        <button type="button" id="insta-inline-save" style="padding:0 18px;background:#e8b84b;color:#0a0f1e;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit;">저장</button>
      </div>
      <div id="insta-inline-status" style="font-size:11.5px;color:var(--subtext);margin-top:8px;text-align:center;min-height:14px;"></div>
    `;
    const inp = document.getElementById('insta-inline-input');
    const saveBtn = document.getElementById('insta-inline-save');
    const status = document.getElementById('insta-inline-status');
    inp.addEventListener('input', () => {
      const cleaned = inp.value.toLowerCase().replace(/^@/, '').replace(/[^a-z0-9._]/g, '');
      if (cleaned !== inp.value) inp.value = cleaned;
    });
    saveBtn.addEventListener('click', async () => {
      const val = inp.value.trim();
      if (!val) { status.textContent = '인스타 아이디를 입력해주세요'; status.style.color = '#ff8a8a'; return; }
      saveBtn.disabled = true;
      saveBtn.textContent = '저장 중…';
      status.textContent = '';
      try {
        const r = await fetch(`/api/rooms/${room_code}/me/instagram`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uuid, instagram: val }),
        });
        if (!r.ok) throw new Error('save failed');
        // 저장 직후 reveal 재요청 — 상대도 입력했으면 즉시 공개
        await requestInsta();
      } catch (e) {
        saveBtn.disabled = false;
        saveBtn.textContent = '저장';
        status.textContent = '저장 실패. 다시 시도해주세요.';
        status.style.color = '#ff8a8a';
      }
    });
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveBtn.click(); });
    setTimeout(() => inp.focus(), 100);
  }

  async function requestInsta() {
    const btn = document.getElementById('insta-btn');
    btn.disabled = true;
    btn.textContent = '처리 중...';
    try {
      const r = await fetch(`/api/rooms/${room_code}/insta-reveal`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uuid })
      });
      const data = await r.json();
      const resultEl = document.getElementById('insta-result');
      if (data.mutual && data.partner?.instagram) {
        const ig = data.partner.instagram;
        resultEl.innerHTML = `<div class="insta-reveal"><a href="https://instagram.com/${encodeURIComponent(ig)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">@${ig} 🎉</a></div>`;
        btn.style.display = 'none';
        // reveal 완료 → pending에서 제거
        if (window.ntablePendingReveals) window.ntablePendingReveals.remove(room_code);
      } else if (data.partner) {
        // 매칭은 됐지만 한쪽 미입력 → pending에 추가 (다음 진입 시 알림)
        if (window.ntablePendingReveals) window.ntablePendingReveals.add(room_code);
        if (data.reason === 'me_empty') {
          showInstaInlineInput(`💌 매칭됐어요!<br>내 인스타를 입력하면 양쪽 모두 공개됩니다.`);
          btn.style.display = 'none';
        } else if (data.reason === 'partner_empty') {
          resultEl.innerHTML = `<div class="insta-pending">💌 매칭됐어요!<br>상대가 인스타를 입력하면 자동으로 공개됩니다.<br><span style="font-size:11px;opacity:0.7;">잠시 후 다시 들어와 확인해주세요</span></div>`;
          btn.style.display = 'none';
        } else {
          showInstaInlineInput(`💌 매칭됐어요!<br>둘 다 인스타를 입력해야 공개됩니다.`);
          btn.style.display = 'none';
        }
      } else {
        resultEl.innerHTML = `<div class="insta-pending">매칭된 상대가 없어요.</div>`;
        btn.style.display = 'none';
        if (window.ntablePendingReveals) window.ntablePendingReveals.remove(room_code);
      }
    } catch {
      btn.disabled = false;
      btn.textContent = '인스타 공개하기 📲';
    }
  }

  // ── 커플 연애 분석(couple_love) DOM ───────────────
  function renderCoupleLove(d) {
    const esc = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const meName = esc(d.me?.nickname || '나');
    const partnerName = esc(d.partner?.nickname || '상대');
    const meMbti = esc(d.me?.mbti || '-');
    const pMbti = esc(d.partner?.mbti || '-');
    const compat = d.mbti_compat;
    const compatHtml = compat ? `
      <div style="padding:16px;background:rgba(212,168,67,0.06);border:1px solid var(--gold-border);border-radius:12px;margin-bottom:14px;">
        <div style="font-size:11px;letter-spacing:0.18em;color:var(--gold);margin-bottom:8px;">MBTI 궁합</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--white);margin-bottom:6px;">${esc(compat.label)}</div>
        <div style="font-size:13px;color:var(--text);line-height:1.55;margin-bottom:10px;">${esc(compat.sub)}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:11.5px;">
          ${(compat.axes || []).map(ax => `
            <div style="padding:5px 9px;border-radius:999px;background:${ax.match?'rgba(212,168,67,0.18)':'rgba(245,242,236,0.06)'};border:1px solid ${ax.match?'var(--gold)':'var(--border)'};color:${ax.match?'var(--gold-light)':'var(--text-muted)'};letter-spacing:0.04em;">
              ${esc(ax.me)}·${esc(ax.partner)} ${ax.match?'✓':''}
            </div>`).join('')}
        </div>
      </div>` : '';

    const pctColor = d.pct >= 70 ? '#7ee8a2' : d.pct >= 40 ? '#f0ca60' : '#e8a87e';
    const matchHtml = d.total > 0 ? `
      <div style="padding:16px;background:rgba(212,168,67,0.06);border:1px solid var(--gold-border);border-radius:12px;margin-bottom:14px;text-align:center;">
        <div style="font-size:11px;letter-spacing:0.18em;color:var(--gold);margin-bottom:6px;">탐구 문항 일치도</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:700;color:${pctColor};line-height:1;">${d.pct}%</div>
        <div style="font-size:12.5px;color:var(--text-muted);margin-top:6px;">${d.total}문항 중 ${d.matched}개 같은 선택</div>
      </div>` : '';

    const highlightsHtml = Array.isArray(d.highlights) && d.highlights.length > 0 ? `
      <div style="font-size:11px;letter-spacing:0.12em;color:var(--gold);margin:6px 0 10px;">하이라이트</div>
      ${d.highlights.map(h => {
        const border = h.match ? 'rgba(126,232,162,0.45)' : 'rgba(232,168,126,0.45)';
        const tag = h.match ? '✨ 같은 선택' : '🔀 다른 선택';
        const tagColor = h.match ? '#7ee8a2' : '#e8a87e';
        return `
          <div style="padding:12px 14px;margin-bottom:8px;border:1px solid ${border};border-radius:10px;background:rgba(245,242,236,0.03);">
            <div style="font-size:10.5px;letter-spacing:0.1em;color:${tagColor};margin-bottom:6px;">${tag}</div>
            <div style="font-size:13px;color:var(--white);font-weight:600;line-height:1.45;margin-bottom:8px;">${esc(h.question)}</div>
            <div style="font-size:12px;color:var(--text);line-height:1.5;">
              <div>${meName}: <strong style="color:var(--gold-light);">${esc(h.my_text)}</strong></div>
              <div>${partnerName}: <strong style="color:var(--gold-light);">${esc(h.partner_text)}</strong></div>
            </div>
          </div>`;
      }).join('')}
    ` : '';

    const genderDefault = (g) => (g === 'M' || g === 'male') ? '👨' : (g === 'F' || g === 'female') ? '👩' : '🙂';
    const meEmoji = esc(d.me?.emoji || genderDefault(d.me?.gender));
    const pEmoji = esc(d.partner?.emoji || genderDefault(d.partner?.gender));
    return `
      <div style="text-align:center;margin-bottom:16px;">
        <div style="display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;font-family:'Cormorant Garamond',serif;">
          <span style="display:inline-flex;align-items:center;gap:6px;"><span style="font-size:26px;line-height:1;">${meEmoji}</span><span style="font-size:22px;color:var(--white);">${meName}</span></span>
          <span style="color:var(--gold-light);font-size:20px;">💘</span>

    `;

  // ── 커플 공유 카드 생성 + 저장/공유 ───────────────
  async function generateCoupleCard() {
    if (!couplePartnerUuid) return;
    const btn = document.querySelector('button[onclick="generateCoupleCard()"]');
    const orig = btn ? btn.textContent : '';
    if (btn) { btn.disabled = true; btn.textContent = '준비 중…'; }
    try {
      const r = await fetch(`/api/rooms/${room_code}/couple-card?uuid=${uuid}&partner_uuid=${encodeURIComponent(couplePartnerUuid)}`);
      if (!r.ok) throw new Error('fetch fail');
      const d = await r.json();
      const escCC = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const truncate = (s, n) => { s = String(s || ''); return s.length > n ? s.slice(0, n - 1) + '…' : s; };
      // 닉네임
      document.getElementById('cc-nicks').innerHTML =
        `${escCC(d.me?.nickname || '나')} <span style="color:#f0ca60;">💘</span> ${escCC(d.partner?.nickname || '상대')}`;
      // 질문 row
      const rowsEl = document.getElementById('cc-rows');
      rowsEl.innerHTML = '';
      const maxRows = 10;
      const qs = (d.questions || []).slice(0, maxRows);
      for (const item of qs) {
        const dot = item.match ? '#f0ca60' : 'rgba(245,242,236,0.25)';
        const chip = item.match ? '#f0ca60' : 'rgba(245,242,236,0.55)';
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(212,168,67,0.06);border-radius:8px;border:1px solid rgba(212,168,67,0.18);';
        row.innerHTML = `
          <span style="width:7px;height:7px;border-radius:50%;background:${dot};flex-shrink:0;"></span>
          <span style="flex:1;font-size:10.5px;line-height:1.3;color:rgba(245,242,236,0.85);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escCC(truncate(item.q, 28))}</span>
          <span style="font-size:10px;color:${chip};font-weight:700;letter-spacing:0.08em;">${escCC(item.mine || '-')}·${escCC(item.theirs || '-')}</span>
        `;
        rowsEl.appendChild(row);
      }
      // 일치도 %
      const pct = d.total > 0 ? Math.round(d.matched / d.total * 100) : 0;
      document.getElementById('cc-pct').textContent = `${pct}%`;

      // html2canvas 캡처
      if (typeof html2canvas === 'undefined') { alert('이미지 모듈 로딩 중입니다'); return; }
      const card = document.getElementById('couple-card-capture');
      const canvas = await html2canvas(card, {
        backgroundColor: '#141d35',
        scale: 2,
        useCORS: true,
        logging: false,
        width: 360,
        height: 640,
      });
      canvas.toBlob(async (blob) => {
        if (!blob) { if (btn) { btn.disabled = false; btn.textContent = orig; } return; }
        const file = new File([blob], `ntable-couple-${room_code}.png`, { type: 'image/png' });
        try {
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
              files: [file],
              title: 'ntable 커플 카드',
              text: '오늘 ntable 모임에서 매칭됐어요 💘',
            });
          } else {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `ntable-couple-${room_code}.png`; a.click();
            URL.revokeObjectURL(url);
          }
          if (btn) { btn.textContent = '✓ 카드 저장됨'; setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000); }
        } catch (_) {
          if (btn) { btn.textContent = orig; btn.disabled = false; }
        }
      }, 'image/png');
    } catch (e) {
      console.error('couple card error:', e);
      if (btn) { btn.textContent = '❌ 실패'; setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1800); }
    }
  }

  // 페이지 pager dots 동기화 + PC 마우스 드래그 스크롤
  (function setupPager() {
    const pager = document.getElementById('pager');
    const dots = Array.from(document.querySelectorAll('#pager-dots .pager-dot'));
    if (!pager || !dots.length) return;
    const sync = () => {
      const idx = Math.round(pager.scrollLeft / (pager.clientWidth || 1));
      dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    };
    pager.addEventListener('scroll', () => {
      if (pager._raf) return;
      pager._raf = requestAnimationFrame(() => { sync(); pager._raf = null; });
    });
    dots.forEach((d, i) => {
      d.addEventListener('click', () => {
        pager.scrollTo({ left: pager.clientWidth * i, behavior: 'smooth' });
      });
    });
    sync();

    // PC 마우스 드래그로 좌우 넘기기 (터치 기기에선 기본 스와이프로 동작)
    let isDown = false, startX = 0, startScroll = 0, moved = false;
    pager.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      // 버튼/링크 위에서 시작한 드래그는 기본 동작 유지
      const t = e.target;
      if (t && t.closest('a, button, input, textarea, label')) return;
      isDown = true;
      moved = false;
      startX = e.pageX;
      startScroll = pager.scrollLeft;
      pager.style.cursor = 'grabbing';
      pager.style.userSelect = 'none';
    });
    pager.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      const dx = e.pageX - startX;
      if (Math.abs(dx) > 4) moved = true;
      pager.scrollLeft = startScroll - dx;
      e.preventDefault();
    });
    const endDrag = () => {
      if (!isDown) return;
      isDown = false;
      pager.style.cursor = '';
      pager.style.userSelect = '';
      // 가장 가까운 페이지로 스냅
      const idx = Math.round(pager.scrollLeft / (pager.clientWidth || 1));
      pager.scrollTo({ left: pager.clientWidth * idx, behavior: 'smooth' });
    };
    pager.addEventListener('mouseup', endDrag);
    pager.addEventListener('mouseleave', endDrag);
    // 드래그로 이동한 경우 자식 click 이벤트 억제
    pager.addEventListener('click', (e) => {
      if (moved) { e.stopPropagation(); e.preventDefault(); moved = false; }
    }, true);
  })();

  // 인스타 교환 페이지 링크 (결과 페이지 이후 별도 메뉴)
  (function linkInstaExchange() {
    const a = document.getElementById('insta-exchange-btn');
    if (!a) return;
    a.href = `/insta-exchange.html?room=${encodeURIComponent(room_code)}&uuid=${encodeURIComponent(uuid)}`;
  })();

  // 팩 정책에 따라 인스타 교환 카드 자체를 숨김 (dating 외 팩은 비노출).
  // data.pack_defaults 는 loadResult 에서 받은 뒤 적용 — 여기서는 초기 상태만 설정.
  function applyPackGates(packDefaults, packId) {
    const exCard = document.getElementById('insta-exchange-card');
    const enabled = packDefaults && packDefaults.insta_exchange_enabled === true;
    if (exCard) exCard.style.display = enabled ? '' : 'none';
    // dating 팩은 인스타 교환이 모임의 핵심 기능 — 버튼 카피·스타일 강조
    if (enabled && packId === 'dating') {
      const btn = document.getElementById('insta-exchange-btn');
      if (btn) {
        btn.textContent = '💘 매칭된 상대와 인스타 교환 →';
        btn.style.background = 'linear-gradient(135deg, var(--gold), #a07828)';
        btn.style.color = 'var(--navy)';
        btn.style.border = 'none';
        btn.style.fontWeight = '700';
      }
      const hint = exCard ? exCard.querySelector('.hint-text') : null;
      if (hint) hint.textContent = '서로 좋다고 누른 사람끼리만 인스타가 공개돼요. 모임이 끝난 뒤에도 연결할 수 있어요.';
      const title = exCard ? exCard.querySelector('.card-title') : null;
      if (title) title.textContent = '💘 오늘의 인연과 다시 만나기';
    }
    // result_sections 에 'summary' 가 없는 팩은 페이지 4(모임 요약) 자체 숨김 + 도트 제거
    const sections = packDefaults && Array.isArray(packDefaults.result_sections) ? packDefaults.result_sections : null;
    if (sections && !sections.includes('summary')) {
      const page4 = document.querySelector('#pager section.page[data-page="3"]');
      if (page4) page4.style.display = 'none';
      const dot4 = document.querySelector('#pager-dots .pager-dot[data-dot="3"]');
      if (dot4) dot4.style.display = 'none';
    }
  }
  // loadResult 내부에서 data.pack_defaults 수신 후 호출하기 위한 전역 노출
  window._applyPackGates = applyPackGates;

  loadPersonality();
  loadResult();
</script>
