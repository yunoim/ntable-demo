<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<title>오늘의 결과 — ntable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Navy */
    --navy:        #0a0f1e;
    --navy-light:  #0f1628;
    --navy-mid:    #141d35;
    /* Surfaces */
    --surface:     #141d35;
    --surface-2:   #1a2442;
    --surface-3:   #223056;
    /* Gold (landing 기준) */
    --gold:        #d4a843;
    --gold-light:  #f0ca60;
    --gold-dim:    rgba(212,168,67,0.18);
    --gold-dim-2:  rgba(212,168,67,0.08);
    --gold-border: rgba(212,168,67,0.35);
    /* Text */
    --white:       #f5f2ec;
    --white-dim:   rgba(245,242,236,0.88);
    --white-muted: rgba(245,242,236,0.72);
    --text:        #ddd5bc;
    --text-muted:  rgba(216,208,187,0.78);
    --text-dim:    rgba(216,208,187,0.65);
    --subtext:     rgba(216,208,187,0.78);
    /* UI */
    --border:      rgba(255,255,255,0.14);
    --input-border:#5a6178;
    --placeholder: rgba(216,208,187,0.65);
    --danger:      #e87e7e;
    --success:     #7ee8a2;
    /* Motion */
    --radius:      10px;
    --radius-lg:   18px;
    --transition:  0.32s cubic-bezier(0.4,0,0.2,1);
  }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'DM Sans', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 44px 18px 60px;
    padding-top: calc(44px + env(safe-area-inset-top));
    padding-bottom: calc(60px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(212,168,67,0.09), transparent 55%),
      radial-gradient(circle at 80% 90%, rgba(80,100,180,0.06), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { width: 100%; max-width: 460px; position: relative; z-index: 1; }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.14em;
    color: var(--gold);
    text-align: center;
    margin-bottom: 20px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 10px;
    line-height: 1.2;
  }
  h1 em { font-style: italic; color: var(--gold-light); }
  .sub {
    color: var(--subtext);
    font-size: 14px;
    margin-bottom: 32px;
    line-height: 1.7;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--gold-border);
    border-radius: 18px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.28);
  }
  .card-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--gold);
    margin-bottom: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    width: 18px; height: 1px;
    background: var(--gold);
  }
  .personality-text {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
  }

  /* ── 공유 가능한 성향 카드 ── */
  .share-card {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 55%, var(--navy-mid) 100%);
    border: 1px solid var(--gold-border);
    border-radius: 18px;
    padding: 30px 24px 26px;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .share-card::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 22% 18%, rgba(212,168,67,0.18), transparent 50%),
      radial-gradient(circle at 78% 82%, rgba(212,168,67,0.1), transparent 55%);
    pointer-events: none;
  }
  .share-card::after {
    content: '✦ ✦ ✦';
    position: absolute;
    top: 14px; right: 16px;
    font-size: 10px;
    color: rgba(212,168,67,0.4);
    letter-spacing: 0.3em;
    pointer-events: none;
  }
  .share-card-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 22px;
    position: relative;
  }
  .share-card-emoji {
    font-size: 62px;
    line-height: 1;
    margin-bottom: 14px;
    position: relative;
    filter: drop-shadow(0 4px 14px rgba(212,168,67,0.45));
  }
  .share-card-type {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px; font-weight: 600;
    color: var(--gold);
    margin-bottom: 16px;
    letter-spacing: 0.01em;
    line-height: 1.15;
    position: relative;
  }
  .share-card-text {
    font-size: 15px;
    line-height: 1.75;
    color: var(--white-dim);
    margin-bottom: 22px;
    position: relative;
    max-width: 320px;
    margin-left: auto; margin-right: auto;
  }
  .share-card-footer {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    position: relative;
  }
  .share-actions { display: flex; gap: 10px; }
  .share-btn {
    flex: 1;
    background: linear-gradient(135deg, var(--gold), #a07828);
    color: var(--navy);
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 14px rgba(212,168,67,0.25);
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .share-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(212,168,67,0.36); }
  .share-btn:disabled { opacity: 0.6; cursor: progress; }
  .share-btn.outline {
    background: transparent;
    color: var(--gold-light);
    border: 1.5px solid var(--gold-border);
    box-shadow: none;
  }
  .share-btn.outline:hover:not(:disabled) { background: var(--gold-dim); border-color: var(--gold); }
  .loading {
    color: var(--subtext);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(212,168,67,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .match-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 600;
    color: var(--gold);
    margin: 8px 0 6px;
  }
  .match-sub { font-size: 13px; color: var(--subtext); line-height: 1.6; }
  .fi-badge {
    display: inline-block;
    background: var(--gold-dim);
    color: var(--gold-light);
    border: 1px solid var(--gold-border);
    border-radius: 10px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    margin-top: 14px;
  }

  .stats-row { display: flex; gap: 12px; margin-bottom: 18px; }
  .stat-box {
    flex: 1;
    background: var(--navy-light);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 10px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 600;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--subtext);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  .highlight-item { padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .highlight-item:last-child { border-bottom: none; }
  .q-label {
    color: var(--subtext);
    font-size: 11px;
    margin-bottom: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .q-top-answer { color: var(--white); font-weight: 500; }
  .q-bar { height: 6px; background: var(--navy-light); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .q-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 3px; transition: width 0.7s ease; }

  .insta-btn {
    width: 100%;
    padding: 15px;
    background: transparent;
    border: 1.5px solid var(--gold-border);
    color: var(--gold-light);
    font-size: 15px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .insta-btn:hover { background: var(--gold-dim); border-color: var(--gold); }
  .insta-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .insta-reveal {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold);
    text-align: center;
    margin-top: 14px;
  }
  .insta-pending {
    font-size: 13px;
    color: var(--subtext);
    text-align: center;
    margin-top: 14px;
    line-height: 1.7;
  }
  .no-match { color: var(--subtext); font-size: 14px; }

  .hint-text {
    font-size: 12px;
    color: var(--subtext);
    margin-bottom: 14px;
    line-height: 1.6;
  }

  /* ── Focus visible (A11y) ── */
  button:focus-visible, a:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  /* ── Mobile (≤480px) ── */
  @media (max-width: 480px) {
    body { padding: 28px 14px 50px;
           padding-top: calc(28px + env(safe-area-inset-top));
           padding-bottom: calc(50px + env(safe-area-inset-bottom)); }
    .brand { font-size: 18px; margin-bottom: 16px; }
    h1 { font-size: 26px; }
    .sub { font-size: 13px; margin-bottom: 24px; }
    .card { padding: 20px; border-radius: 16px; margin-bottom: 12px; }
    .personality-text { font-size: 14px; line-height: 1.75; }
    .match-name { font-size: 26px; }
    .stat-num { font-size: 26px; }
    .stat-box { padding: 16px 8px; }
    .fi-badge { padding: 5px 12px; font-size: 12px; }
    .insta-btn { padding: 13px; font-size: 14px; }
    .insta-reveal { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="brand">ntable</div>
  <h1>오늘의 <em>결과</em></h1>
  <p class="sub">수고하셨어요. 오늘 모임을 정리해드릴게요 🎉</p>

  <div class="card">
    <div class="card-title">✨ AI 성향 분석</div>
    <div class="loading" id="personality-loading">
      <div class="spinner"></div>
      <span>분석 중...</span>
    </div>
    <div id="personality-body" style="display:none">
      <!-- html2canvas 캡처 타깃: 이 박스만 이미지로 저장됨 -->
      <div id="share-card" class="share-card">
        <div class="share-card-brand">ntable</div>
        <div class="share-card-emoji" id="share-emoji">✨</div>
        <div class="share-card-type" id="share-type">탐구형</div>
        <div class="share-card-text" id="personality-text"></div>
        <div class="share-card-footer">오늘의 모임 유형 · ntable.kr</div>
      </div>
      <div class="share-actions">
        <button type="button" id="save-image-btn" class="share-btn" aria-label="이미지 저장">📷 이미지 저장</button>
        <button type="button" id="copy-link-btn" class="share-btn outline" aria-label="결과 링크 복사">🔗 링크 복사</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💘 베스트 매칭</div>
    <div id="match-content">
      <div class="loading"><div class="spinner"></div><span>불러오는 중...</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📊 오늘 모임 요약</div>
    <div id="summary-content">
      <div class="loading"><div class="spinner"></div><span>불러오는 중...</span></div>
    </div>
  </div>

  <div class="card" id="insta-card" style="display:none">
    <div class="card-title">📸 인스타그램 교환</div>
    <p class="hint-text">상호 동의 시에만 공개돼요. 먼저 공개 의사를 표시해보세요.</p>
    <button type="button" class="insta-btn" id="insta-btn" onclick="requestInsta()">인스타 공개하기 📲</button>
    <div id="insta-result"></div>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const room_code = params.get('room');
  const uuid = params.get('uuid') || localStorage.getItem('demo_uuid');
  if (!uuid || !room_code) location.href = '/';

  let matchedUuid = null;

  async function loadPersonality() {
    try {
      const r = await fetch(`/api/personality?uuid=${uuid}&room_code=${room_code}`);
      const data = await r.json();
      document.getElementById('personality-loading').style.display = 'none';
      document.getElementById('share-emoji').textContent = data.emoji || '✨';
      document.getElementById('share-type').textContent = data.personality || '탐구형';
      document.getElementById('personality-text').textContent = data.text || '분석 결과를 불러올 수 없어요.';
      document.getElementById('personality-body').style.display = 'block';
    } catch {
      document.getElementById('personality-loading').innerHTML = '<span style="color:var(--subtext)">분석 결과를 불러올 수 없어요.</span>';
    }
  }

  // ── 이미지 저장 / 링크 복사 ──
  async function saveShareImage() {
    const btn = document.getElementById('save-image-btn');
    const card = document.getElementById('share-card');
    if (!card || typeof html2canvas === 'undefined') {
      alert('이미지 저장 모듈 로딩 중입니다. 잠시 후 다시 시도해주세요.');
      return;
    }
    btn.disabled = true;
    btn.textContent = '저장 중...';
    try {
      const canvas = await html2canvas(card, {
        backgroundColor: '#141d35',
        scale: 2,
        useCORS: true,
        logging: false,
      });
      const link = document.createElement('a');
      link.download = `ntable-${room_code}-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      btn.textContent = '✓ 저장됨';
      setTimeout(() => { btn.textContent = '📷 이미지 저장'; btn.disabled = false; }, 1800);
    } catch (e) {
      btn.textContent = '❌ 저장 실패';
      setTimeout(() => { btn.textContent = '📷 이미지 저장'; btn.disabled = false; }, 1800);
    }
  }

  async function copyResultLink() {
    const btn = document.getElementById('copy-link-btn');
    const url = location.href;
    try {
      if (navigator.share) {
        await navigator.share({ title: 'ntable 모임 결과', url });
        return;
      }
      await navigator.clipboard.writeText(url);
      btn.textContent = '✓ 복사됨';
      setTimeout(() => { btn.textContent = '🔗 링크 복사'; }, 1600);
    } catch {
      const ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      btn.textContent = '✓ 복사됨';
      setTimeout(() => { btn.textContent = '🔗 링크 복사'; }, 1600);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('save-image-btn')?.addEventListener('click', saveShareImage);
    document.getElementById('copy-link-btn')?.addEventListener('click', copyResultLink);
  });

  async function loadResult() {
    try {
      const r = await fetch(`/api/result?uuid=${uuid}&room_code=${room_code}`);
      const data = await r.json();

      const matchEl = document.getElementById('match-content');
      if (data.match_nickname) {
        matchedUuid = data.match_uuid || null;
        matchEl.innerHTML = `
          <div class="match-name">💛 ${data.match_nickname}</div>
          <div class="match-sub">오늘 모임에서 가장 잘 맞았던 분이에요</div>
          ${data.fi_count ? `<div class="fi-badge">❤️ ${data.fi_count}명이 나에게 관심 표시</div>` : ''}
        `;
        document.getElementById('insta-card').style.display = 'block';
      } else {
        matchEl.innerHTML = '<div class="no-match">매칭 결과가 아직 없어요.</div>';
      }

      const summEl = document.getElementById('summary-content');
      let hlHtml = '';
      if (data.question_highlights?.length) {
        const max = Math.max(...data.question_highlights.map(h => h.count));
        hlHtml = `<div style="font-size:12px;color:var(--subtext);margin-bottom:10px;letter-spacing:0.04em;">인기 선택지 TOP 5</div>` +
          data.question_highlights.slice(0, 5).map(h => `
            <div class="highlight-item">
              <div class="q-label">Q${h.question_id}</div>
              <div class="q-top-answer">${h.top_answer}</div>
              <div class="q-bar"><div class="q-fill" style="width:${Math.round(h.count/max*100)}%"></div></div>
            </div>
          `).join('');
      }
      summEl.innerHTML = `
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-num">${data.participants}</div>
            <div class="stat-label">오늘 참가자</div>
          </div>
          <div class="stat-box">
            <div class="stat-num">${data.fi_count || 0}</div>
            <div class="stat-label">나에게 관심 표시</div>
          </div>
        </div>
        ${hlHtml}
      `;
    } catch {
      document.getElementById('match-content').innerHTML = '<span style="color:var(--subtext)">불러올 수 없어요.</span>';
      document.getElementById('summary-content').innerHTML = '<span style="color:var(--subtext)">불러올 수 없어요.</span>';
    }
  }

  async function requestInsta() {
    const btn = document.getElementById('insta-btn');
    btn.disabled = true;
    btn.textContent = '처리 중...';
    try {
      const r = await fetch(`/api/rooms/${room_code}/insta-reveal`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uuid })
      });
      const data = await r.json();
      const resultEl = document.getElementById('insta-result');
      if (data.mutual && data.partner?.instagram) {
        resultEl.innerHTML = `<div class="insta-reveal">@${data.partner.instagram} 🎉</div>`;
      } else if (data.pending) {
        resultEl.innerHTML = `<div class="insta-pending">공개 의사를 전달했어요<br>상대방이 공개하면 알려드릴게요 ⏳</div>`;
        btn.textContent = '✓ 공개 요청 완료';
      } else {
        resultEl.innerHTML = `<div class="insta-pending">매칭 상대 정보를 찾을 수 없어요.</div>`;
        btn.style.display = 'none';
      }
    } catch {
      btn.disabled = false;
      btn.textContent = '인스타 공개하기 📲';
    }
  }

  loadPersonality();
  loadResult();
</script>
</body>
</html>
