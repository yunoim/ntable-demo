<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<link rel="stylesheet" href="/theme-lock.css">
<title>오늘의 결과 — ntable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Navy */
    --navy:        #0a0f1e;
    --navy-light:  #0f1628;
    --navy-mid:    #141d35;
    /* Surfaces */
    --surface:     #141d35;
    --surface-2:   #1a2442;
    --surface-3:   #223056;
    /* Gold (landing 기준) */
    --gold:        #d4a843;
    --gold-light:  #f0ca60;
    --gold-dim:    rgba(212,168,67,0.18);
    --gold-dim-2:  rgba(212,168,67,0.08);
    --gold-border: rgba(212,168,67,0.35);
    /* Text */
    --white:       #f5f2ec;
    --white-dim:   rgba(245,242,236,0.88);
    --white-muted: rgba(245,242,236,0.72);
    --text:        #ddd5bc;
    --text-muted:  rgba(216,208,187,0.78);
    --text-dim:    rgba(216,208,187,0.65);
    --subtext:     rgba(216,208,187,0.78);
    /* UI */
    --border:      rgba(255,255,255,0.14);
    --input-border:#5a6178;
    --placeholder: rgba(216,208,187,0.65);
    --danger:      #e87e7e;
    --success:     #7ee8a2;
    /* Motion */
    --radius:      10px;
    --radius-lg:   18px;
    --transition:  0.32s cubic-bezier(0.4,0,0.2,1);
  }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'DM Sans', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 44px 18px 60px;
    padding-top: calc(44px + env(safe-area-inset-top));
    padding-bottom: calc(60px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(212,168,67,0.09), transparent 55%),
      radial-gradient(circle at 80% 90%, rgba(80,100,180,0.06), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { width: 100%; max-width: 460px; position: relative; z-index: 1; }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.14em;
    color: var(--gold);
    text-align: center;
    margin-bottom: 20px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 10px;
    line-height: 1.2;
  }
  h1 em { font-style: italic; color: var(--gold-light); }
  .sub {
    color: var(--subtext);
    font-size: 14px;
    margin-bottom: 32px;
    line-height: 1.7;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--gold-border);
    border-radius: 18px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.28);
  }
  .card-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--gold);
    margin-bottom: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    width: 18px; height: 1px;
    background: var(--gold);
  }
  .personality-text {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
  }

  /* ── 공유 가능한 성향 카드 ── */
  .share-card {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 55%, var(--navy-mid) 100%);
    border: 1px solid var(--gold-border);
    border-radius: 18px;
    padding: 30px 24px 26px;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .share-card::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 22% 18%, rgba(212,168,67,0.18), transparent 50%),
      radial-gradient(circle at 78% 82%, rgba(212,168,67,0.1), transparent 55%);
    pointer-events: none;
  }
  .share-card::after {
    content: '✦ ✦ ✦';
    position: absolute;
    top: 14px; right: 16px;
    font-size: 10px;
    color: rgba(212,168,67,0.4);
    letter-spacing: 0.3em;
    pointer-events: none;
  }
  .share-card-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 22px;
    position: relative;
  }
  .share-card-emoji {
    font-size: 62px;
    line-height: 1;
    margin-bottom: 14px;
    position: relative;
    filter: drop-shadow(0 4px 14px rgba(212,168,67,0.45));
  }
  .share-card-photo {
    width: 110px; height: 110px;
    margin: 0 auto 16px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid var(--gold);
    box-shadow: 0 0 24px rgba(212,168,67,0.4);
    position: relative;
  }
  .share-card-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-include-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: rgba(212,168,67,0.06);
    border: 1px dashed rgba(212,168,67,0.3);
    border-radius: 10px;
    margin: 14px 0;
    cursor: pointer;
    font-size: 13px;
    color: var(--white-dim);
  }
  .photo-include-toggle input { width: 16px; height: 16px; accent-color: var(--gold); cursor: pointer; }
  .photo-include-toggle small { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; }
  .share-card-type {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px; font-weight: 600;
    color: var(--gold);
    margin-bottom: 16px;
    letter-spacing: 0.01em;
    line-height: 1.15;
    position: relative;
  }
  .share-card-text {
    font-size: 15px;
    line-height: 1.75;
    color: var(--white-dim);
    margin-bottom: 22px;
    position: relative;
    max-width: 320px;
    margin-left: auto; margin-right: auto;
  }
  .share-card-footer {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    position: relative;
  }
  .share-actions { display: flex; gap: 10px; }
  .share-btn {
    flex: 1;
    background: linear-gradient(135deg, var(--gold), #a07828);
    color: var(--navy);
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 14px rgba(212,168,67,0.25);
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .share-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(212,168,67,0.36); }
  .share-btn:disabled { opacity: 0.6; cursor: progress; }
  .share-btn.outline {
    background: transparent;
    color: var(--gold-light);
    border: 1.5px solid var(--gold-border);
    box-shadow: none;
  }
  .share-btn.outline:hover:not(:disabled) { background: var(--gold-dim); border-color: var(--gold); }
  .loading {
    color: var(--subtext);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(212,168,67,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 매칭 카드 (share-card 톤 통일) ── */
  .match-frame {
    position: relative;
    background: linear-gradient(135deg, rgba(212,168,67,0.10) 0%, rgba(212,168,67,0.03) 55%, rgba(20,29,53,0.4) 100%);
    border: 1px solid var(--gold-border);
    border-radius: 16px;
    padding: 22px 18px 20px;
    text-align: center;
    overflow: hidden;
  }
  .match-frame::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 18% 22%, rgba(212,168,67,0.18), transparent 55%),
      radial-gradient(circle at 82% 78%, rgba(212,168,67,0.10), transparent 55%);
    pointer-events: none;
  }
  .match-frame::after {
    content: '✦ ✦ ✦';
    position: absolute;
    top: 10px; right: 14px;
    font-size: 9px;
    color: rgba(212,168,67,0.4);
    letter-spacing: 0.3em;
    pointer-events: none;
  }
  .match-eyebrow {
    position: relative;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .match-heart {
    position: relative;
    font-size: 26px;
    line-height: 1;
    margin-bottom: 6px;
    filter: drop-shadow(0 2px 10px rgba(232,126,126,0.45));
    animation: heartPulse 1.8s ease-in-out infinite;
  }
  .match-photo-wrap {
    position: relative;
    width: 88px; height: 88px;
    margin: 0 auto 8px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--gold);
    box-shadow: 0 0 18px rgba(212,168,67,0.35);
  }
  .match-photo-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  @keyframes heartPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  .match-name {
    position: relative;
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--gold);
    margin: 4px 0 8px;
    letter-spacing: 0.01em;
    line-height: 1.15;
  }
  .match-sub {
    position: relative;
    font-size: 13px;
    color: var(--subtext);
    line-height: 1.6;
  }
  .match-sub strong { color: var(--gold-light); font-weight: 600; }
  .match-common-chip {
    position: relative;
    display: inline-block;
    margin-top: 14px;
    padding: 8px 14px;
    background: rgba(212,168,67,0.08);
    border: 1px solid rgba(212,168,67,0.3);
    border-radius: 10px;
    font-size: 12.5px;
    color: var(--white-dim);
    letter-spacing: 0.02em;
  }
  .match-common-chip strong { color: var(--gold-light); font-weight: 700; }
  .match-picks {
    position: relative;
    margin-top: 12px;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .match-pick {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(212,168,67,0.18);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.5;
  }
  .match-pick-q {
    color: var(--text-dim);
    font-size: 11px;
    margin-bottom: 3px;
    letter-spacing: 0.02em;
  }
  .match-pick-a {
    color: var(--white-dim);
    font-weight: 500;
  }
  .match-pick-a::before {
    content: '✓';
    color: var(--gold-light);
    margin-right: 6px;
    font-weight: 700;
  }
  .fi-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--gold-dim);
    color: var(--gold-light);
    border: 1px solid var(--gold-border);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12.5px;
    font-weight: 600;
    margin-top: 10px;
    position: relative;
  }
  .match-fallback-frame {
    position: relative;
    background: var(--navy-light);
    border: 1px dashed rgba(212,168,67,0.25);
    border-radius: 14px;
    padding: 22px 18px;
    text-align: center;
  }
  .match-fallback-icon {
    font-size: 32px;
    line-height: 1;
    margin-bottom: 10px;
    opacity: 0.85;
  }
  .match-fallback-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold-light);
    margin-bottom: 8px;
  }
  .match-fallback-text { font-size: 13px; color: var(--subtext); line-height: 1.65; }

  .stats-row { display: flex; gap: 12px; margin-bottom: 18px; }
  .stat-box {
    flex: 1;
    background: var(--navy-light);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 10px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 600;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--subtext);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  .highlight-item { padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .highlight-item:last-child { border-bottom: none; }
  .q-label {
    color: var(--subtext);
    font-size: 11px;
    margin-bottom: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .q-top-answer { color: var(--white); font-weight: 500; }
  .q-bar { height: 6px; background: var(--navy-light); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .q-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 3px; transition: width 0.7s ease; }

  .insta-btn {
    width: 100%;
    padding: 15px;
    background: transparent;
    border: 1.5px solid var(--gold-border);
    color: var(--gold-light);
    font-size: 15px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .insta-btn:hover { background: var(--gold-dim); border-color: var(--gold); }
  .insta-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .insta-reveal {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold);
    text-align: center;
    margin-top: 14px;
  }
  .insta-pending {
    font-size: 13px;
    color: var(--subtext);
    text-align: center;
    margin-top: 14px;
    line-height: 1.7;
  }
  .no-match { color: var(--subtext); font-size: 14px; }

  .hint-text {
    font-size: 12px;
    color: var(--subtext);
    margin-bottom: 14px;
    line-height: 1.6;
  }

  /* ── Focus visible (A11y) ── */
  button:focus-visible, a:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  /* ── Mobile (≤480px) ── */
  @media (max-width: 480px) {
    body { padding: 28px 14px 50px;
           padding-top: calc(28px + env(safe-area-inset-top));
           padding-bottom: calc(50px + env(safe-area-inset-bottom)); }
    .brand { font-size: 18px; margin-bottom: 16px; }
    h1 { font-size: 26px; }
    .sub { font-size: 13px; margin-bottom: 24px; }
    .card { padding: 20px; border-radius: 16px; margin-bottom: 12px; }
    .personality-text { font-size: 14px; line-height: 1.75; }
    .match-name { font-size: 26px; }
    .stat-num { font-size: 26px; }
    .stat-box { padding: 16px 8px; }
    .fi-badge { padding: 5px 12px; font-size: 12px; }
    .insta-btn { padding: 13px; font-size: 14px; }
    .insta-reveal { font-size: 20px; }
  }
</style>
<script src="/sentry-init.js" data-page="result" defer></script>
</head>
<body>
<div class="container">
  <div class="brand">ntable</div>
  <h1>오늘의 <em>결과</em></h1>
  <p class="sub">수고하셨어요. 오늘 모임을 정리해드릴게요 🎉</p>

  <div class="card">
    <div class="card-title">✨ AI 성향 분석</div>
    <div class="loading" id="personality-loading">
      <div class="spinner"></div>
      <span>분석 중...</span>
    </div>
    <div id="personality-body" style="display:none">
      <!-- html2canvas 캡처 타깃: 이 박스만 이미지로 저장됨 -->
      <div id="share-card" class="share-card">
        <div class="share-card-brand">ntable</div>
        <div class="share-card-photo" id="share-photo" style="display:none"></div>
        <div class="share-card-emoji" id="share-emoji">✨</div>
        <div class="share-card-type" id="share-type">탐구형</div>
        <div class="share-card-text" id="personality-text"></div>
        <div class="share-card-footer">오늘의 모임 유형 · ntable.kr</div>
      </div>
      <div class="share-actions">
        <button type="button" id="save-image-btn" class="share-btn" aria-label="이미지 저장">📷 이미지 저장</button>
        <button type="button" id="insta-share-btn" class="share-btn outline" aria-label="인스타 스토리로 공유">📸 인스타 스토리 공유</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💘 베스트 매칭</div>
    <div id="match-content">
      <div class="loading"><div class="spinner"></div><span>불러오는 중...</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📊 오늘 모임 요약</div>
    <div id="summary-content">
      <div class="loading"><div class="spinner"></div><span>불러오는 중...</span></div>
    </div>
  </div>

  <div class="card" id="insta-card" style="display:none">
    <div class="card-title">📸 인스타그램 교환</div>
    <p class="hint-text">상호 동의 시에만 공개돼요. 먼저 공개 의사를 표시해보세요.</p>
    <button type="button" class="insta-btn" id="insta-btn" onclick="requestInsta()">인스타 공개하기 📲</button>
    <div id="insta-result"></div>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const room_code = params.get('room');
  const uuid = params.get('uuid') || localStorage.getItem('demo_uuid');
  if (!uuid || !room_code) location.href = '/';

  let matchedUuid = null;

  // ws 연결 — insta_mutual broadcast 수신 시 자동 갱신
  let _ws = null;
  function connectResultWs() {
    try {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      _ws = new WebSocket(`${proto}://${location.host}/ws/${room_code}/${uuid}`);
      _ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'insta_mutual') {
            // 본인이 페어인지 확인
            const ig = msg.a_uuid === uuid ? msg.b?.instagram : (msg.b_uuid === uuid ? msg.a?.instagram : null);
            if (ig) {
              const resultEl = document.getElementById('insta-result');
              if (resultEl) resultEl.innerHTML = `<div class="insta-reveal"><a href="https://instagram.com/${encodeURIComponent(ig)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">@${ig} 🎉</a></div>`;
              const btn = document.getElementById('insta-btn');
              if (btn) btn.style.display = 'none';
            }
          }
        } catch (_) {}
      };
      _ws.onclose = () => { setTimeout(connectResultWs, 5000); };
      _ws.onerror = () => { try { _ws.close(); } catch (_) {} };
    } catch (_) {}
  }
  connectResultWs();

  async function loadPersonality() {
    try {
      const r = await fetch(`/api/personality?uuid=${uuid}&room_code=${room_code}`);
      const data = await r.json();
      document.getElementById('personality-loading').style.display = 'none';
      document.getElementById('share-emoji').textContent = data.emoji || '✨';
      document.getElementById('share-type').textContent = data.personality || '탐구형';
      document.getElementById('personality-text').textContent = data.text || '분석 결과를 불러올 수 없어요.';
      document.getElementById('personality-body').style.display = 'block';
    } catch {
      document.getElementById('personality-loading').innerHTML = '<span style="color:var(--subtext)">분석 결과를 불러올 수 없어요.</span>';
    }
  }

  // 본인 사진 (모임 중 업로드한 것이 localStorage에 남아 있을 때만) 인스타 카드 포함 옵션
  function setupPhotoToggle() {
    let savedPhoto = null;
    try { savedPhoto = localStorage.getItem(`ntable_photo_${room_code}`); } catch (_) {}
    if (!savedPhoto) return;
    const wrap = document.getElementById('photoToggleWrap');
    const toggle = document.getElementById('includePhotoToggle');
    const photoSlot = document.getElementById('share-photo');
    const emojiSlot = document.getElementById('share-emoji');
    if (!wrap || !toggle || !photoSlot || !emojiSlot) return;
    wrap.hidden = false;
    toggle.addEventListener('change', () => {
      if (toggle.checked) {
        photoSlot.innerHTML = `<img src="${savedPhoto}" alt="">`;
        photoSlot.style.display = 'block';
        emojiSlot.style.display = 'none';
      } else {
        photoSlot.innerHTML = '';
        photoSlot.style.display = 'none';
        emojiSlot.style.display = '';
      }
    });
  }

  // ── 이미지 저장 / 링크 복사 ──
  async function saveShareImage() {
    const btn = document.getElementById('save-image-btn');
    const card = document.getElementById('share-card');
    if (!card || typeof html2canvas === 'undefined') {
      alert('이미지 저장 모듈 로딩 중입니다. 잠시 후 다시 시도해주세요.');
      return;
    }
    btn.disabled = true;
    btn.textContent = '저장 중...';
    try {
      const canvas = await html2canvas(card, {
        backgroundColor: '#141d35',
        scale: 2,
        useCORS: true,
        logging: false,
      });
      const link = document.createElement('a');
      link.download = `ntable-${room_code}-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      btn.textContent = '✓ 저장됨';
      setTimeout(() => { btn.textContent = '📷 이미지 저장'; btn.disabled = false; }, 1800);
    } catch (e) {
      btn.textContent = '❌ 저장 실패';
      setTimeout(() => { btn.textContent = '📷 이미지 저장'; btn.disabled = false; }, 1800);
    }
  }

  // 인스타 스토리 공유 — share-card DOM 을 html2canvas 로 PNG 뽑아서 Web Share API 로 전달
  async function shareToInstagram() {
    const btn = document.getElementById('insta-share-btn');
    const card = document.getElementById('share-card');
    if (!card || typeof html2canvas === 'undefined') {
      alert('공유 카드 준비 중이에요. 잠시 후 다시 시도해주세요.');
      return;
    }
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = '준비 중...';
    try {
      const canvas = await html2canvas(card, {
        backgroundColor: '#141d35',
        scale: 2,
        useCORS: true,
        logging: false,
      });
      canvas.toBlob(async (blob) => {
        if (!blob) { btn.textContent = '❌ 실패'; setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1800); return; }
        const file = new File([blob], `ntable-${room_code}.png`, { type: 'image/png' });
        const canShareFile = navigator.canShare && navigator.canShare({ files: [file] });
        try {
          if (canShareFile) {
            await navigator.share({
              files: [file],
              title: 'ntable 모임 결과',
              text: '오늘 ntable 모임 다녀왔어요 🍽️',
            });
            btn.textContent = '✓ 공유됨';
          } else {
            // 모바일에서 파일 공유 미지원 → 이미지 다운로드 + 인스타 앱 열기 안내
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `ntable-${room_code}.png`; a.click();
            URL.revokeObjectURL(url);
            btn.textContent = '✓ 저장됨 · 인스타에 올리세요';
          }
        } catch (_) {
          // 사용자가 공유 시트 닫음
          btn.textContent = original;
        } finally {
          setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2200);
        }
      }, 'image/png');
    } catch (_) {
      btn.textContent = '❌ 실패';
      setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1800);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('save-image-btn')?.addEventListener('click', saveShareImage);
    document.getElementById('insta-share-btn')?.addEventListener('click', shareToInstagram);
  });

  async function loadResult() {
    try {
      const r = await fetch(`/api/result?uuid=${uuid}&room_code=${room_code}`);
      const data = await r.json();

      const matchEl = document.getElementById('match-content');
      const escMatch = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      if (data.match_nickname) {
        matchedUuid = data.match_uuid || null;
        const common = data.match_common || 0;
        const totalAns = data.match_total_answered || 0;
        const commonChip = totalAns > 0
          ? `<div class="match-common-chip">✦ ${totalAns}문항 중 <strong>${common}개</strong> 같은 선택</div>`
          : '';
        const picks = Array.isArray(data.match_common_picks) ? data.match_common_picks : [];
        const picksHtml = picks.length > 0
          ? `<div class="match-picks">${picks.map(p => `
              <div class="match-pick">
                <div class="match-pick-q">${escMatch(p.question)}</div>
                <div class="match-pick-a">${escMatch(p.choice)}</div>
              </div>
            `).join('')}</div>`
          : '';
        // 매칭 상대 사진 — 모임 중 ws photo_update 로 캐시한 localStorage에서 조회
        let partnerPhoto = '';
        try {
          const raw = localStorage.getItem(`ntable_photo_cache_${room_code}`);
          if (raw && matchedUuid) {
            const map = JSON.parse(raw);
            if (map[matchedUuid]) partnerPhoto = map[matchedUuid];
          }
        } catch (_) {}
        const photoHtml = partnerPhoto
          ? `<div class="match-photo-wrap"><img src="${partnerPhoto}" alt="" class="match-photo-img"></div>`
          : `<div class="match-heart">💛</div>`;
        matchEl.innerHTML = `
          <div class="match-frame">
            <div class="match-eyebrow">오늘의 인연</div>
            ${photoHtml}
            <div class="match-name">${escMatch(data.match_nickname)}</div>
            <div class="match-sub">서로의 선택이 가장 많이 닿았어요</div>
            ${commonChip}
            ${picksHtml}
            ${data.fi_count ? `<div class="fi-badge">❤️ ${data.fi_count}명이 나에게 관심 표시</div>` : ''}
          </div>
        `;
        document.getElementById('insta-card').style.display = 'block';
      } else {
        // 참여 상황별 fallback — fi_count 유무로 온도감 구분
        const hasInterest = (data.fi_count || 0) > 0;
        matchEl.innerHTML = hasInterest
          ? `
            <div class="match-fallback-frame">
              <div class="match-fallback-icon">✨</div>
              <div class="match-fallback-title">다음 만남을 기약</div>
              <div class="match-fallback-text">서로의 선택이 맞닿진 않았지만,<br><strong style="color:var(--gold-light);">${data.fi_count}명이 당신을 마음에 담았어요</strong>.<br>다음 모임에서 다시 연결될 수 있어요.</div>
            </div>
          `
          : `
            <div class="match-fallback-frame">
              <div class="match-fallback-icon">🌙</div>
              <div class="match-fallback-title">오늘은 조용히</div>
              <div class="match-fallback-text">매칭은 타이밍이에요. 오늘 나눈 대화가<br>다음 누군가와의 연결로 이어질 거예요.</div>
            </div>
          `;
      }

      const summEl = document.getElementById('summary-content');
      // 간단 escape
      const escResHtml = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      // 인기 TOP 5 → 오늘 모든 문항 + 나의 선택
      let hlHtml = '';
      try {
        const er = await fetch(`/api/rooms/${room_code}/explore-result`);
        if (er.ok) {
          const ed = await er.json();
          const myMember = (ed.members || []).find(m => m.uuid === uuid);
          const myVotes = (myMember && myMember.votes_json) || {};
          if ((ed.questions || []).length) {
            hlHtml = `<div style="font-size:12px;color:var(--subtext);margin:18px 0 10px;letter-spacing:0.04em;">오늘의 탐구 — 나의 선택</div>` +
              ed.questions.map((q, i) => {
                const opts = q.options || [];
                const optA = String(opts[0] || '').replace(/^A\.\s*/, '');
                const optB = String(opts[1] || '').replace(/^B\.\s*/, '');
                const myAns = myVotes[String(q.id)];
                const aSel = myAns === 'A';
                const bSel = myAns === 'B';
                return `
                  <div style="padding:12px 14px;background:rgba(212,168,67,0.05);border:1px solid rgba(212,168,67,0.25);border-radius:10px;margin-bottom:8px;">
                    <div style="font-size:11px;color:var(--gold);margin-bottom:4px;letter-spacing:0.08em;">Q${i+1}</div>
                    <div style="color:#fff;font-size:13.5px;font-weight:500;line-height:1.45;margin-bottom:8px;">${escResHtml(q.question || '')}</div>
                    <div style="font-size:12.5px;line-height:1.6;">
                      <div style="color:${aSel?'#e8b84b':'#c0c0c0'};${aSel?'font-weight:700;':''}">A. ${escResHtml(optA)}${aSel?' ✓':''}</div>
                      <div style="color:${bSel?'#e8b84b':'#c0c0c0'};${bSel?'font-weight:700;':''}">B. ${escResHtml(optB)}${bSel?' ✓':''}</div>
                    </div>
                    ${!myAns ? '<div style="font-size:11px;color:#6f7889;margin-top:4px;font-style:italic;">선택 안 함</div>' : ''}
                  </div>
                `;
              }).join('');
          }
        }
      } catch (_) {}
      const hs = data.host_summary || {};
      let hostAggHtml = '';
      if (hs.host_rating_count && hs.avg_host_rating != null) {
        const stars = '★'.repeat(Math.round(hs.avg_host_rating)) + '☆'.repeat(5 - Math.round(hs.avg_host_rating));
        hostAggHtml = `
          <div class="stats-row" style="margin-top:16px;">
            <div class="stat-box">
              <div class="stat-num" style="font-size:26px;color:var(--gold-light);letter-spacing:2px;">${stars}</div>
              <div class="stat-label">오늘 호스트 평가 · ${hs.host_rating_count}명 응답</div>
            </div>
          </div>`;
      }

      summEl.innerHTML = `
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-num">${data.participants}</div>
            <div class="stat-label">오늘 참가자</div>
          </div>
          <div class="stat-box">
            <div class="stat-num">${data.fi_count || 0}</div>
            <div class="stat-label">나에게 관심 표시</div>
          </div>
        </div>
        ${hostAggHtml}
        ${hlHtml}
      `;
    } catch {
      document.getElementById('match-content').innerHTML = '<span style="color:var(--subtext)">불러올 수 없어요.</span>';
      document.getElementById('summary-content').innerHTML = '<span style="color:var(--subtext)">불러올 수 없어요.</span>';
    }
  }

  // 인라인 인스타 입력 (페이지 이동 없이 빠른 저장)
  function showInstaInlineInput(headHtml) {
    const resultEl = document.getElementById('insta-result');
    resultEl.innerHTML = `
      <div class="insta-pending">${headHtml}</div>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <input type="text" id="insta-inline-input" maxlength="50" placeholder="@your_instagram" autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="email" style="flex:1;padding:12px;background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.4);border-radius:10px;color:#fff;font-size:15px;font-family:inherit;text-align:center;letter-spacing:0.02em;">
        <button type="button" id="insta-inline-save" style="padding:0 18px;background:#e8b84b;color:#0a0f1e;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit;">저장</button>
      </div>
      <div id="insta-inline-status" style="font-size:11.5px;color:var(--subtext);margin-top:8px;text-align:center;min-height:14px;"></div>
    `;
    const inp = document.getElementById('insta-inline-input');
    const saveBtn = document.getElementById('insta-inline-save');
    const status = document.getElementById('insta-inline-status');
    inp.addEventListener('input', () => {
      const cleaned = inp.value.toLowerCase().replace(/^@/, '').replace(/[^a-z0-9._]/g, '');
      if (cleaned !== inp.value) inp.value = cleaned;
    });
    saveBtn.addEventListener('click', async () => {
      const val = inp.value.trim();
      if (!val) { status.textContent = '인스타 아이디를 입력해주세요'; status.style.color = '#ff8a8a'; return; }
      saveBtn.disabled = true;
      saveBtn.textContent = '저장 중…';
      status.textContent = '';
      try {
        const r = await fetch(`/api/rooms/${room_code}/me/instagram`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uuid, instagram: val }),
        });
        if (!r.ok) throw new Error('save failed');
        // 저장 직후 reveal 재요청 — 상대도 입력했으면 즉시 공개
        await requestInsta();
      } catch (e) {
        saveBtn.disabled = false;
        saveBtn.textContent = '저장';
        status.textContent = '저장 실패. 다시 시도해주세요.';
        status.style.color = '#ff8a8a';
      }
    });
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveBtn.click(); });
    setTimeout(() => inp.focus(), 100);
  }

  async function requestInsta() {
    const btn = document.getElementById('insta-btn');
    btn.disabled = true;
    btn.textContent = '처리 중...';
    try {
      const r = await fetch(`/api/rooms/${room_code}/insta-reveal`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uuid })
      });
      const data = await r.json();
      const resultEl = document.getElementById('insta-result');
      if (data.mutual && data.partner?.instagram) {
        const ig = data.partner.instagram;
        resultEl.innerHTML = `<div class="insta-reveal"><a href="https://instagram.com/${encodeURIComponent(ig)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">@${ig} 🎉</a></div>`;
        btn.style.display = 'none';
      } else if (data.partner) {
        // 매칭은 됐지만 한쪽 미입력
        if (data.reason === 'me_empty') {
          showInstaInlineInput(`💌 매칭됐어요!<br>내 인스타를 입력하면 양쪽 모두 공개됩니다.`);
          btn.style.display = 'none';
        } else if (data.reason === 'partner_empty') {
          resultEl.innerHTML = `<div class="insta-pending">💌 매칭됐어요!<br>상대가 인스타를 입력하면 자동으로 공개됩니다.<br><span style="font-size:11px;opacity:0.7;">상대가 입력하면 알림이 와요</span></div>`;
          btn.style.display = 'none';
        } else {
          showInstaInlineInput(`💌 매칭됐어요!<br>둘 다 인스타를 입력해야 공개됩니다.`);
          btn.style.display = 'none';
        }
      } else {
        resultEl.innerHTML = `<div class="insta-pending">매칭된 상대가 없어요.</div>`;
        btn.style.display = 'none';
      }
    } catch {
      btn.disabled = false;
      btn.textContent = '인스타 공개하기 📲';
    }
  }

  loadPersonality();
  loadResult();
</script>
</body>
</html>
