<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<link rel="stylesheet" href="/theme-lock.css">
<link rel="stylesheet" href="/styles/tokens.css">
<link rel="stylesheet" href="/styles/components.css">
<script src="/samsung-dark-warn.js" defer></script>
<script src="/pending-reveals.js" defer></script>
<script src="/twemoji-brand.js" defer></script>
<script src="/js/brand.js"></script>
<title>ntable — 누구나 모임장이 된다</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:ital,wght@1,500;1,600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; }
  body {
    background: var(--navy);
    color: var(--white);
    font-family: var(--font-body);
    line-height: 1.5;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: calc(env(safe-area-inset-top)) 24px calc(20px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
    text-wrap: pretty;
  }

  /* Header — 로고만 (44px 고정) */
  .nt-top {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    flex-shrink: 0;
  }
  .nt-top .brand {
    font-family: var(--font-heading);
    font-style: italic;
    font-weight: 600;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 0.04em;
    text-decoration: none;
  }

  /* Shell */
  .nt-shell {
    flex: 1;
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    padding-top: 40px;
  }

  /* Hero */
  .nt-hero-title {
    font-family: var(--font-body);
    font-weight: 800;
    font-size: 30px;
    line-height: 1.18;
    letter-spacing: -0.02em;
    color: var(--white);
    text-wrap: balance;
  }
  .nt-hero-sub {
    margin-top: 14px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .nt-role-section { margin-top: 30px; }

  /* Footer */
  .nt-foot {
    margin-top: auto;
    padding-top: 26px;
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .nt-foot a { color: inherit; text-decoration: none; }
  .nt-foot a:hover { color: var(--text-muted); }
  .nt-foot-slogan {
    font-family: var(--font-heading);
    font-style: italic;
    font-size: 12px;
    color: var(--gold-light);
    letter-spacing: 0.04em;
  }

  /* Join code modal — 기존 modal primitive 재사용 위에 input 스타일 추가 */
  .jc-input {
    width: 100%;
    padding: 16px 18px;
    background: var(--surface-sunk);
    border: 1px solid var(--input-border);
    border-radius: 12px;
    color: var(--white);
    font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-align: center;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.18s, background 0.18s;
  }
  .jc-input:focus { border-color: var(--gold); background: var(--surface-base); }
  .jc-input::placeholder { color: var(--text-dim); letter-spacing: 0.3em; }
  .jc-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .jc-actions .btn { min-width: 84px; }

  @media (max-width: 360px) {
    .nt-hero-title { font-size: 26px; }
  }

  button:focus-visible, input:focus-visible, a:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }
</style>
<script src="/sentry-init.js" data-page="welcome" defer></script>
</head>
<body>

<header class="nt-top">
  <a href="/" class="brand" aria-label="ntable 홈">ntable</a>
</header>

<main class="nt-shell">
  <section class="nt-hero" data-twe>
    <h1 class="nt-hero-title">
      <span data-copy="home.role_title_line1">오늘은 어떤</span><br>
      <span data-copy="home.role_title_line2">역할인가요?</span>
    </h1>
    <p class="nt-hero-sub">
      <span data-copy="home.role_sub_line1">먼저 골라주시면 딱 필요한 것만</span><br>
      <span data-copy="home.role_sub_line2">보여드려요.</span>
    </p>
  </section>

  <section class="nt-role-section" aria-label="역할 선택">
    <button type="button" class="role-card role-card-host" id="roleHostBtn" aria-label="모임을 열고 싶어요">
      <div class="role-card-row">
        <span class="role-card-icon" aria-hidden="true" data-copy="home.role_host_icon">✨</span>
        <div class="role-card-body">
          <div class="role-card-title" data-copy="home.role_host_label">모임을 열고 싶어요</div>
          <div class="role-card-desc" data-copy="home.role_host_desc">템플릿 고르고 QR 공유 · 진행은 앱이 대신</div>
        </div>
        <span class="role-card-chev" aria-hidden="true">›</span>
      </div>
    </button>

    <button type="button" class="role-card role-card-guest" id="roleGuestBtn" aria-label="초대받아 들어가요">
      <div class="role-card-row">
        <span class="role-card-icon" aria-hidden="true" data-copy="home.role_guest_icon">🎫</span>
        <div class="role-card-body">
          <div class="role-card-title" data-copy="home.role_guest_label">초대받아 들어가요</div>
          <div class="role-card-desc" data-copy="home.role_guest_desc">QR 스캔 또는 6자리 코드 입력</div>
        </div>
        <span class="role-card-chev" aria-hidden="true">›</span>
      </div>
    </button>
  </section>

  <div class="nt-foot">
    <span class="nt-foot-slogan" data-copy="home.footer_slogan">More Life. People Connect.</span>
    <br>
    <span data-copy="home.footer_copyright">© 2026 ntable</span>
  </div>
</main>

<!-- 참여 코드 입력 모달 — role-card-guest 탭 시 활성 -->
<div id="joinModal" hidden aria-hidden="true">
  <div class="modal-backdrop" data-close-join></div>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="jcTitle">
    <div class="cd-title" id="jcTitle" data-copy="home.role_modal_title">참여 코드 입력</div>
    <div class="cd-body" data-copy="home.role_modal_sub">초대받은 6자리 코드를 넣어주세요.</div>
    <input
      type="text"
      id="joinCodeInput"
      class="jc-input"
      maxlength="6"
      placeholder="ABC123"
      autocapitalize="characters"
      autocomplete="off"
      aria-label="참여 코드 6자리"
      inputmode="latin"
    />
    <div class="jc-actions">
      <button type="button" class="btn btn-ghost" data-close-join data-copy="home.role_modal_cancel">닫기</button>
      <button type="button" class="btn btn-primary" id="joinCodeBtn" disabled data-copy="home.join_code_btn">입장</button>
    </div>
  </div>
</div>

<script>
function ensureUuid() {
  let uuid = '';
  try { uuid = localStorage.getItem('demo_uuid') || ''; } catch (_) {}
  if (!uuid) {
    uuid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
      : ('u-' + Math.random().toString(36).slice(2) + '-' + Date.now().toString(36));
    try { localStorage.setItem('demo_uuid', uuid); } catch (_) {}
  }
  return uuid;
}
ensureUuid();

// brand.json 로드 후 data-copy 치환
if (typeof loadBrand === 'function') {
  loadBrand().then(() => {
    if (typeof applyCopyToDOM === 'function') applyCopyToDOM(document);
  }).catch(() => {});
}

// auth_error 쿼리 정리 (OAuth 비활성화 상태 — 2026-04-22)
(() => {
  const url = new URL(location.href);
  if (url.searchParams.has('auth_error')) {
    history.replaceState(null, '', '/');
  }
})();

// ─── Host 카드 ────────────────────────────────────
document.getElementById('roleHostBtn').addEventListener('click', () => {
  ensureUuid();
  // ?next=/room/CODE 가 있으면 해당 방으로 (기존 OAuth redirect 호환)
  const next = new URLSearchParams(location.search).get('next');
  if (next && /^\/room\/[A-Z0-9]{6}/.test(next)) {
    location.href = next;
  } else {
    location.href = '/create';
  }
});

// ─── Guest 모달 ───────────────────────────────────
const joinModal = document.getElementById('joinModal');
const joinInput = document.getElementById('joinCodeInput');
const joinBtn = document.getElementById('joinCodeBtn');

function openJoinModal() {
  joinModal.hidden = false;
  joinModal.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
  setTimeout(() => joinInput.focus(), 60);
}
function closeJoinModal() {
  joinModal.hidden = true;
  joinModal.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

document.getElementById('roleGuestBtn').addEventListener('click', openJoinModal);
joinModal.querySelectorAll('[data-close-join]').forEach(el => {
  el.addEventListener('click', closeJoinModal);
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && !joinModal.hidden) closeJoinModal();
});

joinInput.addEventListener('input', () => {
  joinInput.value = joinInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  const ready = joinInput.value.length === 6;
  joinBtn.disabled = !ready;
});
joinBtn.addEventListener('click', () => {
  const code = joinInput.value.trim().toUpperCase();
  if (code.length !== 6) return;
  ensureUuid();
  location.href = `/room/${code}`;
});
joinInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !joinBtn.disabled) joinBtn.click();
});

// ?role=guest 또는 ?code=XXXXXX 로 진입하면 자동으로 모달 오픈
(() => {
  try {
    const qs = new URLSearchParams(location.search);
    if (qs.get('role') === 'guest' || qs.get('code')) {
      openJoinModal();
      const preset = (qs.get('code') || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
      if (preset) {
        joinInput.value = preset;
        joinInput.dispatchEvent(new Event('input', { bubbles: true }));
      }
    }
  } catch (_) {}
})();
</script>
</body>
</html>
