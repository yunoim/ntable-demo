<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="only dark">
<link rel="stylesheet" href="/theme-lock.css">
<script src="/oauth-redirect.js"></script>
<script src="/pending-reveals.js" defer></script>
<title>ntable — 누구나 호스트가 되는 모임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; }
  body {
    background: #0e1628;
    color: #ffffff;
    font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
    line-height: 1.6;
    padding: 0 24px;
    padding-top: calc(60px + env(safe-area-inset-top));
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  /* HEADER */
  .app-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px;
    padding-top: calc(12px + env(safe-area-inset-top));
    background: rgba(14,22,40,0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(212,168,67,0.2);
  }
  .h-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 600;
    color: #d4a843; letter-spacing: 0.14em;
  }
  /* 빠른 입장 섹션 — CTA 아래 */
  .quick-login {
    margin-top: 20px;
    padding: 18px 16px;
    background: rgba(212,168,67,0.04);
    border: 1px solid rgba(212,168,67,0.22);
    border-radius: 14px;
    text-align: left;
  }
  .ql-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #d4a843;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ql-label-opt {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: #9aa0ac;
    opacity: 0.8;
    font-weight: 400;
    text-transform: none;
  }
  .ql-toggle-row {
    display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 12px;
  }
  .login-toggle {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 13px; color: #e8e8e8;
    cursor: pointer; background: none; border: none;
    padding: 4px 0;
    font-family: inherit;
    transition: color 0.2s;
    align-self: flex-start;
  }
  .login-toggle:hover { color: #e8b84b; }
  .login-toggle .switch {
    width: 30px; height: 16px;
    background: rgba(255,255,255,0.15);
    border-radius: 999px; position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .login-toggle .switch::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: #c0c0c0; border-radius: 50%;
    transition: left 0.2s, background 0.2s;
  }
  .login-toggle[data-on="true"] { color: #7ee8a2; }
  .login-toggle[data-on="true"] .switch { background: rgba(126,232,162,0.45); }
  .login-toggle[data-on="true"] .switch::after { left: 16px; background: #7ee8a2; }
  .ql-desc {
    font-size: 11.5px; color: #9aa0ac;
    letter-spacing: 0.02em; line-height: 1.5;
  }
  .ql-btn {
    display: block; width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13.5px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    margin-top: 8px;
  }
  .btn-google { background: #fff; color: #3c4043; border: 1px solid #dadce0; }
  .btn-kakao { background: #FEE500; color: #3a1d1d; border: none; font-weight: 700; }
  .acc-connected {
    text-align: center;
    padding: 12px;
    font-size: 13px;
    color: #7ee8a2;
    background: rgba(126,232,162,0.06);
    border: 1px dashed rgba(126,232,162,0.25);
    border-radius: 10px;
    letter-spacing: 0.02em;
    margin-top: 8px;
  }
  .acc-logout-hint {
    margin-top: 6px;
    font-size: 11px;
    color: #9aa0ac;
    letter-spacing: 0.02em;
    font-weight: 400;
  }

  /* MAIN */
  .root { width: 100%; max-width: 420px; text-align: center; }
  .hero { margin-top: 24px; margin-bottom: 36px; }
  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px; font-weight: 600;
    color: #ffffff; line-height: 1.25;
    margin-bottom: 16px;
  }
  .hero h1 em { font-style: italic; color: #e8b84b; }
  .hero p {
    font-size: 15px; color: #e8e8e8;
    font-weight: 300; line-height: 1.7;
  }
  .cta-primary {
    display: block; width: 100%; padding: 18px;
    background: #e8b84b; color: #0a0f1e;
    border: none; border-radius: 14px;
    font-size: 17px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 0 16px rgba(232,184,75,0.35);
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .cta-primary:hover { transform: translateY(-1px); box-shadow: 0 0 26px rgba(232,184,75,0.5); }
  .cta-primary:active { transform: scale(0.98); }

  .guest-info {
    margin-top: 36px;
    padding: 20px;
    background: rgba(212,168,67,0.06);
    border: 1px dashed rgba(212,168,67,0.3);
    border-radius: 12px;
    font-size: 13.5px; color: #c0c0c0;
    line-height: 1.6;
  }
  .guest-info strong { color: #e8b84b; }

  .footer-info {
    margin-top: 36px;
    font-size: 11.5px; color: #c0c0c0;
    opacity: 0.7; line-height: 1.6;
  }
  .footer-info a { color: inherit; text-decoration: underline; }
</style>
<script src="/sentry-init.js" data-page="welcome" defer></script>
</head>
<body>

<header class="app-header">
  <span class="h-brand">ntable</span>
</header>

<div class="root">
  <div class="hero">
    <h1>누가 열어도<br><em>재밌는 모임</em></h1>
    <p>호스트 한 명, 스마트폰 하나면 시작됩니다.</p>
  </div>

  <button type="button" class="cta-primary" id="openRoomBtn">모임 열기</button>

  <section class="quick-login" id="quickLogin" hidden>
    <div class="ql-label">빠른 입장 <span class="ql-label-opt">선택</span></div>
    <!-- 토글은 두 상태(비로그인·로그인) 모두에서 항상 노출 — 로그인 상태에서는 OFF로 로그아웃 -->
    <div class="ql-toggle-row">
      <button type="button" class="login-toggle" id="loginToggle" data-on="true" aria-pressed="true">
        <span class="toggle-label">내 정보 기억하기</span>
        <span class="switch" aria-hidden="true"></span>
      </button>
      <span class="ql-desc" id="qlDesc">켜면 다음 방문 시 Google/카카오로 빠르게 입장</span>
    </div>
    <!-- 비로그인: OAuth 버튼 -->
    <div id="accLoginGroup">
      <button type="button" class="ql-btn btn-google" id="googleBtn" hidden>Google로 계속</button>
      <button type="button" class="ql-btn btn-kakao" id="kakaoBtn" hidden>카카오로 계속</button>
    </div>
    <!-- 로그인: provider 라벨 + 로그아웃 안내 -->
    <div class="acc-connected" id="accConnected" hidden>
      ✓ <span id="accProviderLabel">계정 연결됨</span>
      <div class="acc-logout-hint">로그아웃하려면 위 토글을 OFF</div>
    </div>
  </section>

  <div class="guest-info" id="guestSection">
    <div style="font-size:14px;color:#ffffff;margin-bottom:10px;font-weight:600;">참가자세요?</div>
    링크·QR이 있다면 바로 입장,<br>참여 코드를 받았다면 아래 입력하세요.
    <div style="display:flex;gap:8px;margin-top:14px;">
      <input type="text" id="joinCodeInput" maxlength="6" placeholder="ABC123" autocapitalize="characters" autocomplete="off" aria-label="참여 코드 6자리" style="flex:1;padding:12px;background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.4);border-radius:10px;color:#ffffff;font-size:20px;font-weight:700;letter-spacing:0.04em;text-align:center;font-family:'DM Sans',monospace;text-transform:uppercase;" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,''); document.getElementById('joinCodeBtn').disabled = this.value.length !== 6;" />
      <button type="button" id="joinCodeBtn" disabled style="padding:0 18px;background:#e8b84b;color:#0a0f1e;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit;">입장</button>
    </div>
    <div style="font-size:11px;color:#9aa0ac;margin-top:8px;letter-spacing:0.02em;">참여 코드 6자리 (영문·숫자, 대소문자 무관)</div>
  </div>

  <div class="footer-info">
    <a href="https://ntable.kr/privacy.html">개인정보처리방침</a> ·
    <a href="https://ntable.kr/terms.html">이용약관</a><br>
    More Life. People Connect. · © 2026 ntable
  </div>
</div>

<script>
function ensureUuid() {
  let uuid = '';
  try { uuid = localStorage.getItem('demo_uuid') || ''; } catch (_) {}
  if (!uuid) {
    uuid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
      : ('u-' + Math.random().toString(36).slice(2) + '-' + Date.now().toString(36));
    try { localStorage.setItem('demo_uuid', uuid); } catch (_) {}
  }
  return uuid;
}

document.getElementById('openRoomBtn').addEventListener('click', () => {
  ensureUuid();
  const next = new URLSearchParams(location.search).get('next');
  if (next && /^\/room\/[A-Z0-9]{6}/.test(next)) {
    location.href = next;
  } else {
    location.href = '/create';
  }
});

ensureUuid();

// OAuth 콜백 토큰 처리는 /oauth-redirect.js 가 담당 (전 페이지 공통)
// login.html은 추가로 auth_error 쿼리 정리만 담당
(() => {
  const url = new URL(location.href);
  if (url.searchParams.has('auth_error')) {
    history.replaceState(null, '', '/');
  }
})();

// 빠른 입장 섹션 제어 — OAuth provider 활성 시 노출, 항상 flat 레이아웃
const quickLogin = document.getElementById('quickLogin');
const loginToggle = document.getElementById('loginToggle');
const accLoginGroup = document.getElementById('accLoginGroup');
const accConnected = document.getElementById('accConnected');
const accProviderLabel = document.getElementById('accProviderLabel');
let isAuthed = false;

function applyConnectedView() {
  const desc = document.getElementById('qlDesc');
  if (isAuthed) {
    accLoginGroup.hidden = true;
    accConnected.hidden = false;
    if (desc) desc.textContent = '끄면 즉시 로그아웃';
  } else {
    accLoginGroup.hidden = false;
    accConnected.hidden = true;
    if (desc) desc.textContent = '켜면 다음 방문 시 Google/카카오로 빠르게 입장';
  }
}

function setToggle(on) {
  loginToggle.dataset.on = on ? 'true' : 'false';
  loginToggle.setAttribute('aria-pressed', on ? 'true' : 'false');
}

function setProviderLabel(me) {
  let label = '계정 연결됨';
  if (me && me.google) label = 'Google 계정 연결됨';
  else if (me && me.kakao) label = '카카오 계정 연결됨';
  if (accProviderLabel) accProviderLabel.textContent = label;
}

(async () => {
  // OAuth provider config — 활성된 provider만 버튼 노출. 둘 다 비활성이면 섹션 전체 숨김.
  let cfgGoogle = false, cfgKakao = false;
  try {
    const r = await fetch('/api/auth/status');
    const cfg = r.ok ? await r.json() : {};
    cfgGoogle = !!cfg.google;
    cfgKakao = !!cfg.kakao;
  } catch (_) {}
  if (!cfgGoogle && !cfgKakao) {
    // provider 없으면 섹션 자체 숨김
    return;
  }
  quickLogin.hidden = false;
  if (cfgGoogle) document.getElementById('googleBtn').hidden = false;
  if (cfgKakao) document.getElementById('kakaoBtn').hidden = false;

  // 토글 초기 상태 — 저장된 기억 유지 선호, 기본 ON
  const remembered = (() => { try { return localStorage.getItem('login_remember'); } catch (_) { return null; } })();
  setToggle(remembered !== 'false');

  // 로그인 상태 확인 — 실명·이메일은 절대 노출하지 않음 (authed 여부만)
  try {
    const tok = localStorage.getItem('user_token');
    if (tok) {
      const r = await fetch('/api/auth/me', { headers: { 'x-user-token': tok } });
      const me = r.ok ? await r.json() : {};
      if (me.authed) {
        isAuthed = true;
        setProviderLabel(me);
        // 로그인 상태 + remember 미설정 시 ON 으로 저장
        if (remembered !== 'false') {
          try { localStorage.setItem('login_remember', 'true'); } catch (_) {}
          setToggle(true);
        }
      } else {
        try { localStorage.removeItem('user_token'); } catch (_) {}
      }
    }
  } catch (_) {}

  applyConnectedView();

  // ?role=guest 자동 스크롤
  try {
    if (new URLSearchParams(location.search).get('role') === 'guest') {
      const guest = document.getElementById('guestSection');
      const input = document.getElementById('joinCodeInput');
      if (guest) guest.scrollIntoView({ behavior: 'smooth', block: 'center' });
      if (input) setTimeout(() => input.focus(), 400);
    }
  } catch (_) {}
})();

loginToggle.addEventListener('click', async () => {
  const wasOn = loginToggle.dataset.on === 'true';
  if (wasOn) {
    // ON → OFF: 기억 해제 + 캐시 정리. 인증 상태면 즉시 로그아웃.
    try {
      localStorage.setItem('login_remember', 'false');
      localStorage.removeItem('profile_snapshot');
      localStorage.removeItem('preferred_nickname');
    } catch (_) {}
    if (isAuthed) {
      const tok = localStorage.getItem('user_token');
      if (tok) {
        try { await fetch('/api/auth/logout', { method: 'POST', headers: { 'x-user-token': tok } }); } catch (_) {}
      }
      try { localStorage.removeItem('user_token'); } catch (_) {}
      isAuthed = false;
      applyConnectedView();
    }
    setToggle(false);
  } else {
    // OFF → ON: 기억 활성화. OAuth 연결은 사용자가 버튼을 눌러야 개시.
    try { localStorage.setItem('login_remember', 'true'); } catch (_) {}
    setToggle(true);
  }
});

document.getElementById('googleBtn').addEventListener('click', () => {
  location.href = (typeof ntableOAuthHref === 'function') ? ntableOAuthHref('google') : '/api/auth/google';
});
document.getElementById('kakaoBtn').addEventListener('click', () => {
  location.href = (typeof ntableOAuthHref === 'function') ? ntableOAuthHref('kakao') : '/api/auth/kakao';
});

// 참여 코드 입장
document.getElementById('joinCodeBtn').addEventListener('click', () => {
  const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
  if (code.length !== 6) return;
  ensureUuid();
  location.href = `/room/${code}`;
});
document.getElementById('joinCodeInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !document.getElementById('joinCodeBtn').disabled) {
    document.getElementById('joinCodeBtn').click();
  }
});
</script>
</body>
</html>
