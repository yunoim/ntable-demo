<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<link rel="stylesheet" href="/theme-lock.css">
<link rel="stylesheet" href="/styles/tokens.css">
<link rel="stylesheet" href="/styles/components.css">
<script src="/samsung-dark-warn.js" defer></script>
<!-- 2026-04-22: 사용자 OAuth 비활성화.
<script src="/oauth-redirect.js"></script>
-->
<script src="/pending-reveals.js" defer></script>
<script src="/twemoji-brand.js" defer></script>
<script src="/js/brand.js"></script>
<title>ntable — 누구나 모임장이 되는 모임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; }
  body {
    background: #0e1628;
    color: #ffffff;
    font-family: var(--font-body);
    line-height: 1.6;
    padding: 0 24px;
    padding-top: calc(82px + env(safe-area-inset-top));
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  /* HEADER — ntable.kr 랜딩 nav 구조 (.nav-inner max-width:1100px) 동일 적용 */
  .app-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding-top: env(safe-area-inset-top);
    background: rgba(14,22,40,0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(212,168,67,0.45);
  }
  .nav-inner {
    max-width: 1100px; margin: 0 auto; padding: 0 32px;
    height: 62px; display: flex; align-items: center; justify-content: space-between;
  }
  @media (max-width: 768px) {
    .nav-inner { padding: 0 20px; }
  }
  .h-brand {
    font-family: var(--font-heading);
    font-size: 22px; font-weight: 600;
    color: #d4a843; letter-spacing: 0.08em;
    text-decoration: none;
  }
  /* login-col = create 페이지의 auth-header pill 과 동일한 래퍼 (padding·border·backdrop 포함) */
  .login-col {
    display: flex; flex-direction: column;
    align-items: flex-end;
    gap: 2px;
    padding: 8px 14px 7px;
    background: rgba(14,22,40,0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(212,168,67,0.35);
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .login-connected-mini {
    font-size: 10.5px;
    color: #7ee8a2;
    letter-spacing: 0.02em;
    padding-right: 4px;
    line-height: 1.2;
    font-weight: 500;
  }
  /* 헤더 우상단 토글 — create 페이지 auth-header pill 과 동일 치수 */
  .login-toggle {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 11.5px; color: #c0c0c0;
    cursor: pointer; background: none; border: none;
    padding: 0;
    font-family: inherit;
    line-height: 1.2;
    transition: color 0.2s;
  }
  .login-toggle:hover { color: #e8b84b; }
  .login-toggle .switch {
    width: 30px; height: 16px;
    background: rgba(255,255,255,0.15);
    border-radius: 999px; position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .login-toggle .switch::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: #c0c0c0; border-radius: 50%;
    transition: left 0.2s, background 0.2s;
  }
  .login-toggle[data-on="true"] { color: #7ee8a2; }
  .login-toggle[data-on="true"] .switch { background: rgba(126,232,162,0.45); }
  .login-toggle[data-on="true"] .switch::after { left: 16px; background: #7ee8a2; }

  /* 빠른 입장 섹션 — CTA 아래 */
  .quick-login {
    margin-top: 20px;
    padding: 18px 16px;
    background: rgba(212,168,67,0.04);
    border: 1px solid rgba(212,168,67,0.22);
    border-radius: 14px;
    text-align: left;
  }
  .ql-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #d4a843;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ql-label-opt {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: #9aa0ac;
    opacity: 0.8;
    font-weight: 400;
    text-transform: none;
  }
  .ql-desc {
    font-size: 11.5px; color: #9aa0ac;
    letter-spacing: 0.02em; line-height: 1.5;
    margin-bottom: 10px;
  }
  .ql-btn {
    display: block; width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13.5px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    margin-top: 8px;
  }
  .btn-google { background: #fff; color: #3c4043; border: 1px solid #dadce0; }
  .btn-kakao { background: #FEE500; color: #3a1d1d; border: none; font-weight: 700; }
  .acc-connected {
    text-align: center;
    padding: 12px;
    font-size: 13px;
    color: #7ee8a2;
    background: rgba(126,232,162,0.06);
    border: 1px dashed rgba(126,232,162,0.25);
    border-radius: 10px;
    letter-spacing: 0.02em;
  }
  .acc-logout-hint {
    margin-top: 6px;
    font-size: 11px;
    color: #9aa0ac;
    letter-spacing: 0.02em;
    font-weight: 400;
  }

  /* MAIN */
  .root { width: 100%; max-width: 420px; text-align: center; }
  .hero { margin-top: 24px; margin-bottom: 36px; }
  .hero h1 {
    font-family: var(--font-heading);
    font-size: 38px; font-weight: 600;
    color: #ffffff; line-height: 1.25;
    margin-bottom: 16px;
  }
  .hero h1 em { font-style: italic; color: #e8b84b; }
  .hero p {
    font-size: 15px; color: #e8e8e8;
    font-weight: 300; line-height: 1.7;
  }
  .cta-primary {
    display: block; width: 100%; padding: 18px;
    background: #e8b84b; color: #0a0f1e;
    border: none; border-radius: 14px;
    font-size: 17px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 0 16px rgba(232,184,75,0.35);
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .cta-primary:hover { transform: translateY(-1px); box-shadow: 0 0 26px rgba(232,184,75,0.5); }
  .cta-primary:active { transform: scale(0.98); }

  .guest-info {
    margin-top: 36px;
    padding: 20px;
    background: rgba(212,168,67,0.06);
    border: 1px dashed rgba(212,168,67,0.3);
    border-radius: 12px;
    font-size: 13.5px; color: #c0c0c0;
    line-height: 1.6;
  }
  .guest-info strong { color: #e8b84b; }

  .footer-info {
    margin-top: 36px;
    font-size: 11.5px; color: #c0c0c0;
    opacity: 0.7; line-height: 1.6;
  }
  .footer-info a { color: inherit; text-decoration: underline; }
</style>
<script src="/sentry-init.js" data-page="welcome" defer></script>
</head>
<body>

<header class="app-header">
  <div class="nav-inner">
    <a href="/" class="h-brand" style="text-decoration:none;">ntable</a>
    <!-- 2026-04-22: OAuth/remember-me 비활성화 — .login-col 컨테이너 자체 주석 (빈 박스가 단추 모양으로 남는 문제).
    <div class="login-col">
      <button type="button" class="login-toggle" id="loginToggle" data-on="true" aria-pressed="true" title="내 정보 기억하기" hidden>
        <span class="toggle-label">내 정보 기억하기</span>
        <span class="switch" aria-hidden="true"></span>
      </button>
      <div class="login-connected-mini" id="loginConnectedMini" hidden>✓ <span id="miniProviderLabel">Google 계정 연결됨</span></div>
    </div>
    -->
  </div>
</header>

<div class="root">
  <div class="hero" data-twe>
    <h1>QR 하나로 시작되는<br><em>모임 툴킷</em></h1>
    <p>모임장이라면 새 모임을 열고,<br>참가자라면 아래에 참여 코드를 입력하세요.</p>
  </div>

  <button type="button" class="cta-primary" id="openRoomBtn" data-copy="buttons.open_room">모임 열기</button>

  <!-- 토글 ON + 미인증일 때만 노출: OAuth 버튼. 인증되면 헤더 우상단 라벨만 사용. -->
  <section class="quick-login" id="quickLogin" hidden>
    <div class="ql-label">내 정보 저장하기 <span class="ql-label-opt">Google · 카카오</span></div>
    <div class="ql-desc">한 번 연결해두면 다음 방문 시 자동 입장</div>
    <button type="button" class="ql-btn btn-google" id="googleBtn" hidden>Google로 계속하기</button>
    <button type="button" class="ql-btn btn-kakao" id="kakaoBtn" hidden>카카오로 계속하기</button>
  </section>

  <div class="guest-info" id="guestSection">
    <div style="font-size:14px;color:#ffffff;margin-bottom:10px;font-weight:600;">참가자이신가요?</div>
    QR·링크를 받으셨다면 바로 입장돼요.<br>참여 코드만 받으셨다면 아래에 입력해주세요.
    <div style="display:flex;gap:8px;margin-top:14px;">
      <input type="text" id="joinCodeInput" maxlength="6" placeholder="ABC123" autocapitalize="characters" autocomplete="off" aria-label="참여 코드 6자리" style="flex:1;min-width:0;padding:12px;background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.4);border-radius:10px;color:#ffffff;font-size:20px;font-weight:700;letter-spacing:0.04em;text-align:center;font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;text-transform:uppercase;" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,''); document.getElementById('joinCodeBtn').disabled = this.value.length !== 6;" />
      <button type="button" id="joinCodeBtn" disabled style="flex-shrink:0;white-space:nowrap;padding:0 18px;background:#e8b84b;color:#0a0f1e;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit;">입장</button>
    </div>
    <div style="font-size:11px;color:#9aa0ac;margin-top:8px;letter-spacing:0.02em;">참여 코드 6자리 (영문·숫자, 대소문자 무관)</div>
  </div>

  <div class="footer-info">
    <a href="https://ntable.kr/privacy.html">개인정보처리방침</a> ·
    <a href="https://ntable.kr/terms.html">이용약관</a><br>
    More Life. People Connect. · © 2026 ntable
  </div>
</div>

<script>
function ensureUuid() {
  let uuid = '';
  try { uuid = localStorage.getItem('demo_uuid') || ''; } catch (_) {}
  if (!uuid) {
    uuid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
      : ('u-' + Math.random().toString(36).slice(2) + '-' + Date.now().toString(36));
    try { localStorage.setItem('demo_uuid', uuid); } catch (_) {}
  }
  return uuid;
}

document.getElementById('openRoomBtn').addEventListener('click', () => {
  ensureUuid();
  const next = new URLSearchParams(location.search).get('next');
  if (next && /^\/room\/[A-Z0-9]{6}/.test(next)) {
    location.href = next;
  } else {
    location.href = '/create';
  }
});

ensureUuid();

// T-23 (2026-04-22): brand.json 로드 후 data-copy 요소(버튼 라벨 등) 치환
if (typeof loadBrand === 'function') {
  loadBrand().then(() => {
    if (typeof applyCopyToDOM === 'function') applyCopyToDOM(document);
  }).catch(() => {});
}

// OAuth 콜백 토큰 처리는 /oauth-redirect.js 가 담당 (전 페이지 공통)
// login.html은 추가로 auth_error 쿼리 정리만 담당
(() => {
  const url = new URL(location.href);
  if (url.searchParams.has('auth_error')) {
    history.replaceState(null, '', '/');
  }
})();

// 2026-04-22: OAuth / remember-me / quick-login / provider 버튼 로직 전체 비활성화 (사용자 요청 — admin 제외).
// 참조하던 DOM 요소(loginToggle · loginConnectedMini · googleBtn · kakaoBtn)가 HTML 주석 처리돼 null 참조로
// 스크립트가 크래시했고, 그 여파로 joinCodeBtn 바인딩까지 실행되지 않아 "참여 코드 입장" 버튼이 작동하지 않았음.
// 아래 블록 전체 주석. ?role=guest 자동 스크롤만 별도 IIFE 로 보존.
/*
const quickLogin = document.getElementById('quickLogin');
const loginToggle = document.getElementById('loginToggle');
const loginConnectedMini = document.getElementById('loginConnectedMini');
const miniProviderLabel = document.getElementById('miniProviderLabel');
let isAuthed = false;
function applyView() { ... }
function setToggle(on) { ... }
function setProviderLabel(me) { ... }
(async () => { ... OAuth config + 토글 초기화 ... })();
loginToggle.addEventListener('click', ...);
document.getElementById('googleBtn').addEventListener('click', ...);
document.getElementById('kakaoBtn').addEventListener('click', ...);
*/

// ?role=guest 자동 스크롤 — OAuth 와 무관하게 유지.
(() => {
  try {
    if (new URLSearchParams(location.search).get('role') !== 'guest') return;
    const guest = document.getElementById('guestSection');
    const input = document.getElementById('joinCodeInput');
    if (guest) {
      const rect = guest.getBoundingClientRect();
      const offsetY = window.scrollY + rect.top - window.innerHeight / 2 + rect.height / 2;
      window.scrollTo({ top: Math.max(0, offsetY), behavior: 'smooth' });
    }
    if (input) setTimeout(() => input.focus(), 400);
  } catch (_) {}
})();

// 참여 코드 입장
document.getElementById('joinCodeBtn').addEventListener('click', () => {
  const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
  if (code.length !== 6) return;
  ensureUuid();
  location.href = `/room/${code}`;
});
document.getElementById('joinCodeInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !document.getElementById('joinCodeBtn').disabled) {
    document.getElementById('joinCodeBtn').click();
  }
});
</script>
</body>
</html>
