<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<link rel="stylesheet" href="/theme-lock.css">
<link rel="stylesheet" href="/styles/tokens.css">
<link rel="stylesheet" href="/styles/components.css">
<script src="/samsung-dark-warn.js" defer></script>
<script src="/pending-reveals.js" defer></script>
<script src="/twemoji-brand.js" defer></script>
<script src="/js/brand.js"></script>
<title>ntable — 누구나 모임장이 된다</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:ital,wght@1,500;1,600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; }
  body {
    background: var(--navy);
    color: var(--white);
    font-family: var(--font-body);
    line-height: 1.5;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: calc(env(safe-area-inset-top)) 24px calc(20px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
    text-wrap: pretty;
  }

  /* Header — 44px 고정, 로고 + 로그인 pill */
  .nt-top {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .nt-top .brand {
    font-family: var(--font-heading);
    font-style: italic;
    font-weight: 600;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 0.04em;
    text-decoration: none;
  }
  .nt-top .login-pill {
    font-size: 12px;
    font-family: var(--font-body);
    color: var(--text-muted);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    padding: 6px 12px;
    cursor: pointer;
    text-decoration: none;
  }
  .nt-top .login-pill:hover { color: var(--gold-light); border-color: var(--gold-border); }

  /* Main container */
  .nt-shell {
    flex: 1;
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    padding-top: 36px;
  }

  /* Hero */
  .nt-eyebrow {
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .nt-title {
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 34px;
    line-height: 1.12;
    letter-spacing: -0.03em;
    color: var(--white);
    text-wrap: balance;
  }
  .nt-title em {
    font-family: var(--font-heading);
    font-style: italic;
    color: var(--gold);
    font-weight: 600;
    /* 세리프·이탤릭 강조. 앞뒤 공간 살짝 */
    margin: 0 0.04em;
  }
  .nt-desc {
    margin-top: 18px;
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.55;
  }

  /* Spacer between hero & CTA */
  .nt-spacer { flex: 1; min-height: 28px; }

  /* Primary CTA */
  .nt-cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    min-height: 54px;
    padding: 16px 20px;
    background: linear-gradient(135deg, var(--gold), #a07828);
    color: var(--navy);
    border: none;
    border-radius: 14px;
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.01em;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(212,168,67,0.28);
    transition: transform 0.15s, box-shadow 0.2s;
    text-decoration: none;
  }
  .nt-cta:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(212,168,67,0.38); }
  .nt-cta:active { transform: scale(0.98); }
  .nt-cta .chev { font-size: 16px; line-height: 1; margin-top: 1px; }

  /* Divider with label */
  .nt-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0 12px;
  }
  .nt-divider::before,
  .nt-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .nt-divider span {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  /* Join code row (no card wrapper) */
  .nt-join-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .nt-join-input {
    flex: 1;
    min-width: 0;
    padding: 14px 16px;
    background: var(--surface-2, #1a2442);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--white);
    font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-align: center;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.18s;
  }
  .nt-join-input:focus { border: 1.5px solid var(--gold); padding: 13.5px 15.5px; }
  .nt-join-input::placeholder { color: var(--text-dim); letter-spacing: 0.28em; }
  .nt-join-btn {
    flex-shrink: 0;
    padding: 0 20px;
    min-height: 52px;
    background: transparent;
    border: 1px solid var(--gold-border);
    border-radius: 12px;
    color: var(--gold-light);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, color 0.18s, box-shadow 0.18s;
  }
  .nt-join-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .nt-join-btn:not(:disabled).ready {
    background: linear-gradient(135deg, var(--gold), #a07828);
    color: var(--navy);
    border-color: transparent;
    box-shadow: 0 6px 18px rgba(212,168,67,0.28);
    font-weight: 700;
  }

  /* Footer */
  .nt-foot {
    margin-top: 26px;
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
    padding-bottom: 6px;
  }
  .nt-foot a { color: inherit; text-decoration: none; }
  .nt-foot a:hover { color: var(--text-muted); }

  @media (max-width: 360px) {
    .nt-title { font-size: 30px; }
  }

  /* Focus visible */
  button:focus-visible, input:focus-visible, a:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }
</style>
<script src="/sentry-init.js" data-page="welcome" defer></script>
</head>
<body>

<header class="nt-top">
  <a href="/" class="brand" aria-label="ntable 홈">ntable</a>
  <!-- 로그인 pill 은 OAuth 비활성화로 숨김(2026-04-22). 레이아웃 균형용 자리만 남겨둠. -->
  <span aria-hidden="true" style="visibility:hidden;font-size:12px;">&nbsp;</span>
</header>

<main class="nt-shell">
  <section class="nt-hero" data-twe>
    <div class="nt-eyebrow" data-copy="home.eyebrow">QR 하나로 시작</div>
    <h1 class="nt-title">
      <span data-copy="home.hero_line1">어색함 없이</span><br>
      <em data-copy="home.hero_line2_emph">빠르게</em><span data-copy="home.hero_line2_suffix"> 친해지는 자리</span>
    </h1>
    <p class="nt-desc">
      <span data-copy="home.hero_desc_line1">모임장은 새 자리를 열고,</span><br>
      <span data-copy="home.hero_desc_line2">참가자는 QR이나 코드로 들어와요.</span>
    </p>
  </section>

  <div class="nt-spacer"></div>

  <button type="button" class="nt-cta" id="openRoomBtn" aria-label="새 모임 열기">
    <span data-copy="home.cta_primary">새 모임 열기</span>
    <span class="chev" aria-hidden="true">›</span>
  </button>

  <div class="nt-divider"><span data-copy="home.divider_label">참여 코드를 받았다면</span></div>

  <div class="nt-join-row" id="guestSection">
    <input
      type="text"
      id="joinCodeInput"
      class="nt-join-input"
      maxlength="6"
      placeholder="ABC123"
      autocapitalize="characters"
      autocomplete="off"
      aria-label="참여 코드 6자리"
      inputmode="latin"
    />
    <button type="button" id="joinCodeBtn" class="nt-join-btn" disabled data-copy="home.join_code_btn">입장</button>
  </div>

  <div class="nt-foot">
    <a href="https://ntable.kr/privacy.html">개인정보처리방침</a>
    ·
    <a href="https://ntable.kr/terms.html">이용약관</a>
    &nbsp;·&nbsp;
    © 2026 ntable
  </div>
</main>

<script>
function ensureUuid() {
  let uuid = '';
  try { uuid = localStorage.getItem('demo_uuid') || ''; } catch (_) {}
  if (!uuid) {
    uuid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
      : ('u-' + Math.random().toString(36).slice(2) + '-' + Date.now().toString(36));
    try { localStorage.setItem('demo_uuid', uuid); } catch (_) {}
  }
  return uuid;
}

ensureUuid();

document.getElementById('openRoomBtn').addEventListener('click', () => {
  ensureUuid();
  const next = new URLSearchParams(location.search).get('next');
  if (next && /^\/room\/[A-Z0-9]{6}/.test(next)) {
    location.href = next;
  } else {
    location.href = '/create';
  }
});

// brand.json 로드 후 data-copy 치환
if (typeof loadBrand === 'function') {
  loadBrand().then(() => {
    if (typeof applyCopyToDOM === 'function') applyCopyToDOM(document);
  }).catch(() => {});
}

// auth_error 쿼리 정리 (OAuth 비활성화 상태 — 2026-04-22)
(() => {
  const url = new URL(location.href);
  if (url.searchParams.has('auth_error')) {
    history.replaceState(null, '', '/');
  }
})();

// ?role=guest 로 진입하면 입력 포커스
(() => {
  try {
    if (new URLSearchParams(location.search).get('role') !== 'guest') return;
    const input = document.getElementById('joinCodeInput');
    if (input) setTimeout(() => input.focus(), 300);
  } catch (_) {}
})();

// 참여 코드 입력: 6자리 되면 primary 골드로 승격
const joinInput = document.getElementById('joinCodeInput');
const joinBtn = document.getElementById('joinCodeBtn');
joinInput.addEventListener('input', () => {
  joinInput.value = joinInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  const ready = joinInput.value.length === 6;
  joinBtn.disabled = !ready;
  joinBtn.classList.toggle('ready', ready);
});
joinBtn.addEventListener('click', () => {
  const code = joinInput.value.trim().toUpperCase();
  if (code.length !== 6) return;
  ensureUuid();
  location.href = `/room/${code}`;
});
joinInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !joinBtn.disabled) joinBtn.click();
});
</script>
</body>
</html>
