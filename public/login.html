<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1e">
  <meta name="color-scheme" content="dark">
  <title>ntable — 시작하기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Navy */
      --navy:        #0a0f1e;
      --navy-light:  #0f1628;
      --navy-mid:    #141d35;
      /* Surfaces */
      --surface:     #141d35;
      --surface-2:   #1a2442;
      --surface-3:   #223056;
      /* Gold (landing 기준) */
      --gold:        #d4a843;
      --gold-light:  #f0ca60;
      --gold-dim:    rgba(212,168,67,0.18);
      --gold-dim-2:  rgba(212,168,67,0.08);
      --gold-border: rgba(212,168,67,0.35);
      /* Text */
      --white:       #f5f2ec;
      --white-dim:   rgba(245,242,236,0.88);
      --white-muted: rgba(245,242,236,0.72);
      --text:        #ddd5bc;
      --text-muted:  rgba(216,208,187,0.78);
      --text-dim:    rgba(216,208,187,0.65);
      --subtext:     rgba(216,208,187,0.78);
      /* UI */
      --border:      rgba(255,255,255,0.14);
      --input-border:#5a6178;
      --placeholder: rgba(216,208,187,0.65);
      --danger:      #e87e7e;
      --success:     #7ee8a2;
      /* Motion */
      --radius:      10px;
      --radius-lg:   18px;
      --transition:  0.32s cubic-bezier(0.4,0,0.2,1);
    }

    body {
      background: var(--navy);
      color: var(--text);
      font-family: 'DM Sans', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 18px;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 20% 15%, rgba(212,168,67,0.1), transparent 55%),
        radial-gradient(circle at 80% 85%, rgba(80,100,180,0.06), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    .logo {
      text-align: center;
      margin-bottom: 38px;
    }

    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.14em;
      line-height: 1;
    }

    .logo-sub {
      font-size: 12px;
      color: var(--subtext);
      margin-top: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 8px;
    }
    .section-sub {
      font-size: 13px;
      color: var(--subtext);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 12px;
      color: var(--subtext);
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
    }

    input[type="text"],
    select {
      width: 100%;
      background: var(--navy-light);
      border: 1.5px solid var(--input-border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
      font-family: inherit;
    }

    input[type="text"]:focus,
    select:focus { border-color: var(--gold); }
    input[type="text"]::placeholder { color: var(--placeholder); opacity: 1; }

    select {
      background-image:
        linear-gradient(45deg, transparent 50%, var(--gold) 50%),
        linear-gradient(135deg, var(--gold) 50%, transparent 50%);
      background-position: calc(100% - 20px) 50%, calc(100% - 14px) 50%;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 40px;
    }

    .nickname-status {
      font-size: 12px;
      margin-top: 8px;
      min-height: 16px;
      letter-spacing: 0.02em;
    }
    .nickname-status.ok { color: var(--success); }
    .nickname-status.err { color: var(--danger); }
    .nickname-status.info { color: var(--gold-light); }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), #a07828);
      color: var(--navy);
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      margin-top: 8px;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 18px rgba(212,168,67,0.25);
      font-family: inherit;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,168,67,0.35); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }

    /* 성별 버튼 */
    .gender-group { display: flex; gap: 12px; }
    .gender-btn {
      flex: 1;
      padding: 15px;
      background: var(--navy-light);
      border: 1.5px solid var(--input-border);
      border-radius: 12px;
      color: var(--subtext);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .gender-btn.selected {
      border-color: var(--gold);
      color: var(--gold-light);
      background: var(--gold-dim);
    }

    .step { display: none; }
    .step.active { display: block; animation: fadein 0.3s ease; }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .required-mark { color: var(--gold); margin-left: 3px; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    select option { background: var(--surface); color: var(--white); }

    .loading-text {
      text-align: center;
      color: var(--subtext);
      font-size: 14px;
      padding: 40px 0;
    }

    .legal {
      text-align: center;
      margin-top: 22px;
      font-size: 11px;
      color: var(--subtext);
      line-height: 1.8;
    }
    .legal a { color: var(--subtext); text-decoration: underline; }
    .legal a:hover { color: var(--gold); }

    /* 게스트 방 참여 섹션 */
    .join-section {
      margin-top: 24px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
    }
    .join-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 4px;
    }
    .join-sub {
      font-size: 12px;
      color: var(--subtext);
      margin-bottom: 16px;
      line-height: 1.55;
    }
    .join-row {
      display: flex;
      gap: 10px;
    }
    .join-row input {
      flex: 1;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-weight: 600;
    }
    .btn-secondary {
      background: transparent;
      color: var(--gold-light);
      border: 1.5px solid var(--gold-border);
      border-radius: 12px;
      padding: 14px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
    }
    .btn-secondary:hover:not(:disabled) {
      border-color: var(--gold);
      background: var(--gold-dim);
    }
    .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
    .join-hint {
      font-size: 11px;
      color: var(--subtext);
      margin-top: 12px;
      line-height: 1.7;
    }
    .join-hint strong { color: var(--gold-light); font-weight: 600; }

    /* ── Focus visible (A11y) ── */
    button:focus-visible, input:focus-visible, select:focus-visible, a:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    /* ── Mobile (≤480px) ── */
    @media (max-width: 480px) {
      body { padding: 20px 14px; padding-top: calc(20px + env(safe-area-inset-top)); padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
      .logo { margin-bottom: 28px; }
      .logo-text { font-size: 34px; }
      .card { padding: 28px 20px; border-radius: 18px; }
      .section-title { font-size: 20px; }
      .section-sub { font-size: 12.5px; margin-bottom: 20px; }
      input[type="text"], select { padding: 13px 14px; font-size: 14.5px; }
      .btn-primary { padding: 15px; font-size: 14.5px; }
      .gender-btn { padding: 13px; font-size: 14px; }
      .join-section { margin-top: 20px; padding-top: 18px; }
      .join-title { font-size: 16px; }
      .btn-secondary { padding: 13px 18px; font-size: 13.5px; }
    }
  </style>
</head>
<body>
  <h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">ntable — 로그인 · 프로필 설정</h1>
  <div class="container">
    <div class="logo">
      <div class="logo-text">ntable</div>
      <div class="logo-sub">누가 열어도 재밌는 모임</div>
    </div>

    <div id="loading" class="loading-text">로딩 중...</div>

    <!-- Step 1: 닉네임 로그인 -->
    <div id="step-login" class="card step">
      <h2 class="section-title">시작하기</h2>
      <div class="section-sub">닉네임을 입력하세요. 이미 가입한 계정이면 자동으로 로그인됩니다.</div>
      <div class="form-group">
        <label>닉네임<span class="required-mark">*</span></label>
        <input type="text" id="nickname-input" placeholder="닉네임을 입력하세요" maxlength="20" autocomplete="off" aria-label="닉네임" />
        <div class="nickname-status" id="nickname-status"></div>
      </div>
      <button type="button" class="btn-primary" id="login-btn" disabled>🎤 모임 열기 (호스트)</button>

      <div class="join-section">
        <div class="join-title">🙋 모임 참여하기 (게스트)</div>
        <div class="join-sub">호스트에게 받은 6자리 방 코드를 입력하세요.</div>
        <div class="join-row">
          <input type="text" id="room-code-input" placeholder="ABC123" maxlength="6" autocomplete="off" aria-label="방 코드 6자리" />
          <button type="button" class="btn-secondary" id="join-btn" disabled>참여</button>
        </div>
        <div class="nickname-status" id="join-status"></div>
        <div class="join-hint">
          방 코드는 <strong>호스트에게 받거나 QR을 스캔</strong>하세요.<br>
          아직 열린 모임이 없다면 위에서 닉네임을 입력하고 <strong>[모임 열기]</strong>로 직접 여세요.
        </div>
      </div>
    </div>

    <!-- Step 2: 프로필 작성 -->
    <div id="step-profile" class="card step">
      <h2 class="section-title">프로필 설정</h2>
      <div class="section-sub">모임 참가자들에게 보여질 기본 정보예요.</div>
      <div class="form-group">
        <label>성별<span class="required-mark">*</span></label>
        <div class="gender-group">
          <button type="button" class="gender-btn" data-value="male" onclick="selectGender(this)">남성</button>
          <button type="button" class="gender-btn" data-value="female" onclick="selectGender(this)">여성</button>
        </div>
      </div>
      <div class="form-group">
        <label>출생연도<span class="required-mark">*</span></label>
        <select id="birth-year" aria-label="출생연도">
          <option value="">선택하세요</option>
        </select>
      </div>
      <div class="divider"></div>
      <div class="form-group">
        <label>지역</label>
        <select id="region" aria-label="지역">
          <option value="">선택하세요</option>
          <option>서울</option><option>경기</option><option>인천</option>
          <option>부산</option><option>대구</option><option>대전</option>
          <option>광주</option><option>울산</option><option>세종</option>
          <option>강원</option><option>충북</option><option>충남</option>
          <option>전북</option><option>전남</option><option>경북</option>
          <option>경남</option><option>제주</option>
        </select>
      </div>
      <div class="form-group">
        <label>업종</label>
        <select id="industry" aria-label="업종">
          <option value="">선택하세요</option>
          <option>IT/개발</option><option>디자인</option><option>마케팅/광고</option>
          <option>금융/회계</option><option>교육</option><option>의료/보건</option>
          <option>법률</option><option>공무원</option><option>서비스업</option>
          <option>제조업</option><option>미디어/콘텐츠</option><option>스타트업</option>
          <option>기타</option>
        </select>
      </div>
      <div class="form-group">
        <label>MBTI</label>
        <select id="mbti" aria-label="MBTI">
          <option value="">선택하세요</option>
          <option>INTJ</option><option>INTP</option><option>ENTJ</option><option>ENTP</option>
          <option>INFJ</option><option>INFP</option><option>ENFJ</option><option>ENFP</option>
          <option>ISTJ</option><option>ISFJ</option><option>ESTJ</option><option>ESFJ</option>
          <option>ISTP</option><option>ISFP</option><option>ESTP</option><option>ESFP</option>
        </select>
      </div>
      <div class="form-group">
        <label>관심사</label>
        <input type="text" id="interest" placeholder="예: 등산, 독서, 요리" maxlength="30" aria-label="관심사" />
      </div>
      <div class="form-group">
        <label>인스타그램 아이디</label>
        <input type="text" id="instagram" placeholder="@ 제외하고 입력" maxlength="50" aria-label="인스타그램 아이디" />
      </div>
      <button type="button" class="btn-primary" id="profile-btn" disabled>프로필 저장</button>
    </div>

    <div class="legal">
      계속하면 <a href="https://ntable.kr/privacy.html" target="_blank">개인정보처리방침</a>과
      <a href="https://ntable.kr/terms.html" target="_blank">이용약관</a>에 동의하게 됩니다.
    </div>
  </div>

  <script>
    const API = '';
    let currentUuid = null;
    let selectedGender = null;
    let nicknameTimer = null;
    let nicknameAvailable = false;
    let nicknameExists = false;
    // QR 진입(next=/room/XXXXXX) 시 게스트 단독 UX로 전환
    let guestMode = false;
    let guestRoomCode = '';

    const birthSelect = document.getElementById('birth-year');
    for (let y = 2007; y >= 1975; y--) {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y + '년';
      birthSelect.appendChild(opt);
    }

    function getNextUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('next') || null;
    }

    function detectGuestRoom() {
      const n = getNextUrl();
      if (!n) return null;
      const m = n.match(/\/room\/([A-Za-z0-9]+)/);
      return m ? m[1].toUpperCase() : null;
    }

    function applyGuestModeUI(roomCode) {
      guestMode = true;
      guestRoomCode = roomCode;
      const titleEl = document.querySelector('#step-login .section-title');
      const subEl = document.querySelector('#step-login .section-sub');
      const joinSection = document.querySelector('#step-login .join-section');
      if (titleEl) titleEl.textContent = '모임 참여하기';
      if (subEl) {
        subEl.innerHTML = '<strong style="color:var(--gold-light);letter-spacing:0.18em;font-weight:700;">' + roomCode + '</strong> 방에 입장합니다. 닉네임을 입력해주세요.';
      }
      if (joinSection) joinSection.style.display = 'none';
      const btn = document.getElementById('login-btn');
      if (btn) btn.textContent = '🙋 참여하기';
    }

    function showStep(id) {
      document.getElementById('loading').style.display = 'none';
      document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
      const el = document.getElementById(id);
      if (el) el.classList.add('active');
    }

    async function init() {
      const storedUuid = localStorage.getItem('demo_uuid');
      const nextUrl = getNextUrl();
      const guestRoom = detectGuestRoom();

      if (storedUuid) {
        if (nextUrl) { window.location.href = nextUrl; return; }
        try {
          const meRes = await fetch(`${API}/api/me?uuid=${storedUuid}`);
          if (!meRes.ok) {
            localStorage.removeItem('demo_uuid');
            showStep('step-login');
            if (guestRoom) applyGuestModeUI(guestRoom);
            return;
          }
          const roomRes = await fetch(`${API}/api/my-room?uuid=${storedUuid}`);
          const roomData = await roomRes.json();
          if (roomData.room_code) { window.location.href = `/room/${roomData.room_code}/host`; }
          else { window.location.href = "/create"; }
        } catch {
          localStorage.removeItem('demo_uuid');
          showStep('step-login');
          if (guestRoom) applyGuestModeUI(guestRoom);
        }
      } else {
        showStep('step-login');
        if (guestRoom) {
          applyGuestModeUI(guestRoom);
          setTimeout(() => { document.getElementById('nickname-input')?.focus(); }, 200);
        } else {
          // 랜딩 '먼저 참여해보기'에서 ?mode=guest 로 진입 시 게스트 섹션 강조
          const params = new URLSearchParams(window.location.search);
          if (params.get('mode') === 'guest') {
            setTimeout(() => {
              const joinSection = document.querySelector('.join-section');
              if (joinSection) joinSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
              document.getElementById('nickname-input')?.focus();
            }, 200);
          }
        }
      }
    }

    const nicknameInput = document.getElementById('nickname-input');
    const nicknameStatus = document.getElementById('nickname-status');
    const loginBtn = document.getElementById('login-btn');
    let nicknameActive = false;
    let isComposing = false;

    function updateLoginBtnLabel() {
      if (guestMode) {
        loginBtn.textContent = nicknameActive ? '⛔ 이미 접속 중인 닉네임'
                             : nicknameExists ? '🙋 이어서 참여하기'
                             : '🙋 참여하기';
        updateJoinBtn();
        return;
      }
      if (nicknameActive) {
        loginBtn.textContent = '⛔ 이미 접속 중인 닉네임';
      } else {
        loginBtn.textContent = nicknameExists ? '🎤 로그인 후 모임 열기' : '🎤 모임 열기 (호스트)';
      }
      updateJoinBtn();
    }

    nicknameInput.addEventListener('compositionstart', () => { isComposing = true; });
    nicknameInput.addEventListener('compositionend', () => {
      isComposing = false;
      handleNicknameChange();
    });

    nicknameInput.addEventListener('input', (e) => {
      // IME 조합 중(한글 타이핑) 필터링하면 자모가 지워져 조합이 깨짐
      if (isComposing || e.isComposing) return;
      handleNicknameChange();
    });

    function handleNicknameChange() {
      nicknameInput.value = nicknameInput.value.replace(/[^가-힣a-zA-Z0-9]/g, '');
      clearTimeout(nicknameTimer);
      const val = nicknameInput.value.trim();
      nicknameStatus.textContent = '';
      nicknameStatus.className = 'nickname-status';
      loginBtn.disabled = true;
      nicknameAvailable = false;
      nicknameExists = false;
      nicknameActive = false;
      updateLoginBtnLabel();

      if (val.length < 1) return;

      nicknameTimer = setTimeout(async () => {
        try {
          const res = await fetch(`${API}/api/check-nickname?nickname=${encodeURIComponent(val)}`);
          const data = await res.json();
          if (data.available) {
            nicknameStatus.textContent = '✓ 새 닉네임이에요';
            nicknameStatus.className = 'nickname-status ok';
            nicknameAvailable = true;
            nicknameExists = false;
            nicknameActive = false;
            loginBtn.disabled = false;
          } else if (data.active) {
            // 동일 닉네임이 이미 접속 중 — 본인 localStorage uuid가 일치하면 서버가 허용, 아니면 차단
            const storedUuid = localStorage.getItem('demo_uuid');
            if (storedUuid && storedUuid === data.uuid) {
              nicknameStatus.textContent = 'ℹ️ 본인 계정으로 이어서 접속합니다.';
              nicknameStatus.className = 'nickname-status info';
              nicknameAvailable = true;
              nicknameExists = true;
              nicknameActive = false;
              loginBtn.disabled = false;
            } else {
              nicknameStatus.textContent = '⛔ 같은 닉네임으로 이미 접속 중이에요. 다른 닉네임을 써주세요.';
              nicknameStatus.className = 'nickname-status err';
              nicknameAvailable = false;
              nicknameExists = true;
              nicknameActive = true;
              loginBtn.disabled = true;
            }
          } else {
            nicknameStatus.textContent = 'ℹ️ 기존 계정이 있어요. 본인이면 로그인합니다.';
            nicknameStatus.className = 'nickname-status info';
            nicknameAvailable = true;
            nicknameExists = true;
            nicknameActive = false;
            loginBtn.disabled = false;
          }
          updateLoginBtnLabel();
        } catch {
          nicknameStatus.textContent = '확인 중 오류가 발생했어요';
          nicknameStatus.className = 'nickname-status err';
        }
      }, 300);
    }

    // ─── 게스트: 방 코드 참여 ───
    const roomCodeInput = document.getElementById('room-code-input');
    const joinBtn = document.getElementById('join-btn');
    const joinStatus = document.getElementById('join-status');

    function updateJoinBtn() {
      const code = roomCodeInput.value.trim().toUpperCase();
      joinBtn.disabled = !(nicknameAvailable && code.length === 6);
    }

    roomCodeInput.addEventListener('input', () => {
      roomCodeInput.value = roomCodeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
      updateJoinBtn();
      joinStatus.textContent = '';
      joinStatus.className = 'nickname-status';
    });

    joinBtn.addEventListener('click', () => {
      const code = roomCodeInput.value.trim().toUpperCase();
      if (code.length !== 6) {
        joinStatus.textContent = '6자리 방 코드를 입력하세요';
        joinStatus.className = 'nickname-status err';
        return;
      }
      if (!nicknameAvailable) {
        joinStatus.textContent = '먼저 위에서 닉네임을 입력하세요';
        joinStatus.className = 'nickname-status err';
        return;
      }
      // URL에 next 파라미터를 주입하고 기존 로그인 플로우 재사용
      history.replaceState(null, '', `/?next=/room/${encodeURIComponent(code)}`);
      joinStatus.textContent = '방에 입장합니다…';
      joinStatus.className = 'nickname-status info';
      loginBtn.click();
    });

    // ─── 호스트: 기본 로그인 ───
    loginBtn.addEventListener('click', async () => {
      const nickname = nicknameInput.value.trim();
      if (!nickname || !nicknameAvailable) return;
      loginBtn.disabled = true;
      loginBtn.textContent = '처리 중...';
      try {
        const storedUuid = localStorage.getItem('demo_uuid');
        const res = await fetch(`${API}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nickname, uuid: storedUuid || undefined }),
        });
        const data = await res.json();
        if (res.status === 409 && data.error === 'NICKNAME_IN_USE') {
          nicknameStatus.textContent = '⛔ 같은 닉네임으로 이미 접속 중이에요.';
          nicknameStatus.className = 'nickname-status err';
          nicknameActive = true;
          nicknameAvailable = false;
          loginBtn.disabled = true;
          updateLoginBtnLabel();
          return;
        }
        if (!res.ok) throw new Error(data.error || 'login failed');

        currentUuid = data.uuid;
        localStorage.setItem('demo_uuid', currentUuid);

        if (data.is_new) {
          showStep('step-profile');
        } else {
          const nextUrl = getNextUrl();
          if (nextUrl) { window.location.href = nextUrl; }
          else {
            const roomRes = await fetch(`${API}/api/my-room?uuid=${currentUuid}`);
            const roomData = await roomRes.json();
            if (roomData.room_code) { window.location.href = `/room/${roomData.room_code}/host`; }
            else { window.location.href = "/create"; }
          }
        }
      } catch (err) {
        alert('로그인 중 오류가 발생했어요. 다시 시도해주세요.');
        loginBtn.disabled = false;
        updateLoginBtnLabel();
      }
    });

    function selectGender(btn) {
      document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedGender = btn.dataset.value;
      validateProfileForm();
    }

    function validateProfileForm() {
      const birthYear = document.getElementById('birth-year').value;
      const profileBtn = document.getElementById('profile-btn');
      profileBtn.disabled = !(selectedGender && birthYear);
    }

    document.getElementById('birth-year').addEventListener('change', validateProfileForm);

    document.getElementById('profile-btn').addEventListener('click', async () => {
      if (!selectedGender || !document.getElementById('birth-year').value) return;
      const profileBtn = document.getElementById('profile-btn');
      profileBtn.disabled = true;
      profileBtn.textContent = '저장 중...';

      const payload = {
        uuid: currentUuid,
        gender: selectedGender,
        birth_year: parseInt(document.getElementById('birth-year').value),
        region: document.getElementById('region').value || null,
        industry: document.getElementById('industry').value || null,
        mbti: document.getElementById('mbti').value || null,
        interest: document.getElementById('interest').value.trim() || null,
        instagram: document.getElementById('instagram').value.trim() || null,
      };

      try {
        const res = await fetch(`${API}/api/profile`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          const errData = await res.json().catch(()=>({}));
          throw new Error(JSON.stringify(errData));
        }
        const nextUrl = getNextUrl();
        window.location.href = nextUrl || '/create';
      } catch (err) {
        console.error('[profile error]', err.message);
        alert('저장 오류: ' + err.message);
        profileBtn.disabled = false;
        profileBtn.textContent = '프로필 저장';
      }
    });

    init();
  </script>
</body>
</html>
