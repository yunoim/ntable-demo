<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>ntable — 누구나 호스트가 되는 모임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; }
  body {
    background: #0e1628;
    color: #ffffff;
    font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
    line-height: 1.6;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    padding-top: calc(32px + env(safe-area-inset-top));
    padding-bottom: calc(32px + env(safe-area-inset-bottom));
  }
  .root {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 600;
    letter-spacing: 0.32em;
    color: #d4a843;
    margin-bottom: 12px;
  }
  .tagline {
    font-size: 14px;
    color: #c0c0c0;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 56px;
  }
  .hero {
    margin-bottom: 48px;
  }
  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 600;
    color: #ffffff;
    line-height: 1.25;
    margin-bottom: 16px;
  }
  .hero h1 em {
    font-style: italic;
    color: #e8b84b;
  }
  .hero p {
    font-size: 15px;
    color: #e8e8e8;
    font-weight: 300;
    line-height: 1.7;
  }
  .cta-primary {
    display: block;
    width: 100%;
    padding: 18px;
    background: #e8b84b;
    color: #0a0f1e;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 0 16px rgba(232,184,75,0.35);
    text-decoration: none;
    margin-bottom: 16px;
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .cta-primary:hover { transform: translateY(-1px); box-shadow: 0 0 26px rgba(232,184,75,0.5); }
  .cta-primary:active { transform: scale(0.98); }
  .guest-info {
    margin-top: 28px;
    padding: 20px;
    background: rgba(212,168,67,0.06);
    border: 1px dashed rgba(212,168,67,0.3);
    border-radius: 12px;
    font-size: 13.5px;
    color: #c0c0c0;
    line-height: 1.6;
  }
  .guest-info strong { color: #e8b84b; }
  .footer-info {
    margin-top: 40px;
    font-size: 11.5px;
    color: #c0c0c0;
    opacity: 0.7;
    line-height: 1.6;
  }
  .footer-info a { color: inherit; text-decoration: underline; }
  .anon-note {
    margin-top: 20px;
    font-size: 12px;
    color: #7ee8a2;
    opacity: 0.85;
  }
  .anon-note strong { color: #d4a843; }
</style>
<script src="/sentry-init.js" data-page="welcome" defer></script>
</head>
<body>
<div class="root">
  <div class="brand">ntable</div>
  <div class="tagline">SOCIAL GATHERING FACILITATOR</div>

  <div class="hero">
    <h1>누가 열어도<br><em>재밌는 모임</em></h1>
    <p>호스트 한 명, 스마트폰 하나면 끝.<br>플랫폼이 진행을 도와줍니다.</p>
  </div>

  <button type="button" class="cta-primary" id="openRoomBtn">모임 열기 →</button>

  <div class="anon-note">
    🔒 <strong>완전 익명</strong> — 닉네임은 방 안에서만 존재하고<br>모임이 끝나면 자동으로 사라져요
  </div>

  <div class="guest-info">
    참가자라면 호스트가 보내준 <strong>링크</strong> 또는 <strong>QR</strong>로 바로 입장하세요.
  </div>

  <div class="footer-info">
    MLPC Inc. · 사업자번호 286-87-02414<br>
    <a href="https://ntable.kr">ntable.kr</a> ·
    <a href="https://ntable.kr/privacy.html">개인정보처리방침</a> ·
    <a href="https://ntable.kr/terms.html">이용약관</a>
  </div>
</div>

<script>
// uuid 자동 생성 (없으면). 닉네임/프로필 입력은 방 만들기/입장 단계에서 받음.
function ensureUuid() {
  let uuid = '';
  try { uuid = localStorage.getItem('demo_uuid') || ''; } catch (_) {}
  if (!uuid) {
    uuid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
      : ('u-' + Math.random().toString(36).slice(2) + '-' + Date.now().toString(36));
    try { localStorage.setItem('demo_uuid', uuid); } catch (_) {}
  }
  return uuid;
}

document.getElementById('openRoomBtn').addEventListener('click', () => {
  ensureUuid();
  // next 파라미터로 들어온 게스트는 그 방 직접 입장
  const next = new URLSearchParams(location.search).get('next');
  if (next && /^\/room\/[A-Z0-9]{6}/.test(next)) {
    location.href = next;
  } else {
    location.href = '/create';
  }
});

// 페이지 로드 시 uuid 자동 보장 (백그라운드)
ensureUuid();
</script>
</body>
</html>
