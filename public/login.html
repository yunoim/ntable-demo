<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>ntable — 누구나 호스트가 되는 모임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; }
  body {
    background: #0e1628;
    color: #ffffff;
    font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
    line-height: 1.6;
    padding: 0 24px;
    padding-top: calc(60px + env(safe-area-inset-top));
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  /* HEADER (fixed) */
  .app-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px;
    padding-top: calc(12px + env(safe-area-inset-top));
    background: rgba(14,22,40,0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(212,168,67,0.2);
  }
  .h-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 600;
    color: #d4a843; letter-spacing: 0.14em;
  }
  .login-toggle {
    display: flex; align-items: center; gap: 10px;
    font-size: 11.5px; color: #c0c0c0;
    cursor: pointer; background: none; border: none;
    padding: 6px 10px; border-radius: 8px;
    font-family: inherit;
    transition: color 0.2s, background 0.2s;
  }
  .login-toggle:hover { color: #e8b84b; background: rgba(212,168,67,0.06); }
  .login-toggle .switch {
    width: 30px; height: 16px;
    background: rgba(255,255,255,0.15);
    border-radius: 999px; position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .login-toggle .switch::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: #c0c0c0; border-radius: 50%;
    transition: left 0.2s, background 0.2s;
  }
  .login-toggle[data-on="true"] { color: #7ee8a2; }
  .login-toggle[data-on="true"] .switch { background: rgba(126,232,162,0.35); }
  .login-toggle[data-on="true"] .switch::after { left: 16px; background: #7ee8a2; }

  /* ACCORDION (under header) */
  .login-accordion {
    position: fixed;
    top: calc(48px + env(safe-area-inset-top));
    left: 0; right: 0; z-index: 99;
    background: rgba(14,22,40,0.96);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(212,168,67,0.2);
    max-height: 0; overflow: hidden;
    transition: max-height 0.32s ease;
  }
  .login-accordion[data-open="true"] { max-height: 220px; }
  .login-accordion-inner {
    padding: 14px 18px;
    max-width: 420px; margin: 0 auto;
  }
  .acc-intro {
    font-size: 11px; color: #9aa0ac;
    letter-spacing: 0.04em; margin-bottom: 10px;
    text-align: center;
  }
  .acc-buttons { display: flex; gap: 8px; }
  .acc-buttons button {
    flex: 1; padding: 10px;
    border-radius: 8px;
    font-size: 12.5px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .btn-google { background: #fff; color: #3c4043; border: 1px solid #dadce0; }
  .btn-kakao { background: #FEE500; color: #3a1d1d; border: none; font-weight: 700; }
  .acc-badge {
    padding: 10px;
    background: rgba(126,232,162,0.08);
    border: 1px dashed rgba(126,232,162,0.3);
    border-radius: 8px;
    font-size: 12px; color: #7ee8a2;
    display: flex; align-items: center; gap: 10px;
  }
  .acc-badge button {
    padding: 6px 12px; background: transparent;
    border: 1px solid rgba(126,232,162,0.4);
    border-radius: 6px; color: #7ee8a2;
    font-size: 11.5px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }

  /* MAIN */
  .root {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px; font-weight: 600;
    letter-spacing: 0.12em;
    color: #d4a843; margin-bottom: 8px;
  }
  .tagline {
    font-size: 13px; color: #c0c0c0;
    letter-spacing: 0.04em; margin-bottom: 36px;
  }
  .hero { margin-bottom: 36px; }
  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px; font-weight: 600;
    color: #ffffff; line-height: 1.25;
    margin-bottom: 16px;
  }
  .hero h1 em { font-style: italic; color: #e8b84b; }
  .hero p {
    font-size: 15px; color: #e8e8e8;
    font-weight: 300; line-height: 1.7;
  }

  /* HOST CTA (1차) */
  .cta-primary {
    display: block; width: 100%; padding: 18px;
    background: #e8b84b; color: #0a0f1e;
    border: none; border-radius: 14px;
    font-size: 17px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 0 16px rgba(232,184,75,0.35);
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .cta-primary:hover { transform: translateY(-1px); box-shadow: 0 0 26px rgba(232,184,75,0.5); }
  .cta-primary:active { transform: scale(0.98); }

  .anon-note {
    margin-top: 16px;
    font-size: 12px; color: #7ee8a2;
    opacity: 0.85; line-height: 1.55;
  }
  .anon-note strong { color: #d4a843; }

  /* GUEST (2차) */
  .guest-info {
    margin-top: 36px;
    padding: 20px;
    background: rgba(212,168,67,0.06);
    border: 1px dashed rgba(212,168,67,0.3);
    border-radius: 12px;
    font-size: 13.5px; color: #c0c0c0;
    line-height: 1.6;
  }
  .guest-info strong { color: #e8b84b; }

  /* FOOTER */
  .footer-info {
    margin-top: 36px;
    font-size: 11.5px; color: #c0c0c0;
    opacity: 0.7; line-height: 1.6;
  }
  .footer-info a { color: inherit; text-decoration: underline; }
</style>
<script src="/sentry-init.js" data-page="welcome" defer></script>
</head>
<body>

<!-- 헤더 (fixed) — 좌: 로고 / 우: 로그인 토글 -->
<header class="app-header">
  <span class="h-brand">ntable</span>
  <button type="button" class="login-toggle" id="loginToggle" data-on="false" aria-expanded="false" aria-controls="loginAccordion" hidden>
    <span class="toggle-label">↻ 다음에도 쓰기</span>
    <span class="switch" aria-hidden="true"></span>
  </button>
</header>

<!-- 로그인 아코디언 (헤더 아래 펼침) -->
<div class="login-accordion" id="loginAccordion" data-open="false" aria-hidden="true">
  <div class="login-accordion-inner">
    <div class="acc-intro" id="accIntro">다음 입장부터 자동 완성 — 로그인 (선택)</div>
    <div class="acc-buttons" id="accButtons">
      <button type="button" class="btn-google" id="googleBtn" hidden>Google</button>
      <button type="button" class="btn-kakao" id="kakaoBtn" hidden>카카오</button>
    </div>
    <div class="acc-badge" id="authedBadge" hidden>
      <span style="flex:1;">✓ <strong id="authedName">로그인됨</strong> — 다음 입장부터 자동 완성</span>
      <button type="button" id="logoutBtn">로그아웃</button>
    </div>
  </div>
</div>

<div class="root">
  <div class="brand">ntable</div>
  <div class="tagline">소셜 모임 진행 플랫폼</div>

  <div class="hero">
    <h1>누가 열어도<br><em>재밌는 모임</em></h1>
    <p>호스트 한 명, 스마트폰 하나면 시작됩니다.</p>
  </div>

  <!-- 호스트 1차 CTA -->
  <button type="button" class="cta-primary" id="openRoomBtn">익명으로 모임 열기 →</button>

  <div class="anon-note">
    🔒 <strong>방 안에서만 닉네임으로 표시</strong>됩니다.<br>방이 끝나면 표시는 사라져요.
  </div>

  <!-- 참가자 2차 -->
  <div class="guest-info" id="guestSection">
    <div style="font-size:14px;color:#ffffff;margin-bottom:10px;font-weight:600;">참가자세요?</div>
    링크·QR이 있다면 바로 입장,<br>참여 코드를 받았다면 아래 입력하세요.
    <div style="display:flex;gap:8px;margin-top:14px;">
      <input type="text" id="joinCodeInput" maxlength="6" placeholder="ABC123" autocapitalize="characters" autocomplete="off" aria-label="참여 코드 6자리" style="flex:1;padding:12px;background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.4);border-radius:10px;color:#ffffff;font-size:20px;font-weight:700;letter-spacing:0.04em;text-align:center;font-family:'DM Sans',monospace;text-transform:uppercase;" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,''); document.getElementById('joinCodeBtn').disabled = this.value.length !== 6;" />
      <button type="button" id="joinCodeBtn" disabled style="padding:0 18px;background:#e8b84b;color:#0a0f1e;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit;">입장</button>
    </div>
    <div style="font-size:11px;color:#9aa0ac;margin-top:8px;letter-spacing:0.02em;">참여 코드 6자리 (영문·숫자, 대소문자 무관)</div>
  </div>

  <div class="footer-info">
    <a href="https://ntable.kr/privacy.html">개인정보처리방침</a> ·
    <a href="https://ntable.kr/terms.html">이용약관</a><br>
    More Life. People Connect. · © 2026 ntable
  </div>
</div>

<script>
function ensureUuid() {
  let uuid = '';
  try { uuid = localStorage.getItem('demo_uuid') || ''; } catch (_) {}
  if (!uuid) {
    uuid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
      : ('u-' + Math.random().toString(36).slice(2) + '-' + Date.now().toString(36));
    try { localStorage.setItem('demo_uuid', uuid); } catch (_) {}
  }
  return uuid;
}

document.getElementById('openRoomBtn').addEventListener('click', () => {
  ensureUuid();
  const next = new URLSearchParams(location.search).get('next');
  if (next && /^\/room\/[A-Z0-9]{6}/.test(next)) {
    location.href = next;
  } else {
    location.href = '/create';
  }
});

ensureUuid();

// OAuth 콜백 토큰 처리
(() => {
  const url = new URL(location.href);
  const tok = url.searchParams.get('auth_token');
  if (tok) {
    try { localStorage.setItem('user_token', tok); } catch (_) {}
    history.replaceState(null, '', '/');
  }
  const err = url.searchParams.get('auth_error');
  if (err) {
    alert('로그인 실패: ' + err);
    history.replaceState(null, '', '/');
  }
})();

// 토글·아코디언 제어
const loginToggle = document.getElementById('loginToggle');
const accordion = document.getElementById('loginAccordion');
const accButtons = document.getElementById('accButtons');
const accIntro = document.getElementById('accIntro');
const authedBadge = document.getElementById('authedBadge');

function setToggle(on) {
  loginToggle.dataset.on = on ? 'true' : 'false';
  loginToggle.setAttribute('aria-expanded', on ? 'true' : 'false');
  accordion.dataset.open = on ? 'true' : 'false';
  accordion.setAttribute('aria-hidden', on ? 'false' : 'true');
}

function showAuthedUI(me) {
  authedBadge.hidden = false;
  accButtons.style.display = 'none';
  accIntro.style.display = 'none';
  const nameEl = document.getElementById('authedName');
  if (nameEl) nameEl.textContent = me.name || me.email || '로그인됨';
}

function showLoginButtonsUI() {
  authedBadge.hidden = true;
  accButtons.style.display = 'flex';
  accIntro.style.display = 'block';
}

(async () => {
  // OAuth provider config — 활성된 provider만 노출
  let cfgGoogle = false, cfgKakao = false;
  try {
    const r = await fetch('/api/auth/status');
    const cfg = r.ok ? await r.json() : {};
    cfgGoogle = !!cfg.google;
    cfgKakao = !!cfg.kakao;
  } catch (_) {}
  if (cfgGoogle) document.getElementById('googleBtn').hidden = false;
  if (cfgKakao) document.getElementById('kakaoBtn').hidden = false;
  // 둘 다 비활성이면 토글 자체 숨김
  if (!cfgGoogle && !cfgKakao) {
    loginToggle.style.display = 'none';
    return;
  }
  loginToggle.hidden = false;

  // 로그인 상태 확인 → 자동 토글 ON + 배지
  try {
    const tok = localStorage.getItem('user_token');
    if (tok) {
      const r = await fetch('/api/auth/me', { headers: { 'x-user-token': tok } });
      const me = r.ok ? await r.json() : {};
      if (me.authed) {
        setToggle(true);
        showAuthedUI(me);
      } else {
        try { localStorage.removeItem('user_token'); } catch (_) {}
      }
    }
  } catch (_) {}

  // ?role=guest 자동 스크롤
  try {
    if (new URLSearchParams(location.search).get('role') === 'guest') {
      const guest = document.getElementById('guestSection');
      const input = document.getElementById('joinCodeInput');
      if (guest) guest.scrollIntoView({ behavior: 'smooth', block: 'center' });
      if (input) setTimeout(() => input.focus(), 400);
    }
  } catch (_) {}
})();

// 토글 클릭 — 펼침/접힘
loginToggle.addEventListener('click', () => {
  const isOn = loginToggle.dataset.on === 'true';
  setToggle(!isOn);
});

document.getElementById('googleBtn').addEventListener('click', () => { location.href = '/api/auth/google'; });
document.getElementById('kakaoBtn').addEventListener('click', () => { location.href = '/api/auth/kakao'; });
document.getElementById('logoutBtn').addEventListener('click', async () => {
  if (!confirm('Google/카카오 로그아웃 할까요?\n(닉네임·프로필 캐시는 유지됩니다)')) return;
  const tok = localStorage.getItem('user_token');
  if (tok) {
    try { await fetch('/api/auth/logout', { method: 'POST', headers: { 'x-user-token': tok } }); } catch (_) {}
  }
  try { localStorage.removeItem('user_token'); } catch (_) {}
  // 로그아웃 → 토글 OFF, 버튼 복원
  showLoginButtonsUI();
  setToggle(false);
});

// 참여 코드 입장
document.getElementById('joinCodeBtn').addEventListener('click', () => {
  const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
  if (code.length !== 6) return;
  ensureUuid();
  location.href = `/room/${code}`;
});
document.getElementById('joinCodeInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !document.getElementById('joinCodeBtn').disabled) {
    document.getElementById('joinCodeBtn').click();
  }
});
</script>
</body>
</html>
