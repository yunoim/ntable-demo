<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>ntable — 누구나 호스트가 되는 모임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; }
  body {
    background: #0e1628;
    color: #ffffff;
    font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
    line-height: 1.6;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 24px;
    padding-top: calc(20px + env(safe-area-inset-top));
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
  }
  .root {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: #d4a843;
    margin-bottom: 8px;
  }
  .tagline {
    font-size: 13px;
    color: #c0c0c0;
    letter-spacing: 0.04em;
    margin-bottom: 36px;
  }
  .hero {
    margin-bottom: 48px;
  }
  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 600;
    color: #ffffff;
    line-height: 1.25;
    margin-bottom: 16px;
  }
  .hero h1 em {
    font-style: italic;
    color: #e8b84b;
  }
  .hero p {
    font-size: 15px;
    color: #e8e8e8;
    font-weight: 300;
    line-height: 1.7;
  }
  .cta-primary {
    display: block;
    width: 100%;
    padding: 18px;
    background: #e8b84b;
    color: #0a0f1e;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 0 16px rgba(232,184,75,0.35);
    text-decoration: none;
    margin-bottom: 16px;
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .cta-primary:hover { transform: translateY(-1px); box-shadow: 0 0 26px rgba(232,184,75,0.5); }
  .cta-primary:active { transform: scale(0.98); }
  .guest-info {
    margin-top: 28px;
    padding: 20px;
    background: rgba(212,168,67,0.06);
    border: 1px dashed rgba(212,168,67,0.3);
    border-radius: 12px;
    font-size: 13.5px;
    color: #c0c0c0;
    line-height: 1.6;
  }
  .guest-info strong { color: #e8b84b; }
  .footer-info {
    margin-top: 40px;
    font-size: 11.5px;
    color: #c0c0c0;
    opacity: 0.7;
    line-height: 1.6;
  }
  .footer-info a { color: inherit; text-decoration: underline; }
  .anon-note {
    margin-top: 20px;
    font-size: 12px;
    color: #7ee8a2;
    opacity: 0.85;
  }
  .anon-note strong { color: #d4a843; }
</style>
<script src="/sentry-init.js" data-page="welcome" defer></script>
</head>
<body>
<div class="root">
  <div class="brand">ntable</div>
  <div class="tagline">소셜 모임 진행 플랫폼</div>

  <div class="hero">
    <h1>누가 열어도<br><em>재밌는 모임</em></h1>
    <p>호스트 한 명, 스마트폰 하나면 시작됩니다.</p>
  </div>

  <!-- 참가자 진입 (다수) — 위로 노출 -->
  <div class="guest-info" id="guestSection">
    <div style="font-size:14px;color:#ffffff;margin-bottom:10px;font-weight:600;">참가자세요?</div>
    링크·QR이 있다면 바로 입장,<br>참여 코드를 받았다면 아래 입력하세요.
    <div style="display:flex;gap:8px;margin-top:14px;">
      <input type="text" id="joinCodeInput" maxlength="6" placeholder="ABC123" autocapitalize="characters" autocomplete="off" aria-label="참여 코드 6자리" style="flex:1;padding:12px;background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.4);border-radius:10px;color:#ffffff;font-size:20px;font-weight:700;letter-spacing:0.04em;text-align:center;font-family:'DM Sans',monospace;text-transform:uppercase;" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,''); document.getElementById('joinCodeBtn').disabled = this.value.length !== 6;" />
      <button type="button" id="joinCodeBtn" disabled style="padding:0 18px;background:#e8b84b;color:#0a0f1e;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit;">입장</button>
    </div>
    <div style="font-size:11px;color:#9aa0ac;margin-top:8px;letter-spacing:0.02em;">참여 코드 6자리 (영문·숫자, 대소문자 무관)</div>
  </div>

  <!-- 호스트 — '모임 열기' 메인 CTA -->
  <div style="margin-top:32px;font-size:11px;color:#9aa0ac;letter-spacing:0.18em;text-transform:uppercase;">호스트</div>
  <button type="button" class="cta-primary" id="openRoomBtn" style="margin-top:10px;">모임 열기 →</button>

  <!-- OAuth — 톤다운, 명확히 분리된 보조 영역 -->
  <div id="oauthArea" style="margin-top:18px;display:none;padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;">
    <div id="oauthIntro" style="font-size:11px;color:#9aa0ac;letter-spacing:0.04em;margin-bottom:10px;">다음 입장부터 자동 완성 — 로그인 (선택)</div>
    <div id="oauthButtons" style="display:flex;gap:8px;">
      <button type="button" id="googleBtn" hidden style="flex:1;padding:10px;background:rgba(255,255,255,0.92);color:#3c4043;border:1px solid rgba(218,220,224,0.5);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;opacity:0.85;">Google</button>
      <button type="button" id="kakaoBtn" hidden style="flex:1;padding:10px;background:#FEE500;color:#3a1d1d;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;opacity:0.85;">카카오</button>
    </div>
    <div id="authedBadge" hidden style="padding:10px;background:rgba(126,232,162,0.08);border:1px dashed rgba(126,232,162,0.3);border-radius:8px;font-size:12px;color:#7ee8a2;display:flex;align-items:center;gap:10px;">
      <span style="flex:1;">✓ <strong id="authedName">로그인됨</strong> — 다음 입장부터 자동 완성</span>
      <button type="button" id="logoutBtn" style="padding:6px 12px;background:transparent;border:1px solid rgba(126,232,162,0.4);border-radius:6px;color:#7ee8a2;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;">로그아웃</button>
    </div>
  </div>

  <div class="footer-info">
    <a href="https://ntable.kr/privacy.html">개인정보처리방침</a> ·
    <a href="https://ntable.kr/terms.html">이용약관</a><br>
    More Life. People Connect. · © 2026 ntable
  </div>
</div>

<script>
// uuid 자동 생성 (없으면). 닉네임/프로필 입력은 방 만들기/입장 단계에서 받음.
function ensureUuid() {
  let uuid = '';
  try { uuid = localStorage.getItem('demo_uuid') || ''; } catch (_) {}
  if (!uuid) {
    uuid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
      : ('u-' + Math.random().toString(36).slice(2) + '-' + Date.now().toString(36));
    try { localStorage.setItem('demo_uuid', uuid); } catch (_) {}
  }
  return uuid;
}

document.getElementById('openRoomBtn').addEventListener('click', () => {
  ensureUuid();
  // next 파라미터로 들어온 게스트는 그 방 직접 입장
  const next = new URLSearchParams(location.search).get('next');
  if (next && /^\/room\/[A-Z0-9]{6}/.test(next)) {
    location.href = next;
  } else {
    location.href = '/create';
  }
});

// 페이지 로드 시 uuid 자동 보장 (백그라운드)
ensureUuid();

// OAuth 콜백 토큰 처리
(() => {
  const url = new URL(location.href);
  const tok = url.searchParams.get('auth_token');
  if (tok) {
    try { localStorage.setItem('user_token', tok); } catch (_) {}
    history.replaceState(null, '', '/');
  }
  const err = url.searchParams.get('auth_error');
  if (err) {
    alert('로그인 실패: ' + err);
    history.replaceState(null, '', '/');
  }
})();

// OAuth 활성 provider 조회 + 로그인 상태 표시
(async () => {
  try {
    const r = await fetch('/api/auth/status');
    const cfg = r.ok ? await r.json() : {};
    const area = document.getElementById('oauthArea');
    if (cfg.google || cfg.kakao) {
      area.style.display = 'block';
      if (cfg.google) document.getElementById('googleBtn').hidden = false;
      if (cfg.kakao) document.getElementById('kakaoBtn').hidden = false;
    }
  } catch (_) {}
  // 현재 로그인 정보 표시 — 로그인 시 OAuth 버튼·안내 모두 숨김 (배지만 노출)
  try {
    const tok = localStorage.getItem('user_token');
    if (tok) {
      const r = await fetch('/api/auth/me', { headers: { 'x-user-token': tok } });
      const me = r.ok ? await r.json() : {};
      if (me.authed) {
        // 로그인 성공 — 배지만 노출, OAuth 버튼·안내 그룹 모두 숨김
        document.getElementById('oauthArea').style.display = 'block';
        document.getElementById('authedBadge').hidden = false;
        const nameEl = document.getElementById('authedName');
        if (nameEl) nameEl.textContent = me.name || me.email || '로그인됨';
        const buttons = document.getElementById('oauthButtons');
        if (buttons) buttons.style.display = 'none';
        const intro = document.getElementById('oauthIntro');
        if (intro) intro.style.display = 'none';
      } else {
        // 토큰은 있지만 서버 세션 만료/무효 — 정리하고 비로그인 흐름으로
        try { localStorage.removeItem('user_token'); } catch (_) {}
      }
    }
  } catch (_) {}

  // ?role=guest 로 들어오면 참가자 섹션으로 자동 스크롤·포커스
  try {
    if (new URLSearchParams(location.search).get('role') === 'guest') {
      const guest = document.getElementById('guestSection');
      const input = document.getElementById('joinCodeInput');
      if (guest) guest.scrollIntoView({ behavior: 'smooth', block: 'center' });
      if (input) setTimeout(() => input.focus(), 400);
    }
  } catch (_) {}
})();

document.getElementById('googleBtn').addEventListener('click', () => { location.href = '/api/auth/google'; });
document.getElementById('kakaoBtn').addEventListener('click', () => { location.href = '/api/auth/kakao'; });
document.getElementById('logoutBtn').addEventListener('click', async () => {
  if (!confirm('Google/카카오 로그아웃 할까요?\n(닉네임·프로필 캐시는 유지됩니다)')) return;
  const tok = localStorage.getItem('user_token');
  if (tok) {
    try { await fetch('/api/auth/logout', { method: 'POST', headers: { 'x-user-token': tok } }); } catch (_) {}
  }
  try { localStorage.removeItem('user_token'); } catch (_) {}
  location.reload();
});

// 참여 코드 입장
document.getElementById('joinCodeBtn').addEventListener('click', () => {
  const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
  if (code.length !== 6) return;
  ensureUuid();
  location.href = `/room/${code}`;
});
document.getElementById('joinCodeInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !document.getElementById('joinCodeBtn').disabled) {
    document.getElementById('joinCodeBtn').click();
  }
});
</script>
</body>
</html>
