<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1e">
  <meta name="color-scheme" content="dark">
  <link rel="stylesheet" href="/theme-lock.css">
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/components.css">
  <script src="/samsung-dark-warn.js" defer></script>
  <script src="/pending-reveals.js" defer></script>
  <script src="/twemoji-brand.js" defer></script>
  <script src="/js/brand.js"></script>
  <title>모임 만들기 · ntable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--navy);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100vh;
      min-height: 100dvh;
      padding: 0 0 120px;
      -webkit-font-smoothing: antialiased;
      text-wrap: pretty;
    }

    .ct-shell {
      max-width: 460px;
      margin: 0 auto;
      padding: 0 18px;
    }

    /* Top bar */
    .ct-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 18px 0 16px;
    }
    .ct-back {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      text-decoration: none;
      line-height: 1;
    }
    .ct-back:hover { border-color: var(--gold-border); color: var(--gold-light); }
    .ct-head {
      min-width: 0;
      padding-top: 2px;
    }
    .ct-eyebrow {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .ct-title {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: -0.03em;
      color: var(--white);
    }

    /* Filter rail */
    .ct-filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 6px 0 16px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .ct-filters::-webkit-scrollbar { display: none; }
    .ct-filter {
      flex-shrink: 0;
      height: 32px;
      padding: 0 14px;
      display: inline-flex; align-items: center;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s, color 0.18s;
    }
    .ct-filter.active {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold-light);
      font-weight: 600;
    }

    /* Template list */
    .ct-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0;
    }
    .ct-row {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 14px;
      cursor: pointer;
      font-family: inherit;
      color: var(--white);
      text-align: left;
      transition: background 0.18s, border-color 0.18s;
      width: 100%;
    }
    .ct-row:hover { background: rgba(212,168,67,0.04); }
    .ct-row.active {
      background: var(--surface-base);
      border-color: rgba(212,168,67,0.28);
    }
    .ct-row-tile {
      flex-shrink: 0;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      font-size: 22px;
      line-height: 1;
      transition: background 0.18s;
    }
    .ct-row.active .ct-row-tile {
      background: var(--gold-dim);
    }
    .ct-row-body {
      min-width: 0;
      flex: 1;
    }
    .ct-row-titleline {
      display: flex;
      align-items: baseline;
      gap: 6px;
      min-width: 0;
      margin-bottom: 2px;
    }
    .ct-row-title {
      font-size: 14.5px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.01em;
    }
    .ct-row-meta {
      font-size: 10.5px;
      color: var(--text-dim);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .ct-row-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }
    .ct-row-check {
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 50%;
      display: none;
      align-items: center; justify-content: center;
      background: var(--gold);
      color: var(--navy);
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
    }
    .ct-row.active .ct-row-check { display: inline-flex; }

    /* Sticky bottom action bar */
    .ct-bottom {
      position: fixed;
      left: 0; right: 0;
      bottom: 0;
      padding: 14px 18px calc(14px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, var(--navy) 70%, rgba(10,15,30,0) 100%);
      z-index: 90;
    }
    .ct-bottom-inner {
      max-width: 460px;
      margin: 0 auto;
    }
    .ct-summary {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4px 10px;
      gap: 10px;
    }
    .ct-summary-label {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }
    .ct-summary-value {
      font-size: 13px;
      color: var(--white);
      font-weight: 600;
    }
    .ct-cta {
      width: 100%;
      min-height: 54px;
      padding: 16px 20px;
      background: linear-gradient(135deg, var(--gold), #a07828);
      color: var(--navy);
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 15.5px;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(212,168,67,0.28);
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    }
    .ct-cta:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(212,168,67,0.38); }
    .ct-cta:active { transform: scale(0.98); }
    .ct-cta:disabled {
      background: var(--gold-dim);
      color: var(--gold-light);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* Detail screen (confirm) — second step 유지, 기존 기능 그대로 */
    .ct-confirm {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: 20px;
      padding: 28px 22px;
      margin-top: 4px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
    }
    .ct-confirm[hidden] { display: none; }
    .confirm-head { text-align: center; margin-bottom: 16px; }
    .confirm-icon { font-size: 34px; line-height: 1; margin-bottom: 8px; }
    .confirm-title {
      font-family: var(--font-heading);
      font-size: 22px; font-weight: 600; color: var(--white);
      margin-bottom: 6px;
    }
    .confirm-desc { font-size: 13.5px; color: var(--text-muted); line-height: 1.55; }
    .confirm-section-head {
      font-size: 11px; color: var(--gold); letter-spacing: 0.14em;
      text-transform: uppercase; font-weight: 700;
      margin: 22px 0 12px;
    }
    .meeting-time-row {
      margin: 18px 0 4px;
      padding: 14px;
      background: rgba(212,168,67,0.05);
      border: 1px solid rgba(212,168,67,0.18);
      border-radius: 12px;
    }
    .meeting-time-label {
      display: block;
      font-size: 12.5px;
      color: var(--gold-light);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .meeting-time-label .opt-hint { color: var(--text-muted); font-size: 11px; font-weight: 400; margin-left: 4px; }
    .meeting-time-input {
      width: 100%;
      padding: 10px 44px 10px 12px;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--gold-border);
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      color-scheme: dark;
    }
    .meeting-time-input::-webkit-calendar-picker-indicator {
      opacity: 0; cursor: pointer; position: absolute;
      width: 100%; height: 100%; left: 0; top: 0; padding: 0; margin: 0;
    }
    .meeting-time-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    .confirm-stages { display: flex; flex-direction: column; gap: 14px; }
    .confirm-stage-block + .confirm-stage-block {
      padding-top: 14px;
      border-top: 1px solid rgba(212,168,67,0.14);
    }
    .confirm-stage-head {
      font-size: 11.5px; color: var(--gold); letter-spacing: 0.12em;
      font-weight: 700; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .confirm-stage-items {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    .confirm-stage-items li {
      font-size: 13.5px; color: var(--text); line-height: 1.55;
      padding-left: 30px; position: relative;
    }
    .confirm-stage-num {
      position: absolute; left: 0; top: 0;
      font-size: 11.5px; font-weight: 700;
      color: var(--gold-light); letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }

    .confirm-back {
      background: none; border: none; color: var(--text-muted);
      font-size: 12.5px; cursor: pointer; font-family: inherit;
      letter-spacing: 0.02em; padding: 8px 12px;
    }
    .confirm-back:hover { color: var(--gold-light); }

    .error-msg {
      font-size: 13px;
      color: var(--danger);
      text-align: center;
      margin-top: 12px;
      min-height: 18px;
    }

    button:focus-visible, input:focus-visible, a:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    /* TV 외부 화면 진입점 — 모바일(≤768px) 에선 숨김 */
    @media (max-width: 768px) {
      #tvEntry { display: none !important; }
    }
  </style>
  <script src="/sentry-init.js" data-page="create" defer></script>
</head>
<body>
  <h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">ntable — 새 모임 만들기</h1>

  <div class="ct-shell">
    <header class="ct-top">
      <a href="/" class="ct-back" aria-label="홈으로 돌아가기">‹</a>
      <div class="ct-head">
        <div class="ct-eyebrow" data-copy="create.eyebrow">새 모임</div>
        <h2 class="ct-title"><span data-copy="create.title_line1">어떤 자리로</span><br><span data-copy="create.title_line2">꾸며볼까요?</span></h2>
      </div>
    </header>

    <!-- 화면 1: 필터 + 리스트 -->
    <div id="selectScreen">
      <div class="ct-filters" id="filterRail" role="tablist" aria-label="템플릿 카테고리"></div>
      <div class="ct-list" id="packList" role="list"></div>

      <!-- TV 외부 화면 진입점 (데스크탑·노트북 전용 — 모바일에선 숨김) -->
      <div id="tvEntry" style="margin: 22px auto 0; text-align: center; max-width: 380px;">
        <a href="/tv" style="color: var(--gold); font-size: 13.5px; text-decoration: none; display: inline-block; padding: 10px 16px; border: 1px solid var(--gold-border); border-radius: 999px; letter-spacing: 0.01em; background: var(--gold-dim-2);">
          📺 외부 화면(TV·프로젝터)에 결과만 띄우기 →
        </a>
        <div style="margin-top: 8px; font-size: 11.5px; color: var(--text-dim); line-height: 1.5;">
          폰으로 조작하고 외부 화면에는 결과만 보여줘요
        </div>
      </div>
    </div>

    <!-- 화면 2: 확인 화면 (non-instant 템플릿에서만) -->
    <div class="ct-confirm" id="confirmScreen" hidden>
      <div class="confirm-head">
        <div class="confirm-icon" id="confirmIcon"></div>
        <div class="confirm-title" id="confirmTitle"></div>
        <div class="confirm-desc" id="confirmDesc"></div>
      </div>
      <div class="confirm-section-head">이런 순서로 진행돼요</div>
      <div class="confirm-stages" id="confirmFeatures"></div>

      <div class="meeting-time-row">
        <label for="meetingAtInput" class="meeting-time-label">📅 모임 시각 <span class="opt-hint">선택</span></label>
        <div style="position:relative;">
          <input type="datetime-local" id="meetingAtInput" class="meeting-time-input" />
          <button type="button" id="meetingAtIcon" aria-label="날짜·시간 선택" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:18px;color:#e8b84b;background:none;border:none;padding:6px;cursor:pointer;font-family:inherit;">📅</button>
        </div>
        <div class="meeting-time-hint">QR·카카오 공유 메시지에 표시돼요. 비워두면 노출 안 됨.</div>
      </div>

      <div style="text-align:center;margin-top:20px;">
        <button type="button" class="confirm-back" id="confirmBackBtn">← 다른 모임 보기</button>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <!-- Sticky 하단 액션 바 -->
  <div class="ct-bottom" id="stickyBottom">
    <div class="ct-bottom-inner">
      <div class="ct-summary">
        <span class="ct-summary-label" data-copy="create.selected_label">선택한 템플릿</span>
        <span class="ct-summary-value" id="summaryValue">—</span>
      </div>
      <button type="button" class="ct-cta" id="primaryCta" disabled>
        <span id="primaryCtaLabel" data-copy="create.cta_empty">템플릿을 선택해주세요</span>
      </button>
    </div>
  </div>

  <script>
    let uuid = null;
    let selectedId = null;
    let activeCategory = 'all';
    let _pendingKit = null;

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // 활성 템플릿 (2026-04-22 현재): couples · playlist-share 2개만 실제 생성 가능.
    // 스펙 B·재구성안 기준. 비활성 템플릿은 리스트에서 제외.
    const ROOM_KITS = [
      {
        id: 'couples',
        icon: '🙋‍♀️',
        title: '둘이서',
        meta: '2인 · 10–20분',
        desc: '밸런스게임 10문항, 취향·MBTI 교차 탐구',
        categories: ['2p'],
        instant: true,
        defaults: {
          question_count: 10,
          display_fields: ['birth_year', 'mbti'],
          birth_year_format: 'exact',
          host_role: 'participant', display_mode: 'mobile',
          photo_enabled: true, region_detail: false,
          free_chat_timer_minutes: 0, free_chat_chat_enabled: false, free_chat_topic_card_enabled: false,
        },
      },
      {
        id: 'playlist-share',
        icon: '🎵',
        title: '나만의 플리 공유회',
        meta: '2–6인 · 90분',
        desc: '각자 15분씩 플리 공유 · BEST 투표',
        categories: ['music'],
        detailedDesc: '각자 15분 플리를 스피커로 공유하고, 익명 채팅으로 실시간 반응·BEST 플리 투표까지.',
        stages: [
          { label: '입장', items: ['QR 자동 입장 · 익명 닉네임', '플레이리스트 링크 공유 (선택)', '음악 취향 A/B 5문항'] },
          { label: '탐구·대화', items: ['자유대화 — 2시간 · 익명 채팅', 'BEST 플리 투표 — 모두가 한 표씩', '탐구 결과 공개'] },
          { label: '마무리', items: ['AI 성향 카드'] },
        ],
        defaults: {
          question_count: 5,
          display_fields: ['mbti', 'playlist'],
          birth_year_format: 'decade_half',
          host_role: 'participant', display_mode: 'mobile',
          photo_enabled: true, region_detail: false,
          free_chat_timer_minutes: 120, free_chat_chat_enabled: true, free_chat_topic_card_enabled: false,
          instagram_collect: true,
        },
      },
    ];

    // 필터 pill 은 실제 활성 템플릿이 속한 카테고리만 노출. 전체 + 해당 카테고리만.
    const FILTER_DEFS = [
      { id: 'all',   copyKey: 'create.filter_all',   label: '전체' },
      { id: '2p',    copyKey: 'create.filter_2p',    label: '2인' },
      { id: 'music', copyKey: 'create.filter_music', label: '뮤직' },
    ];

    function renderFilters() {
      const rail = document.getElementById('filterRail');
      rail.innerHTML = '';
      FILTER_DEFS.forEach(f => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'ct-filter' + (f.id === activeCategory ? ' active' : '');
        btn.dataset.cat = f.id;
        btn.setAttribute('role', 'tab');
        btn.setAttribute('aria-selected', String(f.id === activeCategory));
        btn.innerHTML = `<span data-copy="${f.copyKey}">${escHtml(f.label)}</span>`;
        btn.addEventListener('click', () => setCategory(f.id));
        rail.appendChild(btn);
      });
      if (typeof applyCopyToDOM === 'function') applyCopyToDOM(rail);
    }

    function filteredKits() {
      if (activeCategory === 'all') return ROOM_KITS;
      return ROOM_KITS.filter(k => (k.categories || []).includes(activeCategory));
    }

    function renderList() {
      const list = document.getElementById('packList');
      list.innerHTML = '';
      filteredKits().forEach(kit => {
        const row = document.createElement('button');
        row.type = 'button';
        row.className = 'ct-row' + (kit.id === selectedId ? ' active' : '');
        row.dataset.packId = kit.id;
        row.setAttribute('role', 'listitem');
        row.setAttribute('aria-pressed', String(kit.id === selectedId));
        row.innerHTML = `
          <span class="ct-row-tile" aria-hidden="true">${escHtml(kit.icon)}</span>
          <span class="ct-row-body">
            <span class="ct-row-titleline">
              <span class="ct-row-title">${escHtml(kit.title)}</span>
              <span class="ct-row-meta">· ${escHtml(kit.meta)}</span>
            </span>
            <span class="ct-row-desc">${escHtml(kit.desc)}</span>
          </span>
          <span class="ct-row-check" aria-hidden="true">✓</span>
        `;
        row.addEventListener('click', () => selectKit(kit));
        list.appendChild(row);
      });
    }

    function selectKit(kit) {
      selectedId = kit.id;
      renderList();
      updateSummary(kit);
      try {
        const u = new URL(location.href);
        u.searchParams.set('pack', kit.id);
        history.replaceState(null, '', u);
      } catch (_) {}
    }

    function updateSummary(kit) {
      const valEl = document.getElementById('summaryValue');
      const cta = document.getElementById('primaryCta');
      const label = document.getElementById('primaryCtaLabel');
      if (!kit) {
        valEl.textContent = '—';
        cta.disabled = true;
        label.textContent = (window.t ? t('create.cta_empty') : '템플릿을 선택해주세요');
        label.dataset.copy = 'create.cta_empty';
        return;
      }
      valEl.textContent = `${kit.icon} ${kit.title}`;
      cta.disabled = false;
      label.textContent = (window.t ? t('create.cta_next') : '다음 · 세부 설정');
      label.dataset.copy = 'create.cta_next';
    }

    function setCategory(id) {
      activeCategory = id;
      try {
        const u = new URL(location.href);
        if (id === 'all') u.searchParams.delete('category');
        else u.searchParams.set('category', id);
        history.replaceState(null, '', u);
      } catch (_) {}
      renderFilters();
      renderList();
      // 선택된 킷이 필터에서 사라지면 선택 해제
      if (selectedId && !filteredKits().find(k => k.id === selectedId)) {
        selectedId = null;
        updateSummary(null);
      }
    }

    // Primary CTA 는 init 에서 onclick 단일 소스로 바인딩 (showConfirmScreen/showSelectScreen 내부에서
    // 재할당할 때 이전 핸들러와 충돌·이중 POST 되는 이슈 때문에 addEventListener 는 쓰지 않음).

    // Confirm 화면
    function showConfirmScreen(kit) {
      _pendingKit = kit;
      document.getElementById('confirmIcon').textContent = kit.icon;
      document.getElementById('confirmTitle').textContent = kit.title;
      document.getElementById('confirmDesc').textContent = kit.detailedDesc || kit.desc;
      const featuresEl = document.getElementById('confirmFeatures');
      if (Array.isArray(kit.stages) && kit.stages.length) {
        let counter = 0;
        featuresEl.innerHTML = kit.stages.map((stage, i) => {
          const stageIdx = String(i + 1).padStart(2, '0');
          const itemsHtml = (stage.items || []).map(it => {
            counter += 1;
            const n = String(counter).padStart(2, '0');
            return `<li><span class="confirm-stage-num">${n}</span>${escHtml(it)}</li>`;
          }).join('');
          return `<div class="confirm-stage-block">
            <div class="confirm-stage-head">STEP ${stageIdx} · ${escHtml(stage.label)}</div>
            <ul class="confirm-stage-items">${itemsHtml}</ul>
          </div>`;
        }).join('');
      } else {
        featuresEl.innerHTML = '';
      }
      document.getElementById('selectScreen').hidden = true;
      document.getElementById('confirmScreen').hidden = false;
      // Sticky bottom CTA 를 "모임 열기" 로 전환
      const label = document.getElementById('primaryCtaLabel');
      label.textContent = '모임 열기';
      label.removeAttribute('data-copy');
      // primaryCta 버튼을 confirm 전용 핸들러로 임시 재바인딩
      const cta = document.getElementById('primaryCta');
      cta.onclick = () => { if (_pendingKit) createRoomFromKit(_pendingKit); };
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function showSelectScreen() {
      document.getElementById('confirmScreen').hidden = true;
      document.getElementById('selectScreen').hidden = false;
      _pendingKit = null;
      const kit = ROOM_KITS.find(k => k.id === selectedId);
      updateSummary(kit || null);
      // 기본 click 핸들러 복원
      const cta = document.getElementById('primaryCta');
      cta.onclick = () => {
        const k = ROOM_KITS.find(x => x.id === selectedId);
        if (!k) return;
        if (k.instant) createRoomFromKit(k);
        else showConfirmScreen(k);
      };
    }
    document.getElementById('confirmBackBtn').addEventListener('click', showSelectScreen);

    async function createRoomFromKit(kit) {
      const errMsg = document.getElementById('errorMsg');
      if (errMsg) errMsg.textContent = '';
      const d = new Date();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const title = `${kit.title} · ${mm}.${dd}`;
      const merged = { ...kit.defaults };
      const meetingAtInput = document.getElementById('meetingAtInput');
      const meeting_at = meetingAtInput && meetingAtInput.value ? new Date(meetingAtInput.value).toISOString() : null;
      try {
        const res = await fetch('/api/rooms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uuid, title, pack_id: kit.id, ...merged, meeting_at })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '모임 생성 실패');
        try { sessionStorage.setItem('nt_pending_toast', 'room_opened'); } catch (_) {}
        window.location.href = `/room/${data.room_code}/host`;
      } catch (e) {
        if (errMsg) errMsg.textContent = e.message || '모임 생성 중 오류';
      }
    }

    async function init() {
      uuid = localStorage.getItem('demo_uuid');
      if (!uuid) {
        uuid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
          : ('u-' + Math.random().toString(36).slice(2) + '-' + Date.now().toString(36));
        try { localStorage.setItem('demo_uuid', uuid); } catch (_) {}
      }

      // URL query 로 카테고리·팩 복원
      try {
        const q = new URLSearchParams(location.search);
        const cat = q.get('category');
        if (cat && FILTER_DEFS.find(f => f.id === cat)) activeCategory = cat;
        const prePack = q.get('pack');
        if (prePack && ROOM_KITS.find(k => k.id === prePack)) selectedId = prePack;
      } catch (_) {}

      renderFilters();
      renderList();
      const kit = selectedId ? ROOM_KITS.find(k => k.id === selectedId) : null;
      updateSummary(kit || null);

      // Primary CTA 핸들러 단일 소스 — 선택 상태에 따라 instant / confirm 분기
      const cta = document.getElementById('primaryCta');
      cta.onclick = () => {
        const k = ROOM_KITS.find(x => x.id === selectedId);
        if (!k) return;
        if (k.instant) createRoomFromKit(k);
        else showConfirmScreen(k);
      };

      // 📅 아이콘 → 네이티브 picker
      try {
        const icon = document.getElementById('meetingAtIcon');
        const dt = document.getElementById('meetingAtInput');
        if (icon && dt) {
          icon.addEventListener('click', (e) => {
            e.preventDefault();
            if (typeof dt.showPicker === 'function') { try { dt.showPicker(); return; } catch (_) {} }
            dt.focus();
          });
        }
      } catch (_) {}

      // result.html 의 "다음 모임 열기" 에서 ?pack=<id> 로 진입 시: instant 면 즉시 생성, 아니면 confirm
      try {
        const prePack = new URLSearchParams(location.search).get('pack');
        if (prePack) {
          const kitAuto = ROOM_KITS.find(k => k.id === prePack);
          if (kitAuto && kitAuto.instant) createRoomFromKit(kitAuto);
          else if (kitAuto) showConfirmScreen(kitAuto);
        }
      } catch (_) {}

      // brand.json 로드 후 data-copy 치환
      if (typeof loadBrand === 'function') {
        loadBrand().then(() => {
          if (typeof applyCopyToDOM === 'function') applyCopyToDOM(document);
          // summary label 은 실시간 계산되므로 재갱신
          const k = ROOM_KITS.find(x => x.id === selectedId);
          updateSummary(k || null);
        }).catch(() => {});
      }
    }

    init();
  </script>
</body>
</html>
