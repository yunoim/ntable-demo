<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1e">
  <title>모임 만들기 · ntable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #0a0f1e;
      --navy-light:  #0f1628;
      --surface:     #141d35;
      --surface-2:   #1a2442;
      --gold:        #c9a84c;
      --gold-light:  #dfc070;
      --gold-dim:    rgba(201,168,76,0.14);
      --gold-border: rgba(201,168,76,0.25);
      --white:       #f5f2ec;
      --text:        #e6dfc9;
      --subtext:     rgba(230,223,201,0.55);
      --border:      rgba(255,255,255,0.08);
      --danger:      #e87e7e;
    }

    body {
      background: var(--navy);
      color: var(--text);
      font-family: 'DM Sans', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0 0 60px 0;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 20% 15%, rgba(201,168,76,0.08), transparent 55%),
        radial-gradient(circle at 80% 90%, rgba(80,100,180,0.05), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 460px;
      padding: 0 22px;
      position: relative;
      z-index: 1;
    }

    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 0;
    }
    .top-nav .user-nick {
      color: var(--subtext);
      font-size: 12px;
      letter-spacing: 0.02em;
    }
    .top-nav .logout-btn {
      background: transparent;
      border: 1px solid var(--gold-border);
      color: var(--subtext);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .top-nav .logout-btn:hover { color: var(--gold); border-color: var(--gold); }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.14em;
      text-align: center;
      padding: 28px 0 6px;
    }
    .welcome {
      font-size: 13px;
      color: var(--subtext);
      text-align: center;
      margin-bottom: 36px;
      line-height: 1.6;
    }
    .welcome span { color: var(--gold-light); font-weight: 600; }

    .card {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 8px;
    }
    .section-sub {
      font-size: 13px;
      color: var(--subtext);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--subtext);
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
    }

    input[type="text"] {
      width: 100%;
      background: var(--navy-light);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--white);
      font-size: 15px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input[type="text"]:focus { border-color: var(--gold); }
    input[type="text"]::placeholder { color: var(--subtext); opacity: 0.6; }

    .char-count {
      font-size: 11px;
      color: var(--subtext);
      text-align: right;
      margin-top: 8px;
      letter-spacing: 0.02em;
    }
    .field-group { margin-bottom: 24px; }

    .role-options { display: flex; gap: 10px; }
    .role-btn {
      flex: 1;
      background: var(--navy-light);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--subtext);
      font-size: 13px;
      padding: 16px 10px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      line-height: 1.45;
      font-family: inherit;
      font-weight: 500;
    }
    .role-btn:hover { border-color: var(--gold-border); color: var(--white); }
    .role-btn.selected {
      border-color: var(--gold);
      background: var(--gold-dim);
      color: var(--gold-light);
    }
    .role-btn .role-icon {
      font-size: 22px;
      display: block;
      margin-bottom: 6px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 26px 0;
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), #a07828);
      color: var(--navy);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 18px rgba(201,168,76,0.25);
      font-family: inherit;
    }
    .submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(201,168,76,0.35); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }

    .error-msg {
      font-size: 13px;
      color: var(--danger);
      text-align: center;
      margin-top: 14px;
      min-height: 18px;
    }

    .required-mark { color: var(--gold); margin-left: 3px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-nav">
      <span class="user-nick" id="topNavUser"></span>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
    <div class="logo">ntable</div>
    <div class="welcome" id="welcomeMsg">로딩 중...</div>

    <div class="card">
      <div class="section-title">새 모임 만들기</div>
      <div class="section-sub">모임을 열면 QR코드와 입장 링크가 생성돼요.</div>

      <div class="field-group">
        <label>모임 제목<span class="required-mark">*</span></label>
        <input type="text" id="titleInput" placeholder="예: 6월 네트워킹 모임" maxlength="100" />
        <div class="char-count"><span id="charCount">0</span> / 100</div>
      </div>

      <div class="field-group">
        <label>호스트 역할<span class="required-mark">*</span></label>
        <div class="role-options">
          <button class="role-btn" data-role="host_only" onclick="selectRole('host_only')">
            <span class="role-icon">🎤</span>
            진행만 할게요
          </button>
          <button class="role-btn" data-role="participant" onclick="selectRole('participant')">
            <span class="role-icon">🙋</span>
            저도 참여할게요
          </button>
        </div>
      </div>

      <div class="divider"></div>

      <button class="submit-btn" id="createBtn" onclick="createRoom()" disabled>
        모임 만들기
      </button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <script>
    let uuid = null;
    let selectedRole = null;

    async function init() {
      uuid = localStorage.getItem('demo_uuid');
      if (!uuid) { window.location.href = '/'; return; }
      try {
        const res = await fetch(`/api/me?uuid=${uuid}`);
        if (!res.ok) { localStorage.removeItem('demo_uuid'); window.location.href = '/'; return; }
        const data = await res.json();
        document.getElementById('welcomeMsg').innerHTML =
          `안녕하세요, <span>${data.nickname}</span>님<br>지금 바로 모임을 열어보세요.`;
        document.getElementById('topNavUser').textContent = `@${data.nickname}`;
      } catch {
        document.getElementById('welcomeMsg').textContent = '모임을 열어보세요.';
      }
    }

    function logout() {
      if (!confirm('로그아웃할까요?')) return;
      localStorage.removeItem('demo_uuid');
      window.location.href = '/';
    }

    function selectRole(role) {
      selectedRole = role;
      document.querySelectorAll('.role-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.role === role);
      });
      checkReady();
    }

    const titleInput = document.getElementById('titleInput');
    const charCount = document.getElementById('charCount');
    titleInput.addEventListener('input', () => {
      charCount.textContent = titleInput.value.length;
      checkReady();
    });

    function checkReady() {
      const ready = titleInput.value.trim().length > 0 && selectedRole !== null;
      document.getElementById('createBtn').disabled = !ready;
    }

    async function createRoom() {
      const title = titleInput.value.trim();
      if (!title || !selectedRole) return;

      const btn = document.getElementById('createBtn');
      const errMsg = document.getElementById('errorMsg');
      btn.disabled = true;
      btn.textContent = '생성 중...';
      errMsg.textContent = '';

      try {
        const res = await fetch('/api/rooms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uuid, title, host_role: selectedRole })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '방 생성 실패');
        window.location.href = `/room/${data.room_code}/host`;
      } catch (err) {
        errMsg.textContent = err.message;
        btn.disabled = false;
        btn.textContent = '모임 만들기';
      }
    }

    init();
  </script>
</body>
</html>
