<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1e">
  <meta name="color-scheme" content="dark">
  <link rel="stylesheet" href="/theme-lock.css">
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/components.css">
  <script src="/samsung-dark-warn.js" defer></script>
  <script src="/oauth-redirect.js"></script>
  <script src="/auth-header.js" defer></script>
  <script src="/remember-toggle.js" defer></script>
  <script src="/pending-reveals.js" defer></script>
  <script src="/twemoji-brand.js" defer></script>
  <script src="/js/brand.js"></script>
  <title>모임 만들기 · ntable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Navy */
      --navy:        #0a0f1e;
      --navy-light:  #0f1628;
      --navy-mid:    #141d35;
      /* Surfaces */
      --surface:     #141d35;
      --surface-2:   #1a2442;
      --surface-3:   #223056;
      /* Gold (landing 기준) */
      --gold:        #d4a843;
      --gold-light:  #f0ca60;
      --gold-dim:    rgba(212,168,67,0.18);
      --gold-dim-2:  rgba(212,168,67,0.08);
      --gold-border: rgba(212,168,67,0.35);
      /* Text */
      --white:       #f5f2ec;
      --white-dim:   rgba(245,242,236,0.88);
      --white-muted: rgba(245,242,236,0.72);
      --text:        #ddd5bc;
      --text-muted:  rgba(216,208,187,0.78);
      --text-dim:    rgba(216,208,187,0.65);
      --subtext:     rgba(216,208,187,0.78);
      /* UI */
      --border:      rgba(255,255,255,0.14);
      --input-border:#5a6178;
      --placeholder: rgba(216,208,187,0.65);
      --danger:      #e87e7e;
      --success:     #7ee8a2;
      /* Motion */
      --radius:      10px;
      --radius-lg:   18px;
      --transition:  0.32s cubic-bezier(0.4,0,0.2,1);
    }

    body {
      background: var(--navy);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0 0 60px 0;
      padding-top: calc(82px + env(safe-area-inset-top));
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }

    /* 공통 헤더 — ntable.kr 랜딩 nav 구조 (.nav-inner max-width:1100px) 동일 적용 */
    .app-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding-top: env(safe-area-inset-top);
      background: rgba(14,22,40,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(212,168,67,0.45);
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 32px;
      height: 62px; display: flex; align-items: center; justify-content: space-between;
    }
    @media (max-width: 768px) {
      .nav-inner { padding: 0 20px; }
    }
    .h-brand {
      font-family: var(--font-heading);
      font-size: 22px; font-weight: 600;
      color: #d4a843; letter-spacing: 0.08em;
      text-decoration: none;
    }
    /* 로그인 토글·아코디언 UI 제거 (2026-04-20) — 공통 /auth-header.js pill 로 대체됨 */

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 20% 15%, rgba(212,168,67,0.08), transparent 55%),
        radial-gradient(circle at 80% 90%, rgba(80,100,180,0.05), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 460px;
      padding: 0 22px;
      position: relative;
      z-index: 1;
    }

    .welcome {
      padding-top: 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--white, #f5f2ec);
      text-align: center;
      margin-bottom: 16px;
      line-height: 1.4;
      letter-spacing: 0.01em;
    }
    .welcome span { color: var(--gold-light); font-weight: 600; }

    .card {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
    }

    .section-title {
      font-family: var(--font-heading);
      font-size: 22px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 8px;
    }
    .section-sub {
      font-size: 13px;
      color: var(--subtext);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--subtext);
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
    }

    input[type="text"] {
      width: 100%;
      background: var(--navy-light);
      border: 1.5px solid var(--input-border);
      border-radius: 12px;
      color: var(--white);
      font-size: 15px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input[type="text"]:focus { border-color: var(--gold); }
    input[type="text"]::placeholder { color: var(--placeholder); opacity: 1; }

    .char-count {
      font-size: 11px;
      color: var(--subtext);
      text-align: right;
      margin-top: 8px;
      letter-spacing: 0.02em;
    }
    .field-group { margin-bottom: 24px; }

    .qcount-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .qcount-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: var(--input-border);
      border-radius: 2px;
      outline: none;
    }
    .qcount-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      border: 2px solid var(--navy);
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .qcount-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      border: 2px solid var(--navy);
    }
    .qcount-value {
      min-width: 70px;
      text-align: right;
      color: var(--gold-light);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.02em;
    }
    .qcount-hint {
      font-size: 11px;
      color: var(--subtext);
      margin-top: 8px;
      letter-spacing: 0.02em;
    }

    /* 상단 태그라인 */
    .tagline-hero {
      background: linear-gradient(135deg, rgba(212,168,67,0.10), rgba(212,168,67,0.03));
      border: 1px solid var(--gold-border);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--gold-light);
      letter-spacing: 0.02em;
      line-height: 1.55;
    }
    .tagline-hero strong { color: var(--gold); font-weight: 700; }

    /* T-16 (2026-04-22): couples 카드 "바로 시작" 뱃지 — 5종 균등 유지하되 즉시 시작 표시 */
    .pack-card-instant { border-color: var(--gold); }
    .pack-badge-instant {
      position: absolute;
      top: 10px; right: 12px;
      display: inline-block;
      font-family: var(--font-body);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--navy);
      background: var(--gold);
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 700;
    }

    /* 전체 팩 보기 토글 */
    .pack-expand-btn {
      width: 100%;
      background: transparent;
      border: 1px dashed var(--gold-border);
      color: var(--gold-light);
      border-radius: 10px;
      padding: 11px;
      font-family: inherit;
      font-size: 12.5px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .pack-expand-btn:hover { background: var(--gold-dim-2); }
    #allPackGrid { margin-top: 10px; }
    #allPackGrid[hidden] { display: none; }

    /* 선택 완료 후 펼쳐지는 설정 영역 */
    #packSetup {
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
    }
    #packSetup[hidden] { display: none; }

    /* 모임 카드 — 시리즈별 섹션 그루핑 + 섹션 내 2x2 grid */
    .pack-grid { display: flex; flex-direction: column; gap: 26px; }
    .pack-group-title {
      font-family: var(--font-body);
      font-size: 11px;
      color: var(--gold-light);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin: 0 0 10px 2px;
      font-weight: 600;
      display: flex; align-items: center; gap: 10px;
    }
    .pack-group-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(212,168,67,0.28), transparent);
    }
    .pack-group-subtitle {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11.5px;
      color: var(--text-muted);
      letter-spacing: 0;
      text-transform: none;
      margin: -6px 0 10px 2px;
      font-weight: 400;
    }
    .pack-group-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (max-width: 380px) {
      .pack-group-grid { grid-template-columns: 1fr; }
    }

    /* 확인 화면 (4개 모임 클릭 시) */
    #confirmScreen[hidden] { display: none; }
    .confirm-head { text-align: center; margin-bottom: 18px; }
    .confirm-icon { font-size: 32px; line-height: 1; margin-bottom: 6px; }
    .confirm-title {
      font-family: var(--font-heading);
      font-size: 20px; font-weight: 600; color: var(--white);
      margin-bottom: 4px;
    }
    .confirm-desc { font-size: 13.5px; color: var(--text-muted); line-height: 1.55; }
    .confirm-section-head {
      font-size: 11.5px; color: var(--gold); letter-spacing: 0.14em;
      text-transform: uppercase; font-weight: 600;
      margin: 24px 0 12px;
    }
    .meeting-time-row {
      margin: 18px 0 4px;
      padding: 14px 14px 12px;
      background: rgba(212,168,67,0.05);
      border: 1px solid rgba(212,168,67,0.18);
      border-radius: 12px;
    }
    .meeting-time-label {
      display: block;
      font-size: 12.5px;
      color: var(--gold-light);
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }
    .meeting-time-label .opt-hint { color: var(--text-muted); font-size: 11px; font-weight: 400; margin-left: 4px; }
    .meeting-time-input {
      width: 100%;
      padding: 9px 12px;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--gold-border);
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
    }
    .meeting-time-input::-webkit-calendar-picker-indicator {
      /* 어두운 배경 위에 잘 보이도록 골드 톤으로 강조 + opacity 1 */
      filter: invert(78%) sepia(31%) saturate(545%) hue-rotate(2deg) brightness(95%) contrast(91%);
      opacity: 1;
      cursor: pointer;
      width: 22px; height: 22px;
      padding: 0 4px;
    }
    .meeting-time-input { color-scheme: dark; }
    .meeting-time-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.5;
    }
    .confirm-features {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    .confirm-features li {
      font-size: 13.5px; color: var(--text); line-height: 1.55;
      padding-left: 22px; position: relative;
    }
    .confirm-features li::before {
      content: '✓'; position: absolute; left: 0;
      color: #7ee8a2; font-weight: 700;
    }
    .confirm-actions {
      display: flex; gap: 10px; margin-top: 28px;
    }
    .confirm-actions .btn-primary,
    .confirm-actions .btn-secondary {
      flex: 1; padding: 15px;
      border-radius: 12px;
      font-size: 14.5px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      letter-spacing: 0.04em;
      transition: transform 0.15s, box-shadow 0.2s;
      border: none;
    }
    .confirm-actions .btn-primary {
      background: linear-gradient(135deg, var(--gold), #a07828);
      color: var(--navy);
      box-shadow: 0 4px 18px rgba(212,168,67,0.25);
    }
    .confirm-actions .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,168,67,0.35); }
    .confirm-actions .btn-secondary {
      background: transparent;
      border: 1px solid var(--gold-border);
      color: var(--gold-light);
    }
    .confirm-actions .btn-secondary:hover { background: var(--gold-dim-2); border-color: var(--gold); }
    .pack-card {
      background: var(--navy-light);
      border: 1.5px solid var(--input-border);
      border-radius: 14px;
      padding: 16px 16px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      font-family: inherit;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }
    .pack-card:hover { border-color: var(--gold); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(212,168,67,0.15); }
    .pack-card:active { transform: scale(0.98); }
    /* featured 강조는 폐기 — 모든 카드 동일 크기·톤 */
    .pack-card .pack-head { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .pack-card .pack-icon { font-size: 22px; line-height: 1; flex-shrink: 0; }
    .pack-card .pack-title { font-size: 14px; font-weight: 700; color: var(--white); letter-spacing: 0; word-break: keep-all; line-height: 1.3; }
    .pack-card .pack-desc {
      font-size: 12.5px;
      color: var(--text-muted);
      line-height: 1.55;
    }
    /* T-22 (2026-04-22): 카드 하단 examples 칩 — 실제 모임 예시 3개 */
    .pack-card .pack-examples {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 8px;
    }
    .pack-card .pack-ex-chip {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface-sunk, rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.06);
      padding: 4px 8px;
      border-radius: 999px;
      letter-spacing: 0.02em;
      line-height: 1.3;
    }
    .pack-card .pack-features {
      list-style: none;
      padding: 0; margin: 4px 0 0;
      display: flex; flex-direction: column;
      gap: 5px;
    }
    .pack-card .pack-features li {
      font-size: 12.5px;
      color: var(--text-muted);
      letter-spacing: 0.01em;
      padding-left: 20px;
      position: relative;
      line-height: 1.5;
    }
    .pack-card .pack-features li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: #7ee8a2;
      font-weight: 700;
    }
    /* couples hero 안 features (동일 톤) */
    .pack-card .pack-cta {
      position: absolute; bottom: 12px; right: 14px;
      font-size: 16px; color: var(--gold-light);
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .pack-card:hover .pack-cta { opacity: 1; transform: translateX(2px); }

    .pack-loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 26px 0;
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), #a07828);
      color: var(--navy);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 18px rgba(212,168,67,0.25);
      font-family: inherit;
    }
    .submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,168,67,0.35); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }

    .error-msg {
      font-size: 13px;
      color: var(--danger);
      text-align: center;
      margin-top: 14px;
      min-height: 18px;
    }

    .required-mark { color: var(--gold); margin-left: 3px; }

    /* ── Focus visible (A11y) ── */
    button:focus-visible, input:focus-visible, a:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    /* ── Mobile (≤480px) ── */
    @media (max-width: 480px) {
      .container { padding: 0 16px; }
      .top-nav { padding: 16px 0 0; }
      .logo { font-size: 28px; padding: 22px 0 4px; }
      .welcome { font-size: 13px; margin-bottom: 12px; }
      .card { padding: 26px 20px; border-radius: 18px; }
      .section-title { font-size: 20px; }
      .section-sub { font-size: 12.5px; }
      .tagline-hero { padding: 12px 14px; font-size: 12px; }
      /* 모임 유형은 2열 고정 — 4열로 벌리지 않음 */
      .type-options { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .type-btn { font-size: 12.5px; padding: 11px 8px; }
      input[type="text"] { padding: 13px 14px; font-size: 14.5px; }
      .qcount-value { font-size: 14px; min-width: 58px; }
      .submit-btn { padding: 15px; font-size: 14.5px; }
      .field-group { margin-bottom: 20px; }
    }

    .display-fields-row {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 6px;
    }
    .df-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 13px;
      border: 1px solid var(--gold-border, rgba(212,168,67,0.35));
      border-radius: 18px;
      font-size: 13px;
      cursor: pointer;
      background: rgba(212,168,67,0.06);
      color: var(--white-dim, #e8e8e8);
      transition: background 0.15s, border-color 0.15s;
    }
    .df-chip input { width: 14px; height: 14px; accent-color: var(--gold, #d4a843); cursor: pointer; }
    .df-chip:has(input:checked) {
      background: rgba(212,168,67,0.2);
      border-color: var(--gold, #d4a843);
      color: var(--gold-light, #e8b84b);
    }

    /* TV·프레젠테이션 진입 — 모바일(≤768px) 에선 숨김. 큰 화면 기기(노트북·TV) 전용 */
    @media (max-width: 768px) {
      #tvEntry { display: none !important; }
    }
  </style>
  <script src="/sentry-init.js" data-page="create" defer></script>
</head>
<body>
  <h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">ntable — 새 모임 만들기</h1>
  <header class="app-header">
    <div class="nav-inner">
      <a href="/" class="h-brand">ntable</a>
    </div>
  </header>

  <div class="container">
    <div class="welcome" id="welcomeMsg">어떤 자리인가요?</div>

    <!-- 화면 1: 모임 선택 -->
    <div class="card" id="selectScreen">
      <!-- T-16 (2026-04-22): 5종 균등 카드. 둘이서는 "바로 시작" 뱃지로 1-tap 경로 표시. -->
      <div class="pack-grid" id="packGrid" data-twe></div>
    </div>

    <!-- TV 페어링 진입점 (Case 2 전용: 폰으로 조작 + 외부 화면에 표시) -->
    <!-- Case 1 (큰 화면 단독)은 여기 안 들어오고 일반 방 생성 플로우 그대로 타면 host.html 이 큰 레이아웃으로 렌더됨 -->
    <div id="tvEntry" style="margin: 22px auto 0; text-align: center; max-width: 380px;">
      <a href="/tv" style="color: var(--gold); font-size: 13.5px; text-decoration: none; display: inline-block; padding: 10px 16px; border: 1px solid var(--gold-border); border-radius: 999px; letter-spacing: 0.01em; background: var(--gold-dim-2);">
        📺 외부 화면(TV·프로젝터)에 결과만 띄우기 →
      </a>
      <div style="margin-top: 8px; font-size: 11.5px; color: var(--text-dim); line-height: 1.5;">

    function renderRoomCard(kit) {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'pack-card' + (kit.id === 'couples' ? ' pack-card-instant' : '');
      card.dataset.packId = kit.id;
      // T-16 (2026-04-22): couples 카드만 "바로 시작" 뱃지 — 확인 화면 스킵, 즉시 생성
      const instantBadge = kit.id === 'couples' ? '<span class="pack-badge-instant">바로 시작</span>' : '';
      const examplesHtml = Array.isArray(kit.examples) && kit.examples.length
        ? `<div class="pack-examples">${kit.examples.slice(0, 3).map(ex => `<span class="pack-ex-chip">${escHtml(ex)}</span>`).join('')}</div>`
        : '';
      card.innerHTML = `
        ${instantBadge}
        <span class="pack-cta" aria-hidden="true">→</span>
        <div class="pack-head">
          <span class="pack-icon">${escHtml(kit.icon)}</span>
          <span class="pack-title">${escHtml(kit.title)}</span>
        </div>
        <div class="pack-desc">${escHtml(kit.desc)}</div>
        ${examplesHtml}
      `;
      // couples 는 확인 화면 스킵 후 즉시 생성. 나머지는 확인 화면 경유.
      card.addEventListener('click', () => {
        if (kit.id === 'couples') createRoomFromKit(kit);
        else showConfirmScreen(kit);
      });
      return card;
    }

    function loadPacks() {
      const grid = document.getElementById('packGrid');
      grid.innerHTML = '';
      const items = ROOM_KITS.slice();
      // 시리즈 그루핑 — seriesLabel 없는 팩은 "빠른 시작" 그룹으로
      const groups = new Map();
      const QUICK = '빠른 시작';
      groups.set(QUICK, []);
      for (const k of items) {
        const label = k.seriesLabel || QUICK;
        if (!groups.has(label)) groups.set(label, []);
        groups.get(label).push(k);
      }
      // 시리즈별 서브타이틀 (ntable Nights/Plays 구조 노출용)
      const seriesSubtitles = {
        'ntable Nights': '대화·창작 소모임',
        'ntable Plays':  '음악 공유·연주 대회',
        'ntable Draws':  '시·그림 창작 대회',
        'ntable Pitches':'아이디어·포폴 대회',
        'ntable Games':  '운동 기록 대회',
      };
      for (const [label, list] of groups) {
        if (list.length === 0) continue;
        const section = document.createElement('section');
        section.className = 'pack-group';
        const subtitle = seriesSubtitles[label] ? `<div class="pack-group-subtitle">${escHtml(seriesSubtitles[label])}</div>` : '';
        section.innerHTML = `<h3 class="pack-group-title">${escHtml(label)}</h3>${subtitle}<div class="pack-group-grid"></div>`;
        const gg = section.querySelector('.pack-group-grid');
        list.forEach(kit => gg.appendChild(renderRoomCard(kit)));
        grid.appendChild(section);
      }
    }

    // 화면 전환
    let _pendingKit = null;
    function showConfirmScreen(kit) {
      _pendingKit = kit;
      document.getElementById('confirmIcon').textContent = kit.icon;
      document.getElementById('confirmTitle').textContent = kit.title;
      // 화면 2의 desc는 detailed 우선 (화면 1과 동어반복 방지)
      document.getElementById('confirmDesc').textContent = kit.detailedDesc || kit.desc;
      const ul = document.getElementById('confirmFeatures');
      ul.innerHTML = (kit.features || []).map(f => `<li>${escHtml(f)}</li>`).join('');
      document.getElementById('selectScreen').hidden = true;
      document.getElementById('confirmScreen').hidden = false;
      // welcome·TV 진입점은 화면 1 전용 — 화면 2에서는 숨김
      const wm = document.getElementById('welcomeMsg');
      if (wm) wm.hidden = true;
      const tv = document.getElementById('tvEntry');
      if (tv) tv.hidden = true;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function showSelectScreen() {
      document.getElementById('confirmScreen').hidden = true;
      document.getElementById('selectScreen').hidden = false;
      const wm = document.getElementById('welcomeMsg');
      if (wm) wm.hidden = false;
      const tv = document.getElementById('tvEntry');
      if (tv) tv.hidden = false;
      _pendingKit = null;
    }
    document.getElementById('confirmBackBtn').addEventListener('click', showSelectScreen);
    document.getElementById('confirmCreateBtn').addEventListener('click', () => {
      if (_pendingKit) createRoomFromKit(_pendingKit);
    });

    async function createRoomFromKit(kit) {
      const errMsg = document.getElementById('errorMsg');
      errMsg.textContent = '';
      const d = new Date();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const title = `${kit.title} · ${mm}.${dd}`;
      const merged = { ...kit.defaults };
      // 모임 시각 (선택)
      const meetingAtInput = document.getElementById('meetingAtInput');
      const meeting_at = meetingAtInput && meetingAtInput.value ? new Date(meetingAtInput.value).toISOString() : null;
      try {
        const res = await fetch('/api/rooms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uuid, title, pack_id: kit.id, ...merged, meeting_at })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '모임 생성 실패');
        // T-02 (2026-04-21): 모임장은 join wizard 우회 — 호스트 화면으로 직행. 프로필 입력은 host.html '내 정보 수정' 모달에서.
        window.location.href = `/room/${data.room_code}/host`;
      } catch (e) {
        errMsg.textContent = e.message || '모임 생성 중 오류';
      }
    }

    async function init() {
      uuid = localStorage.getItem('demo_uuid');
      if (!uuid) {
        uuid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
          : ('u-' + Math.random().toString(36).slice(2) + '-' + Date.now().toString(36));
        try { localStorage.setItem('demo_uuid', uuid); } catch (_) {}
      }
      // 실명·이메일 노출 0 — welcome은 generic 유지. 헤더 토글이 로그인 상태 표현.
      loadPacks();
    }
