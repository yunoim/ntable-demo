<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모임 만들기 · ntable</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0c0c0e;
      color: #f0ede8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0 0 60px 0;
    }
    .container {
      width: 100%;
      max-width: 480px;
      padding: 0 24px;
    }
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 0;
    }
    .top-nav .logout-btn {
      background: transparent;
      border: 1px solid #2a2a30;
      color: #9a9690;
      border-radius: 16px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .top-nav .logout-btn:hover {
      color: #f0ede8;
      border-color: #4a4a54;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #e8c97e;
      letter-spacing: 0.08em;
      text-align: center;
      padding: 20px 0 8px;
    }
    .welcome {
      font-size: 13px;
      color: #9a9690;
      text-align: center;
      margin-bottom: 36px;
    }
    .welcome span {
      color: #f0ede8;
      font-weight: 600;
    }
    .card {
      background: #16161a;
      border-radius: 16px;
      padding: 28px 24px;
      border: 1px solid #2a2a30;
    }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #f0ede8;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #9a9690;
      margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      background: #0c0c0e;
      border: 1px solid #2a2a30;
      border-radius: 10px;
      color: #f0ede8;
      font-size: 15px;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #e8c97e;
    }
    input[type="text"]::placeholder {
      color: #3a3a42;
    }
    .char-count {
      font-size: 11px;
      color: #3a3a42;
      text-align: right;
      margin-top: 6px;
    }
    .field-group {
      margin-bottom: 24px;
    }
    .role-label {
      font-size: 13px;
      color: #9a9690;
      margin-bottom: 10px;
    }
    .role-options {
      display: flex;
      gap: 10px;
    }
    .role-btn {
      flex: 1;
      background: #0c0c0e;
      border: 1px solid #2a2a30;
      border-radius: 10px;
      color: #9a9690;
      font-size: 13px;
      padding: 12px 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      line-height: 1.4;
    }
    .role-btn:hover {
      border-color: #4a4a54;
      color: #f0ede8;
    }
    .role-btn.selected {
      border-color: #e8c97e;
      background: rgba(232, 201, 126, 0.08);
      color: #e8c97e;
    }
    .role-btn .role-icon {
      font-size: 20px;
      display: block;
      margin-bottom: 4px;
    }
    .divider {
      height: 1px;
      background: #2a2a30;
      margin: 24px 0;
    }
    .submit-btn {
      width: 100%;
      background: #e8c97e;
      color: #0c0c0e;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      padding: 15px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .submit-btn:hover {
      opacity: 0.9;
    }
    .submit-btn:active {
      transform: scale(0.98);
    }
    .submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .error-msg {
      font-size: 13px;
      color: #e85c5c;
      text-align: center;
      margin-top: 12px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-nav">
      <span style="color:#9a9690;font-size:12px;" id="topNavUser"></span>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
    <div class="logo">ntable</div>
    <div class="welcome" id="welcomeMsg">로딩 중...</div>

    <div class="card">
      <div class="section-title">새 모임 만들기</div>

      <div class="field-group">
        <label for="titleInput">모임 제목 <span style="color:#e8c97e">*</span></label>
        <input
          type="text"
          id="titleInput"
          placeholder="예: 6월 네트워킹 모임"
          maxlength="100"
        />
        <div class="char-count"><span id="charCount">0</span> / 100</div>
      </div>

      <div class="field-group">
        <div class="role-label">호스트 역할 <span style="color:#e8c97e">*</span></div>
        <div class="role-options">
          <button class="role-btn" data-role="host_only" onclick="selectRole('host_only')">
            <span class="role-icon">🎤</span>
            진행만 할게요
          </button>
          <button class="role-btn" data-role="participant" onclick="selectRole('participant')">
            <span class="role-icon">🙋</span>
            저도 참여할게요
          </button>
        </div>
      </div>

      <div class="divider"></div>

      <button class="submit-btn" id="createBtn" onclick="createRoom()" disabled>
        모임 만들기
      </button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <script>
    let uuid = null;
    let selectedRole = null;

    async function init() {
      uuid = localStorage.getItem('demo_uuid');
      if (!uuid) {
        window.location.href = '/';
        return;
      }
      try {
        const res = await fetch(`/api/me?uuid=${uuid}`);
        if (!res.ok) {
          // uuid 무효 → localStorage 초기화 후 로그인으로
          localStorage.removeItem('demo_uuid');
          window.location.href = '/';
          return;
        }
        const data = await res.json();
        document.getElementById('welcomeMsg').innerHTML =
          `안녕하세요, <span>${data.nickname}</span>님! 지금 바로 모임을 열어보세요.`;
        document.getElementById('topNavUser').textContent = `@${data.nickname}`;
      } catch {
        // 네트워크 오류 등 — 튕기지 않고 그냥 표시
        document.getElementById('welcomeMsg').textContent = '모임을 열어보세요.';
      }
    }

    function logout() {
      if (!confirm('로그아웃하시겠어요?')) return;
      localStorage.removeItem('demo_uuid');
      window.location.href = '/';
    }

    function selectRole(role) {
      selectedRole = role;
      document.querySelectorAll('.role-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.role === role);
      });
      checkReady();
    }

    const titleInput = document.getElementById('titleInput');
    const charCount = document.getElementById('charCount');
    titleInput.addEventListener('input', () => {
      charCount.textContent = titleInput.value.length;
      checkReady();
    });

    function checkReady() {
      const ready = titleInput.value.trim().length > 0 && selectedRole !== null;
      document.getElementById('createBtn').disabled = !ready;
    }

    async function createRoom() {
      const title = titleInput.value.trim();
      if (!title || !selectedRole) return;

      const btn = document.getElementById('createBtn');
      const errMsg = document.getElementById('errorMsg');
      btn.disabled = true;
      btn.textContent = '생성 중...';
      errMsg.textContent = '';

      try {
        const res = await fetch('/api/rooms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uuid, title, host_role: selectedRole })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '방 생성 실패');
        window.location.href = `/room/${data.room_code}/host`;
      } catch (err) {
        errMsg.textContent = err.message;
        btn.disabled = false;
        btn.textContent = '모임 만들기';
      }
    }

    init();
  </script>
</body>
</html>
