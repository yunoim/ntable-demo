<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1e">
  <meta name="color-scheme" content="only dark">
  <link rel="stylesheet" href="/theme-lock.css">
  <script src="/oauth-redirect.js"></script>
  <script src="/auth-header.js" defer></script>
  <script src="/pending-reveals.js" defer></script>
  <title>모임 만들기 · ntable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Navy */
      --navy:        #0a0f1e;
      --navy-light:  #0f1628;
      --navy-mid:    #141d35;
      /* Surfaces */
      --surface:     #141d35;
      --surface-2:   #1a2442;
      --surface-3:   #223056;
      /* Gold (landing 기준) */
      --gold:        #d4a843;
      --gold-light:  #f0ca60;
      --gold-dim:    rgba(212,168,67,0.18);
      --gold-dim-2:  rgba(212,168,67,0.08);
      --gold-border: rgba(212,168,67,0.35);
      /* Text */
      --white:       #f5f2ec;
      --white-dim:   rgba(245,242,236,0.88);
      --white-muted: rgba(245,242,236,0.72);
      --text:        #ddd5bc;
      --text-muted:  rgba(216,208,187,0.78);
      --text-dim:    rgba(216,208,187,0.65);
      --subtext:     rgba(216,208,187,0.78);
      /* UI */
      --border:      rgba(255,255,255,0.14);
      --input-border:#5a6178;
      --placeholder: rgba(216,208,187,0.65);
      --danger:      #e87e7e;
      --success:     #7ee8a2;
      /* Motion */
      --radius:      10px;
      --radius-lg:   18px;
      --transition:  0.32s cubic-bezier(0.4,0,0.2,1);
    }

    body {
      background: var(--navy);
      color: var(--text);
      font-family: 'DM Sans', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0 0 60px 0;
      padding-top: calc(82px + env(safe-area-inset-top));
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }

    /* 공통 헤더 — ntable.kr 랜딩 nav-inner 기준 62px 높이로 통일 */
    .app-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: calc(62px + env(safe-area-inset-top));
      padding: env(safe-area-inset-top) 24px 0;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(14,22,40,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(212,168,67,0.45);
    }
    .h-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 600;
      color: #d4a843; letter-spacing: 0.08em;
      text-decoration: none;
    }
    /* 로그인 토글·아코디언 UI 제거 (2026-04-20) — 공통 /auth-header.js pill 로 대체됨 */

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 20% 15%, rgba(212,168,67,0.08), transparent 55%),
        radial-gradient(circle at 80% 90%, rgba(80,100,180,0.05), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 460px;
      padding: 0 22px;
      position: relative;
      z-index: 1;
    }

    .welcome {
      padding-top: 14px;
      font-size: 13px;
      color: var(--subtext);
      text-align: center;
      margin-bottom: 36px;
      line-height: 1.6;
    }
    .welcome span { color: var(--gold-light); font-weight: 600; }

    .card {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 8px;
    }
    .section-sub {
      font-size: 13px;
      color: var(--subtext);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--subtext);
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
    }

    input[type="text"] {
      width: 100%;
      background: var(--navy-light);
      border: 1.5px solid var(--input-border);
      border-radius: 12px;
      color: var(--white);
      font-size: 15px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input[type="text"]:focus { border-color: var(--gold); }
    input[type="text"]::placeholder { color: var(--placeholder); opacity: 1; }

    .char-count {
      font-size: 11px;
      color: var(--subtext);
      text-align: right;
      margin-top: 8px;
      letter-spacing: 0.02em;
    }
    .field-group { margin-bottom: 24px; }

    .qcount-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .qcount-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: var(--input-border);
      border-radius: 2px;
      outline: none;
    }
    .qcount-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      border: 2px solid var(--navy);
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .qcount-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      border: 2px solid var(--navy);
    }
    .qcount-value {
      min-width: 70px;
      text-align: right;
      color: var(--gold-light);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.02em;
    }
    .qcount-hint {
      font-size: 11px;
      color: var(--subtext);
      margin-top: 8px;
      letter-spacing: 0.02em;
    }

    /* 상단 태그라인 */
    .tagline-hero {
      background: linear-gradient(135deg, rgba(212,168,67,0.10), rgba(212,168,67,0.03));
      border: 1px solid var(--gold-border);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--gold-light);
      letter-spacing: 0.02em;
      line-height: 1.55;
    }
    .tagline-hero strong { color: var(--gold); font-weight: 700; }

    /* 히어로 — 둘이서만 1-tap 경로 */
    .couples-hero {
      position: relative;
      background: linear-gradient(135deg, rgba(212,168,67,0.18), rgba(212,168,67,0.06));
      border: 1px solid var(--gold);
      border-radius: 18px;
      padding: 22px 22px 20px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .couples-hero::before {
      content: '';
      position: absolute;
      top: -40%; right: -20%;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(240,202,96,0.25), transparent 70%);
      pointer-events: none;
    }
    .couples-hero-eyebrow {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-light);
      background: rgba(10,15,30,0.4);
      border: 1px solid var(--gold-border);
      padding: 3px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    .couples-hero h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 6px;
      line-height: 1.3;
      position: relative;
    }
    .couples-hero p {
      font-size: 13px;
      color: var(--white-dim);
      margin-bottom: 14px;
      line-height: 1.6;
      position: relative;
    }
    .couples-hero-btn {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 11px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(212,168,67,0.35);
      position: relative;
    }
    .couples-hero-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(212,168,67,0.5); }
    .couples-hero-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* 섹션 헤더 */
    .group-section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 16px;
      font-size: 13px;
      color: var(--white-muted);
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    .group-section-header::before,
    .group-section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* 전체 팩 보기 토글 */
    .pack-expand-btn {
      width: 100%;
      background: transparent;
      border: 1px dashed var(--gold-border);
      color: var(--gold-light);
      border-radius: 10px;
      padding: 11px;
      font-family: inherit;
      font-size: 12.5px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .pack-expand-btn:hover { background: var(--gold-dim-2); }
    #allPackGrid { margin-top: 10px; }
    #allPackGrid[hidden] { display: none; }

    /* 선택 완료 후 펼쳐지는 설정 영역 */
    #packSetup {
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
    }
    #packSetup[hidden] { display: none; }

    /* 4개 모임 카드 — When 중심, 2x2 grid 동일 크기 */
    .pack-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (max-width: 380px) {
      .pack-grid { grid-template-columns: 1fr; }
    }

    /* 확인 화면 (4개 모임 클릭 시) */
    #confirmScreen[hidden] { display: none; }
    .confirm-head { text-align: center; margin-bottom: 18px; }
    .confirm-icon { font-size: 32px; line-height: 1; margin-bottom: 6px; }
    .confirm-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 600; color: var(--white);
      margin-bottom: 4px;
    }
    .confirm-desc { font-size: 13.5px; color: var(--text-muted); line-height: 1.55; }
    .confirm-section-head {
      font-size: 11.5px; color: var(--gold); letter-spacing: 0.14em;
      text-transform: uppercase; font-weight: 600;
      margin: 24px 0 12px;
    }
    .meeting-time-row {
      margin: 18px 0 4px;
      padding: 14px 14px 12px;
      background: rgba(212,168,67,0.05);
      border: 1px solid rgba(212,168,67,0.18);
      border-radius: 12px;
    }
    .meeting-time-label {
      display: block;
      font-size: 12.5px;
      color: var(--gold-light);
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }
    .meeting-time-label .opt-hint { color: var(--text-muted); font-size: 11px; font-weight: 400; margin-left: 4px; }
    .meeting-time-input {
      width: 100%;
      padding: 9px 12px;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--gold-border);
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
    }
    .meeting-time-input::-webkit-calendar-picker-indicator {
      /* 어두운 배경 위에 잘 보이도록 골드 톤으로 강조 + opacity 1 */
      filter: invert(78%) sepia(31%) saturate(545%) hue-rotate(2deg) brightness(95%) contrast(91%);
      opacity: 1;
      cursor: pointer;
      width: 22px; height: 22px;
      padding: 0 4px;
    }
    .meeting-time-input { color-scheme: dark; }
    .meeting-time-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.5;
    }
    .confirm-features {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    .confirm-features li {
      font-size: 13.5px; color: var(--text); line-height: 1.55;
      padding-left: 22px; position: relative;
    }
    .confirm-features li::before {
      content: '✓'; position: absolute; left: 0;
      color: #7ee8a2; font-weight: 700;
    }
    .confirm-actions {
      display: flex; gap: 10px; margin-top: 28px;
    }
    .confirm-actions .btn-primary,
    .confirm-actions .btn-secondary {
      flex: 1; padding: 15px;
      border-radius: 12px;
      font-size: 14.5px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      letter-spacing: 0.04em;
      transition: transform 0.15s, box-shadow 0.2s;
      border: none;
    }
    .confirm-actions .btn-primary {
      background: linear-gradient(135deg, var(--gold), #a07828);
      color: var(--navy);
      box-shadow: 0 4px 18px rgba(212,168,67,0.25);
    }
    .confirm-actions .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,168,67,0.35); }
    .confirm-actions .btn-secondary {
      background: transparent;
      border: 1px solid var(--gold-border);
      color: var(--gold-light);
    }
    .confirm-actions .btn-secondary:hover { background: var(--gold-dim-2); border-color: var(--gold); }
    .pack-card {
      background: var(--navy-light);
      border: 1.5px solid var(--input-border);
      border-radius: 14px;
      padding: 16px 16px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      font-family: inherit;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }
    .pack-card:hover { border-color: var(--gold); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(212,168,67,0.15); }
    .pack-card:active { transform: scale(0.98); }
    /* featured 강조는 폐기 — 모든 카드 동일 크기·톤 */
    .pack-card .pack-head { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .pack-card .pack-icon { font-size: 22px; line-height: 1; flex-shrink: 0; }
    .pack-card .pack-title { font-size: 14px; font-weight: 700; color: var(--white); letter-spacing: 0; word-break: keep-all; line-height: 1.3; }
    .pack-card .pack-desc {
      font-size: 12.5px;
      color: var(--text-muted);
      line-height: 1.55;
    }
    .pack-card .pack-features {
      list-style: none;
      padding: 0; margin: 4px 0 0;
      display: flex; flex-direction: column;
      gap: 5px;
    }
    .pack-card .pack-features li {
      font-size: 12.5px;
      color: var(--text-muted);
      letter-spacing: 0.01em;
      padding-left: 20px;
      position: relative;
      line-height: 1.5;
    }
    .pack-card .pack-features li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: #7ee8a2;
      font-weight: 700;
    }
    /* couples hero 안 features (동일 톤) */
    .couples-hero .pack-features { margin-top: 14px; }
    .couples-hero .pack-features li { color: var(--white-dim); }
    .pack-card .pack-cta {
      position: absolute; bottom: 12px; right: 14px;
      font-size: 16px; color: var(--gold-light);
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .pack-card:hover .pack-cta { opacity: 1; transform: translateX(2px); }

    /* ⚙️ 상세 설정 (파워유저용) */
    .advanced-toggle {
      margin-top: 18px;
      text-align: center;
    }
    .advanced-toggle button {
      background: transparent;
      border: 1px dashed rgba(212,168,67,0.3);
      color: var(--text-muted);
      padding: 9px 18px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.04em;
      transition: color 0.2s, border-color 0.2s;
    }
    .advanced-toggle button:hover { color: var(--gold); border-color: var(--gold-border); }
    .advanced-toggle button[aria-expanded="true"] .caret { transform: rotate(180deg); }
    .advanced-toggle .caret { display: inline-block; transition: transform 0.2s; margin-left: 4px; }
    .advanced-panel {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .advanced-panel[hidden] { display: none; }
    .advanced-panel .field-group { margin-bottom: 20px; }
    .advanced-dirty-hint {
      font-size: 11px;
      color: var(--gold-light);
      text-align: center;
      margin-top: 8px;
      letter-spacing: 0.02em;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .advanced-dirty-hint[data-dirty="true"] { opacity: 1; }
    .pack-loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 26px 0;
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), #a07828);
      color: var(--navy);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 18px rgba(212,168,67,0.25);
      font-family: inherit;
    }
    .submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,168,67,0.35); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }

    .error-msg {
      font-size: 13px;
      color: var(--danger);
      text-align: center;
      margin-top: 14px;
      min-height: 18px;
    }

    .required-mark { color: var(--gold); margin-left: 3px; }

    /* ── Focus visible (A11y) ── */
    button:focus-visible, input:focus-visible, a:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    /* ── Mobile (≤480px) ── */
    @media (max-width: 480px) {
      .container { padding: 0 16px; }
      .top-nav { padding: 16px 0 0; }
      .logo { font-size: 28px; padding: 22px 0 4px; }
      .welcome { font-size: 12.5px; margin-bottom: 28px; }
      .card { padding: 26px 20px; border-radius: 18px; }
      .section-title { font-size: 20px; }
      .section-sub { font-size: 12.5px; }
      .tagline-hero { padding: 12px 14px; font-size: 12px; }
      /* 모임 유형은 2열 고정 — 4열로 벌리지 않음 */
      .type-options { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .type-btn { font-size: 12.5px; padding: 11px 8px; }
      input[type="text"] { padding: 13px 14px; font-size: 14.5px; }
      .qcount-value { font-size: 14px; min-width: 58px; }
      .submit-btn { padding: 15px; font-size: 14.5px; }
      .field-group { margin-bottom: 20px; }
    }

    .display-fields-row {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 6px;
    }
    .df-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 13px;
      border: 1px solid var(--gold-border, rgba(212,168,67,0.35));
      border-radius: 18px;
      font-size: 13px;
      cursor: pointer;
      background: rgba(212,168,67,0.06);
      color: var(--white-dim, #e8e8e8);
      transition: background 0.15s, border-color 0.15s;
    }
    .df-chip input { width: 14px; height: 14px; accent-color: var(--gold, #d4a843); cursor: pointer; }
    .df-chip:has(input:checked) {
      background: rgba(212,168,67,0.2);
      border-color: var(--gold, #d4a843);
      color: var(--gold-light, #e8b84b);
    }
  </style>
  <script src="/sentry-init.js" data-page="create" defer></script>
</head>
<body>
  <h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">ntable — 새 모임 만들기</h1>
  <header class="app-header">
    <a href="/" class="h-brand">ntable</a>
  </header>

  <div class="container">
    <div class="welcome" id="welcomeMsg">어떤 자리인가요?</div>

    <!-- 화면 1: 모임 선택 -->
    <div class="card" id="selectScreen">
      <!-- 둘이서 hero (즉시 모임 생성, 확인 스킵) -->
      <div class="couples-hero" id="couplesHero">
        <span class="couples-hero-eyebrow">둘이서</span>
        <h3 style="font-size:19px;margin-bottom:14px;">친구 · 썸 · 커플 · 1:1 미팅</h3>
        <button type="button" class="couples-hero-btn" id="quickCouplesBtn">둘이서 시작하기</button>
      </div>

      <div class="group-section-header">아니면 여럿이서</div>

      <!-- 4개 모임 카드 (couples 제외) -->
      <div class="pack-grid" id="packGrid"></div>
    </div>

    <!-- 화면 2: 확인 화면 (4개 모임에서만) -->
    <div class="card" id="confirmScreen" hidden>
      <div class="confirm-head">
        <div class="confirm-icon" id="confirmIcon"></div>
        <div class="confirm-title" id="confirmTitle"></div>
        <div class="confirm-desc" id="confirmDesc"></div>
      </div>
      <div class="confirm-section-head">이런 순서로 진행돼요</div>
      <ul class="confirm-features" id="confirmFeatures"></ul>

      <!-- 모임 시각 (선택) -->
      <div class="meeting-time-row">
        <label for="meetingAtInput" class="meeting-time-label">📅 모임 시각 <span class="opt-hint">선택</span></label>
        <div style="position:relative;">
          <input type="datetime-local" id="meetingAtInput" class="meeting-time-input" style="padding-right:44px;" />
          <span aria-hidden="true" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:18px;color:#e8b84b;pointer-events:none;">📅</span>
        </div>
        <div class="meeting-time-hint">QR·카카오 공유 메시지에 표시돼요. 비워두면 노출 안 됨.</div>
      </div>

      <!-- ⚙ 상세 설정 — 전면 제거 (2026-04-19 spec)
           - 카드 표시 정보·출생연도 표시·지역 세부·사진 업로드 → join wizard 2/8로 이동
           - 탐구 문항 수·자유대화·호스트 역할·화면 형태 → 호스트 대시보드 차후 구현
           - 현재는 5개 모임 카드별 default 그대로 사용 -->
      <div class="advanced-toggle" hidden style="display:none !important;">
        <button type="button" id="advancedBtn" aria-expanded="false">⚙</button>
        <div class="advanced-dirty-hint" id="advancedDirtyHint" data-dirty="false"></div>
      </div>

      <div class="confirm-actions">
        <button type="button" class="btn-primary" id="confirmCreateBtn">모임 열기</button>
      </div>
      <div style="text-align:center;margin-top:10px;font-size:11.5px;color:var(--text-dim);letter-spacing:0.02em;">QR·참여코드를 바로 받아요</div>
      <div style="text-align:center;margin-top:18px;">
        <button type="button" id="confirmBackBtn" style="background:none;border:none;color:var(--text-muted);font-size:12.5px;cursor:pointer;font-family:inherit;letter-spacing:0.02em;padding:6px 12px;">← 다른 모임 보기</button>
      </div>
      <div class="advanced-panel" id="advancedPanel" hidden>
        <div class="field-group">
          <label>탐구 문항 수</label>
          <div class="qcount-row">
            <input type="range" id="adv_qcount" class="qcount-slider" min="1" max="15" step="1" value="5" />
            <span class="qcount-value"><span id="adv_qcount_val">5</span>문항</span>
          </div>
          <div class="qcount-hint">짧은 아이스브레이크 1~3문항 · 본격 탐구 10~15문항</div>
        </div>

        <div class="field-group">
          <label>자유대화 구성</label>
          <div class="display-fields-row">
            <label class="df-chip"><input type="checkbox" id="adv_fc_timer" checked> ⏱ 타이머</label>
            <label class="df-chip"><input type="checkbox" id="adv_fc_chat"> 💬 익명채팅</label>
            <label class="df-chip"><input type="checkbox" id="adv_fc_topic" checked> 🃏 주제카드</label>
          </div>
          <div class="qcount-hint">타이머 체크 시 15분 default · 미체크 시 자유대화 타이머 없음</div>
        </div>

        <!-- 카드 표시 정보·출생연도 표시 방식은 join wizard 'display' step으로 이동 (호스트 전용) -->

        <div class="field-group">
          <label>호스트 역할</label>
          <div class="display-fields-row">
            <label class="df-chip"><input type="radio" name="adv_hostRole" value="participant" checked> 🙋 참여자로 참가</label>
            <label class="df-chip"><input type="radio" name="adv_hostRole" value="host_only"> 🎛️ 진행만</label>
          </div>
        </div>

        <div class="field-group">
          <label>호스트 화면 형태</label>
          <div class="display-fields-row">
            <label class="df-chip"><input type="radio" name="adv_displayMode" value="mobile" checked> 📱 모바일</label>
            <label class="df-chip"><input type="radio" name="adv_displayMode" value="presenter"> 🖥 큰 화면</label>
          </div>
        </div>

        <div class="field-group">
          <label>참가자 사진 업로드</label>
          <div class="display-fields-row">
            <label class="df-chip"><input type="radio" name="adv_photo" value="true" checked> 📷 허용</label>
            <label class="df-chip"><input type="radio" name="adv_photo" value="false"> 🚫 비허용</label>
          </div>
        </div>

        <div class="field-group">
          <label>지역 세부 표시</label>
          <div class="display-fields-row">
            <label class="df-chip"><input type="radio" name="adv_regionDetail" value="false" checked> 시·도만</label>
            <label class="df-chip"><input type="radio" name="adv_regionDetail" value="true"> 서울은 구까지</label>
          </div>
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <script>
    let uuid = null;
    // host_role 기본값 'participant' — 모임 생성 후 호스트 화면 설정 모달에서 토글 가능
    const DEFAULT_HOST_ROLE = 'participant';
    let selectedPack = null;
    let packs = [];

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // 5개 모임 카드 (Phase 1 확정 — 2026-04-19). 각 모임은 "바로 쓸 수 있는 완성 세트".
    // 자유대화 메타는 v1 표시용. 실제 server 적용은 백로그.
    const ROOM_KITS = [
      {
        id: 'couples', icon: '👫', title: '둘이서',
        desc: '친구 · 썸 · 커플 · 1:1 미팅',
        defaults: {
          question_count: 10,
          display_fields: ['birth_year', 'region', 'industry', 'interest'],
          birth_year_format: 'exact',
          host_role: 'participant', display_mode: 'mobile',
          photo_enabled: true, region_detail: false,
          free_chat_timer_minutes: 0, free_chat_chat_enabled: false, free_chat_topic_card_enabled: false,
        },
      },
      {
        id: 'icebreaker', icon: '🤝', title: '처음 만나는 사이',
        desc: '낯선 사람들과 첫 인사',
        detailedDesc: '간단한 5문항으로 어색함을 풀고, MVP 투표로 분위기를 마무리합니다.',
        features: [
          'QR 자동 입장 · 익명 닉네임',
          '참가자 카드 자동 표시',
          '5문항 A/B 투표 (답 변경 가능)',
          '자유대화 (타이머 10분 · 주제카드)',
          'MVP 투표',
          'AI 성향 카드',
        ],
        defaults: {
          question_count: 5,
          display_fields: ['birth_year', 'region', 'interest'],
          birth_year_format: 'decade_half',
          host_role: 'participant', display_mode: 'mobile',
          photo_enabled: true, region_detail: false,
          free_chat_timer_minutes: 10, free_chat_chat_enabled: false, free_chat_topic_card_enabled: true,
        },
      },
      {
        id: 'dating', icon: '💘', title: '소개팅·연애',
        desc: '호감도를 재미있게',
        detailedDesc: '10문항으로 서로를 탐구하고, 사랑의 작대기로 매칭. 양쪽 모두 입력하면 인스타가 공개됩니다.',
        features: [
          'QR 자동 입장 · 익명 닉네임',
          '참가자 카드 자동 표시',
          '10문항 A/B 투표 · 실시간 호환도',
          '자유대화 (타이머 15분 · 익명채팅 · 주제카드)',
          'MVP 투표',
          '사랑의 작대기 매칭 (사진·공통답변)',
          '인스타 상호 공개 (mutual)',
          'AI 성향 카드',
        ],
        defaults: {
          question_count: 10,
          display_fields: ['birth_year', 'region', 'interest'],
          birth_year_format: 'decade_half',
          host_role: 'participant', display_mode: 'mobile',
          photo_enabled: true, region_detail: false,
          free_chat_timer_minutes: 15, free_chat_chat_enabled: true, free_chat_topic_card_enabled: true,
        },
      },
      {
        id: 'friends-reunion', icon: '🍻', title: '오랜만의 만남',
        desc: '동창회 · 송년회 · 집들이',
        detailedDesc: '8문항으로 지금의 서로를 새로 발견하고, 라운드별 다수의견을 함께 봅니다.',
        features: [
          'QR 자동 입장 · 익명 닉네임',
          '참가자 카드 자동 표시',
          '8문항 A/B 투표',
          '자유대화 (타이머 20분 · 주제카드)',
          '탐구 결과 공개',
          'AI 성향 카드',
        ],
        defaults: {
          question_count: 8,
          display_fields: ['birth_year', 'region', 'interest'],
          birth_year_format: 'decade_half',
          host_role: 'participant', display_mode: 'mobile',
          photo_enabled: true, region_detail: false,
          free_chat_timer_minutes: 20, free_chat_chat_enabled: false, free_chat_topic_card_enabled: true,
        },
      },
      {
        id: 'teambuilding', icon: '💼', title: '팀·회사',
        desc: '팀빌딩 · 신입 OT · 워크숍',
        detailedDesc: '업무 스타일 10문항으로 팀원의 성향을 파악하고, MVP·페어·결과 카드까지 한 번에.',
        features: [
          'QR 자동 입장 · 익명 닉네임',
          '참가자 카드 자동 표시',
          '10문항 A/B 투표',
          '자유대화 (타이머 20분 · 주제카드)',
          '매칭 페어 공개',
          'MVP 투표',
          '탐구 결과 공개',
          'AI 성향 카드',
        ],
        defaults: {
          question_count: 10,
          display_fields: ['birth_year', 'region', 'interest'],
          birth_year_format: 'decade_half',
          host_role: 'participant', display_mode: 'mobile',
          photo_enabled: true, region_detail: false,
          free_chat_timer_minutes: 15, free_chat_chat_enabled: false, free_chat_topic_card_enabled: true,
        },
      },
    ];

    function renderRoomCard(kit) {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'pack-card';
      card.dataset.packId = kit.id;
      card.innerHTML = `
        <span class="pack-cta" aria-hidden="true">→</span>
        <div class="pack-head">
          <span class="pack-icon">${escHtml(kit.icon)}</span>
          <span class="pack-title">${escHtml(kit.title)}</span>
        </div>
        <div class="pack-desc">${escHtml(kit.desc)}</div>
      `;
      // 4개 모임은 확인 화면 거침. couples는 hero에서 직접 처리.
      card.addEventListener('click', () => showConfirmScreen(kit));
      return card;
    }

    function loadPacks() {
      const grid = document.getElementById('packGrid');
      grid.innerHTML = '';
      ROOM_KITS.filter(k => k.id !== 'couples').forEach(kit => grid.appendChild(renderRoomCard(kit)));
    }

    // 둘이서 hero — 즉시 모임 생성 (확인 스킵)
    document.getElementById('quickCouplesBtn').addEventListener('click', () => {
      const couples = ROOM_KITS.find(k => k.id === 'couples');
      if (couples) createRoomFromKit(couples);
    });

    // 화면 전환
    let _pendingKit = null;
    function showConfirmScreen(kit) {
      _pendingKit = kit;
      document.getElementById('confirmIcon').textContent = kit.icon;
      document.getElementById('confirmTitle').textContent = kit.title;
      // 화면 2의 desc는 detailed 우선 (화면 1과 동어반복 방지)
      document.getElementById('confirmDesc').textContent = kit.detailedDesc || kit.desc;
      const ul = document.getElementById('confirmFeatures');
      ul.innerHTML = (kit.features || []).map(f => `<li>${escHtml(f)}</li>`).join('');
      document.getElementById('selectScreen').hidden = true;
      document.getElementById('confirmScreen').hidden = false;
      // welcome 메시지는 화면 1 전용 — 화면 2에서는 숨김
      const wm = document.getElementById('welcomeMsg');
      if (wm) wm.hidden = true;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function showSelectScreen() {
      document.getElementById('confirmScreen').hidden = true;
      document.getElementById('selectScreen').hidden = false;
      const wm = document.getElementById('welcomeMsg');
      if (wm) wm.hidden = false;
      _pendingKit = null;
      const panel = document.getElementById('advancedPanel');
      const btn = document.getElementById('advancedBtn');
      if (panel) panel.hidden = true;
      if (btn) btn.setAttribute('aria-expanded', 'false');
    }
    document.getElementById('confirmBackBtn').addEventListener('click', showSelectScreen);
    document.getElementById('confirmCreateBtn').addEventListener('click', () => {
      if (_pendingKit) createRoomFromKit(_pendingKit);
    });

    async function createRoomFromKit(kit) {
      const errMsg = document.getElementById('errorMsg');
      errMsg.textContent = '';
      const d = new Date();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const title = `${kit.title} · ${mm}.${dd}`;
      // dirty tracking: 사용자가 ⚙ 상세 설정에서 변경한 옵션만 override
      const merged = { ...kit.defaults, ...advancedOverrides };
      // 모임 시각 (선택)
      const meetingAtInput = document.getElementById('meetingAtInput');
      const meeting_at = meetingAtInput && meetingAtInput.value ? new Date(meetingAtInput.value).toISOString() : null;
      try {
        const res = await fetch('/api/rooms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uuid, title, pack_id: kit.id, ...merged, meeting_at })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '모임 생성 실패');
        window.location.href = `/room/${data.room_code}/join`;
      } catch (e) {
        errMsg.textContent = e.message || '모임 생성 중 오류';
      }
    }

    /* ⚙ 상세 설정 — dirty tracking */
    const advancedOverrides = {};
    const advancedDirtyHint = document.getElementById('advancedDirtyHint');
    function markDirty(key, value) {
      advancedOverrides[key] = value;
      advancedDirtyHint.dataset.dirty = 'true';
    }

    document.getElementById('advancedBtn').addEventListener('click', () => {
      const panel = document.getElementById('advancedPanel');
      const btn = document.getElementById('advancedBtn');
      const isHidden = panel.hidden;
      panel.hidden = !isHidden;
      btn.setAttribute('aria-expanded', isHidden ? 'true' : 'false');
    });

    // 슬라이더
    const advQ = document.getElementById('adv_qcount');
    const advQVal = document.getElementById('adv_qcount_val');
    advQ.addEventListener('input', () => {
      advQVal.textContent = advQ.value;
      markDirty('question_count', parseInt(advQ.value, 10));
    });

    // 자유대화 구성 chip
    const advFcTimer = document.getElementById('adv_fc_timer');
    const advFcChat = document.getElementById('adv_fc_chat');
    const advFcTopic = document.getElementById('adv_fc_topic');
    advFcTimer.addEventListener('change', () => markDirty('free_chat_timer_minutes', advFcTimer.checked ? 15 : 0));
    advFcChat.addEventListener('change', () => markDirty('free_chat_chat_enabled', advFcChat.checked));
    advFcTopic.addEventListener('change', () => markDirty('free_chat_topic_card_enabled', advFcTopic.checked));

    // 카드 표시 정보 (체크박스)
    document.querySelectorAll('input[data-adv-field]').forEach(cb => {
      cb.addEventListener('change', () => {
        const fields = Array.from(document.querySelectorAll('input[data-adv-field]:checked')).map(el => el.dataset.advField);
        markDirty('display_fields', fields);
      });
    });

    // 라디오 그룹 매핑
    const RADIO_MAP = {
      adv_birthFmt: 'birth_year_format',
      adv_hostRole: 'host_role',
      adv_displayMode: 'display_mode',
      adv_photo: 'photo_enabled',
      adv_regionDetail: 'region_detail',
    };
    Object.entries(RADIO_MAP).forEach(([radioName, key]) => {
      document.querySelectorAll(`input[name="${radioName}"]`).forEach(r => {
        r.addEventListener('change', () => {
          let v = r.value;
          if (key === 'photo_enabled') v = (v === 'true');
          else if (key === 'region_detail') v = (v === 'true');
          markDirty(key, v);
        });
      });
    });

    async function init() {
      uuid = localStorage.getItem('demo_uuid');
      if (!uuid) {
        uuid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
          : ('u-' + Math.random().toString(36).slice(2) + '-' + Date.now().toString(36));
        try { localStorage.setItem('demo_uuid', uuid); } catch (_) {}
      }
      // 실명·이메일 노출 0 — welcome은 generic 유지. 헤더 토글이 로그인 상태 표현.
      loadPacks();
    }

    /* 로컬 헤더 토글·아코디언 로직 제거 (2026-04-20) — 공통 /auth-header.js 가 인증 pill 주입 */

    // packSetup 폐기 (2026-04-19) — title/qcount/options 이벤트 리스너·createRoom 모두 createRoomFromPack 으로 대체.
    // 옛 createRoom() 함수 본체와 packSetup DOM 참조 코드는 모두 제거됨. 기획 결정 후 5/7 카드로 grid 재구성 예정.

    init();
  </script>
</body>
</html>
