<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<link rel="stylesheet" href="/theme-lock.css">
<link rel="stylesheet" href="/styles/tokens-tv.css">
<script src="/samsung-dark-warn.js" defer></script>
<script src="/twemoji-brand.js" defer></script>
<title>ntable Presenter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0e1628;
    color: #ffffff;
    font-family: var(--font-body);
  }
  .root {
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
  }

  /* Header */
  header {
    padding: 24px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(212,168,67,0.25);
    flex-shrink: 0;
  }
  .h-brand {
    font-family: var(--font-heading);
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: #d4a843;
  }
  .h-title {
    font-family: var(--font-heading);
    font-size: 36px;
    font-weight: 600;
    color: #ffffff;
    text-align: center;
  }
  .h-info {
    display: flex; gap: 24px;
    align-items: center;
    font-size: 16px;
    color: #c0c0c0;
  }
  .h-info strong { color: #e8b84b; font-size: 22px; }

  /* Main */
  main {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 48px;
    overflow: hidden;
  }

  /* Phase: waiting/intro */
  .waiting-grid {
    display: flex;
    gap: 56px;
    width: 100%; height: 100%;
    align-items: center;
    justify-content: center;
  }
  .qr-side {
    text-align: center;
    flex-shrink: 0;
  }
  .qr-side img {
    width: 320px; height: 320px;
    border-radius: 16px;
    background: #fff;
    padding: 12px;
    display: block;
  }
  .qr-side .room-code {
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 56px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: #e8b84b;
    margin-top: 24px;
  }
  .qr-side .qr-help {
    margin-top: 16px;
    font-size: 18px;
    color: #c0c0c0;
  }
  .qr-side .qr-help strong { color: #ffffff; }

  .members-side {
    flex: 1;
    display: flex; flex-direction: column;
    height: 100%;
  }
  .members-title {
    font-family: var(--font-heading);
    font-size: 30px;
    font-weight: 600;
    color: #ffffff;
    margin-bottom: 24px;
  }
  .members-title strong { color: #e8b84b; }
  /* T-10 (2026-04-22): TV 토큰 기반 — 4m 거리 가독성 + 참가자 수 자동 스케일 */
  .members-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--member-col-min, 22vw), 1fr));
    gap: clamp(16px, 1.4vw, 28px);
    overflow-y: auto;
    align-content: start;
  }
  .m-card {
    background: rgba(212,168,67,0.06);
    border: 1px solid rgba(212,168,67,0.35);
    border-radius: clamp(14px, 1vw, 20px);
    padding: clamp(14px, 1.4vw, 28px);
    text-align: center;
  }
  .m-avatar {
    width: var(--avatar-member, 140px);
    height: var(--avatar-member, 140px);
    margin: 0 auto clamp(10px, 0.8vw, 18px);
    border-radius: 50%;
    background: rgba(212,168,67,0.18);
    border: var(--avatar-ring, 4px solid var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(32px, 3.2vw, 56px);
    overflow: hidden;
  }
  .m-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: var(--avatar-crop, center 30%);
    aspect-ratio: var(--avatar-aspect, 1 / 1);
    display: block;
  }
  .m-avatar.has-photo { font-size: 0; padding: 0; background: transparent; }
  .m-name {
    font-family: var(--font-heading);
    font-size: var(--size-label, clamp(22px, 1.6vw, 34px));
    font-weight: 600;
    color: #ffffff;
    line-height: 1.2;
  }
  .m-meta {
    font-size: var(--size-caption, clamp(14px, 1.05vw, 20px));
    color: #c0c0c0;
    margin-top: 6px;
  }

  /* Phase: explore */
  .question-card {
    text-align: center;
    width: 100%;
    max-width: 1100px;
  }
  .q-num {
    font-size: 16px;
    letter-spacing: 0.3em;
    color: #d4a843;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .q-text {
    font-family: var(--font-heading);
    font-size: clamp(48px, 7vw, 96px);
    font-weight: 600;
    color: #ffffff;
    line-height: 1.25;
    margin-bottom: 56px;
  }
  .q-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }
  .q-opt {
    padding: 36px;
    background: rgba(212,168,67,0.08);
    border: 1px solid rgba(212,168,67,0.4);
    border-radius: 18px;
    position: relative;
    overflow: hidden;
  }
  .q-opt-label {
    font-family: var(--font-heading);
    font-size: 26px;
    font-weight: 600;
    color: #e8b84b;
    margin-bottom: 14px;
  }
  .q-opt-text {
    font-size: 28px;
    color: #ffffff;
    line-height: 1.4;
    margin-bottom: 24px;
  }
  .q-opt-bar {
    height: 14px;
    background: rgba(255,255,255,0.08);
    border-radius: 7px;
    overflow: hidden;
    position: relative;
  }
  .q-opt-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #d4a843, #e8b84b);
    transition: width 0.5s;
  }
  .q-opt-count {
    margin-top: 10px;
    font-size: 18px;
    color: #c0c0c0;
    text-align: right;
  }
  .q-opt-count strong { color: #e8b84b; font-size: 24px; }

  /* TV 익명 채팅 오버레이 (읽기 전용) */
  #tvChat {
    position: fixed;
    right: 28px; bottom: 84px;
    width: 340px;
    max-height: 42vh;
    display: none;
    flex-direction: column;
    gap: 8px;
    padding: 14px 16px;
    background: rgba(14,22,40,0.72);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(212,168,67,0.28);
    border-radius: 16px;
    overflow-y: auto;
    z-index: 50;
    pointer-events: none;
    font-family: var(--font-body);
  }
  body[data-phase="waiting"] #tvChat,
  body[data-phase="intro"] #tvChat,
  body[data-phase="free"] #tvChat { display: flex; }
  #tvChat.empty { display: none !important; }
  #tvChat .tv-chat-head {
    font-size: 11px; letter-spacing: 0.22em;
    color: #d4a843; text-transform: uppercase;
    margin-bottom: 2px; flex-shrink: 0;
  }
  #tvChat .tv-chat-msg {
    font-size: 17px; line-height: 1.45;
    color: #f5f2ec;
    padding: 8px 12px;
    background: rgba(212,168,67,0.08);
    border: 1px solid rgba(212,168,67,0.22);
    border-radius: 12px;
    animation: tvChatIn 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  #tvChat .tv-chat-msg .tv-chat-meta {
    font-size: 11px; color: rgba(245,242,236,0.55);
    margin-bottom: 4px; letter-spacing: 0.04em;
  }
  @keyframes tvChatIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Phase: free / generic message */
  .big-msg {
    text-align: center;
    max-width: 900px;
  }
  .big-msg .icon { font-size: 96px; margin-bottom: 24px; }
  .big-msg h1 {
    font-family: var(--font-heading);
    font-size: 64px;
    font-weight: 600;
    color: #ffffff;
    margin-bottom: 20px;
    line-height: 1.2;
  }
  .big-msg p {
    font-size: 24px;
    color: #c0c0c0;
    line-height: 1.6;
  }

  /* Phase: closing-mvp-result */
  .mvp-display {
    text-align: center;
  }
  .mvp-display .label {
    font-size: 18px;
    letter-spacing: 0.3em;
    color: #d4a843;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .mvp-display .photo {
    width: 280px; height: 280px;
    margin: 0 auto 32px;
    border-radius: 50%;
    background: rgba(212,168,67,0.12);
    border: 4px solid #d4a843;
    box-shadow: 0 0 60px rgba(212,168,67,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 96px;
    overflow: hidden;
  }
  .mvp-display .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .mvp-display .name {
    font-family: var(--font-heading);
    font-size: 72px;
    font-weight: 600;
    color: #ffffff;
    margin-bottom: 14px;
  }
  .mvp-display .sub {
    font-size: 22px;
    color: #c0c0c0;
  }

  /* Phase: closing-match-result */
  .pairs-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 24px;
    width: 100%;
    max-width: 1200px;
  }
  .pair {
    padding: 28px;
    background: rgba(212,168,67,0.08);
    border: 1px solid rgba(212,168,67,0.45);
    border-radius: 18px;
    text-align: center;
  }
  .pair.mutual { border-color: #e8b84b; box-shadow: 0 0 30px rgba(232,184,75,0.3); }
  .pair-type { font-size: 18px; color: #e8b84b; margin-bottom: 14px; font-weight: 600; }
  .pair-names {
    font-family: var(--font-heading);
    font-size: 32px;
    font-weight: 600;
    color: #ffffff;
  }
  .pair-names .heart { color: #ff8a8a; margin: 0 12px; }

  /* Footer */
  footer {
    padding: 16px 48px;
    border-top: 1px solid rgba(212,168,67,0.25);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 14px; color: #c0c0c0;
    flex-shrink: 0;
  }
  .progress {
    display: flex; gap: 12px; font-size: 13px;
  }
  .progress span {
    padding: 6px 14px;
    border-radius: 12px;
    border: 1px solid rgba(212,168,67,0.35);
    color: #c0c0c0;
  }
  .progress span.active {
    background: #d4a843;
    color: #0e1628;
    font-weight: 700;
    border-color: #d4a843;
  }
  .progress span.done { color: #e8b84b; }

  .conn-dot {
    display: inline-block;
    width: 8px; height: 8px; border-radius: 50%;
    background: #7ee8a2; margin-right: 6px;
    box-shadow: 0 0 8px rgba(126,232,162,0.5);
  }
  .conn-dot.dis { background: #ff8a8a; box-shadow: 0 0 8px rgba(255,138,138,0.5); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  main > * { animation: fadeUp 0.4s ease; }

  /* presenter 디테일: 카드 stagger 등장 + MVP/매칭 호흡 글로우 + bar shimmer */
  @keyframes barShimmer {
    0%   { background-position: -180% 0; }
    100% { background-position:  280% 0; }
  }
  .q-opt-bar-fill {
    background-image: linear-gradient(90deg, #d4a843 0%, #f0ca60 50%, #d4a843 100%);
    background-size: 220% 100%;
    animation: barShimmer 2.6s linear infinite;
  }
  @keyframes mvpGlowPulse {
    0%, 100% { box-shadow: 0 0 60px rgba(212,168,67,0.45); transform: scale(1); }
    50%      { box-shadow: 0 0 110px rgba(232,184,75,0.75); transform: scale(1.025); }
  }
  .mvp-display .photo {
    animation: fadeUp 0.5s ease, mvpGlowPulse 3.4s ease-in-out 0.5s infinite;
    transition: filter 1.2s cubic-bezier(0.4,0,0.2,1);
  }
  /* T-11 (2026-04-22): MVP 2-phase reveal — 3초 블러·카운트다운 → 해제 */
  .mvp-display { position: relative; }
  .mvp-display .name,
  .mvp-display .sub { transition: opacity 0.9s ease 0.4s; }
  .mvp-display.reveal-pending .photo { filter: blur(30px); }
  .mvp-display.reveal-pending .name,
  .mvp-display.reveal-pending .sub { opacity: 0; }
  .mvp-countdown {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-heading);
    font-size: var(--size-mega, clamp(96px, 12vw, 220px));
    font-weight: 700;
    color: var(--gold, #d4a843);
    text-shadow: 0 0 40px rgba(232,184,75,0.55);
    pointer-events: none;
    z-index: 2;
    line-height: 1;
  }
  .mvp-countdown.beat { animation: countdownBeat 1s ease; }
  @keyframes countdownBeat {
    0%   { transform: scale(1.5); opacity: 0; }
    30%  { transform: scale(1);   opacity: 1; }
    100% { transform: scale(0.7); opacity: 0; }
  }
  @keyframes pairGlowPulse {
    0%, 100% { box-shadow: 0 0 24px rgba(232,184,75,0.25); }
    50%      { box-shadow: 0 0 44px rgba(232,184,75,0.55); }
  }
  .pair.mutual { animation: pairGlowPulse 3s ease-in-out infinite; }

  @keyframes cardStagger {
    from { opacity: 0; transform: translateY(14px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .members-grid .m-card { animation: cardStagger 0.5s ease both; }
  .members-grid .m-card:nth-child(1) { animation-delay: 0.02s; }
  .members-grid .m-card:nth-child(2) { animation-delay: 0.06s; }
  .members-grid .m-card:nth-child(3) { animation-delay: 0.10s; }
  .members-grid .m-card:nth-child(4) { animation-delay: 0.14s; }
  .members-grid .m-card:nth-child(5) { animation-delay: 0.18s; }
  .members-grid .m-card:nth-child(6) { animation-delay: 0.22s; }
  .members-grid .m-card:nth-child(7) { animation-delay: 0.26s; }
  .members-grid .m-card:nth-child(8) { animation-delay: 0.30s; }
  .members-grid .m-card:nth-child(n+9) { animation-delay: 0.34s; }

  /* 다수 옵션 강조 — JS에서 .q-opt.major 추가 시 */
  .q-opt.major {
    border-color: #7ee8a2;
    box-shadow: 0 0 32px rgba(126,232,162,0.25);
  }
  .q-opt.major .q-opt-label::after {
    content: ' · 다수';
    color: #7ee8a2;
    font-size: 14px;
    letter-spacing: 0.18em;
    margin-left: 8px;
    font-family: var(--font-body);
    font-weight: 600;
  }
  /* 전원 일치(압도적) — major 위에 한 단계 강조 */
  .q-opt.sweep {
    border-color: #a8f5c1;
    box-shadow: 0 0 48px rgba(126,232,162,0.4);
    animation: sweepPulse 2.2s ease-in-out infinite;
  }
  .q-opt.sweep .q-opt-label::after { content: ' · 전원 일치'; }
  @keyframes sweepPulse {
    0%, 100% { box-shadow: 0 0 48px rgba(126,232,162,0.4); }
    50%      { box-shadow: 0 0 80px rgba(168,245,193,0.7); }
  }

  /* 탐구 인사이트 배너 — 투표 총원/응답률 */
  .q-insight {
    margin-top: 28px;
    font-size: 18px;
    color: #c0c0c0;
    letter-spacing: 0.04em;
    text-align: center;
  }
  .q-insight strong { color: #e8b84b; font-weight: 700; }
  .q-insight .split { color: #ff8a8a; font-weight: 700; }
  .q-insight .unan { color: #7ee8a2; font-weight: 700; }

  /* 매칭 결과 stagger + 인사이트 */
  .pairs-list .pair { animation: cardStagger 0.55s ease both; }
  .pairs-list .pair:nth-child(1) { animation-delay: 0.05s; }
  .pairs-list .pair:nth-child(2) { animation-delay: 0.15s; }
  .pairs-list .pair:nth-child(3) { animation-delay: 0.25s; }
  .pairs-list .pair:nth-child(4) { animation-delay: 0.35s; }
  .pairs-list .pair:nth-child(5) { animation-delay: 0.45s; }
  .pairs-list .pair:nth-child(6) { animation-delay: 0.55s; }
  .pairs-list .pair:nth-child(n+7) { animation-delay: 0.65s; }
  .match-insight {
    margin: 0 auto 32px;
    max-width: 900px;
    font-size: 20px;
    color: #c0c0c0;
    letter-spacing: 0.04em;
    text-align: center;
  }
  .match-insight .mutual-n { color: #ff8aaa; font-weight: 700; font-size: 24px; }
  .match-insight .rec-n   { color: #e8b84b; font-weight: 700; font-size: 24px; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<div class="root">
  <header data-twe>
    <div class="h-brand">ntable</div>
    <div class="h-title" id="hTitle">—</div>
    <div class="h-info">
      <span><span class="conn-dot" id="connDot"></span><span id="connText">연결됨</span></span>
      <span>참가자 <strong id="hMembers">0</strong></span>
      <span>모임 코드 <strong id="hRoom">—</strong></span>
    </div>
  </header>
  <main id="main" data-twe>
    <div class="big-msg"><div class="icon">⏳</div><h1>로딩 중…</h1></div>
  </main>
  <footer>
    <div>📺 큰 화면 모드 · 모임장은 모바일에서 진행</div>
    <div class="progress" id="progress">
      <span data-step="intro">소개</span>
      <span data-step="explore">탐구</span>
      <span data-step="free">자유대화</span>
      <span data-step="closing">마무리</span>
    </div>
  </footer>
  <!-- 읽기 전용 익명 채팅 오버레이 — waiting/intro/free 에서 최근 8건 노출 (입력창 없음) -->
  <aside id="tvChat" aria-hidden="true"></aside>
</div>

<script>
const path = location.pathname.match(/\/room\/([^/]+)/);
const ROOM_CODE = path ? path[1] : '';
const STATE = {
  ws: null,
  room: null,
  members: [],
  photos: {},
  intros: {},
  questions: [],
  currentQIdx: 0,
  voteCounts: {},   // question_id → { A, B }
  matchJson: null,
  mvp: null,
  currentPhase: 'waiting',
  qrUrl: null,
};

function escHtml(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function ageOf(year) { return year ? `${new Date().getFullYear() - year + 1}세` : ''; }
function formatBirthYear(year, fmt) {
  if (!year) return '';
  const age = new Date().getFullYear() - year + 1;
  if (fmt === 'decade_half') {
    if (age < 20) return '10대';
    if (age >= 60) return '60대+';
    const decade = Math.floor(age / 10) * 10;
    const half = age % 10;
    const label = half <= 3 ? '초' : half <= 6 ? '중' : '후';
    return `${decade}${label}`;
  }
  if (fmt === 'decade') {
    if (age < 20) return '10대';
    if (age < 30) return '20대';
    if (age < 40) return '30대';
    if (age < 50) return '40대';
    if (age < 60) return '50대';
    return '60대+';
  }
  return `${year}년생`;
}

async function init() {
  if (!ROOM_CODE) { renderError('모임 코드를 찾을 수 없어요'); return; }
  try {
    const r = await fetch(`/api/rooms/${ROOM_CODE}`);
    if (!r.ok) { renderError('모임 정보를 불러올 수 없어요. 새로고침하거나 잠시 후 다시 시도해주세요.'); return; }
    STATE.room = await r.json();
    document.getElementById('hTitle').textContent = STATE.room.title || ROOM_CODE;
    document.getElementById('hRoom').textContent = ROOM_CODE;

    const qr = await fetch(`/api/rooms/${ROOM_CODE}/qr`);
    if (qr.ok) {
      const j = await qr.json();
      STATE.qrUrl = j.qr_data_url;
    }

    await loadMembers();
    connectObserver();
    renderWaiting();
  } catch (e) {
    renderError('서버에 연결할 수 없어요. 잠시 후 다시 시도해주세요.');
  }
}

async function loadMembers() {
  try {
    const r = await fetch(`/api/rooms/${ROOM_CODE}/members`);
    if (r.ok) {
      STATE.members = await r.json();
      document.getElementById('hMembers').textContent = STATE.members.length;
      // T-10: 참가자 수에 따른 그리드 자동 조정 — tokens-tv.css 의 --member-col-min · --avatar-member 에 연동
      document.body.dataset.participantCount = String(STATE.members.length);
    }
  } catch (_) {}
}

function connectObserver() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  STATE.ws = new WebSocket(`${proto}://${location.host}/ws/observer/${ROOM_CODE}`);
  STATE.ws.onopen = () => {
    setConn(true);
    // 기존 참가자에게 사진/자기소개 다시 보내달라고 요청
    try { STATE.ws.send(JSON.stringify({ type: 'request_photos' })); } catch (_) {}
  };
  STATE.ws.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    handleMessage(msg);
  };
  STATE.ws.onclose = () => {
    setConn(false);
    setTimeout(connectObserver, 3000);
  };
  STATE.ws.onerror = () => { try { STATE.ws.close(); } catch (_) {} };
}

function setConn(connected) {
  const dot = document.getElementById('connDot');
  const txt = document.getElementById('connText');
  dot.classList.toggle('dis', !connected);
  txt.textContent = connected ? '연결됨' : '재연결 중…';
}

async function handleMessage(msg) {
  switch (msg.type) {
    case 'user_joined':
    case 'user_left':
    case 'approved':
      await loadMembers();
      if (STATE.currentPhase === 'waiting' || STATE.currentPhase === 'intro') renderForPhase();
      break;
    case 'state_update': {
      const cur = msg.state?.current_tab || 'waiting';
      const phase = msg.state?.phase || cur;
      const qIdx = msg.state?.question_index;
      if (qIdx !== undefined) STATE.currentQIdx = qIdx;
      if (cur === 'explore' && STATE.questions.length === 0) await loadQuestions();
      STATE.currentPhase = (cur === 'closing' && phase) ? phase : cur;
      renderForPhase();
      break;
    }
    case 'photo_update':
      if (msg.photo) STATE.photos[msg.uuid] = msg.photo;
      else delete STATE.photos[msg.uuid];
      if (STATE.currentPhase === 'waiting' || STATE.currentPhase === 'intro') renderForPhase();
      break;
    case 'intro_update':
      if (msg.intro) STATE.intros[msg.uuid] = msg.intro;
      else delete STATE.intros[msg.uuid];
      if (STATE.currentPhase === 'intro') renderForPhase();
      break;
    case 'photo_request':
      // observer는 요청만 forward (서버에서 처리)
      break;
    case 'vote_result':
      STATE.voteCounts[msg.question_id] = msg.counts;
      if (STATE.currentPhase === 'explore') renderExplore();
      break;
    case 'mvp_announce':
      STATE.mvp = msg.mvp;
      if (STATE.currentPhase === 'closing-mvp-result') renderForPhase();
      break;
    case 'matching_result':
      STATE.matchJson = msg.match_json;
      if (STATE.currentPhase === 'closing-match-result') renderForPhase();
      break;
    case 'free_timer':
      STATE.freeTimerEndsAt = parseInt(msg.ends_at, 10) || 0;
      if (STATE.currentPhase === 'free') renderFree();
      break;
    case 'room_updated':
      // 모임장이 ⚙ 운영에서 display_mode='mobile'로 전환 → host 화면으로 자동 redirect
      if (msg.changes && msg.changes.display_mode === 'mobile') {
        location.replace(`/room/${ROOM_CODE}/host`);
        return;
      }
      if (msg.changes) Object.assign(STATE.room, msg.changes);
      break;
    case 'room_closed':
      STATE.currentPhase = 'closed';
      renderForPhase();
      break;
    case 'chat':
      appendTvChat(msg.uuid, msg.message);
      break;
    case 'kicked':
      // observer 무관
      break;
  }
}

async function loadQuestions() {
  try {
    const r = await fetch(`/api/rooms/${ROOM_CODE}/questions`);
    if (r.ok) {
      const j = await r.json();
      STATE.questions = Array.isArray(j) ? j : (j.questions || []);
    }
  } catch (_) {}
}

function anonTvLabel(u) {
  if (!u) return '익명';
  const tail = String(u).replace(/-/g, '').slice(-4).toUpperCase();
  return `익명#${tail}`;
}

function escHtmlTv(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function appendTvChat(fromUuid, text) {
  if (!text) return;
  const box = document.getElementById('tvChat');
  if (!box) return;
  // 첫 메시지면 헤더 삽입
  if (!box.querySelector('.tv-chat-head')) {
    const head = document.createElement('div');
    head.className = 'tv-chat-head';
    head.textContent = '💬 익명 채팅';
    box.appendChild(head);
  }
  const div = document.createElement('div');
  div.className = 'tv-chat-msg';
  const now = new Date();
  const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  div.innerHTML = `<div class="tv-chat-meta">${escHtmlTv(anonTvLabel(fromUuid))} · ${time}</div>${escHtmlTv(text)}`;
  box.appendChild(div);
  box.classList.remove('empty');
  // 최근 8건만 유지 (헤더 제외)
  const msgs = box.querySelectorAll('.tv-chat-msg');
  if (msgs.length > 8) msgs[0].remove();
  box.scrollTop = box.scrollHeight;
}

function renderForPhase() {
  setProgress(STATE.currentPhase);
  // TV 채팅 오버레이 노출 범위 — data-phase 로 CSS 제어
  const _p = STATE.currentPhase || 'waiting';
  document.body.dataset.phase = _p.startsWith('closing') ? 'closing' : _p;
  switch (STATE.currentPhase) {
    case 'waiting': renderWaiting(); break;
    case 'intro': renderIntro(); break;
    case 'explore': renderExplore(); break;
    case 'free': renderFree(); break;
    case 'closing': case 'closing-mvp': renderClosingVote('mvp'); break;
    case 'closing-mvp-result': renderMVPResult(); break;
    case 'closing-match': renderClosingVote('match'); break;
    case 'closing-match-result': renderMatchResult(); break;
    case 'closed': renderClosed(); break;
    default: renderWaiting();
  }
}

function setProgress(phase) {
  const map = { waiting: 'intro', intro: 'intro', explore: 'explore', free: 'free' };
  let key = map[phase];
  if (!key && phase.startsWith('closing')) key = 'closing';
  const order = ['intro', 'explore', 'free', 'closing'];
  const idx = order.indexOf(key);
  document.querySelectorAll('.progress span').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    el.classList.toggle('done', i < idx);
  });
}

function memberCardHtml(m, big = false) {
  const photo = STATE.photos[m.uuid];
  const df = STATE.room?.display_fields || ['birth_year','region','industry','interest'];
  const fmt = STATE.room?.birth_year_format || 'exact';
  const bd = df.includes('birth_year') ? formatBirthYear(m.birth_year, fmt) : '';
  const meta = [bd, df.includes('region') && m.region ? m.region : ''].filter(Boolean).join(' · ');
  const avatar = photo
    ? `<div class="m-avatar has-photo"><img src="${escHtml(photo)}" alt=""></div>`
    : `<div class="m-avatar">👤</div>`;
  return `<div class="m-card">${avatar}<div class="m-name">${escHtml(m.nickname)}</div>${meta?`<div class="m-meta">${escHtml(meta)}</div>`:''}</div>`;
}

function renderWaiting() {
  const main = document.getElementById('main');
  const qrSrc = STATE.qrUrl || '';
  const cards = STATE.members.map(m => memberCardHtml(m)).join('') || '<div style="color:#c0c0c0;text-align:center;padding:40px;">참가자 입장을 기다리고 있어요…</div>';
  main.innerHTML = `
    <div class="waiting-grid">
      <div class="qr-side">
        ${qrSrc ? `<img src="${escHtml(qrSrc)}" alt="입장 QR">` : '<div style="width:320px;height:320px;background:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#0e1628;">QR 로딩…</div>'}
        <div class="room-code">${escHtml(ROOM_CODE)}</div>
        <div class="qr-help">QR 스캔 또는 <strong>app.ntable.kr/room/${escHtml(ROOM_CODE)}</strong></div>
      </div>
      <div class="members-side">
        <div class="members-title">참가자 <strong>${STATE.members.length}</strong>명</div>
        <div class="members-grid">${cards}</div>
      </div>
    </div>`;
}

function renderIntro() {
  const main = document.getElementById('main');
  const cards = STATE.members.map(m => {
    const html = memberCardHtml(m);
    const intro = STATE.intros[m.uuid];
    return intro
      ? html.replace('</div>$', `<div class="m-meta" style="font-style:italic;color:#e8b84b;margin-top:8px;">"${escHtml(intro)}"</div></div>`)
      : html;
  }).join('');
  main.innerHTML = `
    <div style="width:100%;text-align:center;">
      <div class="q-num">소개</div>
      <h2 style="font-family: var(--font-heading);font-size:48px;color:#fff;margin-bottom:32px;">오늘 함께하는 사람들</h2>
      <div class="members-grid" style="max-width:1200px;margin:0 auto;">${cards}</div>
    </div>`;
}

function renderExplore() {
  const q = STATE.questions[STATE.currentQIdx];
  if (!q) {
    document.getElementById('main').innerHTML = `<div class="big-msg"><div class="icon">📖</div><h1>탐구 단계</h1><p>질문이 곧 표시됩니다.</p></div>`;
    return;
  }
  const counts = STATE.voteCounts[q.id] || { A: 0, B: 0 };
  const aN = counts.A || 0, bN = counts.B || 0;
  const total = aN + bN;
  const pctA = total ? Math.round((aN / total) * 100) : 50;
  const pctB = total ? Math.round((bN / total) * 100) : 50;
  const aMajor = total > 0 && aN > bN;
  const bMajor = total > 0 && bN > aN;
  // 전원 일치(압도적) — 한쪽이 0, 응답 2명 이상
  const sweepA = total >= 2 && bN === 0;
  const sweepB = total >= 2 && aN === 0;
  const memberCount = (STATE.members || []).length;
  // 응답률 인사이트
  let insight;
  if (total === 0) {
    insight = `<span>응답 대기 중…</span>`;
  } else if (sweepA || sweepB) {
    insight = `<span class="unan">전원이 ${sweepA ? 'A' : 'B'}를 선택했어요</span> · ${total}명`;
  } else if (aN === bN) {
    insight = `<span class="split">완벽한 동률</span> · A ${aN} : B ${bN}`;
  } else {
    const gap = Math.abs(aN - bN);
    const close = gap === 1 && total >= 3;
    insight = close
      ? `<span class="split">1표 차 접전</span> · ${total}명 응답`
      : `다수 <strong>${aMajor ? 'A' : 'B'}</strong> (${aMajor ? aN : bN}/${total})`;
  }
  const responded = memberCount > 0 ? ` · <strong>${total}</strong>/${memberCount}명 응답` : '';
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="question-card">
      <div class="q-num">Q${STATE.currentQIdx + 1} / ${STATE.questions.length}</div>
      <div class="q-text">${escHtml(q.text || q.question || '')}</div>
      <div class="q-options">
        <div class="q-opt${sweepA?' major sweep':aMajor?' major':''}">
          <div class="q-opt-label">A</div>
          <div class="q-opt-text">${escHtml(q.option_a || q.A || '')}</div>
          <div class="q-opt-bar"><div class="q-opt-bar-fill" style="width:${pctA}%"></div></div>
          <div class="q-opt-count"><strong>${aN}</strong>표 · ${pctA}%</div>
        </div>
        <div class="q-opt${sweepB?' major sweep':bMajor?' major':''}">
          <div class="q-opt-label">B</div>
          <div class="q-opt-text">${escHtml(q.option_b || q.B || '')}</div>
          <div class="q-opt-bar"><div class="q-opt-bar-fill" style="width:${pctB}%"></div></div>
          <div class="q-opt-count"><strong>${bN}</strong>표 · ${pctB}%</div>
        </div>
      </div>
      <div class="q-insight">${insight}${responded}</div>
    </div>`;
}

function renderFree() {
  const endsAt = STATE.freeTimerEndsAt || 0;
  const remainingMs = endsAt ? (endsAt - Date.now()) : 0;
  let timerHtml = '';
  if (endsAt && remainingMs > 0) {
    const minLeft = Math.ceil(remainingMs / 60000);
    timerHtml = `<div style="font-size:80px;font-weight:700;color:#e8b84b;margin:24px 0 12px;letter-spacing:0.04em;font-variant-numeric:tabular-nums;">⏱ ${minLeft}분</div>`;
  } else if (endsAt && remainingMs <= 0) {
    timerHtml = `<div style="font-size:48px;font-weight:700;color:#ff8a8a;margin:24px 0 12px;">⏰ 시간 종료</div>`;
  }
  document.getElementById('main').innerHTML = `<div class="big-msg"><div class="icon">💬</div><h1>자유롭게 대화하세요</h1>${timerHtml}<p>마음에 든 사람과 더 깊은 이야기를 나눠보세요.<br>모임장이 다음 단계로 안내해드립니다.</p></div>`;
  // 5초마다 timer 갱신 (분 단위라 충분)
  if (_freeTimerTick) clearInterval(_freeTimerTick);
  if (endsAt) _freeTimerTick = setInterval(() => { if (STATE.currentPhase === 'free') renderFree(); }, 5000);
}
let _freeTimerTick = null;

function renderClosingVote(type) {
  const labels = type === 'mvp'
    ? { icon: '🏆', title: '오늘의 MVP를 뽑고 있어요', sub: '가장 인상 깊은 사람 한 명을 모바일에서 선택해주세요.' }
    : { icon: '💘', title: '사랑의 작대기', sub: '또 만나고 싶은 사람을 모바일에서 선택해주세요.' };
  document.getElementById('main').innerHTML = `<div class="big-msg"><div class="icon">${labels.icon}</div><h1>${labels.title}</h1><p>${labels.sub}</p></div>`;
}

// T-11 (2026-04-22): 재렌더 시 같은 MVP 면 reveal 스킵 — 카운트다운 무한 반복 방지
let _mvpRevealedUuid = null;
let _mvpCountdownIv = null;
function renderMVPResult() {
  const mvp = STATE.mvp;
  if (!mvp) {
    document.getElementById('main').innerHTML = `<div class="big-msg"><div class="icon">🏆</div><h1>MVP 발표 대기 중</h1></div>`;
    _mvpRevealedUuid = null;
    return;
  }
  const photo = mvp.uuid && STATE.photos[mvp.uuid];
  const alreadyRevealed = _mvpRevealedUuid === mvp.uuid;
  const pendingClass = alreadyRevealed ? '' : ' reveal-pending';
  const countdownHtml = alreadyRevealed ? '' : `<div class="mvp-countdown beat" id="mvpCountdown">3</div>`;
  document.getElementById('main').innerHTML = `
    <div class="mvp-display${pendingClass}">
      <div class="label">🏆 오늘의 MVP</div>
      <div class="photo">${photo ? `<img src="${escHtml(photo)}" alt="">` : '🏆'}</div>
      <div class="name">${escHtml(mvp.nickname)}</div>
      <div class="sub">${mvp.fi_count != null ? `투표 ${mvp.fi_count}표` : ''} · 가장 인상적인 사람</div>
      ${countdownHtml}
    </div>`;
  if (alreadyRevealed) return;
  // 카운트다운 3 → 2 → 1 → reveal. 중복 interval 방지 (재렌더 중첩 시).
  if (_mvpCountdownIv) clearInterval(_mvpCountdownIv);
  const disp = document.querySelector('.mvp-display');
  const cd = document.getElementById('mvpCountdown');
  let n = 3;
  _mvpCountdownIv = setInterval(() => {
    n -= 1;
    if (!disp) { clearInterval(_mvpCountdownIv); _mvpCountdownIv = null; return; }
    if (n > 0 && cd) {
      cd.textContent = String(n);
      cd.classList.remove('beat');
      void cd.offsetWidth; // reflow — beat animation 재시작
      cd.classList.add('beat');
    } else {
      clearInterval(_mvpCountdownIv);
      _mvpCountdownIv = null;
      if (cd) cd.remove();
      disp.classList.remove('reveal-pending');
      _mvpRevealedUuid = mvp.uuid;
    }
  }, 1000);
}

function renderMatchResult() {
  const mj = STATE.matchJson;
  if (!mj || !mj.pairs || !mj.pairs.length) {
    document.getElementById('main').innerHTML = `<div class="big-msg"><div class="icon">🌙</div><h1>오늘은 매칭이 없어요</h1><p>다음 모임에서 다시 만나요</p></div>`;
    return;
  }
  // 우선순위: 상호(mutual) → 추천(recommended) → 솔로(solo) 순으로 스태거
  const priority = { mutual: 0, recommended: 1, solo: 2 };
  const sortedPairs = [...mj.pairs].sort((a, b) => (priority[a.type] ?? 3) - (priority[b.type] ?? 3));
  let mutualN = 0, recN = 0, soloN = 0;
  for (const p of sortedPairs) {
    if (p.type === 'mutual') mutualN += 1;
    else if (p.type === 'solo') soloN += 1;
    else recN += 1;
  }
  const pairsHtml = sortedPairs.map(p => {
    if (p.type === 'solo') {
      return `<div class="pair"><div class="pair-type">🌙 솔로</div><div class="pair-names">${escHtml(p.a?.nickname || '')}</div></div>`;
    }
    const cls = p.type === 'mutual' ? 'mutual' : '';
    const label = p.type === 'mutual' ? '💘 상호 매칭' : '✨ 추천 매칭';
    return `<div class="pair ${cls}"><div class="pair-type">${label}</div><div class="pair-names">${escHtml(p.a?.nickname || '')}<span class="heart">❤</span>${escHtml(p.b?.nickname || '')}</div></div>`;
  }).join('');
  const insightParts = [];
  if (mutualN) insightParts.push(`<span class="mutual-n">${mutualN}</span>쌍 상호 매칭`);
  if (recN)   insightParts.push(`<span class="rec-n">${recN}</span>쌍 추천 매칭`);
  if (soloN)  insightParts.push(`솔로 ${soloN}명`);
  const insight = insightParts.length
    ? `<div class="match-insight">${insightParts.join(' · ')}</div>`
    : '';
  document.getElementById('main').innerHTML = `
    <div style="width:100%;text-align:center;">
      <h2 style="font-family: var(--font-heading);font-size:56px;color:#fff;margin-bottom:24px;">💘 오늘의 매칭 결과</h2>
      ${insight}
      <div class="pairs-list">${pairsHtml}</div>
    </div>`;
}

function renderClosed() {
  document.getElementById('main').innerHTML = `<div class="big-msg"><div class="icon">🎉</div><h1>모임이 종료됐어요</h1><p>오늘 함께해주신 모든 분들께 감사드립니다.</p></div>`;
}

function renderError(msg) {
  document.getElementById('main').innerHTML = `<div class="big-msg"><div class="icon">⚠️</div><h1>${escHtml(msg)}</h1></div>`;
}

// 핑
setInterval(() => {
  if (STATE.ws && STATE.ws.readyState === WebSocket.OPEN) {
    STATE.ws.send(JSON.stringify({ type: 'ping' }));
  }
}, 30000);

init();
</script>
