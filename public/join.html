function ensureUuid() {
  try { UUID = localStorage.getItem('demo_uuid') || ''; } catch (_) {}
  if (!UUID) {
    UUID = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
      : ('u-' + Math.random().toString(36).slice(2) + '-' + Date.now().toString(36));
    try { localStorage.setItem('demo_uuid', UUID); } catch (_) {}
  }
}

function escHtml(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function init() {
  if (!ROOM_CODE) { renderErr('мһҳлӘ»лҗң кІҪлЎң'); return; }
  ensureUuid();
  document.getElementById('roomTag').textContent = `м°ём—¬ мҪ”л“ң ${ROOM_CODE}`;
  try {
    const r = await fetch(`/api/rooms/${ROOM_CODE}`);
    if (!r.ok) { renderErr('лӘЁмһ„ м •ліҙлҘј л¶Ҳлҹ¬мҳ¬ мҲҳ м—Ҷм–ҙмҡ”. мғҲлЎңкі м№Ён•ҳкұ°лӮҳ мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.'); return; }
    ROOM = await r.json();
    document.getElementById('roomTitle').textContent = ROOM.title || ROOM_CODE;

    // T-02 (2026-04-21): join wizard лҠ” кІҢмҠӨнҠё self-describe м „мҡ©. лӘЁмһ„мһҘмқҖ host.html лЎң мҰүмӢң лҰ¬лӢӨмқҙл үнҠё.
    if (ROOM.host_uuid && ROOM.host_uuid === UUID) {
      location.replace(`/room/${ROOM_CODE}/host`);
      return;
    }

    // demo_kind='ai' н•ңм • вҖ” к°•м—°мһҗк°Җ мһҗкё° нҸ° QR м§„мһ… нҷ”л©ҙм—җм„ң м§„н–үмһҗ лӘЁл“ңлЎң м „нҷҳн•  мҲҳ мһҲкІҢ.
    // admin OAuth мҡ°нҡҢ (к°•м—° нҳ„мһҘ л№ лҘё м§„мһ… лҸҷм„ ). мІӯмӨ‘лҸ„ лҲ„лҘј мҲҳ мһҲмңјлӮҳ лҚ°лӘЁл°© м»Ён…ҚмҠӨнҠёлқј мң„н—ҳ лӮ®мқҢ.
    if (ROOM.demo_kind === 'ai' && ROOM.host_uuid) {
      const speakerBtn = document.getElementById('speakerModeBtn');
      if (speakerBtn) {
        speakerBtn.hidden = false;
        speakerBtn.addEventListener('click', () => {
          try { localStorage.setItem('demo_uuid', ROOM.host_uuid); } catch (_) {}
          location.replace(`/room/${ROOM_CODE}/host`);
        });
      }
    }

    // мқҙлҜё join н–Ҳмңјл©ҙ л°”лЎң кІҢмҠӨнҠё нҷ”л©ҙмңјлЎң (лӢЁ ?edit=1мқҙл©ҙ wizard мһ¬м§„н–ү вҖ” лӮҙ м •ліҙ мҲҳм •мҡ©)
    const isEdit = new URLSearchParams(location.search).get('edit') === '1';
    const meRes = await fetch(`/api/rooms/${ROOM_CODE}/me?uuid=${encodeURIComponent(UUID)}`);
    const me = meRes.ok ? await meRes.json() : { joined: false };
    if (me.joined && !isEdit) {
      location.replace(`/room/${ROOM_CODE}`);
      return;
    }
    // CC-97 (2026-04-25): closed л°© вҖ” кё°мЎҙ м°ём—¬мһҗлҠ” мң„ л¶„кё°м—җм„ң мқҙлҜё redirectлҗЁ. лҜёк°Җмһ… мӮ¬мҡ©мһҗл§Ң м°ЁлӢЁ.
    if (ROOM.status === 'closed') { renderErr('мқҙ лӘЁмһ„мқҖ мқҙлҜё мў…лЈҢлҗҗм–ҙмҡ”'); return; }
    // edit лӘЁл“ң вҖ” кё°мЎҙ лҚ°мқҙн„°лҘј wizard dataлЎң prefill
    if (me.joined && isEdit) {
      ['nickname','gender','birth_year','region','industry','mbti','interest','instagram','emoji'].forEach(k => {
        if (me[k] != null) data[k] = me[k];
      });
      ['hide_birth_year','hide_region','hide_industry','hide_interest','hide_instagram'].forEach(k => {
        if (typeof me[k] === 'boolean') data[k] = me[k];
      });
      // ?step=instagram л“ұ нҠ№м • stepмңјлЎң мһҗлҸҷ м җн”„ (нҺём§‘ deep link)
      const targetStep = new URLSearchParams(location.search).get('step');
      if (targetStep) {
        // STEPSлҠ” rebuildSteps()м—җм„ң кІ°м •лҗЁ вҖ” нҳём¶ң нӣ„ мң„м№ҳ м°ҫкё°
        rebuildSteps();
        const idx = STEPS.indexOf(targetStep);
        if (idx >= 0) CURRENT = idx;
      }
    }

    rebuildSteps();

    // T-19 (2026-04-22): brand.json лҹ°нғҖмһ„ лЎңл“ң вҖ” мң„м Җл“ң м№ҙн”ј data-copy м№ҳнҷҳ мӨҖл№„
    if (typeof loadBrand === 'function') {
      try { await loadBrand(); } catch (e) { /* мӢӨнҢЁн•ҙлҸ„ HTML нҸҙл°ұ м№ҙн”ј мӮ¬мҡ© */ }
    }

    await prefillFromCache();
    // T-01 (2026-04-21): мқҙлӘЁм§Җ лҜём„Өм • мӢң лһңлҚӨ кё°ліёк°’ л°°м • вҖ” м№ҙл“ң н—Ҳм „н•Ё л°©м§Җ (lazy prompt м—җм„ң мһ¬м„ нғқ к°ҖлҠҘ)
    if (!data.emoji) {
      const pool = ['рҹҳҖ','рҹҳҠ','рҹҘ°','рҹҳҺ','рҹӨ”','рҹҘі','рҹӨ—','рҹӨ“','рҹҰҠ','рҹҗ»','рҹҗҜ','рҹҢё','рҹҢҷ','рҹҺө','рҹҺЁ','рҹҺ®','вӯҗ','вңЁ','рҹ’Һ','рҹҢҹ'];
      data.emoji = pool[Math.floor(Math.random() * pool.length)];
    }
    renderProgress();
    renderStep();
  } catch (e) {
    renderErr((typeof t === 'function' ? t('error_copy.server_down') : 'м„ңлІ„м—җ м—°кІ°н•  мҲҳ м—Ҷм–ҙмҡ”. мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.'));
  }
}

function rebuildSteps() {
  // T-01 (2026-04-21): wizard_required кё°мӨҖмңјлЎң мөңмҶҢ step л§Ң кө¬м„ұ. лӮҳлЁём§ҖлҠ” guest.html мҶҢк°ң нғӯ lazy prompt м—җм„ң мҲҳм§‘.
  // - wizard_required мһҲмңјл©ҙ: ['nickname', ...required] вҶ’ STEPS
  // - м—Ҷмңјл©ҙ legacy wizard_fields fallback (н•ҳмң„нҳёнҷҳ)
  const pd = ROOM.pack_defaults || {};
  const req = Array.isArray(pd.wizard_required) ? pd.wizard_required : null;
  const isEdit = new URLSearchParams(location.search).get('edit') === '1';
  // edit лӘЁл“ңм—җм„ңлҠ” кё°мЎҙ л°©мӢқ(м „ н•„л“ң мҲҳм •) мң м§Җ вҖ” лӮҙ м •ліҙ мҲҳм • deep link нҳёнҷҳ
  if (isEdit) {
    const wf = Array.isArray(pd.wizard_fields) ? pd.wizard_fields : null;
    if (wf) {
      const steps = ['nick'];
      const hasGender = wf.includes('gender');
      const hasBirth = wf.includes('birth_year');
      if (hasGender || hasBirth) steps.push('basic');
      if (wf.includes('region')) steps.push('region');
      if (wf.includes('industry')) steps.push('industry');
      if (wf.includes('mbti')) steps.push('mbti');
      if (wf.includes('interest')) steps.push('interest');
      if (wf.includes('playlist')) steps.push('playlist');
      if (wf.includes('instagram') && ROOM.instagram_collect === true) steps.push('instagram');
      if (wf.includes('emoji')) steps.push('photo');
      steps.push('confirm');
      STEPS = steps;
      return;
    }
  }
  // кё°ліё мһ…мһҘ кІҪлЎң вҖ” 2026-04-23 мҠ¬лҰјнҷ” (T-34):
  //  - req м—ҶмқҢ/л№„м–ҙмһҲмқҢ вҶ’ STEPS=['nick'] (мҠ¬лҰј мҳЁліҙл”© В· submit from nick)
  //  - req м—җ playlistВ·instagram мһҲмқ„ л•Ңл§Ң лӮҳлЁём§Җ step + confirm мң м§Җ
  //  - T-24 (2026-04-22) л¬ҙл°ҳмқ‘ лІ„к·ёлҠ” nick л ҢлҚ” лЎңм§Ғм—җм„ң STEPS.length===1 л¶„кё°лЎң submitJoin м§Ғн–ү.
  if (req) {
    const extras = [];
    if (req.includes('playlist')) extras.push('playlist');
    if (req.includes('instagram') && ROOM.instagram_collect === true) extras.push('instagram');
    if (extras.length === 0) { STEPS = ['nick']; return; }
    STEPS = ['nick', ...extras, 'confirm'];
    return;
  }
  // legacy fallback вҖ” pack_defaults лҜёнғ‘мһ¬ л°© (req null) лҸ„ мҠ¬лҰј 1-step.
  STEPS = ['nick'];
}

async function prefillFromCache() {
  // 1) OAuth лЎңк·ёмқё мғҒнғңмқҙл©ҙ server profile мҡ°м„  (лӢӨлҘё л””л°”мқҙмҠӨ лҸҷкё°нҷ”)
  try {
    const tok = localStorage.getItem('user_token');
    if (tok) {
      const r = await fetch('/api/auth/me', { headers: { 'x-user-token': tok } });
      if (r.ok) {
        const me = await r.json();
        if (me.authed) {
          ['gender','birth_year','region','industry','mbti','interest','instagram','emoji'].forEach(k => {
            if (me[k]) data[k] = me[k];
          });
        }
      }
    }
  } catch (_) {}
  // 2) localStorage fallback (мқөлӘ… мӮ¬мҡ©мһҗ)
  try {
    const pref = localStorage.getItem('preferred_nickname');
    if (pref && !data.nickname) data.nickname = pref;
    const profStr = localStorage.getItem('profile_snapshot');
    if (profStr) {
      const p = JSON.parse(profStr);
      ['gender','birth_year','region','industry','mbti','interest','instagram','emoji'].forEach(k => {
        if (p[k] && !data[k]) data[k] = p[k];
      });
    }
  } catch (_) {}
}

function renderProgress() {
  // 3 dot вҖ” мһ…л Ҙ м§„н–ү мӢңк°Ғ лӢЁмҲңнҷ”
  const html = STEPS.map((step, i) => {
    let cls = '';
    if (i === CURRENT) cls = ' active';
    else if (i < CURRENT) cls = ' done';
    return `<div class="pdot${cls}" data-i="${i}" data-step="${step}"></div>`;
  }).join('');
  document.getElementById('progress').innerHTML = html;
}

    }
    case 'confirm':
      const subText = 'м•„лһҳ м •ліҙлЎң лӢӨлҘё м°ёк°Җмһҗм—җкІҢ ліҙмһ…лӢҲлӢӨ.';
      // T-23 (2026-04-22): мң„м Җл“ң л§Ҳм§Җл§ү лІ„нҠјмқҖ buttons.wizard_done ("лӘЁмһ„м—җ л“Өм–ҙк°Җкё°")
      const submitLabel = (typeof t === 'function') ? t('buttons.wizard_done') : 'лӘЁмһ„м—җ л“Өм–ҙк°Җкё°';
      const genderLabel = data.gender === 'male' ? 'лӮЁм„ұ' : data.gender === 'female' ? 'м—¬м„ұ' : data.gender === 'unspecified' ? 'м„ нғқ м•Ҳ н•Ё' : '';
      // лӘЁмһ„мһҘмқҙ м„Өм •н•ң birth_year_format м—җ л§һм¶ҳ мӢӨм ң н‘ңмӢңк°’
      const fmtBy = ROOM.birth_year_format || 'exact';
      const birthDisplay = data.birth_year ? formatBirthYear(data.birth_year, fmtBy) : '';
      // лӘЁмһ„мһҘ region_detail=false л©ҙ кө¬ м •ліҙ мҲЁкё°кі  мӢңВ·лҸ„л§Ң н‘ңмӢң (лӢӨлҘё м°ёк°Җмһҗм—җкІҢ ліҙмқј нҳ•нғң)
      let regionDisplay = data.region || '';
      if (regionDisplay && ROOM.region_detail === false) {
        const metro = (typeof detectMetro === 'function') ? detectMetro(regionDisplay) : '';
        if (metro && regionDisplay.startsWith(metro + ' ')) regionDisplay = metro;
      }
      // нҢ©лі„ мҲҳм§‘ н•„л“ңл§Ң нҷ•мқё нҷ”л©ҙм—җ л…ём¶ң
      // T-24 (2026-04-22): edit лӘЁл“ңлҠ” кё°мЎҙ wizard_fields кё°мӨҖ(м „ н•„л“ң мҲҳм • нҷ”л©ҙ).
      // мқјл°ҳ мһ…мһҘмқҖ wizard_required + мӢӨм ң лҚ°мқҙн„°(prefill нҸ¬н•Ё) мұ„мӣҢм§„ н•„л“ңл§Ң вҖ” 'мғқлһө' н–ү лҸ„л°° л°©м§Җ.
      const wfConf = ROOM.pack_defaults && Array.isArray(ROOM.pack_defaults.wizard_fields)
        ? ROOM.pack_defaults.wizard_fields : null;
      const reqConf = ROOM.pack_defaults && Array.isArray(ROOM.pack_defaults.wizard_required)
        ? ROOM.pack_defaults.wizard_required : null;
      const isEditMode = new URLSearchParams(location.search).get('edit') === '1';
      const hasVal = (f) => {
        const v = data[f];
        return v !== undefined && v !== null && v !== '';
      };
      const showFld = (f) => {
        if (isEditMode) return !wfConf || wfConf.includes(f);
        if (reqConf && reqConf.includes(f)) return true;
        return hasVal(f);
      };
      const avatarRow = showFld('emoji')
        ? `<div class="summary-row"><span class="key">м•„л°”нғҖ</span><span class="val">${data.emoji ? `<span style="font-size:22px;">${escHtml(data.emoji)}</span>` : '<span class="empty">мғқлһө</span>'}</span></div>`
        : '';
      body = `
        <div class="step-num">${stepNum} В· нҷ•мқё</div>
        <h2 class="step-title">мқҙл ҮкІҢ мһ…мһҘн•ҙмҡ”</h2>
        <p class="step-sub">${subText}</p>
        <div class="summary">
          ${avatarRow}
          <div class="summary-row"><span class="key">лӢүл„Өмһ„</span><span class="val">${escHtml(data.nickname)}</span></div>
          ${showFld('gender') ? rowH('м„ұлі„', genderLabel, false) : ''}
          ${showFld('birth_year') ? rowH('м¶ңмғқм—°лҸ„', birthDisplay, data.hide_birth_year) : ''}
          ${showFld('region') ? rowH('м§Җм—ӯ', regionDisplay, data.hide_region) : ''}
          ${showFld('industry') ? rowH('м—…мў…', data.industry, data.hide_industry) : ''}
          ${showFld('mbti') ? rowH('MBTI', data.mbti, false) : ''}
          ${showFld('interest') ? rowH('кҙҖмӢ¬мӮ¬', data.interest, data.hide_interest) : ''}
          ${showFld('playlist') ? rowH('н”ҢлҰ¬ л§ҒнҒ¬', data.playlist, false) : ''}
          ${showFld('instagram') ? rowH('мқёмҠӨнғҖк·ёлһЁ', data.instagram ? '@' + data.instagram : '', data.hide_instagram) : ''}
        </div>
        <div class="err-msg" id="errMsg"></div>
        <div class="actions">
          ${prevBtn}
          <button type="button" class="btn btn-next" id="submitBtn" onclick="submitJoin()">${submitLabel}</button>
        </div>
      `;
      break;
  }

  main.innerHTML = body;
  // T-19 (2026-04-22): data-copy м№ҳнҷҳ вҖ” brand.json лЎңл“ңлҗҗмңјл©ҙ мң„м Җл“ң м№ҙн”ј көҗмІҙ
  if (typeof applyCopyToDOM === 'function') applyCopyToDOM(main);
  bindStep(key);
  renderProgress();
}

// лӘЁмһ„мһҘ birth_year_format м—җ л§һм¶° м—°лҸ„ вҶ’ н‘ңмӢң л¬ёмһҗм—ҙ (host.html кіј лҸҷмқј лЎңм§Ғ)
function formatBirthYear(year, format) {
  if (!year) return '';
  const y = new Date().getFullYear();
  const age = y - year + 1;
  if (format === 'decade_half') {
    if (age < 20) return '10лҢҖ';
    if (age >= 60) return '60лҢҖ+';
    const decade = Math.floor(age / 10) * 10;
    const half = age % 10;
    const label = half <= 3 ? 'мҙҲ' : half <= 6 ? 'мӨ‘' : 'нӣ„';
    return `${decade}${label}`;
  }
  if (format === 'decade') {
    if (age < 20) return '10лҢҖ';
    if (age < 30) return '20лҢҖ';
    if (age < 40) return '30лҢҖ';
    if (age < 50) return '40лҢҖ';
    if (age < 60) return '50лҢҖ';
    return '60лҢҖ+';
  }
  return `${year}л…„`;
}

function row(k, v) {
  if (v) return `<div class="summary-row"><span class="key">${k}</span><span class="val">${escHtml(v)}</span></div>`;
  return `<div class="summary-row"><span class="key">${k}</span><span class="val empty">мғқлһө</span></div>`;
}
function rowH(k, v, hidden) {
  // hidden=trueл©ҙ л§Өм№ӯм—җл§Ң мӮ¬мҡ© (лӢӨлҘё кІҢмҠӨнҠё м№ҙл“ңм—җм„ң л§ҲмҠӨнӮ№). ліёмқё нҷ•мқём—” к°’+рҹ”’ н‘ңмӢң.
  if (!v) return `<div class="summary-row"><span class="key">${k}</span><span class="val empty">мғқлһө</span></div>`;
  if (hidden) {
    return `<div class="summary-row"><span class="key">${k}</span><span class="val" style="opacity:0.55;">${escHtml(v)} <span style="font-size:10px;color:#9aa0ac;letter-spacing:0.04em;">рҹ”’ м°ёк°Җмһҗм—җкІҢ мҲЁк№Җ</span></span></div>`;
  }
  return `<div class="summary-row"><span class="key">${k}</span><span class="val">${escHtml(v)}</span></div>`;
}

let _nickCheckTimer = null;
let _nickCheckSeq = 0;
async function runNicknameCheck(name) {
  const hostBox = document.getElementById('nickConflict');
  if (hostBox) hostBox.innerHTML = '';
  if (!name || name.length < 1) return;
  const mySeq = ++_nickCheckSeq;
  try {
    const r = await fetch(`/api/rooms/${ROOM_CODE}/nickname-check?n=${encodeURIComponent(name)}&uuid=${encodeURIComponent(UUID || '')}`);
    if (!r.ok) return;
    const j = await r.json();
    if (mySeq !== _nickCheckSeq) return; // stale
    if (!hostBox) return;
    if (!j.taken) { hostBox.innerHTML = ''; return; }
    if (j.is_self) {
      hostBox.innerHTML = `<div class="nick-conflict self">
        вң“ мқҙ лӘЁмһ„м—җ мқҙлҜё '${escHtml(name)}' лЎң м°ём—¬н•ң кё°лЎқмқҙ мһҲм–ҙмҡ”.
        <button type="button" class="nick-conflict-cta" onclick="location.replace('/room/' + encodeURIComponent('${ROOM_CODE}'))">л°”лЎң мқҙм–ҙк°Җкё° вҶ’</button>
      </div>`;
    } else {
      hostBox.innerHTML = `<div class="nick-conflict taken">
        вҡ пёҸ мқҙ лӘЁмһ„м—җм„ң '${escHtml(name)}' мқҖ мқҙлҜё мӮ¬мҡ© мӨ‘мқҙм—җмҡ”.
        <button type="button" class="nick-conflict-cta" id="nickRecoverBtn">мқҙм „м—җ мқҙ лӢүмңјлЎң м°ём—¬н–ҲлӢӨл©ҙ мқҙм–ҙл°ӣкё°</button>
      </div>`;
      document.getElementById('nickRecoverBtn')?.addEventListener('click', () => {
        data.nickname = name;
        if (typeof renderRecoverCta === 'function') renderRecoverCta(name);
      });
    }
  } catch (_) {}
}

function bindStep(key) {
  if (key === 'nick') {
    const inp = document.getElementById('nicknameInput');
    // slim лӘЁл“ңлҠ” submitBtn, legacy лҠ” nextBtn
    const slim = STEPS.length === 1;
    const btn = slim ? document.getElementById('submitBtn') : document.getElementById('nextBtn');

    // мҠ¬лҰј лӘЁл“ңлҠ” 1вҖ“8мһҗ В· н•ңкёҖ/мҳҒл¬ё/мҲ«мһҗл§Ң н—Ҳмҡ©.
    // н•ңкёҖ мһҗлӘЁ(г„ұ-г…Һ, г…Ҹ-г…Ј)лҸ„ нҶөкіј вҖ” IME мЎ°н•© мӨ‘ мһҗлӘЁ лӢЁлҸ… н‘ңмӢң лӢЁкі„м—җм„ң кұ°лҘҙл©ҙ н•ңкёҖмқҙ м•Ҳ мҚЁм§җ.
    const validate = (v) => {
      if (!slim) return v.length >= 1;
      return v.length >= 1 && v.length <= 8;
    };
    const cleanSlim = (raw) => (raw || '').replace(/[^A-Za-z0-9к°Җ-нһЈг„ұ-г…Һг…Ҹ-г…Ј]/g, '').slice(0, 8);

    btn.disabled = !validate(inp.value.trim());

    inp.addEventListener('input', () => {
      if (slim) {
        const cleaned = cleanSlim(inp.value);
        if (cleaned !== inp.value) inp.value = cleaned;
      }
      data.nickname = inp.value.trim();
      btn.disabled = !validate(data.nickname);
      // мһ…л Ҙ мӨ‘м—җлҠ” conflict л©”мӢңм§Җ мҙҲкё°нҷ” (blur л•Ң мһ¬нҷ•мқё)
      const hostBox = document.getElementById('nickConflict');
      if (hostBox) hostBox.innerHTML = '';
    });
    inp.addEventListener('blur', () => {
      clearTimeout(_nickCheckTimer);
      const v = inp.value.trim();
      _nickCheckTimer = setTimeout(() => runNicknameCheck(v), 300);
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !btn.disabled) {
        if (slim) submitJoin(); else nextStep();
      }
    });

    // slim лӘЁл“ң В· м•„л°”нғҖ м№© нҒҙлҰӯ мӢң preview к°ұмӢ  (generic emoji-chip н•ёл“Өлҹ¬к°Җ data.emoji лҸ„ н•Ёк»ҳ л°ҳмҳҒ)
    if (slim) {
      const strip = document.querySelector('.slim-avatar-strip');
      const preview = document.querySelector('.slim-avatar-preview');
      if (strip && preview) {
        strip.addEventListener('click', (e) => {
          const chip = e.target.closest('.slim-ava-chip');
          if (!chip) return;
          const v = chip.dataset.emoji || '';
          if (v) preview.textContent = v;
        });
      }
    }

    setTimeout(() => inp.focus(), 100);
  }
  // chip click н•ёл“Өлҹ¬лҠ” document-levelлЎң н•ңлІҲл§Ң
}

document.addEventListener('click', (e) => {
  // df-check лқјлІЁ (hide мІҙнҒ¬л°•мҠӨ chip) вҖ” selected нҶ кёҖ + data л°ҳмҳҒ
  const dfChip = e.target.closest('.chip.df-check');
  if (dfChip) {
    const cb = dfChip.querySelector('input[type="checkbox"]');
    if (cb) {
      setTimeout(() => {
        dfChip.classList.toggle('selected', cb.checked);
        if (cb.id === 'hide_industry') data.hide_industry = cb.checked;
        if (cb.id === 'hide_interest') data.hide_interest = cb.checked;
        if (cb.id === 'hide_instagram') data.hide_instagram = cb.checked;
      }, 0);
    }
    return;
  }
  const chip = e.target.closest('.chip');
  if (!chip) return;
  const group = chip.dataset.group;
  if (!group) return;
  const wasSelected = chip.classList.contains('selected');

  // кІҢмҠӨнҠё hide_birth_year нҶ кёҖ
  if (group === 'hide_birth_year') {
    document.querySelectorAll('.chip[data-group="hide_birth_year"]').forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
    data.hide_birth_year = chip.dataset.value === 'true';
    return;
  }
  // кІҢмҠӨнҠё hide_region нҶ кёҖ
  if (group === 'hide_region') {
    const isHide = chip.dataset.value === 'true';
    data.hide_region = isHide;
    if (isHide) data.region = stripMetroGu(data.region);
    renderStep();
    return;
  }

  if (group === 'interest') {
    // chip м„ нғқ вҖ” input valueлҠ” кұҙл“ңлҰ¬м§Җ м•ҠмқҢ (м§Ғм ‘ мһ…л Ҙ мҳҒм—ӯкіј л¶„лҰ¬)
    chip.classList.toggle('selected', !wasSelected);
    recomputeInterest();
    return;
  }

  // region: н•ӯмғҒ renderStepмңјлЎң кө¬ row мһ¬нҸүк°Җ (м„ңмҡё вҶ” лӢӨлҘё мӢңВ·лҸ„ м „нҷҳ мӢң к°•лӮЁ мһ”мһ¬ м ңкұ°)
  if (group === 'region') {
    if (wasSelected) {
      data.region = null;
    } else {
      data.region = chip.dataset.value;
    }
    renderStep(); // кө¬ UI л…ём¶ң мЎ°кұҙ(region==='м„ңмҡё' && rd) мҰүмӢң мһ¬нҸүк°Җ
    return;
  }

  // metro-gu: кө¬ м„ нғқ вҶ’ region = "{кҙ‘м—ӯмӢң} {кө¬}" нҳ•нғң (м„ңмҡё/л¶ҖмӮ°/лҢҖкө¬/мқёмІң/кҙ‘мЈј/лҢҖм „/мҡёмӮ°)
  if (group === 'metro-gu') {
    document.querySelectorAll('.chip[data-group="metro-gu"]').forEach(c => c.classList.remove('selected'));
    const currentMetro = detectMetro(data.region);
    if (!currentMetro) return;
    if (wasSelected) {
      data.region = currentMetro;
    } else {
      chip.classList.add('selected');
      data.region = currentMetro + ' ' + chip.dataset.value;
    }
    return;
  }

  // лӢӨлҘё к·ёлЈ№мқҖ single-select (лӢӨмӢң лҲ„лҘҙл©ҙ м·ЁмҶҢ)
  document.querySelectorAll(`.chip[data-group="${group}"]`).forEach(c => c.classList.remove('selected'));
  if (!wasSelected) {
    chip.classList.add('selected');
    data[group] = chip.dataset.value;
  } else {
    data[group] = null;
  }
});

document.addEventListener('change', (e) => {
  if (e.target.id === 'birthYearInput') {
    const y = parseInt(e.target.value, 10);
    data.birth_year = (y >= 1940 && y <= 2030) ? y : null;
  }
});

// нҶөн•© нҺҳмқҙм§Җ м§„мһ… мӢң м¶ңмғқм—°лҸ„ defaultлҘј 1990мңјлЎң мҰүмӢң л°ҳмҳҒ (мӮ¬мҡ©мһҗк°Җ м•Ҳ л§Ңм ёлҸ„ м Ғмҡ©)
document.addEventListener('DOMContentLoaded', () => {});
function ensureBirthDefault() {
  if (!data.birth_year) {
    const sel = document.getElementById('birthYearInput');
    if (sel && sel.value) {
      const y = parseInt(sel.value, 10);
      if (y >= 1940 && y <= 2030) data.birth_year = y;
    }
  }
}

// кҙҖмӢ¬мӮ¬ вҖ” chip selected + input extras н•©міҗм„ң dedupe
function recomputeInterest() {
  const chips = Array.from(document.querySelectorAll('.chip[data-group="interest"].selected')).map(c => c.dataset.value);
  const inp = document.getElementById('interestInput');
  const extras = (inp ? inp.value : '').split(',').map(s => s.trim()).filter(Boolean);
  const merged = [];
  const seen = new Set();
  for (const t of [...chips, ...extras]) {
    if (!seen.has(t)) { seen.add(t); merged.push(t); }
  }
  data.interest = merged.length ? merged.join(', ') : null;
}

document.addEventListener('input', (e) => {
  if (e.target.id === 'interestInput') {
    recomputeInterest();
  }
  if (e.target.id === 'playlistInput') {
    const v = e.target.value.trim();
    data.playlist = (v && /^https?:\/\//i.test(v)) ? v.slice(0, 500) : (v ? v : null);
    // URL whitelist мІҙнҒ¬ вҖ” Spotify/Apple Music/YouTube Music/YouTube (2026-04-22 QA)
    const hintEl = document.getElementById('playlistHint');
    if (hintEl) {
      if (!v) { hintEl.style.display = 'none'; hintEl.textContent = ''; return; }
      let host = '';
      try { host = new URL(v).hostname.toLowerCase(); } catch (_) { host = ''; }
      const ok = /(^|\.)(open\.spotify\.com|spotify\.com|music\.apple\.com|music\.youtube\.com|youtube\.com|youtu\.be)$/.test(host);
      if (!ok) {
        hintEl.style.display = 'block';
        hintEl.style.color = '#e87e7e';
        hintEl.textContent = 'вҡ пёҸ Spotify В· Apple Music В· YouTube Music В· YouTube л§ҒнҒ¬лҘј л¶ҷм—¬мЈјм„ёмҡ”.';
      } else {
        hintEl.style.display = 'block';
        hintEl.style.color = 'var(--text-muted)';
        hintEl.textContent = 'вң“ нҷ•мқёлҗҗм–ҙмҡ”';
      }
    }
  }
  if (e.target.id === 'instaInput') {
    // мқёмҠӨнғҖк·ёлһЁ вҖ” мҳҒл¬ё/мҲ«мһҗ/м җ/м–ёлҚ”л°”л§Ң н—Ҳмҡ©, мҶҢл¬ёмһҗ ліҖнҷҳ, @ мһҗлҸҷ м ңкұ°
    const cleaned = e.target.value.toLowerCase().replace(/^@/, '').replace(/[^a-z0-9._]/g, '');
    if (cleaned !== e.target.value) e.target.value = cleaned;
    data.instagram = cleaned || null;
  }
});

function nextStep() {
  // basic step л– лӮ  л•Ң birth_year default 1990 ліҙмһҘ
  if (STEPS[CURRENT] === 'basic') ensureBirthDefault();
  const next = Math.min(CURRENT + 1, STEPS.length - 1);
  if (next === CURRENT) {
    console.warn('[wizard] nextStep: already at last step', { STEPS, CURRENT, key: STEPS[CURRENT] });
  }
  CURRENT = next;
  renderStep();
}
function skipInstagram() {
  data.instagram = null;
  data.hide_instagram = false;
  CURRENT = Math.min(CURRENT + 1, STEPS.length - 1);
  renderStep();
}

// мқҙлӘЁм§Җ м№ҙн…Ңкі лҰ¬ нғӯ м „нҷҳ вҖ” нҳ„мһ¬ step(emoji) мһ¬л ҢлҚ”. data.emoji лҠ” к·ёлҢҖлЎң ліҙмЎҙ
function switchEmojiCat(idx) {
  window._emojiCatIdx = idx;
  renderStep();
}

// T-15 (2026-04-22): лҚ”ліҙкё° нҶ кёҖ В· лһңлҚӨ м„ нғқ
function toggleEmojiMore() {
  window._emojiExpanded = !window._emojiExpanded;
  renderStep();
}
function pickRandomEmoji() {
  const pool = window._ALL_EMOJIS;
  if (!Array.isArray(pool) || pool.length === 0) return;
  data.emoji = pool[Math.floor(Math.random() * pool.length)];
  renderStep();
}

// мқҙлӘЁм§Җ м„ нғқ/мһ…л Ҙ н•ёл“Өлҹ¬
document.addEventListener('click', (e) => {
  // #23 slim м№ҙн…Ңкі лҰ¬ нғӯ вҖ” emoji-chip ліҙлӢӨ лЁјм Җ мІҳлҰ¬ (нғӯ мһҗмІҙ нҒҙлҰӯ мӢң emoji м„ нғқ нҡЁкіј X).
  const slimTab = e.target.closest('.slim-cat-tab');
  if (slimTab) {
    const idx = parseInt(slimTab.dataset.slimCatIdx, 10);
    if (Number.isFinite(idx)) {
      window._slimCatIdx = idx;
      if (typeof renderStep === 'function') renderStep();
    }
    return;
  }
  const chip = e.target.closest('.emoji-chip');
  if (!chip) return;
  const v = chip.dataset.emoji || '';
  data.emoji = v || null;
  // input value лҸҷкё°нҷ” + preview к°ұмӢ 
  const inp = document.getElementById('emojiInput');
  if (inp) inp.value = v;
  const preview = document.getElementById('emojiPreview');
  if (preview) preview.innerHTML = v ? `<span style="font-size:72px;line-height:1;">${v}</span>` : 'рҹҷӮ';
  // chip selected нҶ кёҖ
  document.querySelectorAll('.emoji-chip').forEach(c => c.classList.toggle('selected', c.dataset.emoji === v && v));
});
document.addEventListener('input', (e) => {
  if (e.target.id !== 'emojiInput') return;
  // мІ« кёҖлҰ¬н”„(мқҙлӘЁм§Җ) м¶”м¶ң вҖ” кІ°н•© л¬ёмһҗ(zwj)лҠ” к·ёлҢҖлЎң л‘җкі  4мһҗ cap
  const v = (e.target.value || '').slice(0, 4);
  data.emoji = v || null;
  const preview = document.getElementById('emojiPreview');
  if (preview) preview.innerHTML = v ? `<span style="font-size:72px;line-height:1;">${v}</span>` : 'рҹҷӮ';
  document.querySelectorAll('.emoji-chip').forEach(c => c.classList.toggle('selected', c.dataset.emoji === v && v));
});
// мӮ¬м§„ м—…лЎңл“ң кё°лҠҘ нҸҗкё° (2026-04-19) вҖ” wizardм—җм„ң мһ…л Ҙ path лӘЁл‘җ м ңкұ°
function clearWizardPhoto() { /* legacy noop */ }
function prevStep() {
  CURRENT = Math.max(CURRENT - 1, 0);
  renderStep();
}

async function submitJoin() {
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errMsg');
  if (!data.nickname) {
    err.textContent = 'лӢүл„Өмһ„мқҙ н•„мҡ”н•ҙмҡ”';
    CURRENT = 0;
    renderStep();
    return;
  }
  btn.disabled = true;
  btn.textContent = 'мһ…мһҘ мӨ‘вҖҰ';
  err.textContent = '';
  try {
    const r = await fetch(`/api/rooms/${ROOM_CODE}/join`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        uuid: UUID,
        nickname: data.nickname,
        profile: {
          gender: data.gender, birth_year: data.birth_year,
          region: data.region, industry: data.industry,
          mbti: data.mbti, interest: data.interest,
          instagram: data.instagram,
          emoji: data.emoji,
          hide_birth_year: data.hide_birth_year,
          hide_region: data.hide_region,
          hide_industry: data.hide_industry,
          hide_interest: data.hide_interest,
          hide_instagram: data.hide_instagram,
        },
      }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) {
      if (j.error === 'NICKNAME_TAKEN') {
        // мқҙм „м—җ мқҙ л°©м—җм„ң м“°лҚҳ лӢүл„Өмһ„мқј к°ҖлҠҘм„ұ вҖ” ліөкө¬ CTA л…ём¶ң
        renderRecoverCta(data.nickname);
      } else {
        err.textContent = j.message || j.error || 'мһ…мһҘ мӢӨнҢЁ';
      }
      btn.disabled = false;
      btn.textContent = 'мһ…мһҘн•ҳкё°';
      return;
    }
    // playlist-share нҢ© вҖ” н”Ңл ҲмқҙлҰ¬мҠӨнҠё URL лі„лҸ„ м ҖмһҘ (мӢӨнҢЁн•ҙлҸ„ мһ…мһҘмқҖ м§„н–ү)
    if (ROOM.pack_id === 'playlist-share' && data.playlist) {
      try {
        await fetch(`/api/rooms/${ROOM_CODE}/playlist`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uuid: UUID, url: data.playlist }),
        });
      } catch (_) {}
    }
    try {
      localStorage.setItem('preferred_nickname', data.nickname);
      localStorage.setItem('profile_snapshot', JSON.stringify({
        gender: data.gender, birth_year: data.birth_year, region: data.region,
        industry: data.industry, mbti: data.mbti, interest: data.interest,
        instagram: data.instagram,
        emoji: data.emoji,
      }));
    } catch (_) {}
    // OAuth лЎңк·ёмқё мғҒнғңмқҙл©ҙ server users н…Ңмқҙлё”м—җлҸ„ profile м ҖмһҘ (лӢӨмқҢ лӘЁмһ„ prefill)
    try {
      const tok = localStorage.getItem('user_token');
      if (tok) {
        await fetch('/api/auth/profile', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'x-user-token': tok },
          body: JSON.stringify({
            gender: data.gender, birth_year: data.birth_year, region: data.region,
            industry: data.industry, mbti: data.mbti, interest: data.interest,
            instagram: data.instagram,
            emoji: data.emoji,
          }),
        });
      }
    } catch (_) {}
    location.replace(`/room/${ROOM_CODE}`);
  } catch (e) {
    err.textContent = (typeof t === 'function' ? t('error_copy.server_down') : 'м„ңлІ„м—җ м—°кІ°н•  мҲҳ м—Ҷм–ҙмҡ”. мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.');
    btn.disabled = false;
    btn.textContent = 'мһ…мһҘн•ҳкё°';
  }
}

function renderErr(msg) {
  document.getElementById('main').innerHTML = `<div class="step-title" style="text-align:center;color:#ff8a8a;">вҡ пёҸ ${escHtml(msg)}</div>`;
}

// в”Җв”Җ лӢүл„Өмһ„ ліөкө¬ н”ҢлЎңмҡ° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// мқҙ л°©м—җм„ң м“°лҚҳ лӢүл„Өмһ„мқҙ мқҙлҜё лӢӨлҘё uuid лЎң л“ұлЎқлҗЁ вҶ’ лӘЁмһ„мһҘ мҠ№мқё н•ҳм—җ лӮҙ мғҲ uuid лЎң кё°мЎҙ лӢөм•Ҳ мҠ№кі„.
function renderRecoverCta(nickname) {
  const err = document.getElementById('errMsg');
  if (!err) return;
  err.innerHTML = `
    <div style="padding:14px;border:1px solid rgba(212,168,67,0.45);border-radius:12px;background:rgba(212,168,67,0.08);text-align:left;">
      <div style="font-weight:700;color:#f5f2ec;margin-bottom:6px;">"${escHtml(nickname)}" вҖ” мқҙ лӘЁмһ„м—җм„ң мқҙлҜё мӮ¬мҡ© мӨ‘мқҙм—җмҡ”</div>
      <div style="font-size:12.5px;color:#c9cdd6;line-height:1.55;margin-bottom:10px;">к°ҷмқҖ лӢүл„Өмһ„мңјлЎң м „м—җ мһ…мһҘн–ҲлҚҳ кё°кё°лқјл©ҙ <strong>ліөкө¬ мҡ”мІӯ</strong> к°ҖлҠҘн•ҙмҡ”. лӘЁмһ„мһҘмқҙ мҠ№мқён•ҳл©ҙ м§ҖкёҲк№Ңм§Җмқҳ лӢөм•ҲВ·нҲ¬н‘ңк°Җ мқҙ кё°кё°лЎң мқҙм–ҙм ёмҡ”.</div>
      <button type="button" id="recoverBtn" style="width:100%;padding:10px;background:var(--gold);color:var(--navy);border:none;border-radius:8px;font-weight:700;font-family:inherit;font-size:13px;cursor:pointer;">мқҙ лӘЁмһ„м—җм„ң м“°лҚҳ лӢүл„Өмһ„мқҙм—җмҡ” В· ліөкө¬ мҡ”мІӯ</button>
    </div>`;
  const rb = document.getElementById('recoverBtn');
  if (rb) rb.onclick = () => requestRecover(nickname);
}

async function requestRecover(nickname) {
  const err = document.getElementById('errMsg');
  err.innerHTML = `<div style="padding:12px;color:#e8b84b;text-align:center;">лӘЁмһ„мһҘм—җкІҢ ліөкө¬ мҡ”мІӯ ліҙлғҲм–ҙмҡ”. мҠ№мқё лҢҖкё° мӨ‘вҖҰ</div>`;
  try {
    const r = await fetch(`/api/rooms/${ROOM_CODE}/recover-request`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname, new_uuid: UUID }),
    });
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      err.innerHTML = `<div style="color:#ff8a8a;">ліөкө¬ мҡ”мІӯ мӢӨнҢЁ вҖ” ${escHtml(j.error || 'мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„')}</div>`;
      return;
    }
    // 60мҙҲк°„ 2мҙҲ к°„кІ© нҸҙл§Ғ вҖ” лӘЁмһ„мһҘ мҠ№мқё мӢң /me?uuid=new_uuid к°Җ joined:true
    let tries = 0;
    const timer = setInterval(async () => {
      tries++;
      if (tries > 30) { clearInterval(timer); err.innerHTML = `<div style="color:#ff8a8a;">мҠ№мқё лҢҖкё° мӢңк°„мқҙ м§ҖлӮ¬м–ҙмҡ”. лӘЁмһ„мһҘм—җкІҢ лӢӨмӢң мҡ”мІӯн•ҙмЈјм„ёмҡ”.</div>`; return; }
      try {
        const meR = await fetch(`/api/rooms/${ROOM_CODE}/me?uuid=${encodeURIComponent(UUID)}`);
        if (!meR.ok) return;
        const me = await meR.json();
        if (me.joined) {
          clearInterval(timer);
          try { localStorage.setItem('preferred_nickname', nickname); } catch (_) {}
          location.replace(`/room/${ROOM_CODE}`);
        }
      } catch (_) {}
    }, 2000);
  } catch (e) {
    err.innerHTML = `<div style="color:#ff8a8a;">${(typeof t === 'function' ? t('error_copy.network_down') : 'л„ӨнҠёмӣҢнҒ¬к°Җ л¶Ҳм•Ҳм •н•ҙмҡ”. мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.')}</div>`;
  }
}

</script>
