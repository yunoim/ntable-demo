<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>ntable — 모임 입장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; }
  body {
    background: #0e1628;
    color: #ffffff;
    font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
    line-height: 1.6;
    padding: 24px;
    padding-top: calc(24px + env(safe-area-inset-top));
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
  }
  .root {
    max-width: 460px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    min-height: calc(100vh - 48px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
  }
  header {
    text-align: center;
    margin-bottom: 18px;
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: #d4a843;
  }
  .room-tag {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #c0c0c0;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .room-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    color: #ffffff;
    margin-top: 6px;
  }
  .progress {
    display: flex;
    gap: 6px;
    margin: 20px 0 28px;
  }
  .progress .pdot {
    flex: 1;
    height: 4px;
    background: rgba(212,168,67,0.2);
    border-radius: 2px;
    transition: background 0.3s;
  }
  .progress .pdot.active { background: #e8b84b; }
  .progress .pdot.done { background: #d4a843; }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .step { display: none; animation: fadeIn 0.3s ease; }
  .step.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-num {
    font-size: 12px;
    letter-spacing: 0.16em;
    color: #d4a843;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .step-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 600;
    color: #ffffff;
    line-height: 1.3;
    margin-bottom: 10px;
  }
  .step-sub {
    font-size: 14px;
    color: #c0c0c0;
    margin-bottom: 28px;
    line-height: 1.6;
  }
  .step-sub strong { color: #e8b84b; }

  .field { margin-bottom: 22px; }
  .field-label {
    display: block;
    font-size: 12px;
    color: #c0c0c0;
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }
  input[type=text], input[type=number], select.year-select {
    width: 100%;
    padding: 14px 16px;
    background: rgba(212,168,67,0.06);
    border: 1px solid rgba(212,168,67,0.4);
    border-radius: 12px;
    color: #ffffff;
    font-size: 17px;
    font-family: inherit;
    text-align: center;
  }
  select.year-select { appearance: none; -webkit-appearance: none; cursor: pointer; }
  select.year-select option { background: #131c33; color: #ffffff; }
  input:focus, select:focus { outline: none; border-color: #e8b84b; background: rgba(212,168,67,0.12); }
  input::placeholder { color: #6f7889; }
  .hint { font-size: 12px; color: #c0c0c0; margin-top: 8px; line-height: 1.5; text-align: center; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .chip-row.mbti { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .chip {
    padding: 11px 16px;
    background: rgba(212,168,67,0.06);
    border: 1px solid rgba(212,168,67,0.4);
    color: #e8e8e8;
    border-radius: 18px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
  }
  .chip-row.mbti .chip {
    padding: 12px 6px;
    text-align: center;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.04em;
  }
  .chip:hover { background: rgba(212,168,67,0.18); }
  .chip.selected {
    background: #d4a843;
    color: #0e1628;
    border-color: #d4a843;
    font-weight: 700;
  }

  .summary {
    background: rgba(212,168,67,0.06);
    border: 1px dashed rgba(212,168,67,0.35);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 24px;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 14px;
  }
  .summary-row .key { color: #c0c0c0; }
  .summary-row .val { color: #ffffff; font-weight: 600; }
  .summary-row .val.empty { color: #6f7889; font-weight: 400; font-style: italic; }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 28px;
  }
  .btn {
    flex: 1;
    padding: 16px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    border: none;
    transition: opacity 0.15s, transform 0.15s;
  }
  .btn-back {
    background: transparent;
    color: #c0c0c0;
    border: 1px solid rgba(192,192,192,0.3);
    flex: 0 0 auto;
    padding: 16px 24px;
  }
  .btn-back:hover { background: rgba(255,255,255,0.05); }
  .btn-next {
    background: #e8b84b;
    color: #0a0f1e;
    box-shadow: 0 0 16px rgba(232,184,75,0.35);
  }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
  .btn-next:not(:disabled):hover { transform: translateY(-1px); }
  .btn-skip {
    background: transparent;
    color: #c0c0c0;
    border: 1px solid rgba(192,192,192,0.3);
  }
  .btn-skip:hover { color: #ffffff; }
  .err-msg { color: #ff8a8a; font-size: 13px; margin-top: 12px; min-height: 16px; text-align: center; }
  .anon-note {
    margin-top: 18px;
    font-size: 11px;
    color: #c0c0c0;
    text-align: center;
    opacity: 0.8;
  }
  .anon-note strong { color: #7ee8a2; }
</style>
<script src="/sentry-init.js" data-page="join" defer></script>
</head>
<body>
<div class="root">
  <header>
    <div class="brand">ntable</div>
    <div class="room-tag" id="roomTag">모임 코드 —</div>
    <div class="room-title" id="roomTitle">—</div>
  </header>

  <div class="progress" id="progress"></div>

  <main id="main"><!-- steps injected --></main>

  <div class="anon-note">
    🔒 <strong>모임별 익명</strong> · 모임이 끝나면 모든 정보 자동 폐기
  </div>
</div>

<script>
const REGIONS = ['서울','경기','인천','부산','대구','대전','광주','울산','세종','강원','충북','충남','전북','전남','경북','경남','제주'];
const SEOUL_GU = ['강남','강동','강북','강서','관악','광진','구로','금천','노원','도봉','동대문','동작','마포','서대문','서초','성동','성북','송파','양천','영등포','용산','은평','종로','중구','중랑'];
const INDUSTRIES = ['IT/개발','디자인','마케팅/광고','금융/회계','교육','의료/보건','법률','공무원','서비스업','제조업','미디어/콘텐츠','스타트업','기타'];
const MBTIS = ['INTJ','INTP','ENTJ','ENTP','INFJ','INFP','ENFJ','ENFP','ISTJ','ISFJ','ESTJ','ESFJ','ISTP','ISFP','ESTP','ESFP'];
const INTERESTS = ['운동','독서','음식','영화','여행','음악','게임','술','카페','등산','사진','공연'];

const path = location.pathname.match(/\/room\/([^/]+)/);
const ROOM_CODE = path ? path[1] : '';
let UUID = '';
let ROOM = null;
let CURRENT = 0;
let STEPS = [];           // step keys: 'nick','basic','region','industry','mbti','interest','confirm'
const data = {
  nickname: '', gender: null, birth_year: null, region: null,
  industry: null, mbti: null, interest: null, instagram: null,
  // 카드 비공개 (매칭에만 사용, 다른 게스트 카드에서 마스킹)
  hide_birth_year: false, hide_region: false, hide_industry: false, hide_interest: false, hide_instagram: false,
};

function ensureUuid() {
  try { UUID = localStorage.getItem('demo_uuid') || ''; } catch (_) {}
  if (!UUID) {
    UUID = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
      : ('u-' + Math.random().toString(36).slice(2) + '-' + Date.now().toString(36));
    try { localStorage.setItem('demo_uuid', UUID); } catch (_) {}
  }
}

function escHtml(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function init() {
  if (!ROOM_CODE) { renderErr('잘못된 경로'); return; }
  ensureUuid();
  document.getElementById('roomTag').textContent = `모임 코드 ${ROOM_CODE}`;
  try {
    const r = await fetch(`/api/rooms/${ROOM_CODE}`);
    if (!r.ok) { renderErr('모임 정보를 불러올 수 없어요'); return; }
    ROOM = await r.json();
    if (ROOM.status === 'closed') { renderErr('이 모임은 이미 종료됐어요'); return; }
    document.getElementById('roomTitle').textContent = ROOM.title || ROOM_CODE;

    // 호스트 / 게스트 판별 — host_uuid 매칭
    ROOM.isHost = ROOM.host_uuid && ROOM.host_uuid === UUID;
    if (ROOM.isHost) {
      const sub = document.querySelector('.room-tag');
      if (sub) sub.textContent = `모임 코드 ${ROOM_CODE} · 호스트`;
    }

    // 이미 join 했으면 바로 호스트/게스트 화면으로 (단 ?edit=1이면 wizard 재진행 — 내 정보 수정용)
    const isEdit = new URLSearchParams(location.search).get('edit') === '1';
    const meRes = await fetch(`/api/rooms/${ROOM_CODE}/me?uuid=${encodeURIComponent(UUID)}`);
    const me = meRes.ok ? await meRes.json() : { joined: false };
    if (me.joined && !isEdit) {
      location.replace(ROOM.isHost ? `/room/${ROOM_CODE}/host` : `/room/${ROOM_CODE}`);
      return;
    }
    // edit 모드 — 기존 데이터를 wizard data로 prefill
    if (me.joined && isEdit) {
      ['nickname','gender','birth_year','region','industry','mbti','interest','instagram'].forEach(k => {
        if (me[k] != null) data[k] = me[k];
      });
      ['hide_birth_year','hide_region','hide_industry','hide_interest','hide_instagram'].forEach(k => {
        if (typeof me[k] === 'boolean') data[k] = me[k];
      });
    }

    // 호스트 = 'display' step 추가 (display_fields/birth_year_format 결정 → server PATCH)
    // couples는 성별·출생연도만 (지역/업종/MBTI/관심사 스킵)
    rebuildSteps();

    await prefillFromCache();
    renderProgress();
    renderStep();
  } catch (e) {
    renderErr('서버 연결 실패');
  }
}

function rebuildSteps() {
  // 인라인 hide 모델 — 별도 'display' step 폐기 / 사진 step 추가
  // couples: 닉 → 기본 → 사진 → 확인 (4단계)
  // 일반:    닉 → 기본 → 지역 → 업종 → MBTI → 관심사 → 사진 → 확인 (8단계)
  const isCouples = ROOM.pack_id === 'couples';
  const steps = ['nick', 'basic'];
  if (!isCouples) {
    steps.push('region', 'industry', 'mbti', 'interest');
  }
  steps.push('photo', 'confirm');
  STEPS = steps;
}

async function prefillFromCache() {
  // 1) OAuth 로그인 상태이면 server profile 우선 (다른 디바이스 동기화)
  try {
    const tok = localStorage.getItem('user_token');
    if (tok) {
      const r = await fetch('/api/auth/me', { headers: { 'x-user-token': tok } });
      if (r.ok) {
        const me = await r.json();
        if (me.authed) {
          ['gender','birth_year','region','industry','mbti','interest','instagram'].forEach(k => {
            if (me[k]) data[k] = me[k];
          });
        }
      }
    }
  } catch (_) {}
  // 2) localStorage fallback (익명 사용자)
  try {
    const pref = localStorage.getItem('preferred_nickname');
    if (pref && !data.nickname) data.nickname = pref;
    const profStr = localStorage.getItem('profile_snapshot');
    if (profStr) {
      const p = JSON.parse(profStr);
      ['gender','birth_year','region','industry','mbti','interest','instagram'].forEach(k => {
        if (p[k] && !data[k]) data[k] = p[k];
      });
    }
  } catch (_) {}
}

function renderProgress() {
  // 3 dot — 입력 진행 시각 단순화
  const html = STEPS.map((step, i) => {
    let cls = '';
    if (i === CURRENT) cls = ' active';
    else if (i < CURRENT) cls = ' done';
    return `<div class="pdot${cls}" data-i="${i}" data-step="${step}"></div>`;
  }).join('');
  document.getElementById('progress').innerHTML = html;
}

function renderStep() {
  const key = STEPS[CURRENT];
  const main = document.getElementById('main');
  const last = CURRENT === STEPS.length - 1;
  const prevBtn = CURRENT > 0
    ? `<button type="button" class="btn btn-back" onclick="prevStep()">←</button>`
    : '';

  let body = '', stepNum = `${CURRENT + 1} / ${STEPS.length}`;

  switch (key) {
    case 'nick':
      body = `
        <div class="step-num">${stepNum} · 시작</div>
        <h2 class="step-title">닉네임을 정해주세요</h2>
        <p class="step-sub">이 모임 안에서만 사용. <strong>모임이 끝나면 사라져요.</strong></p>
        ${ROOM.isHost ? `<div style="background:rgba(212,168,67,0.08);border:1px dashed rgba(212,168,67,0.4);border-radius:10px;padding:12px 14px;font-size:12.5px;color:#e8b84b;margin-bottom:18px;line-height:1.55;">📢 여기 입력한 내용은 다른 참가자 카드에 표시됩니다.</div>` : ''}
        <div class="field">
          <input type="text" id="nicknameInput" maxlength="20" placeholder="예: 별빛, lemon, J" autocomplete="off" autocapitalize="off" autocorrect="off" value="${escHtml(data.nickname)}">
        </div>
        <div class="actions">
          ${prevBtn}
          <button type="button" class="btn btn-next" id="nextBtn" disabled onclick="nextStep()">다음</button>
        </div>
      `;
      break;
    case 'basic': {
      const isHost = !!ROOM.isHost;
      const isCouples = ROOM.pack_id === 'couples';
      const defaultYear = data.birth_year || 1990;
      const yearOpts = (() => {
        const cur = new Date().getFullYear();
        let html = '<option value="">선택하세요</option>';
        for (let y = cur - 10; y >= 1940; y--) {
          html += `<option value="${y}"${defaultYear===y?' selected':''}>${y}년</option>`;
        }
        return html;
      })();
      const fmt = ROOM.birth_year_format || (isCouples ? 'exact' : 'decade_half');
      // 호스트는 표시 방식 4옵션(decade/decade_half/exact/hide), 게스트는 hide 토글만
      const fmtSection = isHost
        ? `
        <div class="field">
          <div class="field-label">출생연도 표시 방식 <span style="opacity:0.5;font-size:11px;">호스트가 모두에게 적용</span></div>
          <div class="chip-row">
            <button type="button" class="chip${fmt==='decade'&&!data.hide_birth_year?' selected':''}" data-group="bfmt" data-value="decade">30대 (10대 단위)</button>
            <button type="button" class="chip${fmt==='decade_half'&&!data.hide_birth_year?' selected':''}" data-group="bfmt" data-value="decade_half">30초·중·후 (기본·권장)</button>
            <button type="button" class="chip${fmt==='exact'&&!data.hide_birth_year?' selected':''}" data-group="bfmt" data-value="exact">정확한 연도 (1990)</button>
            <button type="button" class="chip${data.hide_birth_year?' selected':''}" data-group="bfmt" data-value="hide">🔒 카드에 표시 안 함 (매칭에만 사용)</button>
          </div>
        </div>`
        : `
        <div class="field">
          <div class="field-label">내 출생연도 공개</div>
          <div class="chip-row">
            <button type="button" class="chip${!data.hide_birth_year?' selected':''}" data-group="hide_birth_year" data-value="false">호스트 설정대로 표시 (${fmt==='decade'?'30대':fmt==='decade_half'?'30초·중·후':'정확한 연도'})</button>
            <button type="button" class="chip${data.hide_birth_year?' selected':''}" data-group="hide_birth_year" data-value="true">🔒 카드에 표시 안 함</button>
          </div>
        </div>`;
      body = `
        <div class="step-num">${stepNum} · 기본 정보 <span style="opacity:0.6;font-weight:400;">(선택)</span></div>
        <h2 class="step-title">간단히 알려주세요</h2>
        <p class="step-sub">매칭·표시에 쓰여요.</p>
        <div class="field">
          <div class="field-label">성별</div>
          <div class="chip-row">
            <button type="button" class="chip${data.gender==='male'?' selected':''}" data-group="gender" data-value="male">남성</button>
            <button type="button" class="chip${data.gender==='female'?' selected':''}" data-group="gender" data-value="female">여성</button>
            <button type="button" class="chip${data.gender==='unspecified'?' selected':''}" data-group="gender" data-value="unspecified">선택 안 함</button>
          </div>
        </div>
        <div class="field">
          <div class="field-label">출생연도 <span style="opacity:0.5;font-size:11px;">기본 1990</span></div>
          <select id="birthYearInput" class="year-select">${yearOpts}</select>
        </div>
        ${fmtSection}
        <div class="actions">
          ${prevBtn}
          <button type="button" class="btn btn-next" onclick="nextStep()">다음</button>
        </div>
      `;
      break;
    }
    case 'region': {
      const isHost = !!ROOM.isHost;
      const regionPicked = data.region || '';
      const isSeoulPicked = regionPicked.startsWith('서울');
      const seoulGu = isSeoulPicked ? regionPicked.replace(/^서울\s*/, '').trim() : '';
      const rd = ROOM.region_detail === true;
      const showGu = rd && (regionPicked === '서울' || isSeoulPicked);
      const rdSection = isHost
        ? `
        <div class="field">
          <div class="field-label">지역 표시 방식 <span style="opacity:0.5;font-size:11px;">호스트가 모두에게 적용</span></div>
          <div class="chip-row">
            <button type="button" class="chip${!rd && !data.hide_region?' selected':''}" data-group="rdfmt" data-value="false">시·도만 (예: 서울)</button>
            <button type="button" class="chip${rd && !data.hide_region?' selected':''}" data-group="rdfmt" data-value="true">서울은 구까지 (예: 강남)</button>
            <button type="button" class="chip${data.hide_region?' selected':''}" data-group="rdfmt" data-value="hide">🔒 카드에 표시 안 함 (매칭에만 사용)</button>
          </div>
        </div>`
        : `
        <div class="field">
          <div class="field-label">내 지역 공개</div>
          <div class="chip-row">
            <button type="button" class="chip${!data.hide_region?' selected':''}" data-group="hide_region" data-value="false">호스트 설정대로 표시 (${rd?'서울 구까지':'시·도만'})</button>
            <button type="button" class="chip${data.hide_region?' selected':''}" data-group="hide_region" data-value="true">🔒 카드에 표시 안 함</button>
          </div>
        </div>`;
      body = `
        <div class="step-num">${stepNum} · 지역 <span style="opacity:0.6;font-weight:400;">(선택)</span></div>
        <h2 class="step-title">주로 활동하는 지역</h2>
        <p class="step-sub">근처에 사는 분과 인연이 생길 수도.</p>
        <div class="field">
          <div class="chip-row">${REGIONS.map(v => {
            const sel = regionPicked === v || (v === '서울' && isSeoulPicked);
            return `<button type="button" class="chip${sel?' selected':''}" data-group="region" data-value="${escHtml(v)}">${escHtml(v)}</button>`;
          }).join('')}</div>
        </div>
        ${showGu ? `
        <div class="field">
          <div class="field-label" style="font-size:13px;color:#e8b84b;">서울 어디?</div>
          <div class="chip-row">${SEOUL_GU.map(g => `<button type="button" class="chip${seoulGu===g?' selected':''}" data-group="seoul-gu" data-value="${escHtml(g)}">${escHtml(g)}</button>`).join('')}</div>
        </div>` : ''}
        ${rdSection}
        <div class="actions">
          ${prevBtn}
          <button type="button" class="btn btn-next" onclick="nextStep()">다음</button>
        </div>
      `;
      break;
    }
    case 'industry':
      body = `
        <div class="step-num">${stepNum} · 업종 <span style="opacity:0.6;font-weight:400;">(선택)</span></div>
        <h2 class="step-title">주로 어떤 분야</h2>
        <p class="step-sub">대화 거리가 생겨요.</p>
        <div class="field">
          <div class="chip-row">${INDUSTRIES.map(v => `<button type="button" class="chip${data.industry===v?' selected':''}" data-group="industry" data-value="${escHtml(v)}">${escHtml(v)}</button>`).join('')}</div>
        </div>
        <div class="field">
          <label class="chip df-check${data.hide_industry?' selected':''}" style="cursor:pointer;"><input type="checkbox" id="hide_industry"${data.hide_industry?' checked':''} style="display:none;"> 🔒 카드에 표시 안 함 (매칭에만 사용)</label>
        </div>
        <div class="actions">
          ${prevBtn}
          <button type="button" class="btn btn-next" onclick="nextStep()">다음</button>
        </div>
      `;
      break;
    case 'mbti':
      body = `
        <div class="step-num">${stepNum} · MBTI <span style="opacity:0.6;font-weight:400;">(선택)</span></div>
        <h2 class="step-title">MBTI는요?</h2>
        <p class="step-sub">매칭 정확도가 올라가요.</p>
        <div class="field">
          <div class="chip-row mbti">${MBTIS.map(v => `<button type="button" class="chip${data.mbti===v?' selected':''}" data-group="mbti" data-value="${v}">${v}</button>`).join('')}</div>
        </div>
        <div class="field">
          <div class="chip-row">
            <button type="button" class="chip${data.mbti===null?' selected':''}" data-group="mbti" data-value="">모르겠어요 / 선택 안 함</button>
          </div>
        </div>
        <div class="actions">
          ${prevBtn}
          <button type="button" class="btn btn-next" onclick="nextStep()">다음</button>
        </div>
      `;
      break;
    case 'interest': {
      const interestSet = new Set((data.interest || '').split(',').map(s => s.trim()).filter(Boolean));
      body = `
        <div class="step-num">${stepNum} · 관심사 <span style="opacity:0.6;font-weight:400;">(선택)</span></div>
        <h2 class="step-title">뭘 좋아하세요?</h2>
        <p class="step-sub">여러 개 가능. 직접 입력도 OK.</p>
        <div class="field">
          <div class="chip-row">${INTERESTS.map(v => `<button type="button" class="chip${interestSet.has(v)?' selected':''}" data-group="interest" data-value="${escHtml(v)}">${escHtml(v)}</button>`).join('')}</div>
          <input type="text" id="interestInput" maxlength="60" placeholder="또는 직접 입력 (콤마로 여러 개)" value="${escHtml(data.interest || '')}" style="margin-top:14px;">
        </div>
        <div class="field">
          <label class="chip df-check${data.hide_interest?' selected':''}" style="cursor:pointer;"><input type="checkbox" id="hide_interest"${data.hide_interest?' checked':''} style="display:none;"> 🔒 관심사 카드에 표시 안 함 (매칭에만 사용)</label>
        </div>

        <div class="field" style="margin-top:24px;padding-top:18px;border-top:1px dashed rgba(212,168,67,0.2);">
          <div class="field-label">인스타그램 <span style="opacity:0.5;font-size:11px;">(선택)</span></div>
          <input type="text" id="instaInput" maxlength="50" placeholder="@your_id (영문·숫자·점·언더바)" value="${escHtml(data.instagram || '')}" autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="email">
        </div>
        <div class="field">
          <label class="chip df-check${data.hide_instagram?' selected':''}" style="cursor:pointer;"><input type="checkbox" id="hide_instagram"${data.hide_instagram?' checked':''} style="display:none;"> 🔒 인스타그램 카드에 표시 안 함</label>
        </div>

        <div class="actions">
          ${prevBtn}
          <button type="button" class="btn btn-next" onclick="nextStep()">다음</button>
        </div>
      `;
      break;
    }
    case 'photo': {
      const savedPhoto = (() => { try { return localStorage.getItem(`ntable_photo_${ROOM_CODE}`) || ''; } catch (_) { return ''; } })();
      body = `
        <div class="step-num">${stepNum} · 프로필 사진 <span style="opacity:0.6;font-weight:400;">(선택)</span></div>
        <h2 class="step-title">사진을 올릴까요?</h2>
        <p class="step-sub">올리면 카드에 표시돼요. <strong>브라우저에만 저장</strong>, 서버에 안 남아요.</p>
        <div class="field" style="text-align:center;">
          <div id="photoPreview" style="width:140px;height:140px;border-radius:50%;background:rgba(212,168,67,0.12);border:2px dashed rgba(212,168,67,0.4);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:48px;overflow:hidden;">${savedPhoto ? `<img src="${escHtml(savedPhoto)}" style="width:100%;height:100%;object-fit:cover;">` : '📷'}</div>
          <input type="file" id="photoInput" accept="image/*" style="display:none;" />
          <button type="button" class="btn btn-skip" onclick="document.getElementById('photoInput').click();" style="width:100%;margin-bottom:8px;">${savedPhoto ? '사진 변경' : '📷 사진 선택'}</button>
          ${savedPhoto ? `<button type="button" class="btn btn-skip" onclick="clearWizardPhoto()" style="width:100%;font-size:12px;color:#ff8a8a;border-color:rgba(255,138,138,0.3);">사진 제거</button>` : ''}
        </div>
        <div class="actions">
          ${prevBtn}
          <button type="button" class="btn btn-next" onclick="nextStep()">다음</button>
        </div>
      `;
      break;
    }
    case 'confirm':
      const subText = ROOM.isHost
        ? '호스트로 모임을 시작해요. 게스트들에게는 이렇게 보입니다.'
        : '아래 정보로 다른 참가자에게 보입니다.';
      const submitLabel = ROOM.isHost ? 'QR·참여코드 받기' : '입장하기';
      const genderLabel = data.gender === 'male' ? '남성' : data.gender === 'female' ? '여성' : data.gender === 'unspecified' ? '선택 안 함' : '';
      body = `
        <div class="step-num">${stepNum} · 확인</div>
        <h2 class="step-title">이렇게 입장해요</h2>
        <p class="step-sub">${subText}</p>
        <div class="summary">
          <div class="summary-row"><span class="key">닉네임</span><span class="val">${escHtml(data.nickname)}</span></div>
          ${rowH('성별', genderLabel, false)}
          ${rowH('출생연도', data.birth_year ? data.birth_year + '년' : '', data.hide_birth_year)}
          ${rowH('지역', data.region, data.hide_region)}
          ${rowH('업종', data.industry, data.hide_industry)}
          ${rowH('MBTI', data.mbti, false)}
          ${rowH('관심사', data.interest, data.hide_interest)}
          ${rowH('인스타그램', data.instagram ? '@' + data.instagram : '', data.hide_instagram)}
        </div>
        <div class="actions">
          ${prevBtn}
          <button type="button" class="btn btn-next" id="submitBtn" onclick="submitJoin()">${submitLabel}</button>
        </div>
        <div class="err-msg" id="errMsg"></div>
      `;
      break;
  }

  main.innerHTML = body;
  bindStep(key);
  renderProgress();
}

function row(k, v) {
  if (v) return `<div class="summary-row"><span class="key">${k}</span><span class="val">${escHtml(v)}</span></div>`;
  return `<div class="summary-row"><span class="key">${k}</span><span class="val empty">생략</span></div>`;
}
function rowH(k, v, hidden) {
  // hidden=true면 매칭에만 사용 (다른 게스트 카드에서 마스킹). 본인 확인엔 값+🔒 표시.
  if (!v) return `<div class="summary-row"><span class="key">${k}</span><span class="val empty">생략</span></div>`;
  if (hidden) {
    return `<div class="summary-row"><span class="key">${k}</span><span class="val" style="opacity:0.55;">${escHtml(v)} <span style="font-size:10px;color:#9aa0ac;letter-spacing:0.04em;">🔒 카드 비공개</span></span></div>`;
  }
  return `<div class="summary-row"><span class="key">${k}</span><span class="val">${escHtml(v)}</span></div>`;
}

function bindStep(key) {
  if (key === 'nick') {
    const inp = document.getElementById('nicknameInput');
    const btn = document.getElementById('nextBtn');
    btn.disabled = inp.value.trim().length === 0;
    inp.addEventListener('input', () => {
      data.nickname = inp.value.trim();
      btn.disabled = data.nickname.length === 0;
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !btn.disabled) nextStep();
    });
    setTimeout(() => inp.focus(), 100);
  }
  // chip click 핸들러는 document-level로 한번만
}

document.addEventListener('click', (e) => {
  // df-check 라벨 (hide 체크박스 chip) — selected 토글 + data 반영
  const dfChip = e.target.closest('.chip.df-check');
  if (dfChip) {
    const cb = dfChip.querySelector('input[type="checkbox"]');
    if (cb) {
      setTimeout(() => {
        dfChip.classList.toggle('selected', cb.checked);
        if (cb.id === 'hide_industry') data.hide_industry = cb.checked;
        if (cb.id === 'hide_interest') data.hide_interest = cb.checked;
        if (cb.id === 'hide_instagram') data.hide_instagram = cb.checked;
      }, 0);
    }
    return;
  }
  const chip = e.target.closest('.chip');
  if (!chip) return;
  const group = chip.dataset.group;
  if (!group) return;
  const wasSelected = chip.classList.contains('selected');

  // 호스트 출생연도 표시 방식 (decade/decade_half/exact/hide)
  if (group === 'bfmt') {
    document.querySelectorAll('.chip[data-group="bfmt"]').forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
    const v = chip.dataset.value;
    if (v === 'hide') {
      data.hide_birth_year = true;
    } else {
      data.hide_birth_year = false;
      // 호스트 결정 → server PATCH (방 규칙 변경)
      ROOM.birth_year_format = v;
      patchRoomDisplay({ birth_year_format: v });
    }
    return;
  }
  // 게스트 hide_birth_year 토글
  if (group === 'hide_birth_year') {
    document.querySelectorAll('.chip[data-group="hide_birth_year"]').forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
    data.hide_birth_year = chip.dataset.value === 'true';
    return;
  }
  // 호스트 지역 표시 방식 (false/true/hide) — 항상 renderStep으로 구 UI 재평가 + 강남 잔재 정리
  if (group === 'rdfmt') {
    const v = chip.dataset.value;
    if (v === 'hide') {
      data.hide_region = true;
      // 시·도만 / 표시 안 함 → 구 선택값 초기화 (서울 강남 → 서울)
      if (data.region && data.region.startsWith('서울 ')) data.region = '서울';
      ROOM.region_detail = false;
      patchRoomDisplay({ region_detail: false });
    } else {
      data.hide_region = false;
      const newRd = v === 'true';
      ROOM.region_detail = newRd;
      // 시·도만으로 변경 시 강남 잔재 제거
      if (!newRd && data.region && data.region.startsWith('서울 ')) data.region = '서울';
      patchRoomDisplay({ region_detail: newRd });
    }
    renderStep(); // 구 row 노출 조건 즉시 재평가
    return;
  }
  // 게스트 hide_region 토글
  if (group === 'hide_region') {
    const isHide = chip.dataset.value === 'true';
    data.hide_region = isHide;
    if (isHide && data.region && data.region.startsWith('서울 ')) data.region = '서울';
    renderStep();
    return;
  }

  if (group === 'interest') {
    // 관심사는 multi-select (0개~여러 개 OK)
    chip.classList.toggle('selected', !wasSelected);
    const selected = Array.from(document.querySelectorAll(`.chip[data-group="interest"].selected`))
      .map(c => c.dataset.value);
    data.interest = selected.length ? selected.join(', ') : null;
    const inp = document.getElementById('interestInput');
    if (inp) inp.value = data.interest || '';
    return;
  }

  // region: 항상 renderStep으로 구 row 재평가 (서울 ↔ 다른 시·도 전환 시 강남 잔재 제거)
  if (group === 'region') {
    if (wasSelected) {
      data.region = null;
    } else {
      data.region = chip.dataset.value;
    }
    renderStep(); // 구 UI 노출 조건(region==='서울' && rd) 즉시 재평가
    return;
  }

  // seoul-gu: 구 선택 → region = "서울 강남" 형태
  if (group === 'seoul-gu') {
    document.querySelectorAll('.chip[data-group="seoul-gu"]').forEach(c => c.classList.remove('selected'));
    if (wasSelected) {
      data.region = '서울';
    } else {
      chip.classList.add('selected');
      data.region = '서울 ' + chip.dataset.value;
    }
    return;
  }

  // 다른 그룹은 single-select (다시 누르면 취소)
  document.querySelectorAll(`.chip[data-group="${group}"]`).forEach(c => c.classList.remove('selected'));
  if (!wasSelected) {
    chip.classList.add('selected');
    data[group] = chip.dataset.value;
  } else {
    data[group] = null;
  }
});

document.addEventListener('change', (e) => {
  if (e.target.id === 'birthYearInput') {
    const y = parseInt(e.target.value, 10);
    data.birth_year = (y >= 1940 && y <= 2030) ? y : null;
  }
});

// 통합 페이지 진입 시 출생연도 default를 1990으로 즉시 반영 (사용자가 안 만져도 적용)
document.addEventListener('DOMContentLoaded', () => {});
function ensureBirthDefault() {
  if (!data.birth_year) {
    const sel = document.getElementById('birthYearInput');
    if (sel && sel.value) {
      const y = parseInt(sel.value, 10);
      if (y >= 1940 && y <= 2030) data.birth_year = y;
    }
  }
}

document.addEventListener('input', (e) => {
  if (e.target.id === 'interestInput') {
    const v = e.target.value.trim();
    data.interest = v || null;
    document.querySelectorAll('.chip[data-group="interest"]').forEach(c => c.classList.remove('selected'));
  }
  if (e.target.id === 'instaInput') {
    // 인스타그램 — 영문/숫자/점/언더바만 허용, 소문자 변환, @ 자동 제거
    const cleaned = e.target.value.toLowerCase().replace(/^@/, '').replace(/[^a-z0-9._]/g, '');
    if (cleaned !== e.target.value) e.target.value = cleaned;
    data.instagram = cleaned || null;
  }
});

function nextStep() {
  // basic step 떠날 때 birth_year default 1990 보장
  if (STEPS[CURRENT] === 'basic') ensureBirthDefault();
  CURRENT = Math.min(CURRENT + 1, STEPS.length - 1);
  renderStep();
}

// 호스트 표시 방식 변경 시 server PATCH (인라인)
async function patchRoomDisplay(payload) {
  if (!ROOM.isHost) return;
  try {
    await fetch(`/api/rooms/${ROOM_CODE}/display`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ uuid: UUID, ...payload }),
    });
  } catch (_) {}
}

// 사진 input 처리 + 제거
document.addEventListener('change', (e) => {
  if (e.target.id === 'photoInput') {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      try { localStorage.setItem(`ntable_photo_${ROOM_CODE}`, dataUrl); } catch (_) {}
      const preview = document.getElementById('photoPreview');
      if (preview) preview.innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;">`;
    };
    reader.readAsDataURL(file);
  }
});
function clearWizardPhoto() {
  try { localStorage.removeItem(`ntable_photo_${ROOM_CODE}`); } catch (_) {}
  renderStep();
}
function prevStep() {
  CURRENT = Math.max(CURRENT - 1, 0);
  renderStep();
}

async function submitJoin() {
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errMsg');
  if (!data.nickname) {
    err.textContent = '닉네임이 필요해요';
    CURRENT = 0;
    renderStep();
    return;
  }
  btn.disabled = true;
  btn.textContent = '입장 중…';
  err.textContent = '';
  try {
    const r = await fetch(`/api/rooms/${ROOM_CODE}/join`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        uuid: UUID,
        nickname: data.nickname,
        profile: {
          gender: data.gender, birth_year: data.birth_year,
          region: data.region, industry: data.industry,
          mbti: data.mbti, interest: data.interest,
          instagram: data.instagram,
          hide_birth_year: data.hide_birth_year,
          hide_region: data.hide_region,
          hide_industry: data.hide_industry,
          hide_interest: data.hide_interest,
          hide_instagram: data.hide_instagram,
        },
      }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) {
      err.textContent = j.message || (j.error === 'NICKNAME_TAKEN' ? '이 모임에서 이미 사용 중인 닉네임이에요' : (j.error || '입장 실패'));
      btn.disabled = false;
      btn.textContent = '입장하기';
      return;
    }
    try {
      localStorage.setItem('preferred_nickname', data.nickname);
      localStorage.setItem('profile_snapshot', JSON.stringify({
        gender: data.gender, birth_year: data.birth_year, region: data.region,
        industry: data.industry, mbti: data.mbti, interest: data.interest,
      }));
    } catch (_) {}
    // OAuth 로그인 상태이면 server users 테이블에도 profile 저장 (다음 모임 prefill)
    try {
      const tok = localStorage.getItem('user_token');
      if (tok) {
        await fetch('/api/auth/profile', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'x-user-token': tok },
          body: JSON.stringify({
            gender: data.gender, birth_year: data.birth_year, region: data.region,
            industry: data.industry, mbti: data.mbti, interest: data.interest,
          }),
        });
      }
    } catch (_) {}
    location.replace(ROOM.isHost ? `/room/${ROOM_CODE}/host` : `/room/${ROOM_CODE}`);
  } catch (e) {
    err.textContent = '서버 연결 실패';
    btn.disabled = false;
    btn.textContent = '입장하기';
  }
}

function renderErr(msg) {
  document.getElementById('main').innerHTML = `<div class="step-title" style="text-align:center;color:#ff8a8a;">⚠️ ${escHtml(msg)}</div>`;
}

init();
</script>
</body>
</html>
