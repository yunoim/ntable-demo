<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<link rel="stylesheet" href="/theme-lock.css">
<link rel="stylesheet" href="/styles/tokens.css">
<link rel="stylesheet" href="/styles/components.css">
<script src="/samsung-dark-warn.js" defer></script>
<script src="/oauth-redirect.js"></script>
<script src="/auth-header.js" defer></script>
<script src="/remember-toggle.js" defer></script>
<title>ntable — 모임 입장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; }
  body {
    background: #0e1628;
    color: #ffffff;
    font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
    line-height: 1.6;
    padding: 24px;
    padding-top: calc(24px + env(safe-area-inset-top));
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
  }
  .root {
    max-width: 460px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    min-height: calc(100vh - 48px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
  }
  header {
    text-align: center;
    margin-bottom: 18px;
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: #d4a843;
  }
  .room-tag {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #c0c0c0;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .room-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    color: #ffffff;
    margin-top: 6px;
  }
  .progress {
    display: flex;
    gap: 6px;
    margin: 20px 0 28px;
  }
  .progress .pdot {
    flex: 1;
    height: 4px;
    background: rgba(212,168,67,0.2);
    border-radius: 2px;
    transition: background 0.3s;
  }
  .progress .pdot.active { background: #e8b84b; }
  .progress .pdot.done { background: #d4a843; }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .step { display: none; animation: fadeIn 0.3s ease; }
  .step.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-num {
    font-size: 12px;
    letter-spacing: 0.16em;
    color: #d4a843;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .step-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 600;
    color: #ffffff;
    line-height: 1.3;
    margin-bottom: 10px;
  }
  .step-sub {
    font-size: 14px;
    color: #c0c0c0;
    margin-bottom: 28px;
    line-height: 1.6;
  }
  .step-sub strong { color: #e8b84b; }
  .step-tip {
    display: flex; align-items: flex-start; gap: 8px;
    margin: -8px 0 18px;
    padding: 10px 12px;
    background: rgba(212,168,67,0.06);
    border: 1px solid rgba(212,168,67,0.22);
    border-radius: 10px;
    font-size: 12.5px;
    color: rgba(245,242,236,0.85);
    line-height: 1.55;
  }
  .step-tip-icon { font-size: 14px; flex-shrink: 0; line-height: 1.4; }
  .step-tip strong { color: #e8b84b; font-weight: 600; }

  .field { margin-bottom: 22px; }
  .nick-conflict-slot { margin-top: 10px; }
  .nick-conflict {
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 12.5px;
    line-height: 1.5;
    letter-spacing: 0.01em;
    display: flex; flex-direction: column; gap: 8px;
  }
  .nick-conflict.self {
    background: rgba(126,232,162,0.08);
    border: 1px solid rgba(126,232,162,0.35);
    color: #b4efc9;
  }
  .nick-conflict.taken {
    background: rgba(232,126,126,0.08);
    border: 1px solid rgba(232,126,126,0.35);
    color: #f2c0c0;
  }
  .nick-conflict-cta {
    align-self: flex-start;
    background: transparent;
    border: 1px solid currentColor;
    color: inherit;
    font-family: inherit;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .nick-conflict-cta:hover { background: rgba(255,255,255,0.04); }
  .field-label {
    display: block;
    font-size: 12px;
    color: #c0c0c0;
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }
  input[type=text], input[type=number], input[type=url], input[type=email], select.year-select {
    width: 100%;
    padding: 14px 16px;
    background: rgba(212,168,67,0.06);
    border: 1px solid rgba(212,168,67,0.4);
    border-radius: 12px;
    color: #ffffff;
    font-size: 17px;
    font-family: inherit;
    text-align: center;
  }
  input[type=url] {
    text-align: left;
    font-size: 15px;
    letter-spacing: 0.01em;
  }
  select.year-select { appearance: none; -webkit-appearance: none; cursor: pointer; }
  select.year-select option { background: #131c33; color: #ffffff; }
  input:focus, select:focus { outline: none; border-color: #e8b84b; background: rgba(212,168,67,0.12); }
  input::placeholder { color: #6f7889; }
  .hint { font-size: 12px; color: #c0c0c0; margin-top: 8px; line-height: 1.5; text-align: center; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  /* 이모지 카테고리 탭 (2026-04-20 추가) */
  .emoji-cat-tabs { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 10px; }
  .emoji-cat-tab {
    padding: 6px 12px;
    background: transparent;
    border: 1px solid rgba(212,168,67,0.3);
    color: #c0c0c0;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .emoji-cat-tab:hover { color: #e8b84b; border-color: rgba(212,168,67,0.6); }
  .emoji-cat-tab.active { background: rgba(212,168,67,0.18); border-color: #d4a843; color: #e8b84b; font-weight: 600; }
  .emoji-cat-grid { min-height: 180px; }
  .chip-row.mbti { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .chip {
    padding: 11px 16px;
    background: rgba(212,168,67,0.06);
    border: 1px solid rgba(212,168,67,0.4);
    color: #e8e8e8;
    border-radius: 18px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
  }
  .chip-row.mbti .chip {
    padding: 12px 6px;
    text-align: center;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.04em;
  }
  .chip:hover { background: rgba(212,168,67,0.18); }
  .chip.selected {
    background: #d4a843;
    color: #0e1628;
    border-color: #d4a843;
    font-weight: 700;
  }

  .summary {
    background: rgba(212,168,67,0.06);
    border: 1px dashed rgba(212,168,67,0.35);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 24px;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 14px;
  }
  .summary-row .key { color: #c0c0c0; }
  .summary-row .val { color: #ffffff; font-weight: 600; }
  .summary-row .val.empty { color: #6f7889; font-weight: 400; font-style: italic; }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: auto;
    padding-top: 22px;
    padding-bottom: calc(8px + env(safe-area-inset-bottom));
    position: sticky;
    bottom: 0;
    background: linear-gradient(180deg, rgba(10,15,30,0) 0%, #0a0f1e 32%);
    z-index: 10;
  }
  .btn {
    flex: 1;
    padding: 16px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    border: none;
    transition: opacity 0.15s, transform 0.15s;
  }
  .btn-back {
    background: transparent;
    color: #c0c0c0;
    border: 1px solid rgba(192,192,192,0.3);
    flex: 0 0 auto;
    padding: 16px 24px;
  }
  .btn-back:hover { background: rgba(255,255,255,0.05); }
  .btn-next {
    background: #e8b84b;
    color: #0a0f1e;
    box-shadow: 0 0 16px rgba(232,184,75,0.35);
  }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
  .btn-next:not(:disabled):hover { transform: translateY(-1px); }
  .btn-skip {
    background: transparent;
    color: #c0c0c0;
    border: 1px solid rgba(192,192,192,0.3);
  }
  .btn-skip:hover { color: #ffffff; }
  .err-msg { color: #ff8a8a; font-size: 13px; margin-top: 12px; min-height: 16px; text-align: center; }
  .anon-note {
    margin-top: 18px;
    font-size: 11px;
    color: #c0c0c0;
    text-align: center;
    opacity: 0.8;
  }
  .anon-note strong { color: #7ee8a2; }
</style>
<script src="/sentry-init.js" data-page="join" defer></script>
</head>
<body>
<div class="root">
  <header>
    <div class="brand">ntable</div>
    <div class="room-tag" id="roomTag">참여 코드 —</div>
    <div class="room-title" id="roomTitle">—</div>
  </header>

  <div class="progress" id="progress"></div>

  <main id="main"><!-- steps injected --></main>

  <div class="anon-note">
    🔒 <strong>익명성 보장</strong> · 모임이 끝나면 개인 정보 자동 폐기
  </div>
</div>

<script>
const REGIONS = ['서울','경기','인천','부산','대구','대전','광주','울산','세종','강원','충북','충남','전북','전남','경북','경남','제주'];
const SEOUL_GU = ['강남','강동','강북','강서','관악','광진','구로','금천','노원','도봉','동대문','동작','마포','서대문','서초','성동','성북','송파','양천','영등포','용산','은평','종로','중구','중랑'];
const METROS = ['서울','부산','대구','인천','광주','대전','울산'];
const METRO_GU = {
  '서울': SEOUL_GU,
  '부산': ['강서','금정','기장','남','동','동래','부산진','북','사상','사하','서','수영','연제','영도','중','해운대'],
  '대구': ['남','달서','달성','동','북','서','수성','중'],
  '인천': ['강화','계양','남동','동','미추홀','부평','서','연수','옹진','중'],
  '광주': ['광산','남','동','북','서'],
  '대전': ['대덕','동','서','유성','중'],
  '울산': ['남','동','북','중','울주'],
};
function detectMetro(region) {
  if (!region) return null;
  return METROS.find(m => region === m || region.startsWith(m + ' ')) || null;
}
function stripMetroGu(region) {
  const m = detectMetro(region);
  if (!m) return region;
  return m;
}
const INDUSTRIES = ['IT/개발','디자인','마케팅/광고','금융/회계','교육','의료/보건','법률','공무원','서비스업','제조업','미디어/콘텐츠','스타트업','기타'];
const MBTIS = ['INTJ','INTP','ENTJ','ENTP','INFJ','INFP','ENFJ','ENFP','ISTJ','ISFJ','ESTJ','ESFJ','ISTP','ISFP','ESTP','ESFP'];
const INTERESTS = ['운동','독서','음식','영화','여행','음악','게임','술','카페','등산','사진','공연'];

const path = location.pathname.match(/\/room\/([^/]+)/);
const ROOM_CODE = path ? path[1] : '';
let UUID = '';
let ROOM = null;
let CURRENT = 0;
let STEPS = [];           // step keys: 'nick','basic','region','industry','mbti','interest','confirm'
// 팩별 라벨/아이콘 — wizard 뱃지·결과 페이지 톤에 사용
const PACK_META = {
  couples:          { icon: '💞', label: '둘이서' },
  dating:           { icon: '💘', label: '소개팅·연애' },
  icebreaker:       { icon: '🤝', label: '처음 만나는 사이' },
  'friends-reunion':{ icon: '✨', label: '오랜만' },
  teambuilding:     { icon: '🎯', label: '팀빌딩' },
};
const data = {
  nickname: '', gender: null, birth_year: null, region: null,
  industry: null, mbti: null, interest: null, instagram: null, emoji: null,
  playlist: null, // playlist-share 팩 전용 — playlist_links 테이블에 별도 저장
  // 카드 비공개 (매칭에만 사용, 다른 게스트 카드에서 마스킹)
  hide_birth_year: false, hide_region: false, hide_industry: false, hide_interest: false, hide_instagram: false,
};

function ensureUuid() {
  try { UUID = localStorage.getItem('demo_uuid') || ''; } catch (_) {}
  if (!UUID) {
    UUID = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
      : ('u-' + Math.random().toString(36).slice(2) + '-' + Date.now().toString(36));
    try { localStorage.setItem('demo_uuid', UUID); } catch (_) {}
  }
}

function escHtml(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function init() {
  if (!ROOM_CODE) { renderErr('잘못된 경로'); return; }
  ensureUuid();
  document.getElementById('roomTag').textContent = `참여 코드 ${ROOM_CODE}`;
  try {
    const r = await fetch(`/api/rooms/${ROOM_CODE}`);
    if (!r.ok) { renderErr('모임 정보를 불러올 수 없어요. 새로고침하거나 잠시 후 다시 시도해주세요.'); return; }
    ROOM = await r.json();
    if (ROOM.status === 'closed') { renderErr('이 모임은 이미 종료됐어요'); return; }
    document.getElementById('roomTitle').textContent = ROOM.title || ROOM_CODE;

    // T-02 (2026-04-21): join wizard 는 게스트 self-describe 전용. 모임장은 host.html 로 즉시 리다이렉트.
    if (ROOM.host_uuid && ROOM.host_uuid === UUID) {
      location.replace(`/room/${ROOM_CODE}/host`);
      return;
    }

    // 이미 join 했으면 바로 게스트 화면으로 (단 ?edit=1이면 wizard 재진행 — 내 정보 수정용)
    const isEdit = new URLSearchParams(location.search).get('edit') === '1';
    const meRes = await fetch(`/api/rooms/${ROOM_CODE}/me?uuid=${encodeURIComponent(UUID)}`);
    const me = meRes.ok ? await meRes.json() : { joined: false };
    if (me.joined && !isEdit) {
      location.replace(`/room/${ROOM_CODE}`);
      return;
    }
    // edit 모드 — 기존 데이터를 wizard data로 prefill
    if (me.joined && isEdit) {
      ['nickname','gender','birth_year','region','industry','mbti','interest','instagram','emoji'].forEach(k => {
        if (me[k] != null) data[k] = me[k];
      });
      ['hide_birth_year','hide_region','hide_industry','hide_interest','hide_instagram'].forEach(k => {
        if (typeof me[k] === 'boolean') data[k] = me[k];
      });
      // ?step=instagram 등 특정 step으로 자동 점프 (편집 deep link)
      const targetStep = new URLSearchParams(location.search).get('step');
      if (targetStep) {
        // STEPS는 rebuildSteps()에서 결정됨 — 호출 후 위치 찾기
        rebuildSteps();
        const idx = STEPS.indexOf(targetStep);
        if (idx >= 0) CURRENT = idx;
      }
    }

    rebuildSteps();

    await prefillFromCache();
    // T-01 (2026-04-21): 이모지 미설정 시 랜덤 기본값 배정 — 카드 허전함 방지 (lazy prompt 에서 재선택 가능)
    if (!data.emoji) {
      const pool = ['😀','😊','🥰','😎','🤔','🥳','🤗','🤓','🦊','🐻','🐯','🌸','🌙','🎵','🎨','🎮','⭐','✨','💎','🌟'];
      data.emoji = pool[Math.floor(Math.random() * pool.length)];
    }
    renderProgress();
    renderStep();
  } catch (e) {
    renderErr('서버에 연결할 수 없어요. 잠시 후 다시 시도해주세요.');
  }
}

function rebuildSteps() {
  // T-01 (2026-04-21): wizard_required 기준으로 최소 step 만 구성. 나머지는 guest.html 소개 탭 lazy prompt 에서 수집.
  // - wizard_required 있으면: ['nickname', ...required] → STEPS
  // - 없으면 legacy wizard_fields fallback (하위호환)
  const pd = ROOM.pack_defaults || {};
  const req = Array.isArray(pd.wizard_required) ? pd.wizard_required : null;
  const isEdit = new URLSearchParams(location.search).get('edit') === '1';
  // edit 모드에서는 기존 방식(전 필드 수정) 유지 — 내 정보 수정 deep link 호환
  if (isEdit) {
    const wf = Array.isArray(pd.wizard_fields) ? pd.wizard_fields : null;
    if (wf) {
      const steps = ['nick'];
      const hasGender = wf.includes('gender');
      const hasBirth = wf.includes('birth_year');
      if (hasGender || hasBirth) steps.push('basic');
      if (wf.includes('region')) steps.push('region');
      if (wf.includes('industry')) steps.push('industry');
      if (wf.includes('mbti')) steps.push('mbti');
      if (wf.includes('interest')) steps.push('interest');
      if (wf.includes('playlist')) steps.push('playlist');
      if (wf.includes('instagram') && ROOM.instagram_collect === true) steps.push('instagram');
      if (wf.includes('emoji')) steps.push('photo');
      steps.push('confirm');
      STEPS = steps;
      return;
    }
  }
  // 기본 입장 경로 — required 필드만
  if (req) {
    const steps = ['nick'];
    if (req.includes('playlist')) steps.push('playlist');
    if (req.includes('instagram') && ROOM.instagram_collect === true) steps.push('instagram');
    STEPS = steps;
    return;
  }
  // legacy fallback — pack_defaults 미탑재 방
  STEPS = ['nick'];
}

async function prefillFromCache() {
  // 1) OAuth 로그인 상태이면 server profile 우선 (다른 디바이스 동기화)
  try {
    const tok = localStorage.getItem('user_token');
    if (tok) {
      const r = await fetch('/api/auth/me', { headers: { 'x-user-token': tok } });
      if (r.ok) {
        const me = await r.json();
        if (me.authed) {
          ['gender','birth_year','region','industry','mbti','interest','instagram','emoji'].forEach(k => {
            if (me[k]) data[k] = me[k];
          });
        }
      }
    }
  } catch (_) {}
  // 2) localStorage fallback (익명 사용자)
  try {
    const pref = localStorage.getItem('preferred_nickname');
    if (pref && !data.nickname) data.nickname = pref;
    const profStr = localStorage.getItem('profile_snapshot');
    if (profStr) {
      const p = JSON.parse(profStr);
      ['gender','birth_year','region','industry','mbti','interest','instagram','emoji'].forEach(k => {
        if (p[k] && !data[k]) data[k] = p[k];
      });
    }
  } catch (_) {}
}

function renderProgress() {
  // 3 dot — 입력 진행 시각 단순화
  const html = STEPS.map((step, i) => {
    let cls = '';
    if (i === CURRENT) cls = ' active';
    else if (i < CURRENT) cls = ' done';
    return `<div class="pdot${cls}" data-i="${i}" data-step="${step}"></div>`;
  }).join('');
  document.getElementById('progress').innerHTML = html;
}

function renderStep() {
  const key = STEPS[CURRENT];
  const main = document.getElementById('main');
  const last = CURRENT === STEPS.length - 1;
  const prevBtn = CURRENT > 0
    ? `<button type="button" class="btn btn-back" onclick="prevStep()">←</button>`
    : '';

        const metro = (typeof detectMetro === 'function') ? detectMetro(regionDisplay) : '';
        if (metro && regionDisplay.startsWith(metro + ' ')) regionDisplay = metro;
      }
      // 팩별 수집 필드만 확인 화면에 노출
      const wfConf = ROOM.pack_defaults && Array.isArray(ROOM.pack_defaults.wizard_fields)
        ? ROOM.pack_defaults.wizard_fields : null;
      const showFld = (f) => !wfConf || wfConf.includes(f);
      const avatarRow = showFld('emoji')
        ? `<div class="summary-row"><span class="key">아바타</span><span class="val">${data.emoji ? `<span style="font-size:22px;">${escHtml(data.emoji)}</span>` : '<span class="empty">생략</span>'}</span></div>`
        : '';
      body = `
        <div class="step-num">${stepNum} · 확인</div>
        <h2 class="step-title">이렇게 입장해요</h2>
        <p class="step-sub">${subText}</p>
        <div class="summary">
          ${avatarRow}
          <div class="summary-row"><span class="key">닉네임</span><span class="val">${escHtml(data.nickname)}</span></div>
          ${showFld('gender') ? rowH('성별', genderLabel, false) : ''}
          ${showFld('birth_year') ? rowH('출생연도', birthDisplay, data.hide_birth_year) : ''}
          ${showFld('region') ? rowH('지역', regionDisplay, data.hide_region) : ''}
          ${showFld('industry') ? rowH('업종', data.industry, data.hide_industry) : ''}
          ${showFld('mbti') ? rowH('MBTI', data.mbti, false) : ''}
          ${showFld('interest') ? rowH('관심사', data.interest, data.hide_interest) : ''}
          ${showFld('playlist') ? rowH('플리 링크', data.playlist, false) : ''}
          ${showFld('instagram') ? rowH('인스타그램', data.instagram ? '@' + data.instagram : '', data.hide_instagram) : ''}
        </div>
        <div class="err-msg" id="errMsg"></div>
        <div class="actions">
          ${prevBtn}
          <button type="button" class="btn btn-next" id="submitBtn" onclick="submitJoin()">${submitLabel}</button>
        </div>
      `;
      break;
  }

  main.innerHTML = body;
  bindStep(key);
  renderProgress();
}

// 모임장 birth_year_format 에 맞춰 연도 → 표시 문자열 (host.html 과 동일 로직)
function formatBirthYear(year, format) {
  if (!year) return '';
  const y = new Date().getFullYear();
  const age = y - year + 1;
  if (format === 'decade_half') {
    if (age < 20) return '10대';
    if (age >= 60) return '60대+';
    const decade = Math.floor(age / 10) * 10;
    const half = age % 10;
    const label = half <= 3 ? '초' : half <= 6 ? '중' : '후';
    return `${decade}${label}`;
  }
  if (format === 'decade') {
    if (age < 20) return '10대';
    if (age < 30) return '20대';
    if (age < 40) return '30대';
    if (age < 50) return '40대';
    if (age < 60) return '50대';
    return '60대+';
  }
  return `${year}년`;
}

function row(k, v) {
  if (v) return `<div class="summary-row"><span class="key">${k}</span><span class="val">${escHtml(v)}</span></div>`;
  return `<div class="summary-row"><span class="key">${k}</span><span class="val empty">생략</span></div>`;
}
function rowH(k, v, hidden) {
  // hidden=true면 매칭에만 사용 (다른 게스트 카드에서 마스킹). 본인 확인엔 값+🔒 표시.
  if (!v) return `<div class="summary-row"><span class="key">${k}</span><span class="val empty">생략</span></div>`;
  if (hidden) {
    return `<div class="summary-row"><span class="key">${k}</span><span class="val" style="opacity:0.55;">${escHtml(v)} <span style="font-size:10px;color:#9aa0ac;letter-spacing:0.04em;">🔒 참가자에게 숨김</span></span></div>`;
  }
  return `<div class="summary-row"><span class="key">${k}</span><span class="val">${escHtml(v)}</span></div>`;
}

let _nickCheckTimer = null;
let _nickCheckSeq = 0;
async function runNicknameCheck(name) {
  const hostBox = document.getElementById('nickConflict');
  if (hostBox) hostBox.innerHTML = '';
  if (!name || name.length < 1) return;
  const mySeq = ++_nickCheckSeq;
  try {
    const r = await fetch(`/api/rooms/${ROOM_CODE}/nickname-check?n=${encodeURIComponent(name)}&uuid=${encodeURIComponent(UUID || '')}`);
    if (!r.ok) return;
    const j = await r.json();
    if (mySeq !== _nickCheckSeq) return; // stale
    if (!hostBox) return;
    if (!j.taken) { hostBox.innerHTML = ''; return; }
    if (j.is_self) {
      hostBox.innerHTML = `<div class="nick-conflict self">
        ✓ 이 방에 이미 '${escHtml(name)}' 로 참여한 기록이 있어요.
        <button type="button" class="nick-conflict-cta" onclick="location.replace('/room/' + encodeURIComponent('${ROOM_CODE}'))">바로 이어가기 →</button>
      </div>`;
    } else {
      hostBox.innerHTML = `<div class="nick-conflict taken">
        ⚠️ 이 방에서 '${escHtml(name)}' 은 이미 사용 중이에요.
        <button type="button" class="nick-conflict-cta" id="nickRecoverBtn">이전에 이 닉으로 참여했다면 이어받기</button>
      </div>`;
      document.getElementById('nickRecoverBtn')?.addEventListener('click', () => {
        data.nickname = name;
        if (typeof renderRecoverCta === 'function') renderRecoverCta(name);
      });
    }
  } catch (_) {}
}

function bindStep(key) {
  if (key === 'nick') {
    const inp = document.getElementById('nicknameInput');
    const btn = document.getElementById('nextBtn');
    btn.disabled = inp.value.trim().length === 0;
    inp.addEventListener('input', () => {
      data.nickname = inp.value.trim();
      btn.disabled = data.nickname.length === 0;
      // 입력 중에는 conflict 메시지 초기화 (blur 때 재확인)
      const hostBox = document.getElementById('nickConflict');
      if (hostBox) hostBox.innerHTML = '';
    });
    inp.addEventListener('blur', () => {
      clearTimeout(_nickCheckTimer);
      const v = inp.value.trim();
      _nickCheckTimer = setTimeout(() => runNicknameCheck(v), 300);
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !btn.disabled) nextStep();
    });
    setTimeout(() => inp.focus(), 100);
  }
  // chip click 핸들러는 document-level로 한번만
}

document.addEventListener('click', (e) => {
  // df-check 라벨 (hide 체크박스 chip) — selected 토글 + data 반영
  const dfChip = e.target.closest('.chip.df-check');
  if (dfChip) {
    const cb = dfChip.querySelector('input[type="checkbox"]');
    if (cb) {
      setTimeout(() => {
        dfChip.classList.toggle('selected', cb.checked);
        if (cb.id === 'hide_industry') data.hide_industry = cb.checked;
        if (cb.id === 'hide_interest') data.hide_interest = cb.checked;
        if (cb.id === 'hide_instagram') data.hide_instagram = cb.checked;
      }, 0);
    }
    return;
  }
  const chip = e.target.closest('.chip');
  if (!chip) return;
  const group = chip.dataset.group;
  if (!group) return;
  const wasSelected = chip.classList.contains('selected');

  // 게스트 hide_birth_year 토글
  if (group === 'hide_birth_year') {
    document.querySelectorAll('.chip[data-group="hide_birth_year"]').forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
    data.hide_birth_year = chip.dataset.value === 'true';
    return;
  }
  // 게스트 hide_region 토글
  if (group === 'hide_region') {
    const isHide = chip.dataset.value === 'true';
    data.hide_region = isHide;
    if (isHide) data.region = stripMetroGu(data.region);
    renderStep();
    return;
  }

  if (group === 'interest') {
    // chip 선택 — input value는 건드리지 않음 (직접 입력 영역과 분리)
    chip.classList.toggle('selected', !wasSelected);
    recomputeInterest();
    return;
  }

  // region: 항상 renderStep으로 구 row 재평가 (서울 ↔ 다른 시·도 전환 시 강남 잔재 제거)
  if (group === 'region') {
    if (wasSelected) {
      data.region = null;
    } else {
      data.region = chip.dataset.value;
    }
    renderStep(); // 구 UI 노출 조건(region==='서울' && rd) 즉시 재평가
    return;
  }

  // metro-gu: 구 선택 → region = "{광역시} {구}" 형태 (서울/부산/대구/인천/광주/대전/울산)
  if (group === 'metro-gu') {
    document.querySelectorAll('.chip[data-group="metro-gu"]').forEach(c => c.classList.remove('selected'));
    const currentMetro = detectMetro(data.region);
    if (!currentMetro) return;
    if (wasSelected) {
      data.region = currentMetro;
    } else {
      chip.classList.add('selected');
      data.region = currentMetro + ' ' + chip.dataset.value;
    }
    return;
  }

  // 다른 그룹은 single-select (다시 누르면 취소)
  document.querySelectorAll(`.chip[data-group="${group}"]`).forEach(c => c.classList.remove('selected'));
  if (!wasSelected) {
    chip.classList.add('selected');
    data[group] = chip.dataset.value;
  } else {
    data[group] = null;
  }
});

document.addEventListener('change', (e) => {
  if (e.target.id === 'birthYearInput') {
    const y = parseInt(e.target.value, 10);
    data.birth_year = (y >= 1940 && y <= 2030) ? y : null;
  }
});

// 통합 페이지 진입 시 출생연도 default를 1990으로 즉시 반영 (사용자가 안 만져도 적용)
document.addEventListener('DOMContentLoaded', () => {});
function ensureBirthDefault() {
  if (!data.birth_year) {
    const sel = document.getElementById('birthYearInput');
    if (sel && sel.value) {
      const y = parseInt(sel.value, 10);
      if (y >= 1940 && y <= 2030) data.birth_year = y;
    }
  }
}

// 관심사 — chip selected + input extras 합쳐서 dedupe
function recomputeInterest() {
  const chips = Array.from(document.querySelectorAll('.chip[data-group="interest"].selected')).map(c => c.dataset.value);
  const inp = document.getElementById('interestInput');
  const extras = (inp ? inp.value : '').split(',').map(s => s.trim()).filter(Boolean);
  const merged = [];
  const seen = new Set();
  for (const t of [...chips, ...extras]) {
    if (!seen.has(t)) { seen.add(t); merged.push(t); }
  }
  data.interest = merged.length ? merged.join(', ') : null;
}

document.addEventListener('input', (e) => {
  if (e.target.id === 'interestInput') {
    recomputeInterest();
  }
  if (e.target.id === 'playlistInput') {
    const v = e.target.value.trim();
    data.playlist = (v && /^https?:\/\//i.test(v)) ? v.slice(0, 500) : (v ? v : null);
  }
  if (e.target.id === 'instaInput') {
    // 인스타그램 — 영문/숫자/점/언더바만 허용, 소문자 변환, @ 자동 제거
    const cleaned = e.target.value.toLowerCase().replace(/^@/, '').replace(/[^a-z0-9._]/g, '');
    if (cleaned !== e.target.value) e.target.value = cleaned;
    data.instagram = cleaned || null;
  }
});

function nextStep() {
  // basic step 떠날 때 birth_year default 1990 보장
  if (STEPS[CURRENT] === 'basic') ensureBirthDefault();
  CURRENT = Math.min(CURRENT + 1, STEPS.length - 1);
  renderStep();
}
function skipInstagram() {
  data.instagram = null;
  data.hide_instagram = false;
  CURRENT = Math.min(CURRENT + 1, STEPS.length - 1);
  renderStep();
}

// 이모지 카테고리 탭 전환 — 현재 step(emoji) 재렌더. data.emoji 는 그대로 보존
function switchEmojiCat(idx) {
  window._emojiCatIdx = idx;
  renderStep();
}

// 이모지 선택/입력 핸들러
document.addEventListener('click', (e) => {
  const chip = e.target.closest('.emoji-chip');
  if (!chip) return;
  const v = chip.dataset.emoji || '';
  data.emoji = v || null;

  document.querySelectorAll('.emoji-chip').forEach(c => c.classList.toggle('selected', c.dataset.emoji === v && v));
});
document.addEventListener('input', (e) => {
  if (e.target.id !== 'emojiInput') return;
  // 첫 글리프(이모지) 추출 — 결합 문자(zwj)는 그대로 두고 4자 cap
  const v = (e.target.value || '').slice(0, 4);
  data.emoji = v || null;
  const preview = document.getElementById('emojiPreview');
  if (preview) preview.innerHTML = v ? `<span style="font-size:72px;line-height:1;">${v}</span>` : '🙂';
  document.querySelectorAll('.emoji-chip').forEach(c => c.classList.toggle('selected', c.dataset.emoji === v && v));
});
// 사진 업로드 기능 폐기 (2026-04-19) — wizard에서 입력 path 모두 제거
function clearWizardPhoto() { /* legacy noop */ }
function prevStep() {
  CURRENT = Math.max(CURRENT - 1, 0);
  renderStep();
}

async function submitJoin() {
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errMsg');
  if (!data.nickname) {
    err.textContent = '닉네임이 필요해요';
    CURRENT = 0;
    renderStep();
    return;
  }
  btn.disabled = true;
  btn.textContent = '입장 중…';
  err.textContent = '';
  try {
    const r = await fetch(`/api/rooms/${ROOM_CODE}/join`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        uuid: UUID,
        nickname: data.nickname,
        profile: {
          gender: data.gender, birth_year: data.birth_year,
          region: data.region, industry: data.industry,
          mbti: data.mbti, interest: data.interest,
          instagram: data.instagram,
          emoji: data.emoji,
          hide_birth_year: data.hide_birth_year,
          hide_region: data.hide_region,
          hide_industry: data.hide_industry,
          hide_interest: data.hide_interest,
          hide_instagram: data.hide_instagram,
        },
      }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) {
      if (j.error === 'NICKNAME_TAKEN') {
        // 이전에 이 방에서 쓰던 닉네임일 가능성 — 복구 CTA 노출
        renderRecoverCta(data.nickname);
      } else {
        err.textContent = j.message || j.error || '입장 실패';
      }
      btn.disabled = false;
      btn.textContent = '입장하기';
      return;
    }
    // playlist-share 팩 — 플레이리스트 URL 별도 저장 (실패해도 입장은 진행)
    if (ROOM.pack_id === 'playlist-share' && data.playlist) {
      try {
        await fetch(`/api/rooms/${ROOM_CODE}/playlist`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uuid: UUID, url: data.playlist }),
        });
      } catch (_) {}
    }
    try {
      localStorage.setItem('preferred_nickname', data.nickname);
      localStorage.setItem('profile_snapshot', JSON.stringify({
        gender: data.gender, birth_year: data.birth_year, region: data.region,
        industry: data.industry, mbti: data.mbti, interest: data.interest,
        instagram: data.instagram,
        emoji: data.emoji,
      }));
    } catch (_) {}
    // OAuth 로그인 상태이면 server users 테이블에도 profile 저장 (다음 모임 prefill)
    try {
      const tok = localStorage.getItem('user_token');
      if (tok) {
        await fetch('/api/auth/profile', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'x-user-token': tok },
          body: JSON.stringify({
            gender: data.gender, birth_year: data.birth_year, region: data.region,
            industry: data.industry, mbti: data.mbti, interest: data.interest,
            instagram: data.instagram,
            emoji: data.emoji,
          }),
        });
      }
    } catch (_) {}
    location.replace(`/room/${ROOM_CODE}`);
  } catch (e) {
    err.textContent = '서버에 연결할 수 없어요. 잠시 후 다시 시도해주세요.';
    btn.disabled = false;
    btn.textContent = '입장하기';
  }
}

function renderErr(msg) {
  document.getElementById('main').innerHTML = `<div class="step-title" style="text-align:center;color:#ff8a8a;">⚠️ ${escHtml(msg)}</div>`;
}

// ── 닉네임 복구 플로우 ──────────────────────
// 이 방에서 쓰던 닉네임이 이미 다른 uuid 로 등록됨 → 모임장 승인 하에 내 새 uuid 로 기존 답안 승계.
function renderRecoverCta(nickname) {
  const err = document.getElementById('errMsg');
  if (!err) return;
  err.innerHTML = `
    <div style="padding:14px;border:1px solid rgba(212,168,67,0.45);border-radius:12px;background:rgba(212,168,67,0.08);text-align:left;">
      <div style="font-weight:700;color:#f5f2ec;margin-bottom:6px;">"${escHtml(nickname)}" — 이 방에서 이미 사용 중이에요</div>
      <div style="font-size:12.5px;color:#c9cdd6;line-height:1.55;margin-bottom:10px;">같은 닉네임으로 전에 입장했던 기기라면 <strong>복구 요청</strong> 가능해요. 모임장이 승인하면 지금까지의 답안·투표가 이 기기로 이어져요.</div>
      <button type="button" id="recoverBtn" style="width:100%;padding:10px;background:var(--gold);color:var(--navy);border:none;border-radius:8px;font-weight:700;font-family:inherit;font-size:13px;cursor:pointer;">이 방에서 쓰던 닉네임이에요 · 복구 요청</button>
    </div>`;
  const rb = document.getElementById('recoverBtn');
  if (rb) rb.onclick = () => requestRecover(nickname);
}

async function requestRecover(nickname) {
  const err = document.getElementById('errMsg');
  err.innerHTML = `<div style="padding:12px;color:#e8b84b;text-align:center;">모임장에게 복구 요청 보냈어요. 승인 대기 중…</div>`;
  try {
    const r = await fetch(`/api/rooms/${ROOM_CODE}/recover-request`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname, new_uuid: UUID }),
    });
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      err.innerHTML = `<div style="color:#ff8a8a;">복구 요청 실패 — ${escHtml(j.error || '잠시 후 다시 시도')}</div>`;
      return;
    }
    // 60초간 2초 간격 폴링 — 모임장 승인 시 /me?uuid=new_uuid 가 joined:true
    let tries = 0;
    const timer = setInterval(async () => {
      tries++;
      if (tries > 30) { clearInterval(timer); err.innerHTML = `<div style="color:#ff8a8a;">승인 대기 시간이 지났어요. 모임장에게 다시 요청해주세요.</div>`; return; }
      try {
        const meR = await fetch(`/api/rooms/${ROOM_CODE}/me?uuid=${encodeURIComponent(UUID)}`);
        if (!meR.ok) return;
        const me = await meR.json();
        if (me.joined) {
          clearInterval(timer);
          try { localStorage.setItem('preferred_nickname', nickname); } catch (_) {}
          location.replace(`/room/${ROOM_CODE}`);
        }
      } catch (_) {}
    }, 2000);
  } catch (e) {
    err.innerHTML = `<div style="color:#ff8a8a;">네트워크가 불안정해요. 잠시 후 다시 시도해주세요.</div>`;
  }
}
